// Names and avatars get copied into pick/entry documents at submit/join time (so historical
// records freeze correctly), but that means those copies go stale the moment someone changes
// their name or avatar in Settings. This hook does a live lookup against the real `users`
// profiles for a given set of uids, so any screen that shows a name/avatar can prefer the
// live version and always reflect the latest Settings changes. Firestore's "in" queries cap
// at 30 values, so a larger uid set is split into chunks and merged.
function useLiveProfiles(uids) {
  const [profiles, setProfiles] = useState({});
  const key = uids.slice().sort().join(",");
  useEffect(() => {
    const unique = key ? key.split(",") : [];
    if (unique.length === 0) { setProfiles({}); return; }
    const chunks = [];
    for (let i = 0; i < unique.length; i += 30) chunks.push(unique.slice(i, i + 30));
    const merged = {};
    let pending = chunks.length;
    const unsubs = chunks.map((chunk) =>
      db.collection("users").where(FieldPath.documentId(), "in", chunk).onSnapshot((snap) => {
        snap.docs.forEach((d) => { merged[d.id] = d.data(); });
        setProfiles({ ...merged });
      })
    );
    return () => unsubs.forEach((u) => u());
  }, [key]);
  return profiles;
}

function getRound(roundId) { return NRL_ROUNDS.find((r) => r.id === roundId) || NRL_ROUNDS[0]; }
// Rounds a host can still open a competition for — their first game hasn't kicked off yet.
// Everything here is derived from the live date against the season schedule, so the app always
// tracks the real current round automatically as weeks roll over.
function upcomingRounds() { return NRL_ROUNDS.filter((r) => r.firstKickoff.getTime() > Date.now()); }
function firstUpcomingRoundId() { const u = upcomingRounds(); return (u[0] || NRL_ROUNDS[NRL_ROUNDS.length - 1]).id; }
// The round the NRL is currently up to = the latest round whose first game has kicked off
// (or the very first round if the season hasn't started).
function currentNrlRound() {
  const now = Date.now();
  let cur = NRL_ROUNDS[0];
  for (const r of NRL_ROUNDS) { if (r.firstKickoff.getTime() <= now) cur = r; }
  return cur;
}
// Find a round's games in the NRL feed. Tries the exact round key, then falls back to the feed
// round whose games kick off closest to this round's date — so finals (which the feed may number
// differently) still resolve. Used by results auto-fill, the margin decider, and fixture loading.
function feedRoundFor(store, round) {
  const rounds = (store && store.rounds) || {};
  if (round && rounds[round.id]) return rounds[round.id];
  if (!round) return null;
  const target = round.firstKickoff.getTime();
  let best = null, bestDiff = 6 * 24 * 3600 * 1000; // within ~6 days
  for (const k in rounds) {
    const g0 = (rounds[k].games || []).find((g) => g.date);
    if (!g0) continue;
    const diff = Math.abs(new Date(g0.date).getTime() - target);
    if (diff < bestDiff) { bestDiff = diff; best = rounds[k]; }
  }
  return best;
}

// ---- Monetisation / payments ----
// Opening (creating) a competition carries a one-off setup fee per tier — except a host's
// FIRST ever competition at the free-trial tier, which is on us. Prices are inc. GST.
//
// PAYMENTS_LIVE is the single switch: flip it to true once Stripe is wired up. Until then the
// app runs BETA SIMULATED payments — the full checkout UX shows and behaves exactly as it will
// in production, but no card is collected and nothing is charged. The Stripe integration point
// is the clearly-marked block in processCheckout() below (see docs/STRIPE.md for the contract).
const PAYMENTS_LIVE = false;
const FREE_TRIAL_TIER = "bronze"; // the tier a first-time host can open for free

// GST is included in every displayed price. In Australia the GST component of a GST-inclusive
// total is exactly 1/11 of that total.
function gstOf(incGstAmount) { return Math.round((incGstAmount / 11) * 100) / 100; }
// What a host pays to open a competition at this tier (0 if it's their free first one).
function tierUnlockAmount(tierLevel, isFirstFree) { return isFirstFree ? 0 : getTierPreset(tierLevel).unlockPrice; }

// Runs the checkout for a paid competition open. BETA: simulates a successful payment after a
// short delay (no charge). LIVE: hand off to Stripe. Returns { ok, mode, reference? } or throws.
async function processCheckout({ tierLevel, amount }) {
  if (!PAYMENTS_LIVE) {
    // BETA — simulated payment. No card details are collected and no money moves.
    await new Promise((resolve) => setTimeout(resolve, 900));
    return { ok: true, mode: "beta-sim", reference: "SIMULATED" };
  }
  // ---- STRIPE INTEGRATION POINT --------------------------------------------------------------
  // TODO(stripe): create a Checkout Session / PaymentIntent for `amount` (AUD, inc. GST) on your
  // backend, run the confirmation/redirect, and return { ok: true, mode: "stripe", reference }
  // on success or { ok: false, error } on failure. Full contract in docs/STRIPE.md.
  throw new Error("Live card payments aren't switched on yet.");
}

// A short badge describing what a host paid to open a competition. Competitions created before
// the payment step existed have no `payment` field — they were opened for free.
function paymentStatusBadge(payment) {
  if (!payment || payment.status === "free" || !payment.amount) return { text: "Free", tone: "teal" };
  const amt = `$${Number(payment.amount).toFixed(0)}`;
  if (payment.status === "paid") return { text: `${amt} paid`, tone: "teal" };
  if (payment.status === "simulated") return { text: `${amt} · simulated`, tone: "amber" };
  return { text: amt, tone: "neutral" };
}

// Short, human-friendly invite code (no ambiguous 0/O/1/I). Hosts share it so players can
// join a private competition — the app is invite-only, you don't browse a public list.
function genCode() {
  const A = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s = "";
  for (let i = 0; i < 6; i++) s += A[Math.floor(Math.random() * A.length)];
  return s;
}

// Robust copy — tries the async Clipboard API, falls back to a temporary textarea + execCommand
// (needed on some iOS/Safari and non-secure contexts where navigator.clipboard silently fails).
async function copyText(text) {
  try {
    if (navigator.clipboard && window.isSecureContext) { await navigator.clipboard.writeText(text); return true; }
  } catch (e) { /* fall through to legacy path */ }
  try {
    const ta = document.createElement("textarea");
    ta.value = text; ta.setAttribute("readonly", ""); ta.style.position = "fixed"; ta.style.top = "-1000px"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select(); ta.setSelectionRange(0, text.length);
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  } catch (e) { return false; }
}

function formatCountdown(ms) {
  if (ms <= 0) return "Started";
  const totalMin = Math.floor(ms / 60000);
  const days = Math.floor(totalMin / (60 * 24));
  const hours = Math.floor((totalMin % (60 * 24)) / 60);
  const mins = totalMin % 60;
  if (days > 0) return `${days}d ${hours}h`;
  if (hours > 0) return `${hours}h ${mins}m`;
  return `${mins}m`;
}

}

function getInitials(name) {
  if (!name) return "?";
  const parts = name.trim().split(/\s+/).filter(Boolean);
  if (parts.length === 0) return "?";
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

// Shared audio context for the whole app. Browsers block sound until the user has
// interacted with the page at all — creating a fresh AudioContext each time (as the
// splash screen used to) meant it was blocked on every truly first load. Reusing one
// shared, primed context means sound works reliably everywhere after the very first tap.
function getSharedAudioCtx() {
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx) return null;
  if (!window.__lmsAudioCtx) window.__lmsAudioCtx = new Ctx();
  if (window.__lmsAudioCtx.state === "suspended") window.__lmsAudioCtx.resume().catch(() => {});
  return window.__lmsAudioCtx;
}

// Heavy "concrete smash" impact — a Hulk-style crumbling thud, built from four layered
// parts: a deep sub that drops in pitch for weight, a gritty (distorted) body, a sharp
// filtered "crack" as it hits, and a longer band-limited noise tail that crumbles away
// like settling rubble. `boom` makes it bigger (used for the final word).
function playThumpSound(freq, boom) {
  try {
    const ctx = getSharedAudioCtx();
    if (!ctx) return;
    const now = ctx.currentTime;
    const master = ctx.createGain();
    master.gain.value = boom ? 1.0 : 0.72;
    master.connect(ctx.destination);
    const dur = boom ? 0.5 : 0.32;

    // Filtered-noise buffer helper.
    const noiseBuf = (len) => {
      const n = Math.max(1, Math.floor(ctx.sampleRate * len));
      const b = ctx.createBuffer(1, n, ctx.sampleRate);
      const d = b.getChannelData(0);
      for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
      return b;
    };

    // 1) Deep sub — pitch collapses fast for weight/impact.
    const sub = ctx.createOscillator();
    const subGain = ctx.createGain();
    sub.type = "sine";
    sub.frequency.setValueAtTime(freq * 2.2, now);
    sub.frequency.exponentialRampToValueAtTime(Math.max(freq * 0.22, 22), now + dur);
    subGain.gain.setValueAtTime(0.0001, now);
    subGain.gain.exponentialRampToValueAtTime(boom ? 1.1 : 0.82, now + 0.006);
    subGain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    sub.connect(subGain); subGain.connect(master);
    sub.start(now); sub.stop(now + dur + 0.05);

    // 2) Gritty body — triangle through a soft-clip waveshaper for concrete crunch.
    const shaper = ctx.createWaveShaper();
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) { const x = (i / 255) * 2 - 1; curve[i] = Math.tanh(x * 3); }
    shaper.curve = curve;
    const body = ctx.createOscillator();
    const bodyGain = ctx.createGain();
    body.type = "triangle";
    body.frequency.setValueAtTime(freq * 1.3, now);
    body.frequency.exponentialRampToValueAtTime(Math.max(freq * 0.4, 40), now + dur * 0.7);
    bodyGain.gain.setValueAtTime(0.0001, now);
    bodyGain.gain.exponentialRampToValueAtTime(boom ? 0.5 : 0.32, now + 0.006);
    bodyGain.gain.exponentialRampToValueAtTime(0.0001, now + dur * 0.85);
    body.connect(shaper); shaper.connect(bodyGain); bodyGain.connect(master);
    body.start(now); body.stop(now + dur);

    // 3) Crack — noise through a lowpass that sweeps down; the sharp hit.
    const crackLen = boom ? 0.16 : 0.11;
    const crack = ctx.createBufferSource(); crack.buffer = noiseBuf(crackLen);
    const crackLp = ctx.createBiquadFilter(); crackLp.type = "lowpass";
    crackLp.frequency.setValueAtTime(1700, now);
    crackLp.frequency.exponentialRampToValueAtTime(160, now + crackLen);
    crackLp.Q.value = 1.0;
    const crackGain = ctx.createGain();
    crackGain.gain.setValueAtTime(boom ? 0.85 : 0.55, now);
    crackGain.gain.exponentialRampToValueAtTime(0.001, now + crackLen);
    crack.connect(crackLp); crackLp.connect(crackGain); crackGain.connect(master);
    crack.start(now);

    // 4) Crumbling rubble tail — band-limited noise settling with a granular flicker.
    const tailLen = boom ? 0.8 : 0.5;
    const tail = ctx.createBufferSource(); tail.buffer = noiseBuf(tailLen);
    const tailBp = ctx.createBiquadFilter(); tailBp.type = "bandpass";
    tailBp.frequency.setValueAtTime(720, now + 0.02);
    tailBp.frequency.exponentialRampToValueAtTime(300, now + tailLen);
    tailBp.Q.value = 0.6;
    const tailGain = ctx.createGain();
    const peak = boom ? 0.28 : 0.18;
    tailGain.gain.setValueAtTime(0.0001, now);
    tailGain.gain.linearRampToValueAtTime(peak, now + 0.03);
    const steps = 6;
    for (let i = 1; i <= steps; i++) {
      const t = now + (tailLen * i) / steps;
      tailGain.gain.linearRampToValueAtTime(peak * (1 - i / steps) * (0.55 + Math.random() * 0.45), t);
    }
    tailGain.gain.exponentialRampToValueAtTime(0.0001, now + tailLen + 0.05);
    tail.connect(tailBp); tailBp.connect(tailGain); tailGain.connect(master);
    tail.start(now + 0.01);
  } catch (e) { /* audio blocked or unavailable — visuals still carry the moment */ }
}

function playBellStrike(ctx, t, fundamental) {
  // Bells ring with inharmonic (non-whole-number) overtone ratios, not simple harmonics —
  // that's what gives a struck bell its metallic "clang" instead of sounding like a soft chime.
  const partials = [1, 2.4, 3.8];
  const gains = [0.55, 0.28, 0.16];
  partials.forEach((mult, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(fundamental * mult, t);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(gains[i], t + 0.008);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.7);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.75);
  });
  // sharp metallic strike transient right at the hit
  const clickLen = Math.floor(ctx.sampleRate * 0.02);
  const buffer = ctx.createBuffer(1, clickLen, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < clickLen; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / clickLen);
  const click = ctx.createBufferSource();
  click.buffer = buffer;
  const clickGain = ctx.createGain();
  clickGain.gain.setValueAtTime(0.35, t);
  clickGain.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
  click.connect(clickGain); clickGain.connect(ctx.destination);
  click.start(t);
}

// Rising tension "swoosh" under the elimination sequence — builds to the winner reveal.
function playIntroRiser() {
  try {
    const ctx = getSharedAudioCtx();
    if (!ctx) return;
    const now = ctx.currentTime;
    const dur = 1.4;
    const n = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, n, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const bp = ctx.createBiquadFilter(); bp.type = "bandpass"; bp.Q.value = 0.8;
    bp.frequency.setValueAtTime(220, now); bp.frequency.exponentialRampToValueAtTime(2600, now + dur);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, now); g.gain.exponentialRampToValueAtTime(0.08, now + dur * 0.85); g.gain.exponentialRampToValueAtTime(0.0001, now + dur + 0.1);
    src.connect(bp); bp.connect(g); g.connect(ctx.destination); src.start(now); src.stop(now + dur + 0.1);
  } catch (e) { /* audio unavailable */ }
}

// Gentle warm swell for the logo reveal — soft and premium, not a smash.
function playSoftReveal() {
  try {
    const ctx = getSharedAudioCtx();
    if (!ctx) return;
    const now = ctx.currentTime;
    const lp = ctx.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 950; lp.connect(ctx.destination);
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = "sine"; o.frequency.setValueAtTime(196, now); o.frequency.linearRampToValueAtTime(294, now + 0.5);
    g.gain.setValueAtTime(0.0001, now); g.gain.exponentialRampToValueAtTime(0.11, now + 0.28); g.gain.exponentialRampToValueAtTime(0.0001, now + 1.3);
    o.connect(g); g.connect(lp); o.start(now); o.stop(now + 1.4);
    const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
    o2.type = "sine"; o2.frequency.setValueAtTime(587, now);
    g2.gain.setValueAtTime(0.0001, now); g2.gain.exponentialRampToValueAtTime(0.045, now + 0.32); g2.gain.exponentialRampToValueAtTime(0.0001, now + 1.05);
    o2.connect(g2); g2.connect(ctx.destination); o2.start(now); o2.stop(now + 1.1);
  } catch (e) { /* audio blocked or unavailable */ }
}

function playDingSound() {
  try {
    const ctx = getSharedAudioCtx();
    if (!ctx) return;
    const now = ctx.currentTime;
    playBellStrike(ctx, now, 850);
    playBellStrike(ctx, now + 0.32, 850);
  } catch (e) { /* audio blocked or unavailable */ }
}

// Apple Pay-style confirmation — two clean ascending tones, short and crisp.
function playPaySuccessSound() {
  try {
    const ctx = getSharedAudioCtx();
    if (!ctx) return;
    const now = ctx.currentTime;
    const notes = [[783.99, 0.0, 0.13], [1174.66, 0.11, 0.22]]; // G5 → D6, quick rise
    notes.forEach(([freq, t0, dur]) => {
      const t = now + t0;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = "sine";
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.22, t + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(ctx.destination);
      o.start(t); o.stop(t + dur + 0.05);
    });
  } catch (e) { /* audio blocked or unavailable */ }
}

function playCashSound() {
  try {
    const ctx = getSharedAudioCtx();
    if (!ctx) return;
    const now = ctx.currentTime;
    [[900, now], [1350, now + 0.08]].forEach(([freq, t]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.32, t + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.28);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.3);
    });
  } catch (e) { /* audio blocked or unavailable */ }
}

async function hashPin(pin, salt) {
  const enc = new TextEncoder();
  const data = enc.encode(`${pin}:${salt}`);
  const buf = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, "0")).join("");
}

function PinLockScreen({ uid, onUnlock, onUseEmailInstead }) {
  const [pin, setPin] = useState("");
  const [error, setError] = useState("");
  const [checking, setChecking] = useState(false);

  const submit = async () => {
    setChecking(true); setError("");
    const stored = window.localStorage.getItem(`lms_pin_${uid}`);
    const hash = await hashPin(pin, uid);
    if (hash === stored) { onUnlock(); }
    else { setError("Incorrect PIN"); setPin(""); }
    setChecking(false);
  };

  return (
    <div className="min-h-screen text-slate-100 flex flex-col justify-center px-6" style={{ backgroundColor: BG, color: "var(--app-text)" }}>

          value={pin} onChange={(e) => setPin(e.target.value.replace(/\D/g, "").slice(0, 6))}

}

function calcAge(dobString) {
  if (!dobString) return null;
  const dob = new Date(dobString);
  if (isNaN(dob.getTime())) return null;
  const today = new Date();
  let age = today.getFullYear() - dob.getFullYear();
  const m = today.getMonth() - dob.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--;
  return age;
}

function AuthScreen() {

  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);
  const canSubmit = mode === "create" ? name && email && password.length >= 6 : email && password;

  const submit = async () => {
    setError(""); setBusy(true);
    try {
      if (mode === "create") {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        await db.collection("users").doc(cred.user.uid).set({
          name, email, accent: "teal", role: "player",
          ageVerified: false, avatarPreset: null, createdAt: FieldValue.serverTimestamp(),
        });
      } else {
        await auth.signInWithEmailAndPassword(email, password);
      }
    } catch (e) { setError(e.message.replace("Firebase: ", "")); }
    setBusy(false);
  };

  const smokeRef = useRef(null);
  const pointerTarget = useRef({ x: 0, y: 0 });
  const pointerCurrent = useRef({ x: 0, y: 0 });

  useEffect(() => {
    let raf;
    const animate = () => {
      pointerCurrent.current.x += (pointerTarget.current.x - pointerCurrent.current.x) * 0.08;
      pointerCurrent.current.y += (pointerTarget.current.y - pointerCurrent.current.y) * 0.08;
      if (smokeRef.current) smokeRef.current.style.transform = `translate(${pointerCurrent.current.x}px, ${pointerCurrent.current.y}px)`;
      raf = requestAnimationFrame(animate);
    };
    raf = requestAnimationFrame(animate);
    return () => cancelAnimationFrame(raf);
  }, []);

  const handlePointerMove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width - 0.5) * 2;
    const y = ((e.clientY - rect.top) / rect.height - 0.5) * 2;
    pointerTarget.current = { x: x * 26, y: y * 26 };
  };

  return (
    <div className="min-h-screen text-slate-100 flex flex-col justify-center px-6 relative overflow-hidden" style={{ backgroundColor: "#050506" }} onPointerMove={handlePointerMove}>
      <svg width="0" height="0" style={{ position: "absolute" }}>
        <filter id="smokeTurb" colorInterpolationFilters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.012 0.02" numOctaves="3" seed="11" result="turb" />
          <feColorMatrix in="turb" type="matrix" values="0 0 0 0 0.85  0 0 0 0 0.85  0 0 0 0 0.9  0 0 0 0.4 0" />
        </filter>
      </svg>
      <div ref={smokeRef} style={{ position: "absolute", inset: 0 }}>
        <div className="smoke-noise" style={{ filter: "url(#smokeTurb)" }} />
        <div className="smoke-layer-a" />
        <div className="smoke-layer-b" />
      </div>

      <div className="max-w-sm mx-auto w-full relative z-10">
        <div className="mb-8">
          <BrandLockup layout="stacked" emblemSize={56} showBeta />
        </div>

        <div className={`rounded-2xl border adapt-border-10 p-1 mb-6`} style={{ backgroundColor: "rgba(255,255,255,0.03)", backdropFilter: "blur(6px)" }}>
          <div className="flex rounded-xl overflow-hidden">
            <button onClick={() => setMode("create")} className={`flex-1 py-2 text-sm font-medium transition ${mode === "create" ? "bg-teal-400 text-neutral-950" : "text-neutral-400"}`}>Create account</button>
            <button onClick={() => setMode("login")} className={`flex-1 py-2 text-sm font-medium transition ${mode === "login" ? "bg-teal-400 text-neutral-950" : "text-neutral-400"}`}>Log in</button>
          </div>
        </div>

        <div className="space-y-3">
          {mode === "create" && (
            <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Full name"
              className="w-full rounded-xl border adapt-border-10 px-4 py-3 text-sm text-slate-100 placeholder:text-neutral-500 outline-none focus:border-teal-400"
              style={{ backgroundColor: "rgba(255,255,255,0.04)" }} />
          )}
          <input value={email} onChange={(e) => setEmail(e.target.value)} placeholder="Email address" type="email"
            className="w-full rounded-xl border adapt-border-10 px-4 py-3 text-sm text-slate-100 placeholder:text-neutral-500 outline-none focus:border-teal-400"
            style={{ backgroundColor: "rgba(255,255,255,0.04)" }} />
          <input value={password} onChange={(e) => setPassword(e.target.value)} type="password" placeholder="Password (min 6 characters)"
            className="w-full rounded-xl border adapt-border-10 px-4 py-3 text-sm text-slate-100 placeholder:text-neutral-500 outline-none focus:border-teal-400"
            style={{ backgroundColor: "rgba(255,255,255,0.04)" }} />

function TierCard({ tier, now, onJoin, onInvite, joined, theme }) {
  const preset = getTierPreset(tier.tierLevel);
  const isHigh = preset.premium;
  const maxPlayers = preset.maxPlayers;
  const spotsLeft = maxPlayers === null ? null : Math.max(0, maxPlayers - tier.entries);
  const isFull = spotsLeft === 0;
  const closeTime = tier.lockTime || tier.startTime; // entries close at lockout, which is always before kickoff
  const msToClose = closeTime.getTime() - now.getTime();
  const entriesClosed = msToClose <= 0 || isFull;
  const isUrgent = !entriesClosed && msToClose <= 1000 * 60 * 60 * 6;
  const started = now.getTime() >= tier.startTime.getTime();
  const countdown = formatCountdown(msToClose);
  const [rulesOpen, setRulesOpen] = useState(false);
  const roundLabel = getRound(tier.roundId).label;
  return (
    <div className={`relative overflow-hidden rounded-2xl border ${isHigh ? "border-violet-500/40 bg-gradient-to-b from-violet-950/30 to-neutral-800" : `${theme.borderSoft} bg-neutral-800`} p-5`}>
      {joined && (
        <div className={`absolute top-3 right-3 inline-flex items-center gap-1 rounded-full ${theme.bgSoft} ${theme.text} px-2 py-0.5 text-[10px] font-semibold`}><Check size={11} /> Joined</div>
      )}
      <div className="inline-flex items-center gap-1 mb-2 rounded-full px-3 py-1 text-[10px] font-bold uppercase tracking-wider text-neutral-950" style={{ backgroundColor: preset.color }}><Crown size={12} /> {preset.name}</div>
      <div className="flex items-center justify-between"><h3 className="text-lg font-semibold text-slate-100">{tier.name}</h3><span className="text-xs text-neutral-500">{roundLabel}</span></div>
      <p className="text-sm text-neutral-400 mt-1">{preset.name} tier · {tierCapacityLabel(preset)} · prize pool run by your host</p>
      <p className="text-[11px] text-neutral-500 mt-0.5">{tierLives(tier)} {tierLives(tier) === 1 ? "life" : "lives"} · {reusePolicyLabel(tierReusePolicy(tier))}{tier.marginsMode ? " · margins mode" : ""}</p>
      <div className={`mt-4 flex items-center justify-center gap-2 rounded-lg px-3 py-2 text-xs font-medium ${entriesClosed ? "bg-rose-500/10 text-rose-400" : isUrgent ? "bg-rose-500/15 text-rose-300 animate-pulse" : "bg-amber-400/10 text-amber-300"}`}>
        <Clock size={13} />{isFull && msToClose > 0 ? "Competition full — no spots left" : entriesClosed ? (started ? "Entries closed — round underway" : "Entries closed — picks have locked for this round") : isUrgent ? `Locking in ${countdown} — last chance to join!` : `Entries close in ${countdown} (picks lock 24h before the round's first game)`}
      </div>
      <div className={`mt-4 flex items-center justify-around rounded-xl bg-black/30 border ${PANEL_BORDER} py-4`}>
        <Scoreboard value={tier.entries} label="Entries" accent={isHigh ? "text-violet-300" : theme.text} />
        <div className="h-10 w-px bg-white/10" /><Scoreboard value={maxPlayers === null ? "∞" : spotsLeft} label={maxPlayers === null ? "Capacity" : "Spots Left"} accent="gold" />
      </div>
      {tier.rules && (
        <div className="mt-4">
          <button onClick={() => setRulesOpen((o) => !o)} className="flex items-center gap-1 text-xs text-neutral-400 hover:text-neutral-200">
            <ChevronDown size={12} className={`transition-transform ${rulesOpen ? "rotate-180" : ""}`} /> {rulesOpen ? "Hide rules" : "View rules"}
          </button>
          {rulesOpen && <p className={`mt-2 rounded-lg bg-black/30 border ${PANEL_BORDER} p-3 text-xs text-neutral-300 whitespace-pre-wrap`}>{tier.rules}</p>}
        </div>
      )}
      {joined ? (
        entriesClosed ? (
          <div className={`mt-5 w-full rounded-xl py-3 text-sm font-medium text-center border ${PANEL_BORDER} text-neutral-500`}>
            Entries have closed — invites aren't available for this competition anymore
          </div>
        ) : (
          <button onClick={() => onInvite(tier)}
            className="mt-5 w-full rounded-xl py-3 text-sm font-semibold border-2 border-teal-400 text-teal-300 transition hover:bg-teal-400/10"
            style={{ boxShadow: "0 0 16px rgba(45,212,191,0.4)", textShadow: "0 0 8px rgba(45,212,191,0.6)" }}>
            Invite your friends
          </button>
        )
      ) : (
        <button onClick={() => onJoin(tier)} disabled={entriesClosed}
          className={`mt-5 w-full rounded-xl py-3 text-sm font-semibold transition ${entriesClosed ? "bg-neutral-700 text-neutral-500 cursor-default" : isHigh ? "bg-violet-500 text-white hover:bg-violet-400" : `${theme.bg} text-neutral-950 ${theme.bgHover}`}`}>
          {isFull && msToClose > 0 ? "Competition full" : entriesClosed ? "Entries closed" : "Join competition"}
        </button>
      )}
    </div>
  );
}

            </div>
          </div>
        </>
      )}
    </div>
  );
}

function ConfettiBurst() {
  const colors = ["#facc15", "#2dd4bf", "#a78bfa", "#fb7185", "#60a5fa", "#f5f5f5"];
  const pieces = useMemo(() => Array.from({ length: 30 }, (_, i) => ({
    left: Math.random() * 100,
    delay: Math.random() * 0.35,
    duration: 1.7 + Math.random() * 1.3,
    color: colors[i % colors.length],
    rot: Math.round(Math.random() * 360 - 180),
    drift: Math.round(Math.random() * 70 - 35),
    size: 6 + Math.round(Math.random() * 5),
  })), []);
  return (
    <div className="absolute inset-0 overflow-hidden pointer-events-none rounded-xl">
      {pieces.map((p, i) => (
        <span key={i} className="confetti-piece" style={{
          left: `${p.left}%`, backgroundColor: p.color, width: p.size, height: Math.round(p.size * 0.6),
          animationDelay: `${p.delay}s`, animationDuration: `${p.duration}s`,
          "--drift": `${p.drift}px`, "--rot": `${p.rot}deg`,
        }} />
      ))}
    </div>
  );
}

function PinSettings({ uid, theme, onChange }) {
  const [hasPin, setHasPin] = useState(() => !!window.localStorage.getItem(`lms_pin_${uid}`));
  const [editing, setEditing] = useState(false);
  const [pin1, setPin1] = useState("");
  const [pin2, setPin2] = useState("");
  const [error, setError] = useState("");
  const [saved, setSaved] = useState(false);

  useEffect(() => { onChange && onChange(hasPin); }, [hasPin]);

  const save = async () => {
    setError("");
    if (pin1.length < 4) { setError("PIN must be at least 4 digits"); return; }
    if (pin1 !== pin2) { setError("PINs don't match"); return; }
    const hash = await hashPin(pin1, uid);
    window.localStorage.setItem(`lms_pin_${uid}`, hash);
    setHasPin(true); setEditing(false); setPin1(""); setPin2("");
    setSaved(true); setTimeout(() => setSaved(false), 1500);
  };
  const remove = () => { window.localStorage.removeItem(`lms_pin_${uid}`); setHasPin(false); setEditing(false); };

  return (
    <div>
      <h4 className="text-sm font-semibold text-neutral-300 mb-2">Quick PIN unlock</h4>
      <div className={`rounded-xl border ${PANEL_BORDER} bg-neutral-800 p-4`}>
        <p className="text-xs text-neutral-500 mb-3">Set a PIN to unlock the app quickly on this device — once set, it replaces retyping your password on this device. This doesn't change your account password.</p>
        {!editing ? (
          hasPin ? (
            <div className="flex items-center justify-between">
              <span className={`text-xs ${theme.text} flex items-center gap-1`}><Check size={12} /> PIN set on this device{saved ? " — saved" : ""}</span>
              <div className="flex gap-2">
                <button onClick={() => setEditing(true)} className="text-xs text-neutral-300 underline">Change</button>
                <button onClick={remove} className="text-xs text-rose-400 underline">Remove</button>
              </div>
            </div>
          ) : (
            <button onClick={() => setEditing(true)} className={`w-full rounded-lg ${theme.bg} ${theme.bgHover} text-neutral-950 font-semibold py-2 text-sm`}>Set a PIN</button>
          )
        ) : (
          <div className="space-y-2">
            <input value={pin1} onChange={(e) => setPin1(e.target.value.replace(/\D/g, "").slice(0, 6))} type="password" inputMode="numeric" placeholder="New PIN (4-6 digits)"
              className="w-full rounded-lg bg-black/30 border adapt-border-10 px-3 py-2 text-sm text-slate-100 placeholder:text-neutral-500 outline-none" />
            <input value={pin2} onChange={(e) => setPin2(e.target.value.replace(/\D/g, "").slice(0, 6))} type="password" inputMode="numeric" placeholder="Confirm PIN"
              className="w-full rounded-lg bg-black/30 border adapt-border-10 px-3 py-2 text-sm text-slate-100 placeholder:text-neutral-500 outline-none" />
            {error && <p className="text-xs text-rose-400">{error}</p>}
            <div className="flex gap-2">
              <button onClick={() => { setEditing(false); setError(""); setPin1(""); setPin2(""); }} className="flex-1 rounded-lg border adapt-border-10 text-neutral-300 py-2 text-sm">Cancel</button>
              <button onClick={save} className={`flex-1 rounded-lg ${theme.bg} ${theme.bgHover} text-neutral-950 font-semibold py-2 text-sm`}>Save PIN</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function HostTierForm({ initial, onSave, onCancel, theme }) {
  const [name, setName] = useState(initial?.name || "");
  const [tierLevel, setTierLevel] = useState(initial?.tierLevel || "bronze");
  const [roundId, setRoundId] = useState(initial?.roundId || firstUpcomingRoundId());
  const [lockAt, setLockAt] = useState(() => {
    if (initial?.lockTime) return toDatetimeLocalValue(initial.lockTime);
    const round = getRound(initial?.roundId || firstUpcomingRoundId());
    return toDatetimeLocalValue(new Date(round.firstKickoff.getTime() - 1000 * 60 * 60 * 24));
  });
  const [rules, setRules] = useState(initial ? (initial.rules || "") : DEFAULT_RULES);
  const [lives, setLives] = useState(initial?.lives ?? 1);
  const [reusePolicy, setReusePolicy] = useState(initial?.reusePolicy || "nextRound");
  const [marginsMode, setMarginsMode] = useState(initial?.marginsMode || false);
  const nowLocalValue = toDatetimeLocalValue(new Date());
  const lockInPast = lockAt ? new Date(lockAt).getTime() <= Date.now() : false;
  const seasonOver = !initial && upcomingRounds().length === 0;
  const canSave = name && tierLevel && roundId && lockAt && lives >= 1 && !lockInPast && !seasonOver;
  const selectedRound = getRound(roundId);
  const roundAlreadyStarted = selectedRound.firstKickoff.getTime() <= Date.now();

  const onRoundChange = (id) => {
    setRoundId(id);
    const round = getRound(id);
    setLockAt(toDatetimeLocalValue(new Date(round.firstKickoff.getTime() - 1000 * 60 * 60 * 24)));
  };
  // Only offer rounds that haven't kicked off yet — but if we're editing a competition that's
  // already on a past round, keep that one in the list so the selection stays valid.
  const roundOptions = NRL_ROUNDS.filter((r) => r.firstKickoff.getTime() > Date.now() || r.id === roundId);

  return (
    <div className={`rounded-xl border ${PANEL_BORDER} bg-neutral-800 p-4 space-y-3`}>

function FixtureEditor({ tier, effectiveFixtures, theme }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(effectiveFixtures);
  const [loadMsg, setLoadMsg] = useState("");
  const hasOverride = !!tier.fixtureOverrides;
  const round = getRound(tier.roundId);
  const isFinals = !!round.finals;
  const noFixtures = (effectiveFixtures || []).length === 0;
  useEffect(() => { if (!editing) setDraft(effectiveFixtures); }, [effectiveFixtures, editing]);

  const updateRow = (i, field, value) => setDraft((prev) => prev.map((f, idx) => (idx === i ? { ...f, [field]: value } : f)));
  const addRow = () => setDraft((prev) => [...prev, { home: ALL_TEAMS[0], away: ALL_TEAMS[1], kickoff: "" }]);
  const removeRow = (i) => setDraft((prev) => prev.filter((_, idx) => idx !== i));
  const save = async () => { await db.collection("tiers").doc(tier.id).set({ fixtureOverrides: draft }, { merge: true }); setEditing(false); };
  const resetToOfficial = async () => { await db.collection("tiers").doc(tier.id).set({ fixtureOverrides: FieldValue.delete() }, { merge: true }); setEditing(false); };
  // Pull this round's actual fixtures (teams, kickoff, venue) from the auto-updated NRL feed —
  // the weekly source of truth for finals, where matchups aren't known until the week before.
  const loadFromNRL = async () => {
    setLoadMsg("Loading fixtures from NRL…");
    try {
      const res = await fetch("nrl-results.json?t=" + tier.roundId, { cache: "no-store" });
      if (!res.ok) throw new Error("feed unavailable");
      const store = await res.json();
      const rd = feedRoundFor(store, round);
      if (!rd || !rd.games || !rd.games.length) { setLoadMsg("No NRL fixtures for this round yet — they usually appear once the previous round finishes."); return; }
      const fx = rd.games.map((g) => ({
        home: g.home, away: g.away,
        kickoff: g.kickoff || (g.date ? (formatStartLabel(new Date(g.date)) + (g.venue ? " — " + g.venue : "")) : ""),
      }));
      setDraft(fx); setEditing(true);
      setLoadMsg(`Loaded ${fx.length} fixture${fx.length === 1 ? "" : "s"} from NRL — review and Save.`);
    } catch (e) { setLoadMsg("Couldn't reach the NRL feed — add the fixtures manually below."); }
  };

  return (
    <div className="rounded-lg border border-dashed adapt-border-10 p-3">
      <div className="flex items-center justify-between gap-2">
        <span className="text-[11px] text-neutral-400">{noFixtures ? (isFinals ? "Finals fixtures aren't set yet — load this week's games." : "No fixtures set for this round.") : hasOverride ? "This round has host-set fixtures." : "Fixtures shown are from the official draw."}</span>
        <button onClick={() => setEditing((e) => !e)} className="text-[11px] text-neutral-300 underline shrink-0">{editing ? "Cancel" : noFixtures ? "Set fixtures" : "Fix fixtures"}</button>
      </div>
      <button onClick={loadFromNRL} className={`mt-2 w-full flex items-center justify-center gap-2 rounded-lg border ${theme.borderSoft} ${theme.bgSoft} ${theme.text} font-medium py-1.5 text-[12px]`}>
        <Zap size={13} /> Load fixtures from NRL
      </button>
      {loadMsg && <p className="text-[11px] text-neutral-400 mt-1.5">{loadMsg}</p>}
      {editing && (
        <div className="mt-2 space-y-2">
          {draft.map((f, i) => (
            <div key={i} className="flex items-center gap-1.5">
              <select value={f.home} onChange={(e) => updateRow(i, "home", e.target.value)} className="flex-1 rounded bg-black/30 border adapt-border-10 px-1.5 py-1 text-[11px] text-slate-100">
                {ALL_TEAMS.map((t) => <option key={t} value={t}>{t}</option>)}
              </select>
              <span className="text-[10px] text-neutral-500">vs</span>
              <select value={f.away} onChange={(e) => updateRow(i, "away", e.target.value)} className="flex-1 rounded bg-black/30 border adapt-border-10 px-1.5 py-1 text-[11px] text-slate-100">
                {ALL_TEAMS.map((t) => <option key={t} value={t}>{t}</option>)}
              </select>
              <button onClick={() => removeRow(i)} className="shrink-0 text-neutral-500 hover:text-rose-400 p-1"><X size={13} /></button>
            </div>
          ))}
          {draft.map((f, i) => (
            <input key={`ko-${i}`} value={f.kickoff || ""} onChange={(e) => updateRow(i, "kickoff", e.target.value)} placeholder={`Kickoff details for ${f.home} vs ${f.away}`}
              className="w-full rounded bg-black/30 border adapt-border-10 px-2 py-1 text-[10px] text-slate-300 placeholder:text-neutral-600" />
          ))}
          <button onClick={addRow} className="w-full rounded-lg border adapt-border-10 text-neutral-300 py-1.5 text-[11px]">+ Add a fixture</button>
          <div className="flex gap-2 pt-1">
            {hasOverride && <button onClick={resetToOfficial} className="flex-1 rounded-lg border adapt-border-10 text-neutral-300 py-1.5 text-xs">Reset to official draw</button>}
            <button onClick={save} className={`flex-1 rounded-lg ${theme.bg} ${theme.bgHover} text-neutral-950 font-semibold py-1.5 text-xs`}>Save fixtures</button>
          </div>
        </div>
      )}
    </div>
  );
}

function HostResultsPanel({ tier, now, theme }) {
  const [open, setOpen] = useState(false);
  const [results, setResults] = useState({});
  const [finalized, setFinalized] = useState(false);
  const [wipeoutSurvived, setWipeoutSurvived] = useState(false);
  const [picks, setPicks] = useState([]);
  const [entries, setEntries] = useState([]);
  const round = getRound(tier.roundId);
  const effectiveFixtures = tier.fixtureOverrides || round.fixtures;
  const resultsDocId = `${tier.id}_${tier.roundId}`;
  const locked = tier.lockTime ? now.getTime() >= tier.lockTime.getTime() : false;
  // Only allow confirming once EVERY fixture has a winner — confirming half-entered results
  // advances the round and lets un-judged players wrongly survive with no clean way back.
  const allResultsIn = effectiveFixtures.length > 0 && effectiveFixtures.every((_, i) => results[i]);

  useEffect(() => {
    if (!open) return;
    const unsubResults = db.collection("results").doc(resultsDocId).onSnapshot((doc) => {
      const data = doc.exists ? doc.data() : {};
      setResults(data.fixtureResults || {});
      setFinalized(!!data.finalized);
      setWipeoutSurvived(!!data.wipeoutSurvived);
    });
    const unsubPicks = db.collection("picks").where("tierId", "==", tier.id).where("roundId", "==", tier.roundId).onSnapshot((snap) => setPicks(snap.docs.map((d) => d.data())));
    const unsubEntries = db.collection("entries").where("tierId", "==", tier.id).onSnapshot((snap) => setEntries(snap.docs.map((d) => ({ id: d.id, ...d.data() }))));
    return () => { unsubResults(); unsubPicks(); unsubEntries(); };
  }, [open, tier.id, tier.roundId]);

  const setFixtureResult = (i, winner) => db.collection("results").doc(resultsDocId).set({ fixtureResults: { ...results, [i]: winner } }, { merge: true });
  const [autoMsg, setAutoMsg] = useState("");
  // Pre-fill winners from the auto-updated NRL feed (host still reviews + confirms below).
  const autoFillFromNRL = async () => {
    setAutoMsg("Checking NRL results…");
    try {
      const res = await fetch("nrl-results.json?t=" + tier.roundId, { cache: "no-store" });
      if (!res.ok) throw new Error("feed unavailable");
      const store = await res.json();
      const rd = feedRoundFor(store, round);
      if (!rd || !rd.games) { setAutoMsg("No NRL results yet for this round."); return; }
      const next = { ...results }; let filled = 0, pending = 0;
      effectiveFixtures.forEach((f, i) => {
        const g = rd.games.find((x) =>
          (x.home === f.home && x.away === f.away) || (x.home === f.away && x.away === f.home));
        if (g && g.completed && g.winner) { next[i] = g.winner; filled++; }
        else if (g && !g.completed) pending++;
      });
      if (!filled) { setAutoMsg(pending ? "Games not finished yet — check back after kickoff." : "No matching NRL results found for these fixtures."); return; }
      await db.collection("results").doc(resultsDocId).set({ fixtureResults: next }, { merge: true });
      setAutoMsg(`Filled ${filled} result${filled === 1 ? "" : "s"} from NRL${pending ? ` (${pending} still to play)` : ""}. Review, then Confirm.`);
    } catch (e) {
      setAutoMsg("Couldn't reach the NRL feed. Enter results manually below.");
    }
  };
  // Host allocates a team to a player who didn't submit a pick for this round.
  const assignPick = (uid, name, team) => db.collection("picks").doc(`${tier.id}_${tier.roundId}_${uid}`).set({ tierId: tier.id, roundId: tier.roundId, uid, name, team, submittedAt: FieldValue.serverTimestamp(), assignedByHost: true }, { merge: true });
  // Give every no-show a random team (and a random margin in margins mode) — the "miss the
  // deadline, get a random team" rule, applied host-side since players can't write post-lock.
  const assignRandomToNoShows = () => {
    const teams = [...new Set(effectiveFixtures.flatMap((f) => [f.home, f.away]))];
    if (teams.length === 0) return;
    noPick.forEach((e) => {
      const doc = { tierId: tier.id, roundId: tier.roundId, uid: e.uid, name: e.name, team: teams[Math.floor(Math.random() * teams.length)], submittedAt: FieldValue.serverTimestamp(), assignedByHost: true, autoAssigned: true };
      if (tier.marginsMode) doc.margin = 1 + Math.floor(Math.random() * 12);
      db.collection("picks").doc(`${tier.id}_${tier.roundId}_${e.uid}`).set(doc, { merge: true });
    });
  };
  const pickedUids = new Set(picks.map((p) => p.uid));
  const noPick = entries.filter((e) => e.status === "active" && !pickedUids.has(e.uid));
  const roundTeams = [...new Set(effectiveFixtures.flatMap((f) => [f.home, f.away]))].sort();

  // ---- Margins mode decider (tiebreaker — guarantees a single winner, no draws) ----
  const activeEntries = entries.filter((e) => e.status === "active");
  const roundIdx = NRL_ROUNDS.findIndex((r) => r.id === tier.roundId);
  const isFinalRound = roundIdx === NRL_ROUNDS.length - 1;
  // Show the decider when margins mode is on, more than one player is still standing, and it's
  // either down to the final two or the last round with no games left to separate them.
  const marginDeciderRelevant = !!tier.marginsMode && activeEntries.length > 1 && (activeEntries.length <= 2 || isFinalRound);
  const [marginRank, setMarginRank] = useState(null);
  const [marginMsg, setMarginMsg] = useState("");
  const decideByMargin = async () => {
    setMarginMsg("Working out the closest margin…"); setMarginRank(null);
    const scoresByTeam = {};
    try {
      const res = await fetch("nrl-results.json?t=" + tier.roundId, { cache: "no-store" });
      if (res.ok) {
        const store = await res.json();
        const rd = feedRoundFor(store, round);
        (rd?.games || []).forEach((g) => {
          if (g.homeScore == null || g.awayScore == null) return;
          const m = Math.abs(Number(g.homeScore) - Number(g.awayScore));
          scoresByTeam[g.home] = m; scoresByTeam[g.away] = m;
        });
      }
    } catch (e) {}
    const picksByUid = {}; picks.forEach((p) => { picksByUid[p.uid] = p; });
    const rows = activeEntries.map((e) => {
      const p = picksByUid[e.uid];
      const predicted = p && p.margin != null ? Number(p.margin) : null;
      const actual = p && p.team != null && scoresByTeam[p.team] != null ? scoresByTeam[p.team] : null;
      const diff = predicted != null && actual != null ? Math.abs(actual - predicted) : null;
      const submittedMs = p && p.submittedAt && p.submittedAt.toMillis ? p.submittedAt.toMillis() : Infinity;
      return { uid: e.uid, name: e.name, team: p ? p.team : null, predicted, actual, diff, submittedMs };
    });
    // Closest wins; exact ties broken by whoever locked their pick in first — so it never draws.
    const scored = rows.filter((r) => r.diff != null).sort((a, b) => a.diff - b.diff || a.submittedMs - b.submittedMs);
    if (scored.length === 0) { setMarginMsg("No scores available yet for the picked games — auto-fill or enter this round's results first, then try again."); return; }
    setMarginRank({ scored, unscored: rows.filter((r) => r.diff == null) }); setMarginMsg("");
  };
  const crownMarginWinner = async (uid, name) => {
    if (!confirm(`Crown ${name} as the winner of "${tier.name}" on the closest margin? This records them as the last one standing. The prize pool is settled by you outside the app.`)) return;
    try {
      await db.collection("tiers").doc(tier.id).update({ winnerUid: uid, winnerName: name, winnerAt: FieldValue.serverTimestamp() });
      setMarginMsg(`${name} crowned as the winner.`);
    } catch (e) {
      setMarginMsg("Couldn't save the winner: " + (e.message || "try again") + (String(e.message || "").toLowerCase().includes("permission") ? " (publish the latest Firestore rules)." : "."));
    }
  };

  // Re-runnable on purpose: hosts can correct a result any time. Rather than incrementally
  // toggling status (which can't be undone cleanly), we recompute each player's status from
  // the FULL history every time — a player is eliminated once their total losses reach the
  // competition's lives count. Wipeout rounds (everyone still in loses) cost nobody a life.
  const applyResults = async () => {
    const lives = tierLives(tier);
    // Every pick in the competition, grouped by round → uid → team.
    const picksSnap = await db.collection("picks").where("tierId", "==", tier.id).get();
    const picksByRound = {}; const roundIds = new Set([tier.roundId]);
    picksSnap.docs.forEach((d) => { const p = d.data(); roundIds.add(p.roundId); (picksByRound[p.roundId] = picksByRound[p.roundId] || {})[p.uid] = p.team; });
    const roundList = [...roundIds];
    // Results for every round: current round from local state, earlier rounds fetched.
    const resByRound = {};
    await Promise.all(roundList.map(async (rid) => {
      if (rid === tier.roundId) { resByRound[rid] = { fixtureResults: results, fixtures: effectiveFixtures, wipeoutSurvived: false }; return; }
      const doc = await db.collection("results").doc(`${tier.id}_${rid}`).get();
      const d = doc.exists ? doc.data() : {};
      resByRound[rid] = { fixtureResults: d.fixtureResults || {}, fixtures: d.fixtures || getRound(rid).fixtures, wipeoutSurvived: !!d.wipeoutSurvived };
    }));

    const roundLockMs = (rid) => {
      if (rid === tier.roundId && tier.lockTime) return tier.lockTime.getTime();
      return getRound(rid).firstKickoff.getTime() - 1000 * 60 * 60 * 24;
    };
    // Did this player lose a life in round `rid`? A played round (results entered, not a
    // wipeout) counts a loss if their team lost OR they had no pick at all (missed lockout).
    // Players are only judged on rounds they were actually in (joined before that round's lock),
    // so late joiners aren't penalised for earlier rounds.
    const lostRound = (rid, joinedMs, uid) => {
      const rr = resByRound[rid]; if (!rr || rr.wipeoutSurvived) return false;
      const hasResults = Object.keys(rr.fixtureResults || {}).length > 0;
      if (!hasResults) return false;
      if (joinedMs > roundLockMs(rid)) return false;
      const team = (picksByRound[rid] || {})[uid];
      if (!team) return true; // in a played round with no pick = a loss
      const fi = (rr.fixtures || []).findIndex((f) => f.home === team || f.away === team);
      const w = rr.fixtureResults[fi];
      return !!w && w !== team;
    };
    const joinedMsOf = (e) => (e.joinedAt && e.joinedAt.toDate ? e.joinedAt.toDate().getTime() : 0);

    // Never touch kicked/cancelled entrants — only players still in the running or eliminated.
    const eligible = entries.filter((e) => e.status === "active" || e.status === "eliminated");

    // Wipeout check: did every still-active player who has a decided pick lose THIS round?
    const curDecided = eligible.filter((e) => e.status === "active").map((e) => {
      const team = (picksByRound[tier.roundId] || {})[e.uid]; if (!team) return null;
      const fi = effectiveFixtures.findIndex((f) => f.home === team || f.away === team);
      const w = results[fi]; if (!w) return null;
      return w === team;
    }).filter((v) => v !== null);
    if (curDecided.length === 0) return;
    const allLost = curDecided.every((won) => won === false);
    resByRound[tier.roundId].wipeoutSurvived = allLost; // a wipeout round costs nobody a life

    const batch = db.batch();
    eligible.forEach((e) => {
      if (e.manual) return; // host set this player's status by hand — never override it
      const joinedMs = joinedMsOf(e);
      let losses = 0;
      roundList.forEach((rid) => { if (lostRound(rid, joinedMs, e.uid)) losses++; });
      const target = losses >= lives ? "eliminated" : "active";
      if (e.status !== target) batch.update(db.collection("entries").doc(`${tier.id}_${e.uid}`), { status: target });
    });
    batch.set(db.collection("results").doc(resultsDocId), { finalized: true, wipeoutSurvived: allLost, fixtures: effectiveFixtures }, { merge: true });

    // Always move on to the next round. Survivors carry forward; on a wipeout nobody was
    // eliminated but the competition still continues (this prevents a locked round deadlock).
    const idx = NRL_ROUNDS.findIndex((r) => r.id === tier.roundId);
    const next = NRL_ROUNDS[idx + 1];
    if (next) {
      batch.set(db.collection("tiers").doc(tier.id), {
        roundId: next.id, previousRoundId: tier.roundId,
        startTime: Timestamp.fromDate(next.firstKickoff),
        lockTime: Timestamp.fromDate(new Date(next.firstKickoff.getTime() - 1000 * 60 * 60 * 24)),
        fixtureOverrides: FieldValue.delete(),
      }, { merge: true });
    }
    await batch.commit();
  };

          {marginDeciderRelevant && (

  );

function InviteModal({ tier, onClose, theme }) {
  const [emails, setEmails] = useState("");
  const [emailOpen, setEmailOpen] = useState(false);
  const [copied, setCopied] = useState(false);

  const roundLabel = getRound(tier.roundId).label;
  const preset = getTierPreset(tier.tierLevel);
  const baseUrl = window.location.origin + window.location.pathname;
  const inviteUrl = `${baseUrl}?invite=1&name=${encodeURIComponent(tier.name)}&tier=${preset.id}&code=${tier.code || ""}&round=${encodeURIComponent(roundLabel)}&hours=${hoursLeft(tier)}`;
  const shareText = `You're invited to play Last Man Standing!\n\nJoin "${tier.name}" — a ${preset.name} tier competition.\n\n👉 Invite code: ${tier.code || "(ask your host)"}\n\nOpen the app, create a free account, choose "Join a competition" and enter that code — or tap:\n${inviteUrl}`;

  const share = async () => {
    try {
      if (navigator.share) { await navigator.share({ title: "Last Man Standing invite", text: shareText }); return; }
    } catch (e) { return; /* user cancelled the share sheet */ }
    await copyText(shareText); setCopied(true); setTimeout(() => setCopied(false), 1600);
  };
  const copy = async () => { await copyText(shareText); setCopied(true); setTimeout(() => setCopied(false), 1600); };

  const sendEmail = () => {
    const subject = "You're invited to play Last Man Standing!";
    const list = emails.split(/[,;\n]/).map((e) => e.trim()).filter(Boolean);
    // Recipients go in BCC so invitees can't see each other's addresses.
    const mailto = `mailto:?bcc=${encodeURIComponent(list.join(","))}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(shareText)}`;
    window.location.href = mailto;
    onClose();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/70 p-4">
      <div className={`w-full max-w-sm rounded-2xl bg-neutral-800 border ${PANEL_BORDER} p-5`}>
        <div className="flex items-center justify-between mb-1">
          <h4 className="text-slate-100 font-semibold">Invite your friends</h4>
          <button onClick={onClose} className="text-neutral-500 hover:text-neutral-300"><X size={18} /></button>
        </div>
        <p className="text-xs text-neutral-500 mb-3">{tier.name}</p>
        {tier.code && (
          <div className={`rounded-xl bg-black/30 border ${PANEL_BORDER} p-3 mb-3 text-center`}>
            <div className="text-[10px] uppercase tracking-[0.2em] text-neutral-500 mb-1">Invite code</div>
            <div className={`font-scoreboard text-3xl tracking-[0.3em] ${theme.text}`}>{tier.code}</div>
            <div className="text-[10px] text-neutral-500 mt-1">Players enter this under "Join a competition".</div>
          </div>
        )}
        <button onClick={share} className={`w-full flex items-center justify-center gap-2 rounded-xl ${theme.bg} ${theme.bgHover} text-neutral-950 font-semibold py-3 text-sm`}><UserPlus size={16} /> Share invite</button>
        <button onClick={copy} className="mt-2 w-full rounded-xl border adapt-border-10 text-neutral-300 font-semibold py-2.5 text-sm adapt-hover">{copied ? "Copied!" : "Copy invite text"}</button>
        <p className="text-[10px] text-neutral-500 mt-2 text-center">Share sends the code + link straight to WhatsApp, Messages, or wherever you like — nothing goes near your own inbox.</p>

        {!emailOpen ? (
          <button onClick={() => setEmailOpen(true)} className="mt-3 w-full text-center text-xs text-neutral-500 hover:text-neutral-300 underline">Send by email instead</button>
        ) : (
          <div className="mt-3 pt-3 border-t adapt-border-5">
            <textarea value={emails} onChange={(e) => setEmails(e.target.value)} rows={2} placeholder="Email addresses, separated by commas"
              className="w-full rounded-lg bg-black/30 border adapt-border-10 px-3 py-2 text-sm text-slate-100 placeholder:text-neutral-500 outline-none resize-none mb-2" />
            <button onClick={sendEmail} disabled={!emails.trim()} className="w-full rounded-lg bg-neutral-700 hover:bg-neutral-600 disabled:opacity-40 text-slate-100 font-semibold py-2.5 text-sm">Open email app</button>
            <p className="text-[10px] text-neutral-500 mt-2 text-center">Opens your email app to send from your account — a copy will appear in your Sent items (that's normal). Addresses are hidden using BCC.</p>
          </div>
        )}
      </div>
    </div>
  );
}
function hoursLeft(tier) { return tier.lockTime ? Math.max(1, Math.round((tier.lockTime.getTime() - Date.now()) / (1000 * 60 * 60))) : 24; }

// Checkout step shown when opening a competition. In beta this simulates the payment; the same
// component drives the real Stripe charge once PAYMENTS_LIVE is true.
function CheckoutModal({ tierData, isFirstFree, theme, onCancel, onConfirm }) {
  const preset = getTierPreset(tierData.tierLevel);
  const amount = tierUnlockAmount(tierData.tierLevel, isFirstFree);
  const gst = gstOf(amount);
  const [state, setState] = useState("review"); // review | processing | error
  const [error, setError] = useState("");
  const [locked, setLocked] = useState(false); // payment taken but setup failed — block re-charge
  const money = (n) => `$${n.toFixed(2)}`;

  const confirm = async () => {
    if (state === "processing" || locked) return; // guard double-taps on both free and paid paths
    setState("processing"); setError("");

    // 1) Take payment (or nothing, for a free open).
    let payment;
    if (amount === 0) {
      payment = { status: "free", amount: 0, gst: 0, currency: "AUD", tierLevel: tierData.tierLevel, mode: "free", reference: null };
    } else {
      try {
        const res = await processCheckout({ tierLevel: tierData.tierLevel, amount });
        if (!res || !res.ok) throw new Error((res && res.error) || "Payment didn't go through.");
        payment = { status: PAYMENTS_LIVE ? "paid" : "simulated", amount, gst, currency: "AUD", tierLevel: tierData.tierLevel, mode: res.mode, reference: res.reference || null };
      } catch (e) {
        setState("error"); setError(e.message || "Payment didn't go through."); return;
      }
    }

    // 2) Create the competition. Only celebrate once it's actually saved — and if this fails
    // after a real charge, surface it and block re-payment rather than losing money silently.
    try {
      await onConfirm(payment);
      playPaySuccessSound();
    } catch (e) {
      setState("error");
      if (amount > 0 && PAYMENTS_LIVE) {
        setLocked(true);
        setError("Payment received, but setting up the competition failed. Don't pay again — contact support to finish setup.");
      } else {
        setError(e.message || "Couldn't create the competition — please try again.");
      }
    }
  };

  const primaryLabel = state === "processing" ? "Processing…"
    : amount === 0 ? "Create competition"
    : PAYMENTS_LIVE ? `Pay ${money(amount)}` : `Simulate payment · ${money(amount)}`;

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/70 p-4">
      <div className={`w-full max-w-sm rounded-2xl bg-neutral-800 border ${PANEL_BORDER} p-5`}>
        <div className="flex items-center justify-between mb-3">
          <h4 className="text-slate-100 font-semibold flex items-center gap-2"><Crown size={16} className="text-amber-400" /> Open your competition</h4>
          <button onClick={onCancel} disabled={state === "processing"} className="text-neutral-500 hover:text-neutral-300 disabled:opacity-40"><X size={18} /></button>
        </div>

        <div className={`rounded-xl border ${PANEL_BORDER} bg-black/30 p-3.5`}>
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className="h-2.5 w-2.5 rounded-full" style={{ backgroundColor: preset.color }} />
              <span className="text-sm font-semibold text-slate-100">{preset.name} tier</span>
            </div>
            <span className="text-[11px] text-neutral-500">{tierCapacityLabel(preset)}</span>
          </div>
          <p className="text-[11px] text-neutral-500 mt-0.5 truncate">{tierData.name}</p>
          <div className="border-t adapt-border-10 my-3" />
          {amount === 0 ? (
            <>
              <div className="flex items-baseline justify-between">
                <span className="text-sm text-slate-200">One-off setup fee</span>
                <span className="font-scoreboard text-2xl text-teal-300">Free</span>
              </div>
              <p className="text-[11px] text-neutral-500 mt-1">Your first competition is on us.</p>
            </>
          ) : (
            <>
              <div className="flex items-baseline justify-between">
                <span className="text-sm text-slate-200">One-off setup fee</span>
                <span className={`font-scoreboard text-2xl ${theme.text}`}>{money(amount)}</span>
              </div>
              <p className="text-[11px] text-neutral-500 mt-1">Inc. GST — includes {money(gst)} GST. One-off, per competition.</p>
            </>
          )}
        </div>

        {amount > 0 && !PAYMENTS_LIVE && (
          <div className="mt-3 rounded-lg border border-amber-400/30 bg-amber-400/5 p-3">
            <p className="text-[11px] text-amber-300 font-semibold">Beta mode — simulated payment</p>
            <p className="text-[11px] text-neutral-400 mt-0.5">No card is collected and nothing is charged. This runs the full checkout so it's ready for launch — real card payments go live when we come out of beta.</p>
          </div>
        )}

        {error && <p className="text-[11px] text-rose-400 mt-3">{error}</p>}

        <div className="flex gap-2 mt-4">
          <button onClick={onCancel} disabled={state === "processing"} className="flex-1 rounded-lg border adapt-border-10 text-neutral-300 py-2.5 text-sm disabled:opacity-40">{locked ? "Close" : "Cancel"}</button>
          {!locked && <button onClick={confirm} disabled={state === "processing"} className={`flex-1 rounded-lg ${theme.bg} ${theme.bgHover} text-neutral-950 font-semibold py-2.5 text-sm disabled:opacity-60`}>{primaryLabel}</button>}
        </div>
        <p className="text-[10px] text-neutral-500 mt-3 leading-relaxed">The setup fee opens and hosts this competition (it sets the max players). Any prize pool is organised by you outside the app — LMS never handles prize money.</p>
      </div>
    </div>
  );
}
