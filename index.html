function formatCountdown(ms) {
  if (ms <= 0) return "Started";
  const totalMin = Math.floor(ms / 60000);
  const days = Math.floor(totalMin / (60 * 24));
  const hours = Math.floor((totalMin % (60 * 24)) / 60);
  const mins = totalMin % 60;
  if (days > 0) return `${days}d ${hours}h`;
  if (hours > 0) return `${hours}h ${mins}m`;
  return `${mins}m`;
}
function formatStartLabel(date) {
  if (!date) return "";
  return date.toLocaleString("en-AU", { weekday: "short", hour: "numeric", minute: "2-digit", hour12: true });
}
function toDatetimeLocalValue(date) {
  if (!date) return "";
  const pad = (n) => String(n).padStart(2, "0");
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}
function useAccentTheme(accent) {

    border: `border-${accent}-400`, borderSoft: `border-${accent}-400/40`, borderHalf: `border-${accent}-400/50`,
  }), [accent]);
}
function calcAge(dobString) {
  if (!dobString) return null;
  const dob = new Date(dobString);
  if (isNaN(dob.getTime())) return null;
  const today = new Date();
  let age = today.getFullYear() - dob.getFullYear();
  const m = today.getMonth() - dob.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--;
  return age;
}

function Scoreboard({ value, label, accent = "gold" }) {

      <div className="text-[11px] uppercase tracking-[0.2em] text-neutral-500 mt-1">{label}</div>

  );
}

  const canSubmit = mode === "create" ? name && email && password.length >= 6 : email && password;

  const submit = async () => {
    setError(""); setBusy(true);
    try {
      if (mode === "create") {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        await db.collection("users").doc(cred.user.uid).set({
          name, email, walletBalance: 0, accent: "teal", role: "player",
          ageVerified: false, avatarUrl: null, createdAt: FieldValue.serverTimestamp(),
        });
      } else {
        await auth.signInWithEmailAndPassword(email, password);
      }
    } catch (e) { setError(e.message.replace("Firebase: ", "")); }
    setBusy(false);
  };

  const embers = useMemo(() => Array.from({ length: 16 }, (_, i) => ({
    left: `${(i * 137.5) % 100}%`,
    delay: `${(i * 1.9) % 14}s`,
    duration: `${8 + (i % 5) * 2}s`,
    size: 2 + (i % 3),
  })), []);

  return (
    <div className="min-h-screen text-slate-100 flex flex-col justify-center px-6 relative overflow-hidden" style={{ backgroundColor: "#050506" }}>
      <div className="smoke-layer-a" />
      <div className="smoke-layer-b" />
      {embers.map((e, i) => (
        <span key={i} className="ember" style={{ left: e.left, width: e.size, height: e.size, animationDelay: e.delay, animationDuration: e.duration }} />
      ))}

      <div className="max-w-sm mx-auto w-full relative z-10">
        <div className="flex flex-col items-center gap-3 mb-8">
          <div className="relative">
            <div className="absolute inset-0 rounded-full blur-2xl opacity-60" style={{ background: "radial-gradient(circle, rgba(255,80,55,0.55), transparent 70%)" }} />
            <Flame className="relative text-rose-500" size={34} />
          </div>
          <h1 className="neon-title font-scoreboard text-4xl tracking-wide text-center" style={{ color: "#fff1e0" }}>LAST MAN STANDING</h1>
          <span className="text-[10px] tracking-[0.3em] uppercase text-amber-300/80 border border-amber-400/30 rounded-full px-3 py-1">Beta</span>
        </div>

        <div className={`rounded-2xl border border-white/10 p-1 mb-6`} style={{ backgroundColor: "rgba(255,255,255,0.03)", backdropFilter: "blur(6px)" }}>
          <div className="flex rounded-xl overflow-hidden">
            <button onClick={() => setMode("create")} className={`flex-1 py-2 text-sm font-medium transition ${mode === "create" ? "bg-teal-400 text-neutral-950" : "text-neutral-400"}`}>Create account</button>
            <button onClick={() => setMode("login")} className={`flex-1 py-2 text-sm font-medium transition ${mode === "login" ? "bg-teal-400 text-neutral-950" : "text-neutral-400"}`}>Log in</button>
          </div>
        </div>

        <div className="space-y-3">
          {mode === "create" && (
            <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Full name"
              className="w-full rounded-xl border border-white/10 px-4 py-3 text-sm text-slate-100 placeholder:text-neutral-500 outline-none focus:border-teal-400"
              style={{ backgroundColor: "rgba(255,255,255,0.04)" }} />
          )}
          <input value={email} onChange={(e) => setEmail(e.target.value)} placeholder="Email address" type="email"
            className="w-full rounded-xl border border-white/10 px-4 py-3 text-sm text-slate-100 placeholder:text-neutral-500 outline-none focus:border-teal-400"
            style={{ backgroundColor: "rgba(255,255,255,0.04)" }} />
          <input value={password} onChange={(e) => setPassword(e.target.value)} type="password" placeholder="Password (min 6 characters)"
            className="w-full rounded-xl border border-white/10 px-4 py-3 text-sm text-slate-100 placeholder:text-neutral-500 outline-none focus:border-teal-400"
            style={{ backgroundColor: "rgba(255,255,255,0.04)" }} />
        </div>
        {error && <p className="text-xs text-rose-400 mt-3">{error}</p>}
        <button disabled={!canSubmit || busy} onClick={submit}
          className="mt-5 w-full flex items-center justify-center gap-2 rounded-xl bg-teal-400 hover:bg-teal-300 disabled:opacity-40 disabled:cursor-not-allowed text-neutral-950 font-semibold py-3 text-sm transition"
          style={{ boxShadow: canSubmit && !busy ? "0 0 22px rgba(45,212,191,0.35)" : "none" }}>
          {mode === "create" ? <UserPlus size={16} /> : <LogIn size={16} />}
          {busy ? "Please wait…" : mode === "create" ? "Create account" : "Log in"}
        </button>

        <div className="mt-10 text-center space-y-1">
          <p className="text-[11px] text-neutral-500">Established by Jack Caspani &amp; James Redman</p>
          <p className="text-[10px] text-neutral-600 leading-relaxed">
            © {new Date().getFullYear()} Last Man Standing. All rights reserved.<br/>
            Last Man Standing™ is an unregistered trademark, all rights reserved by its founders.<br/>
            This app is in BETA — for testing purposes only. No real-money wagering is processed by this application.
          </p>
        </div>
      </div>
    </div>
  );
}

const AU_STATES = ["NSW", "VIC", "QLD", "WA", "SA", "TAS", "ACT", "NT"];

function IDCheckScreen({ initialName, onVerified }) {
  const [fullName, setFullName] = useState(initialName || "");
  const [dob, setDob] = useState("");
  const [licenceNumber, setLicenceNumber] = useState("");
  const [licenceState, setLicenceState] = useState("NSW");
  const [checked, setChecked] = useState(false);
  const [denied, setDenied] = useState(false);
  const canSubmit = fullName && dob && licenceNumber;
  const submit = () => {
    const age = calcAge(dob); setChecked(true);
    if (age === null || age < 18) setDenied(true);
    else { setDenied(false); onVerified({ fullName, dob, licenceNumber, licenceState, age }); }
  };
  const tryAgain = () => { setChecked(false); setDenied(false); setDob(""); setLicenceNumber(""); };

  if (checked && denied) {
    return (
      <div className="min-h-screen text-slate-100 flex flex-col justify-center px-6" style={{ backgroundColor: BG }}>
        <div className="max-w-sm mx-auto w-full text-center">
          <div className="mx-auto mb-4 h-14 w-14 rounded-full bg-rose-500/10 flex items-center justify-center"><ShieldAlert size={26} className="text-rose-400" /></div>
          <h2 className="font-scoreboard text-2xl tracking-wide text-rose-400">ACCESS DENIED</h2>
          <p className="text-sm text-neutral-400 mt-2 leading-relaxed">Our records show you're under 18. You must be 18 or older to use this app.</p>
          <button onClick={tryAgain} className="mt-6 w-full rounded-xl bg-neutral-800 border border-white/10 text-slate-200 font-semibold py-3 text-sm">Go back</button>
        </div>
      </div>
    );
  }
  return (
    <div className="min-h-screen text-slate-100 flex flex-col justify-center px-6" style={{ backgroundColor: BG }}>
      <div className="max-w-sm mx-auto w-full">
        <h2 className="font-scoreboard text-3xl tracking-wide mb-1">VERIFY YOUR DETAILS</h2>
        <p className="text-sm text-neutral-500 mb-6">Quick licence check — required to confirm you're 18+.</p>
        <div className="space-y-3">
          <input value={fullName} onChange={(e) => setFullName(e.target.value)} placeholder="Full legal name"
            className={`w-full rounded-xl bg-neutral-800 border ${PANEL_BORDER} px-4 py-3 text-sm text-slate-100 placeholder:text-neutral-500 outline-none focus:border-teal-400`} />
          <div><label className="text-[11px] text-neutral-500 mb-1 block">Date of birth</label>
            <input value={dob} onChange={(e) => setDob(e.target.value)} type="date" className={`w-full rounded-xl bg-neutral-800 border ${PANEL_BORDER} px-4 py-3 text-sm text-slate-100 outline-none focus:border-teal-400`} /></div>
          <input value={licenceNumber} onChange={(e) => setLicenceNumber(e.target.value)} placeholder="Driver licence number"
            className={`w-full rounded-xl bg-neutral-800 border ${PANEL_BORDER} px-4 py-3 text-sm text-slate-100 placeholder:text-neutral-500 outline-none focus:border-teal-400`} />
          <div><label className="text-[11px] text-neutral-500 mb-1 block">Licence state</label>
            <select value={licenceState} onChange={(e) => setLicenceState(e.target.value)} className={`w-full rounded-xl bg-neutral-800 border ${PANEL_BORDER} px-4 py-3 text-sm text-slate-100 outline-none focus:border-teal-400`}>
              {AU_STATES.map((s) => <option key={s} value={s}>{s}</option>)}
            </select></div>
        </div>
        <button disabled={!canSubmit} onClick={submit} className="mt-5 w-full rounded-xl bg-teal-400 hover:bg-teal-300 disabled:opacity-40 text-neutral-950 font-semibold py-3 text-sm">Verify my details</button>
      </div>
    </div>
  );
}

function SportScreen({ userName, onPick, onBack, showBack }) {

function TierCard({ tier, now, onJoin, joined, theme }) {
  const isHigh = tier.buyIn >= 50;
  const msToStart = tier.startTime.getTime() - now.getTime();
  const started = msToStart <= 0;
  const countdown = formatCountdown(msToStart);
  const [rulesOpen, setRulesOpen] = useState(false);
  return (
    <div className={`relative rounded-2xl border ${isHigh ? "border-violet-500/40 bg-gradient-to-b from-violet-950/30 to-neutral-800" : `${theme.borderSoft} bg-neutral-800`} p-5`}>
      {isHigh && (<div className="absolute -top-3 left-5 flex items-center gap-1 rounded-full bg-violet-500 px-3 py-1 text-[10px] font-bold uppercase tracking-wider text-white"><Crown size={12} /> High Stakes</div>)}
      <div className="flex items-center justify-between"><h3 className="text-lg font-semibold text-slate-100">{tier.name}</h3><span className="text-xs text-neutral-500">Round {tier.round}</span></div>
      <p className="text-sm text-neutral-400 mt-1">${tier.buyIn} buy-in · winner takes the pool</p>
      <div className={`mt-4 flex items-center justify-center gap-2 rounded-lg px-3 py-2 text-xs font-medium ${started ? "bg-rose-500/10 text-rose-400" : "bg-amber-400/10 text-amber-300"}`}>
        <Clock size={13} />{started ? "Entries closed — round underway" : `Round ${tier.round} starts in ${countdown} (${tier.startLabel})`}
      </div>
      <div className={`mt-4 flex items-center justify-around rounded-xl bg-black/30 border ${PANEL_BORDER} py-4`}>
        <Scoreboard value={`$${tier.pool.toLocaleString()}`} label="Prize Pool" accent="gold" />
        <div className="h-10 w-px bg-white/10" /><Scoreboard value={tier.entries} label="Entries" accent={isHigh ? "text-violet-300" : theme.text} />
      </div>
      {tier.rules && (
        <div className="mt-4">
          <button onClick={() => setRulesOpen((o) => !o)} className="flex items-center gap-1 text-xs text-neutral-400 hover:text-neutral-200">
            <ChevronDown size={12} className={`transition-transform ${rulesOpen ? "rotate-180" : ""}`} /> {rulesOpen ? "Hide rules" : "View rules"}
          </button>
          {rulesOpen && <p className={`mt-2 rounded-lg bg-black/30 border ${PANEL_BORDER} p-3 text-xs text-neutral-300 whitespace-pre-wrap`}>{tier.rules}</p>}
        </div>
      )}
      <button onClick={() => onJoin(tier)} disabled={joined || started}
        className={`mt-5 w-full rounded-xl py-3 text-sm font-semibold transition ${joined || started ? "bg-neutral-700 text-neutral-500 cursor-default" : isHigh ? "bg-violet-500 text-white hover:bg-violet-400" : `${theme.bg} text-neutral-950 ${theme.bgHover}`}`}>
        {joined ? "You're in — good luck" : started ? "Entries closed" : `Enter for $${tier.buyIn}`}
      </button>
    </div>
  );
}

function EntryConfirmModal({ tier, balance, onClose, onConfirm, onGoToWallet, theme, error }) {
  const insufficient = balance < tier.buyIn;
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/70 p-4">
      <div className={`w-full max-w-sm rounded-2xl bg-neutral-800 border ${PANEL_BORDER} p-5`}>
        <div className="flex items-center justify-between mb-4"><h4 className="text-slate-100 font-semibold">Confirm your entry</h4><button onClick={onClose} className="text-neutral-500 hover:text-neutral-300"><X size={18} /></button></div>
        <div className={`rounded-xl bg-black/30 border ${PANEL_BORDER} p-4 mb-3 flex items-center justify-between`}><span className="text-neutral-300 text-sm">{tier.name} entry</span><span className="text-slate-100 font-scoreboard text-2xl">${tier.buyIn}.00</span></div>
        <div className={`rounded-xl bg-black/30 border ${PANEL_BORDER} p-4 mb-4 flex items-center justify-between`}><span className="text-neutral-300 text-sm">Wallet balance</span><span className={`font-scoreboard text-2xl ${insufficient ? "text-rose-400" : theme.text}`}>${balance.toFixed(2)}</span></div>
        {error && <p className="text-xs text-rose-400 mb-3">{error}</p>}
        {insufficient ? (<><p className="text-sm text-neutral-400 mb-3">Your balance is a bit short. Top up your wallet to enter.</p><button onClick={onGoToWallet} className={`w-full rounded-xl ${theme.bg} ${theme.bgHover} text-neutral-950 font-semibold py-3 text-sm`}>Go to Wallet</button></>) : (
          <button onClick={onConfirm} className={`w-full rounded-xl ${theme.bg} ${theme.bgHover} text-neutral-950 font-semibold py-3 text-sm`}>Confirm — deduct ${tier.buyIn} from wallet</button>
        )}
      </div>
    </div>
  );
}

function DepositModal({ onClose, onConfirm, theme }) {
  const [amount, setAmount] = useState(50);
  const [processing, setProcessing] = useState(false);
  const presets = [20, 50, 100, 250];
  const pay = async () => { setProcessing(true); await onConfirm(amount); setProcessing(false); onClose(); };
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/70 p-4">
      <div className={`w-full max-w-sm rounded-2xl bg-neutral-800 border ${PANEL_BORDER} p-5`}>
        <div className="flex items-center justify-between mb-4"><h4 className="text-slate-100 font-semibold">Add funds (tracked balance only)</h4><button onClick={onClose} className="text-neutral-500 hover:text-neutral-300"><X size={18} /></button></div>
        <div className="grid grid-cols-4 gap-2 mb-4">{presets.map((p) => (<button key={p} onClick={() => setAmount(p)} className={`rounded-lg py-2 text-sm font-semibold border ${amount === p ? `${theme.border} ${theme.bgSoft} ${theme.text}` : "border-white/10 text-neutral-300"}`}>${p}</button>))}</div>
        <button onClick={pay} disabled={processing} className={`w-full rounded-xl ${theme.bg} ${theme.bgHover} text-neutral-950 font-semibold py-3 text-sm disabled:opacity-60`}>{processing ? "Adding…" : `Add $${amount} to balance`}</button>
      </div>
    </div>
  );
}

function WithdrawModal({ balance, onClose, onConfirm, theme }) {
  const [amount, setAmount] = useState("");
  const [processing, setProcessing] = useState(false);
  const num = parseFloat(amount) || 0;
  const valid = num > 0 && num <= balance;
  const go = async () => { setProcessing(true); await onConfirm(num); setProcessing(false); onClose(); };
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/70 p-4">
      <div className={`w-full max-w-sm rounded-2xl bg-neutral-800 border ${PANEL_BORDER} p-5`}>
        <div className="flex items-center justify-between mb-4"><h4 className="text-slate-100 font-semibold">Withdraw (tracked balance)</h4><button onClick={onClose} className="text-neutral-500 hover:text-neutral-300"><X size={18} /></button></div>
        <p className="text-xs text-neutral-500 mb-3">Available balance: ${balance.toFixed(2)}</p>
        <input value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="Amount" inputMode="decimal" className={`w-full rounded-xl bg-black/30 border ${PANEL_BORDER} px-4 py-3 text-sm text-slate-100 placeholder:text-neutral-500 outline-none focus:border-teal-400 mb-4`} />
        <button disabled={!valid || processing} onClick={go} className={`w-full rounded-xl ${theme.bg} ${theme.bgHover} disabled:opacity-40 text-neutral-950 font-semibold py-3 text-sm`}>{processing ? "Processing…" : `Withdraw $${num > 0 ? num.toFixed(2) : "0.00"}`}</button>
      </div>
    </div>
  );
}

function FixtureRow({ home, away, myPick, lockedTeam, locked, onSelect, theme }) {
  const renderSide = (team, align) => {
    const selected = myPick === team;
    const disabled = team === lockedTeam || locked;
    return (
      <button onClick={() => !disabled && onSelect(team)} disabled={disabled}
        className={`flex-1 flex items-center gap-2 rounded-xl px-3 py-3 border transition ${align === "right" ? "flex-row-reverse text-right" : "text-left"} ${selected ? `${theme.border} ${theme.bgSoft}` : disabled ? "border-white/5 opacity-40 cursor-not-allowed" : `border-white/10 hover:${theme.borderHalf}`}`}>
        <TeamBadge team={team} size={32} />
        <div className="min-w-0">
          <div className="text-sm font-medium text-slate-100 truncate">{team}</div>
          {selected && <div className={`text-[10px] ${theme.text} flex items-center gap-1 justify-start`}>{align !== "right" && <Check size={10} />}Tipped{align === "right" && <Check size={10} />}</div>}
          {team === lockedTeam && <div className="text-[10px] text-rose-400">Used last round</div>}
        </div>
      </button>
    );
  };
  return (<div className="flex items-center gap-2">{renderSide(home, "left")}<span className="text-[11px] text-neutral-500 shrink-0">vs</span>{renderSide(away, "right")}</div>);
}

            <div className={`rounded-xl ${theme.bgSoft} border ${theme.borderSoft} px-4 py-3 flex items-center justify-between`}><span className={`text-sm ${theme.text} flex items-center gap-2`}><Check size={14} /> Pick submitted: {myPick}</span><button onClick={onEdit} className="text-xs text-neutral-300 flex items-center gap-1 hover:text-white"><Pencil size={12} /> Edit</button></div>

        <h4 className="text-sm font-semibold text-neutral-300 mb-2 flex items-center gap-2">{locked ? <Eye size={14} className="text-teal-300" /> : <EyeOff size={14} className="text-neutral-500" />}This round's tips</h4>
        {!locked ? (<div className={`rounded-xl border ${PANEL_BORDER} bg-neutral-800 px-4 py-5 text-center text-sm text-neutral-500`}>Everyone's tips stay hidden until picks lock.</div>) :
          players.length === 0 ? (<div className={`rounded-xl border ${PANEL_BORDER} bg-neutral-800 px-4 py-5 text-center text-sm text-neutral-500`}>Nobody has entered yet.</div>) : (
          <div className={`rounded-xl border ${PANEL_BORDER} overflow-hidden`}>
            {players.map((p) => (
              <div key={p.uid} className={`flex items-center justify-between px-4 py-3 border-t border-white/5 first:border-t-0 ${p.isYou ? "bg-teal-400/5" : ""}`}>
                <span className="text-sm text-slate-200">{p.name}{p.isYou ? " (you)" : ""}</span>
                {p.pick ? (<div className="flex items-center gap-2"><span className="text-xs text-neutral-400">{p.pick}</span><TeamBadge team={p.pick} size={24} /></div>) : (<span className="text-xs text-rose-400">No pick</span>)}
              </div>
            ))}
          </div>
        )}
      </div>
      <div>
        <h4 className="text-sm font-semibold text-neutral-300 mb-2">Overall standings</h4>
        <div className={`rounded-xl border ${PANEL_BORDER} overflow-hidden`}>
          {players.length === 0 && <div className="px-4 py-6 text-center text-sm text-neutral-500">No entries yet.</div>}
          {players.map((p) => (
            <div key={p.uid} className={`flex items-center justify-between px-4 py-3 text-sm border-t border-white/5 first:border-t-0 ${p.status === "L" ? "opacity-40" : ""} ${p.isYou ? "bg-teal-400/5" : ""}`}>
              <span className="text-slate-200">{p.name}{p.isYou ? " (you)" : ""}</span>
              {p.status && (<span className={`inline-flex h-5 w-5 items-center justify-center rounded ${p.status === "W" ? "bg-teal-400/20 text-teal-300" : "bg-rose-500/20 text-rose-400"}`}>{p.status === "W" ? <Check size={12} /> : <X size={12} />}</span>)}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function SettingsTab({ profile, onSaveNameEmail, onProfileChange, accent, onAccentChange, theme, onSignOut, isHost, rulesText, onSaveRules }) {
  const fileRef = useRef(null);
  const [draftName, setDraftName] = useState(profile.name || "");
  const [draftEmail, setDraftEmail] = useState(profile.email || "");

  const [draftRules, setDraftRules] = useState(rulesText || "");
  const [rulesSaved, setRulesSaved] = useState(false);

  useEffect(() => { setDraftRules(rulesText || ""); }, [rulesText]);

  const save = async () => { await onSaveNameEmail({ name: draftName, email: draftEmail }); setSaved(true); setTimeout(() => setSaved(false), 1500); };
  const saveRules = async () => { await onSaveRules(draftRules); setRulesSaved(true); setTimeout(() => setRulesSaved(false), 1500); };

  return (
    <div className="space-y-6 pb-6">
      <div>
        <h4 className="text-sm font-semibold text-neutral-300 mb-2 flex items-center gap-2"><User size={14} /> Profile</h4>
        <div className={`rounded-xl border ${PANEL_BORDER} bg-neutral-800 p-4`}>
          <div className="flex items-center gap-4 mb-4">
            <button onClick={() => fileRef.current && fileRef.current.click()} className="relative">
              {profile.avatarUrl ? (<img src={profile.avatarUrl} alt="avatar" className="h-16 w-16 rounded-full object-cover" />) : (
                <div className={`h-16 w-16 rounded-full ${theme.bgSoft} flex items-center justify-center ${theme.text} font-scoreboard text-2xl`}>{profile.name ? profile.name.slice(0, 1).toUpperCase() : "?"}</div>
              )}
              <div className={`absolute -bottom-1 -right-1 h-6 w-6 rounded-full ${theme.bg} flex items-center justify-center`}><Camera size={12} className="text-neutral-950" /></div>
            </button>
            <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={(e) => {
              const file = e.target.files && e.target.files[0]; if (!file) return;
              const reader = new FileReader(); reader.onload = () => onProfileChange({ avatarUrl: reader.result }); reader.readAsDataURL(file);
            }} />
            <div>
              <div className="text-slate-100 font-medium">{profile.name || "Player"}</div>
              <div className="text-xs text-neutral-500">{profile.email || "no email set"}</div>
              <div className="flex items-center gap-2 mt-1">
                {profile.ageVerified && (<div className={`inline-flex items-center gap-1 text-[10px] ${theme.text}`}><Check size={10} /> 18+ verified</div>)}
                {isHost && (<div className="inline-flex items-center gap-1 text-[10px] text-amber-300"><Crown size={10} /> Host</div>)}
              </div>
            </div>
          </div>
          <div className="space-y-2">
            <input value={draftName} onChange={(e) => setDraftName(e.target.value)} placeholder="Full name" className={`w-full rounded-lg bg-black/30 border ${PANEL_BORDER} px-3 py-2 text-sm text-slate-100 placeholder:text-neutral-500 outline-none`} />
            <input value={draftEmail} onChange={(e) => setDraftEmail(e.target.value)} placeholder="Email address" className={`w-full rounded-lg bg-black/30 border ${PANEL_BORDER} px-3 py-2 text-sm text-slate-100 placeholder:text-neutral-500 outline-none`} />
            <button onClick={save} className={`w-full rounded-lg ${theme.bg} ${theme.bgHover} text-neutral-950 font-semibold py-2 text-sm`}>{saved ? "Saved ✓" : "Save changes"}</button>
          </div>
        </div>
      </div>

      <div>
        <h4 className="text-sm font-semibold text-neutral-300 mb-2">Rules</h4>
        <div className={`rounded-xl border ${PANEL_BORDER} bg-neutral-800 p-4`}>
          {isHost ? (
            <>
              <p className="text-xs text-neutral-500 mb-2">Only hosts can edit this — it's visible to everyone in the group.</p>
              <textarea value={draftRules} onChange={(e) => setDraftRules(e.target.value)} rows={6} placeholder="How to play, eligibility, payout rules, etc."
                className={`w-full rounded-lg bg-black/30 border ${PANEL_BORDER} px-3 py-2 text-sm text-slate-100 placeholder:text-neutral-500 outline-none resize-none`} />
              <button onClick={saveRules} className={`mt-2 w-full rounded-lg ${theme.bg} ${theme.bgHover} text-neutral-950 font-semibold py-2 text-sm`}>{rulesSaved ? "Saved ✓" : "Save rules"}</button>
            </>
          ) : (
            <p className="text-sm text-neutral-300 whitespace-pre-wrap">{rulesText || "No rules added yet — check back once your host sets them."}</p>
          )}
        </div>
      </div>

      <div>
        <h4 className="text-sm font-semibold text-neutral-300 mb-2 flex items-center gap-2"><Palette size={14} /> Display settings</h4>
        <div className={`rounded-xl border ${PANEL_BORDER} bg-neutral-800 p-4`}>
          <p className="text-xs text-neutral-500 mb-3">Choose the accent colour used across your tabs and buttons.</p>
          <div className="grid grid-cols-3 gap-2">
            {ACCENT_OPTIONS.map((opt) => (
              <button key={opt.id} onClick={() => onAccentChange(opt.id)} className={`flex items-center gap-2 rounded-lg border px-3 py-2 text-xs font-medium ${accent === opt.id ? `border-${opt.id}-400 bg-${opt.id}-400/10 text-${opt.id}-300` : "border-white/10 text-neutral-300"}`}>
                <span className={`h-3 w-3 rounded-full bg-${opt.id}-400`} />{opt.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      <button onClick={onSignOut} className="w-full flex items-center justify-center gap-2 rounded-xl border border-white/10 text-neutral-300 font-semibold py-3 text-sm hover:bg-white/5"><LogOut size={15} /> Sign out</button>
    </div>
  );
}

function HostTierForm({ initial, onSave, onCancel, theme }) {
  const [name, setName] = useState(initial?.name || "");
  const [buyIn, setBuyIn] = useState(initial?.buyIn ?? 5);
  const [start, setStart] = useState(toDatetimeLocalValue(initial?.startTime || new Date(Date.now() + 1000 * 60 * 60 * 30)));
  const [rules, setRules] = useState(initial?.rules || "");
  const canSave = name && buyIn > 0 && start;
  return (
    <div className={`rounded-xl border ${PANEL_BORDER} bg-neutral-800 p-4 space-y-3`}>
      <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Competition name" className={`w-full rounded-lg bg-black/30 border ${PANEL_BORDER} px-3 py-2 text-sm text-slate-100 placeholder:text-neutral-500 outline-none`} />
      <div><label className="text-[11px] text-neutral-500 mb-1 block">Buy-in ($)</label><input value={buyIn} onChange={(e) => setBuyIn(Number(e.target.value))} type="number" min="1" className={`w-full rounded-lg bg-black/30 border ${PANEL_BORDER} px-3 py-2 text-sm text-slate-100 outline-none`} /></div>
      <div><label className="text-[11px] text-neutral-500 mb-1 block">Round 1 start date & time</label><input value={start} onChange={(e) => setStart(e.target.value)} type="datetime-local" className={`w-full rounded-lg bg-black/30 border ${PANEL_BORDER} px-3 py-2 text-sm text-slate-100 outline-none`} /></div>
      <div><label className="text-[11px] text-neutral-500 mb-1 block">Rules / description</label><textarea value={rules} onChange={(e) => setRules(e.target.value)} rows={4} className={`w-full rounded-lg bg-black/30 border ${PANEL_BORDER} px-3 py-2 text-sm text-slate-100 placeholder:text-neutral-500 outline-none resize-none`} /></div>
      <div className="flex gap-2 pt-1">
        <button onClick={onCancel} className="flex-1 rounded-lg border border-white/10 text-neutral-300 py-2 text-sm">Cancel</button>
        <button disabled={!canSave} onClick={() => onSave({ name, buyIn, startTime: new Date(start), rules })} className={`flex-1 rounded-lg ${theme.bg} ${theme.bgHover} disabled:opacity-40 text-neutral-950 font-semibold py-2 text-sm`}>{initial ? "Save changes" : "Create competition"}</button>
      </div>
    </div>
  );
}

function HostTab({ tiers, onCreate, onUpdate, onDelete, theme }) {
  const [creating, setCreating] = useState(false);
  const [editingId, setEditingId] = useState(null);
  return (
    <div className="space-y-4 pb-6">
      {!creating && !editingId && (<button onClick={() => setCreating(true)} className={`w-full rounded-xl ${theme.bg} ${theme.bgHover} text-neutral-950 font-semibold py-3 text-sm`}>+ Create new competition</button>)}
      {creating && (<HostTierForm theme={theme} onCancel={() => setCreating(false)} onSave={async (data) => { await onCreate(data); setCreating(false); }} />)}
      <div className="space-y-3">
        {tiers.map((tier) => (
          <div key={tier.id} className={`rounded-xl border ${PANEL_BORDER} bg-neutral-800 p-4`}>
            {editingId === tier.id ? (
              <HostTierForm initial={tier} theme={theme} onCancel={() => setEditingId(null)} onSave={async (data) => { await onUpdate(tier.id, data); setEditingId(null); }} />
            ) : (
              <>
                <div className="flex items-center justify-between">
                  <div><div className="text-slate-100 font-medium">{tier.name}</div><div className="text-xs text-neutral-500">${tier.buyIn} buy-in · starts {tier.startLabel} · {tier.entries} entered</div></div>
                  <div className="flex gap-2"><button onClick={() => setEditingId(tier.id)} className="p-2 rounded-lg bg-neutral-700 hover:bg-neutral-600"><Pencil size={14} /></button><button onClick={() => { if (confirm(`Delete "${tier.name}"?`)) onDelete(tier.id); }} className="p-2 rounded-lg bg-rose-500/10 text-rose-400 hover:bg-rose-500/20"><Trash size={14} /></button></div>
                </div>
                {tier.rules && <p className="mt-2 text-xs text-neutral-400 whitespace-pre-wrap">{tier.rules}</p>}
              </>
            )}
          </div>
        ))}
        {tiers.length === 0 && <p className="text-center text-sm text-neutral-500 py-6">No competitions yet — create the first one above.</p>}
      </div>
    </div>
  );
}

function AppShell({ user }) {
  const [profile, setProfile] = useState(null);
  const [screen, setScreen] = useState("loading");
  const screenInitialized = useRef(false);
  const [sport, setSport] = useState(null);
  const [tab, setTab] = useState("compete");
  const [now, setNow] = useState(new Date());

  const [transactions, setTransactions] = useState([]);
  const [showDeposit, setShowDeposit] = useState(false);
  const [showWithdraw, setShowWithdraw] = useState(false);

  const [rawTiers, setRawTiers] = useState([]);
  const [entryCounts, setEntryCounts] = useState({});
  const [myEntries, setMyEntries] = useState({});
  const [entryTarget, setEntryTarget] = useState(null);
  const [entryError, setEntryError] = useState("");

  const [allPicks, setAllPicks] = useState([]);
  const [myPick, setMyPick] = useState(null);
  const [pickSubmitted, setPickSubmitted] = useState(false);
  const [pickSaving, setPickSaving] = useState(false);
  const [results, setResults] = useState({});
  const [rulesText, setRulesText] = useState("");

  const accent = profile?.accent || "teal";
  const theme = useAccentTheme(accent);

  useEffect(() => { const id = setInterval(() => setNow(new Date()), 30000); return () => clearInterval(id); }, []);

  // FIX: previously used `screen` inside this closure, which went stale and re-fired
  // setScreen("sport") on every profile update (settings edits, avatar uploads, etc).
  // Using a ref instead means this only ever runs once, on the very first load.
  useEffect(() => {
    const unsub = db.collection("users").doc(user.uid).onSnapshot((doc) => {
      if (doc.exists) {
        const data = doc.data();
        setProfile(data);
        if (!screenInitialized.current) {
          screenInitialized.current = true;
          setScreen(!data.ageVerified ? "idcheck" : "sport");
        }
      }
    });
    return unsub;
  }, [user.uid]);

  useEffect(() => {
    const unsub = db.collection("users").doc(user.uid).collection("transactions").orderBy("createdAt", "desc").limit(20)
      .onSnapshot((snap) => setTransactions(snap.docs.map((d) => ({ id: d.id, ...d.data() }))));
    return unsub;
  }, [user.uid]);

  useEffect(() => {
    const unsub = db.collection("tiers").onSnapshot((snap) => {
      setRawTiers(snap.docs.map((d) => { const data = d.data(); return { id: d.id, ...data, startTime: data.startTime.toDate() }; }));
    });
    return unsub;
  }, []);

  useEffect(() => {
    const unsub = db.collection("config").doc("rules").onSnapshot((doc) => setRulesText(doc.exists ? doc.data().text || "" : ""));
    return unsub;
  }, []);

  useEffect(() => {
    const unsubs = rawTiers.map((tier) => db.collection("entries").where("tierId", "==", tier.id).onSnapshot((snap) => setEntryCounts((prev) => ({ ...prev, [tier.id]: snap.size }))));
    const unsubMine = db.collection("entries").where("uid", "==", user.uid).onSnapshot((snap) => { const mine = {}; snap.docs.forEach((d) => { mine[d.data().tierId] = true; }); setMyEntries(mine); });
    return () => { unsubs.forEach((u) => u()); unsubMine(); };
  }, [rawTiers.map((t) => t.id).join(","), user.uid]);

  const joinedTierId = Object.keys(myEntries)[0] || null;

  useEffect(() => {
    if (!joinedTierId) { setAllPicks([]); setMyPick(null); setPickSubmitted(false); return; }
    const unsubPicks = db.collection("picks").where("tierId", "==", joinedTierId).where("round", "==", ROUND).onSnapshot((snap) => {
      const list = snap.docs.map((d) => d.data()); setAllPicks(list);
      const mine = list.find((p) => p.uid === user.uid);
      if (mine) { setMyPick(mine.team); setPickSubmitted(true); }
    });
    const unsubResults = db.collection("results").doc(`${joinedTierId}_r${ROUND}`).onSnapshot((doc) => setResults(doc.exists ? doc.data().fixtureResults || {} : {}));
    return () => { unsubPicks(); unsubResults(); };
  }, [joinedTierId, user.uid]);

  const tiers = useMemo(() => rawTiers.map((t) => ({ ...t, round: ROUND, startLabel: formatStartLabel(t.startTime), entries: entryCounts[t.id] || 0, pool: (entryCounts[t.id] || 0) * t.buyIn })), [rawTiers, entryCounts]);
  const currentTier = tiers.find((t) => t.id === joinedTierId);
  const lockTime = currentTier ? new Date(currentTier.startTime.getTime() - 1000 * 60 * 60 * 24) : null;
  const tipsLocked = lockTime ? now.getTime() >= lockTime.getTime() : false;
  const lockCountdown = lockTime ? formatCountdown(lockTime.getTime() - now.getTime()) : "";

  const players = useMemo(() => allPicks.map((p) => {
    const fixtureIndex = FIXTURES_R1.findIndex((f) => f.includes(p.team));
    const winner = results[fixtureIndex];
    const status = winner ? (winner === p.team ? "W" : "L") : null;
    return { uid: p.uid, name: p.name, pick: p.team, isYou: p.uid === user.uid, status };
  }), [allPicks, results, user.uid]);

  const myStatus = players.find((p) => p.isYou)?.status || null;
  const eliminated = myStatus === "L";
  const lockedTeam = myStatus === "W" ? myPick : null;

  const updateProfile = (patch) => db.collection("users").doc(user.uid).set(patch, { merge: true });

  const confirmEntry = async () => {
    const tier = entryTarget; setEntryError("");
    try {
      await db.runTransaction(async (tx) => {
        const userRef = db.collection("users").doc(user.uid);
        const userDoc = await tx.get(userRef);
        const bal = userDoc.data().walletBalance || 0;
        if (bal < tier.buyIn) throw new Error("Insufficient balance");
        tx.update(userRef, { walletBalance: FieldValue.increment(-tier.buyIn) });
        tx.set(db.collection("users").doc(user.uid).collection("transactions").doc(), { label: `${tier.name} entry`, amount: -tier.buyIn, createdAt: FieldValue.serverTimestamp() });
        tx.set(db.collection("entries").doc(`${tier.id}_${user.uid}`), { tierId: tier.id, uid: user.uid, name: profile.name, joinedAt: FieldValue.serverTimestamp() });
      });
      setEntryTarget(null); setTab("pick");
    } catch (e) { setEntryError(e.message); }
  };

  const submitPick = async () => {
    if (!myPick || !joinedTierId) return;
    setPickSaving(true);
    await db.collection("picks").doc(`${joinedTierId}_r${ROUND}_${user.uid}`).set({ tierId: joinedTierId, round: ROUND, uid: user.uid, name: profile.name, team: myPick, submittedAt: FieldValue.serverTimestamp() });
    setPickSaving(false); setPickSubmitted(true);
  };

  const setFixtureResult = (fixtureIndex, winner) => db.collection("results").doc(`${joinedTierId}_r${ROUND}`).set({ fixtureResults: { ...results, [fixtureIndex]: winner } }, { merge: true });
  const createTier = (data) => db.collection("tiers").add({ name: data.name, buyIn: data.buyIn, startTime: Timestamp.fromDate(data.startTime), rules: data.rules, createdBy: user.uid, createdAt: FieldValue.serverTimestamp() });
  const updateTier = (id, data) => db.collection("tiers").doc(id).set({ name: data.name, buyIn: data.buyIn, startTime: Timestamp.fromDate(data.startTime), rules: data.rules }, { merge: true });
  const deleteTier = (id) => db.collection("tiers").doc(id).delete();
  const saveRules = (text) => db.collection("config").doc("rules").set({ text, updatedBy: user.uid, updatedAt: FieldValue.serverTimestamp() }, { merge: true });

  if (screen === "loading" || !profile) return <div className="min-h-screen flex items-center justify-center text-neutral-500 text-sm" style={{ backgroundColor: BG }}>Loading…</div>;
  if (screen === "idcheck") return <IDCheckScreen initialName={profile.name} onVerified={(idInfo) => { updateProfile({ ...idInfo, ageVerified: true }); setScreen("sport"); }} />;
  if (screen === "sport") return <SportScreen userName={profile.name} showBack={!!sport} onBack={() => setScreen("app")} onPick={(s) => { setSport(s); setScreen("app"); }} />;

  const isHost = profile.role === "host";
  const navTabs = [
    { id: "compete", label: "Compete", Icon: NavTrophy },
    { id: "pick", label: "My Pick", Icon: NavTarget },
    { id: "standings", label: "Standings", Icon: NavBars },
    { id: "wallet", label: "Wallet", Icon: NavWallet },
    ...(isHost ? [{ id: "host", label: "Host", Icon: NavClipboard }] : []),
    { id: "settings", label: "Settings", Icon: NavGear },
  ];

  return (
    <div className="min-h-screen text-slate-100 pb-20" style={{ backgroundColor: BG }}>
      <header className="px-5 pt-6 pb-4 border-b border-white/5 flex items-center justify-between">
        <button onClick={() => setScreen("sport")} className="flex items-center gap-1 text-neutral-400 text-xs hover:text-neutral-200"><ChevronLeft size={16} /> Sport</button>
        <div className="flex items-center gap-2"><Flame className="text-rose-500" size={20} /><h1 className="font-scoreboard text-2xl tracking-wide">LAST MAN STANDING</h1></div>
        <span className="text-[11px] uppercase tracking-widest text-neutral-500 border border-white/10 rounded-full px-2 py-1">{sport}</span>
      </header>

      <main className="px-5 py-5 max-w-md mx-auto">
        {tab === "compete" && (
          <div className="space-y-4">
            <p className="text-sm text-neutral-500">Pick a tier, and survive the rounds.</p>
            {tiers.length === 0 && <p className="text-center text-sm text-neutral-500 py-12">No competitions live yet — ask your host to set one up.</p>}
            {tiers.map((tier) => <TierCard key={tier.id} tier={tier} now={now} onJoin={setEntryTarget} joined={!!myEntries[tier.id]} theme={theme} />)}
          </div>
        )}
        {tab === "pick" && currentTier && (
          <PickTab fixtures={FIXTURES_R1} myPick={myPick} lockedTeam={lockedTeam} submitted={pickSubmitted} locked={tipsLocked}
            lockCountdown={lockCountdown} eliminated={eliminated} onPick={(team) => { setMyPick(team); setPickSubmitted(false); }}
            onSubmit={submitPick} onEdit={() => setPickSubmitted(false)} theme={theme} saving={pickSaving} />
        )}
        {tab === "pick" && !currentTier && <div className="text-center text-neutral-500 text-sm py-12">Join a competition first to make a pick.</div>}
        {tab === "standings" && currentTier && <StandingsTab players={players} locked={tipsLocked} poolAmount={currentTier.pool} />}
        {tab === "standings" && !currentTier && <div className="text-center text-neutral-500 text-sm py-12">Join a competition to see the field.</div>}
        {tab === "wallet" && <WalletTab balance={profile.walletBalance || 0} transactions={transactions} onDeposit={() => setShowDeposit(true)} onWithdraw={() => setShowWithdraw(true)} theme={theme} />}
        {tab === "host" && isHost && <HostTab tiers={tiers} onCreate={createTier} onUpdate={updateTier} onDelete={deleteTier} theme={theme} />}
        {tab === "settings" && (
          <SettingsTab profile={profile} onSaveNameEmail={updateProfile} onProfileChange={updateProfile} accent={accent} onAccentChange={(a) => updateProfile({ accent: a })} theme={theme} onSignOut={() => auth.signOut()} isHost={isHost} rulesText={rulesText} onSaveRules={saveRules} />
        )}
        {currentTier && (
          <details className="mt-6 rounded-xl border border-dashed border-white/10 p-4">
            <summary className="text-xs text-neutral-500 cursor-pointer">Friends-test tools — simulate this round's results</summary>
            <div className="space-y-2 mt-2">
              {FIXTURES_R1.map(([home, away], i) => (
                <div key={i} className="flex items-center justify-between rounded-lg bg-black/30 px-3 py-2">
                  <span className="text-xs text-neutral-400">{home} vs {away}</span>
                  <div className="flex gap-1">{[home, away].map((team) => (<button key={team} onClick={() => setFixtureResult(i, team)} className={`rounded px-2 py-1 text-[11px] font-medium ${results[i] === team ? `${theme.bg} text-neutral-950` : "bg-neutral-700 text-neutral-300"}`}>{team} won</button>))}</div>
                </div>
              ))}
            </div>
          </details>
        )}
      </main>

      <nav className="fixed bottom-0 inset-x-0 border-t border-white/10 px-2 py-2" style={{ backgroundColor: BG, opacity: 0.98 }}>
        <div className="max-w-md mx-auto grid gap-1" style={{ gridTemplateColumns: `repeat(${navTabs.length}, minmax(0, 1fr))` }}>
          {navTabs.map(({ id, label, Icon }) => (
            <button key={id} onClick={() => setTab(id)} className={`flex flex-col items-center gap-1 py-2 rounded-lg text-[10px] ${tab === id ? theme.text : "text-neutral-500"}`}>
              <Icon active={tab === id} />{label}
            </button>
          ))}
        </div>
      </nav>

      {entryTarget && (<EntryConfirmModal tier={entryTarget} balance={profile.walletBalance || 0} onClose={() => { setEntryTarget(null); setEntryError(""); }} onConfirm={confirmEntry} onGoToWallet={() => { setEntryTarget(null); setTab("wallet"); setShowDeposit(true); }} theme={theme} error={entryError} />)}
      {showDeposit && (<DepositModal onClose={() => setShowDeposit(false)} theme={theme} onConfirm={async (amount) => { await db.collection("users").doc(user.uid).update({ walletBalance: FieldValue.increment(amount) }); await db.collection("users").doc(user.uid).collection("transactions").add({ label: "Balance added", amount, createdAt: FieldValue.serverTimestamp() }); }} />)}
      {showWithdraw && (<WithdrawModal balance={profile.walletBalance || 0} onClose={() => setShowWithdraw(false)} theme={theme} onConfirm={async (amount) => { await db.collection("users").doc(user.uid).update({ walletBalance: FieldValue.increment(-amount) }); await db.collection("users").doc(user.uid).collection("transactions").add({ label: "Withdrawal", amount: -amount, createdAt: FieldValue.serverTimestamp() }); }} />)}
    </div>
  );
}

function App() {
  const [user, setUser] = useState(undefined);
  useEffect(() => auth.onAuthStateChanged((u) => setUser(u)), []);
  if (user === undefined) return <div className="min-h-screen flex items-center justify-center text-neutral-500 text-sm" style={{ backgroundColor: BG }}>Loading…</div>;
  if (!user) return <AuthScreen />;
  return <AppShell key={user.uid} user={user} />;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  document.body.appendChild(s);
