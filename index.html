                    <div className="text-xs text-neutral-500">{getTierPreset(tier.tierLevel).name} · {tier.entries}{getTierPreset(tier.tierLevel).maxPlayers === null ? "" : `/${getTierPreset(tier.tierLevel).maxPlayers}`} entered · starts {tier.startLabel}</div>
                  </div>
                  {owner && (
                    <div className="flex gap-2">
                      <button onClick={() => setEditingId(tier.id)} className="p-2 rounded-lg bg-neutral-700 hover:bg-neutral-600"><Pencil size={14} /></button>
                      <button onClick={() => { if (confirm(`Delete "${tier.name}"?`)) onDelete(tier.id); }} className="p-2 rounded-lg bg-rose-500/10 text-rose-400 hover:bg-rose-500/20"><Trash size={14} /></button>
                    </div>
                  )}
                </div>
                {!tier.cancelled && (
                  <div className="mt-2">
                    {tier.code ? (
                      <CodeChip code={tier.code} theme={theme} />
                    ) : (
                      <button onClick={() => onEnsureCode(tier.id)} className={`w-full rounded-lg bg-black/30 border adapt-border-10 py-2 text-[11px] font-medium ${theme.text}`}>Generate invite code</button>
                    )}
                  </div>
                )}
                {tier.rules && <p className="mt-2 text-xs text-neutral-400 whitespace-pre-wrap">{tier.rules}</p>}
                {!tier.cancelled && (
                  <>
                    <div className="mt-3 grid grid-cols-1 gap-2">
                      <button onClick={() => setManagingTierId(tier.id)} className={`w-full flex items-center justify-center gap-2 rounded-lg border ${theme.borderSoft} ${theme.bgSoft} ${theme.text} font-semibold py-2.5 text-sm`}>
                        <Users size={15} /> Manage entrants{owner ? " & co-hosts" : ""}
                      </button>
                      {!entriesClosed && (
                        <button onClick={() => setInvitingTierId(tier.id)} className="w-full flex items-center justify-center gap-2 rounded-lg border adapt-border-10 bg-neutral-800 text-slate-100 hover:bg-neutral-700 font-semibold py-2.5 text-sm">
                          <UserPlus size={15} /> Invite players by email
                        </button>
                      )}
                    </div>
                    <HostResultsPanel tier={tier} now={now} theme={theme} />
                    {owner && (cancelling === tier.id ? (
                      <div className="mt-3 rounded-lg bg-rose-500/10 border border-rose-500/30 p-3">
                        <p className="text-[11px] text-rose-300 mb-2">This closes the competition for everyone still in it. Sort out any buy-in refunds with your entrants directly. This can't be undone.</p>
                        <div className="flex gap-2">
                          <button onClick={() => setCancelling(null)} className="flex-1 rounded-lg border adapt-border-10 text-neutral-300 py-1.5 text-xs">Never mind</button>
                          <button onClick={async () => { await onCancel(tier); setCancelling(null); }} className="flex-1 rounded-lg bg-rose-500 text-white py-1.5 text-xs font-semibold">Confirm cancel</button>
                        </div>
                      </div>
                    ) : (
                      <button onClick={() => setCancelling(tier.id)} className="mt-3 w-full flex items-center justify-center gap-2 rounded-lg border border-rose-500/40 bg-rose-500/10 text-rose-300 hover:bg-rose-500/20 font-semibold py-2.5 text-sm">
                        <Ban size={15} /> Cancel competition
                      </button>
                    ))}
                  </>
                )}
              </>
            )}
          </div>
          );
        })}
        {tiers.length === 0 && <p className="text-center text-sm text-neutral-500 py-6">You're not hosting any competitions yet — create one above to get started.</p>}
      </div>
      {managingTierId && (
        <EntrantsModal tier={tiers.find((t) => t.id === managingTierId)} theme={theme} isOwner={isOwnerOf(tiers.find((t) => t.id === managingTierId))} onKick={onKick} onRestore={onRestore} onMarkEliminated={onMarkEliminated} onMarkWinner={onMarkWinner} onAddAdmin={onAddAdmin} onRemoveAdmin={onRemoveAdmin} onClose={() => setManagingTierId(null)} />
      )}
      {invitingTierId && (
        <InviteModal tier={tiers.find((t) => t.id === invitingTierId)} theme={theme} onClose={() => setInvitingTierId(null)} />
      )}
    </div>
  );
}

function AppShell({ user }) {
  const [profile, setProfile] = useState(null);
  const [screen, setScreen] = useState("loading");
  const screenInitialized = useRef(false);
  const [sport, setSport] = useState(null);
  const [tab, setTab] = useState("compete");
  const [now, setNow] = useState(new Date());

  const [rawTiers, setRawTiers] = useState([]);
  const [entryCounts, setEntryCounts] = useState({});
  const [myEntries, setMyEntries] = useState({});
  const [viewingTierId, setViewingTierId] = useState(null);
  const [invitingTier, setInvitingTier] = useState(null);

  const [allPicks, setAllPicks] = useState([]);
  const [myPick, setMyPick] = useState(null);
  const [myMargin, setMyMargin] = useState("");
  const [pickSubmitted, setPickSubmitted] = useState(false);
  const [pickStamp, setPickStamp] = useState(null); // team name while the confirmation stamp shows
  const [pickSaving, setPickSaving] = useState(false);
  const [results, setResults] = useState({});
  const [picksLoaded, setPicksLoaded] = useState(false);

  // One fixed, refined accent across the whole app — no per-user colour pickers.
  const accent = "teal";
  // Two themes only. Back-compat: earlier light-ish bg choices map to light, everything else dark.
  const themePref = profile?.theme || ((profile?.bgMode === "white" || profile?.bgMode === "sky") ? "light" : "dark");
  const fontSize = profile?.fontSize || "small";
  useEffect(() => {
    document.documentElement.classList.toggle("app-light", themePref === "light");
    const fs = FONT_SIZES.find((s) => s.id === fontSize) || FONT_SIZES[0];
    document.documentElement.style.fontSize = fs.px;
  }, [themePref, fontSize]);
  const theme = useAccentTheme(accent);

  useEffect(() => { const id = setInterval(() => setNow(new Date()), 30000); return () => clearInterval(id); }, []);

  // FIX: previously used `screen` inside this closure, which went stale and re-fired
  // setScreen("sport") on every profile update (settings edits, avatar uploads, etc).
  // Using a ref instead means this only ever runs once, on the very first load.
  useEffect(() => {
    const unsub = db.collection("users").doc(user.uid).onSnapshot((doc) => {
      if (doc.exists) {
        const data = doc.data();
        setProfile(data);
        if (!screenInitialized.current) {
          screenInitialized.current = true;
          if (!data.ageVerified) setScreen("idcheck");
          else if (!data.hasSeenHowToPlay) setScreen("howtoplay");
          else if (!data.hasChosenMode) setScreen("choosemode");
          else setScreen("sport");
        }
      }
    });
    return unsub;
  }, [user.uid]);

  useEffect(() => {
    const unsub = db.collection("tiers").onSnapshot((snap) => {
      // Guard every date field — one malformed/legacy tier doc without startTime would otherwise
      // throw inside this map and blank the whole app for everyone on every snapshot.
      setRawTiers(snap.docs.map((d) => {
        const data = d.data();
        return { id: d.id, ...data, startTime: data.startTime ? data.startTime.toDate() : new Date(), lockTime: data.lockTime ? data.lockTime.toDate() : null };
      }));
    });
    return unsub;
  }, []);

  useEffect(() => {
    const unsubs = rawTiers.map((tier) => db.collection("entries").where("tierId", "==", tier.id).onSnapshot((snap) => setEntryCounts((prev) => ({ ...prev, [tier.id]: snap.size }))));
    const unsubMine = db.collection("entries").where("uid", "==", user.uid).onSnapshot((snap) => { const mine = {}; snap.docs.forEach((d) => { mine[d.data().tierId] = { id: d.id, ...d.data() }; }); setMyEntries(mine); });
    return () => { unsubs.forEach((u) => u()); unsubMine(); };
  }, [rawTiers.map((t) => t.id).join(","), user.uid]);

  const joinedTierIds = Object.keys(myEntries);
  const tiers = useMemo(() => rawTiers.map((t) => ({ ...t, startLabel: formatStartLabel(t.startTime), entries: entryCounts[t.id] || 0 })), [rawTiers, entryCounts]);
  // Per-competition host model: the creator owns it; owners can appoint co-hosts (adminUids).
  // Legacy competitions created before this model fall back to createdBy for ownership.
  const isOwnerOf = (t) => !!t && (t.ownerUid ? t.ownerUid === user.uid : t.createdBy === user.uid);
  const isHostOf = (t) => !!t && (isOwnerOf(t) || (t.adminUids || []).includes(user.uid));
  const hostedTiers = useMemo(() => tiers.filter(isHostOf), [tiers, user.uid]);
  // viewingTierId is which joined competition you're actively looking at on My Pick / Standings.
  // Default to one you're still active in (and not cancelled), not just the first by id.
  const activeJoinedIds = joinedTierIds.filter((id) => { const e = myEntries[id]; const t = tiers.find((x) => x.id === id); return e && e.status === "active" && t && !t.cancelled; });
  const defaultJoinedId = activeJoinedIds[0] || joinedTierIds.find((id) => { const t = tiers.find((x) => x.id === id); return t && !t.cancelled; }) || joinedTierIds[0] || null;
  const joinedTierId = (viewingTierId && myEntries[viewingTierId]) ? viewingTierId : defaultJoinedId;
  const currentTier = tiers.find((t) => t.id === joinedTierId);
  // Older competitions created before round selection existed won't have a roundId yet —
  // fall back to the first known round so they still work instead of crashing.
  const effectiveRoundId = currentTier?.roundId || NRL_ROUNDS[0].id;
  // Memoised so its object identity is stable — otherwise the auto-pick effect (which depends on
  // it) tears down and re-runs on every render/tick.
  const currentRound = useMemo(() => currentTier ? { ...getRound(effectiveRoundId), fixtures: currentTier.fixtureOverrides || getRound(effectiveRoundId).fixtures } : null, [currentTier?.id, effectiveRoundId, currentTier?.fixtureOverrides]);

  useEffect(() => {
    setPicksLoaded(false);
    if (!joinedTierId || !currentTier) { setAllPicks([]); setMyPick(null); setMyMargin(""); setPickSubmitted(false); return; }
    const unsubPicks = db.collection("picks").where("tierId", "==", joinedTierId).where("roundId", "==", effectiveRoundId).onSnapshot((snap) => {
      const list = snap.docs.map((d) => d.data()); setAllPicks(list);
      const mine = list.find((p) => p.uid === user.uid);
      if (mine) { setMyPick(mine.team); setMyMargin(mine.margin != null ? String(mine.margin) : ""); setPickSubmitted(true); } else { setMyPick(null); setMyMargin(""); setPickSubmitted(false); }
      setPicksLoaded(true);
    });
    const unsubResults = db.collection("results").doc(`${joinedTierId}_${effectiveRoundId}`).onSnapshot((doc) => {
      const data = doc.exists ? doc.data() : {};
      setResults(data.fixtureResults || {});
    });
    return () => { unsubPicks(); unsubResults(); };
  }, [joinedTierId, effectiveRoundId, user.uid]);

  const lockTime = currentTier?.lockTime || null;
  const tipsLocked = lockTime ? now.getTime() >= lockTime.getTime() : false;
  const msToLock = lockTime ? lockTime.getTime() - now.getTime() : null;
  const lockCountdown = lockTime ? formatCountdown(msToLock) : "";
  const lockUrgent = !tipsLocked && msToLock !== null && msToLock <= 1000 * 60 * 60 * 6;

  const standingsProfiles = useLiveProfiles(useMemo(() => allPicks.map((p) => p.uid), [allPicks]));

  const players = useMemo(() => {
    if (!currentRound) return [];
    return allPicks.map((p) => {
      const fixtureIndex = currentRound.fixtures.findIndex((f) => f.home === p.team || f.away === p.team);
      const winner = results[fixtureIndex];
      const status = winner ? (winner === p.team ? "W" : "L") : null;
      const live = standingsProfiles[p.uid];
      return { uid: p.uid, name: live?.name || p.name, avatarPreset: live ? (live.avatarPreset || null) : (p.avatarPreset || null), pick: p.team, margin: p.margin != null ? p.margin : null, isYou: p.uid === user.uid, status };
    });
  }, [allPicks, results, user.uid, currentRound, standingsProfiles]);

  const myStatus = players.find((p) => p.isYou)?.status || null;
  const myEntryStatus = myEntries[joinedTierId]?.status;
  const eliminated = !!myEntryStatus && myEntryStatus !== "active"; // covers eliminated, kicked, and refunded alike

  // Teams you can't reuse this round, driven by the competition's reuse policy:
  //   • free      → none
  //   • nextRound → just last round's pick (must sit a round before reusing)
  //   • none      → every team you've already used in this competition
  const [lockedTeams, setLockedTeams] = useState([]);
  useEffect(() => {
    if (!joinedTierId || !currentTier) { setLockedTeams([]); return; }
    const policy = tierReusePolicy(currentTier);
    if (policy === "free") { setLockedTeams([]); return; }
    let cancelled = false;
    if (policy === "nextRound") {
      if (!currentTier.previousRoundId) { setLockedTeams([]); return; }
      db.collection("picks").doc(`${joinedTierId}_${currentTier.previousRoundId}_${user.uid}`).get().then((doc) => {
        if (!cancelled) setLockedTeams(doc.exists ? [doc.data().team] : []);
      }).catch(() => { if (!cancelled) setLockedTeams([]); });
    } else { // "none" — every team used in a round other than the one being picked now
      db.collection("picks").where("tierId", "==", joinedTierId).where("uid", "==", user.uid).get().then((snap) => {
        if (cancelled) return;
        const teams = snap.docs.map((d) => d.data()).filter((p) => p.roundId !== effectiveRoundId).map((p) => p.team);
        setLockedTeams([...new Set(teams)]);
      }).catch(() => { if (!cancelled) setLockedTeams([]); });
    }
    return () => { cancelled = true; };
  }, [joinedTierId, currentTier?.previousRoundId, currentTier?.reusePolicy, effectiveRoundId, user.uid]);

  // Note: random teams for no-shows are assigned HOST-SIDE now (see the results panel's
  // "Auto-assign random to no-shows"). Server rules block any pick write after lockout, so a
  // player's own device can no longer write a pick once tips lock — that's what keeps the
  // deadline honest. The host allocates (or auto-assigns) missed picks when entering results.

  const updateProfile = (patch) => db.collection("users").doc(user.uid).set(patch, { merge: true });

  // Join a private competition using the invite code the host shared. Returns { ok, tierId }
  // or { error }. Used by onboarding and the "Join with a code" action on Compete.
  const joinByCode = async (rawCode) => {
    const code = (rawCode || "").toUpperCase().trim();
    if (code.length < 4) return { error: "Enter the code your host gave you." };
    let snap;
    try { snap = await db.collection("tiers").where("code", "==", code).limit(1).get(); }
    catch (e) { return { error: "Couldn't check that code — try again." }; }
    if (snap.empty) return { error: "No competition found with that code." };
    const doc = snap.docs[0]; const data = doc.data();
    // Already a member? Go straight in (even if it was later cancelled — you can see that state).
    let already = false;
    try { already = (await db.collection("entries").doc(`${doc.id}_${user.uid}`).get()).exists; }
    catch (e) { return { error: "Couldn't join — try again." }; }
    if (already) { playDingSound(); return { ok: true, tierId: doc.id }; }
    if (data.cancelled) return { error: "That competition has been cancelled." };
    const preset = getTierPreset(data.tierLevel);
    const lockTime = data.lockTime ? data.lockTime.toDate() : null;
    if (lockTime && Date.now() >= lockTime.getTime()) return { error: "Entries have closed for that competition." };
    let count = 0;
    try { count = (await db.collection("entries").where("tierId", "==", doc.id).get()).size; } catch (e) { /* fall through — capacity is a soft check */ }
    if (preset.maxPlayers !== null && count >= preset.maxPlayers) return { error: "That competition is full." };
    try {
      await db.collection("entries").doc(`${doc.id}_${user.uid}`).set({ tierId: doc.id, uid: user.uid, name: profile.name, status: "active", joinedAt: FieldValue.serverTimestamp() });
    } catch (e) { return { error: "Couldn't join — try again." }; }
    playDingSound();
    return { ok: true, tierId: doc.id };
  };

  // Older competitions created before invite codes existed get one on demand.
  const ensureCode = async (tierId) => { const c = genCode(); await db.collection("tiers").doc(tierId).set({ code: c }, { merge: true }); return c; };

  // Compete-tab join: after a successful code join, jump the player straight to their pick.
  const handleJoinByCode = async (code) => {
    const res = await joinByCode(code);
    if (res.ok) { setViewingTierId(res.tierId); setTab("pick"); }
    return res;
  };

  // A player can forfeit (concede — marked out but stays listed) or leave entirely.
  const forfeitEntry = async (tierId) => {
    try {
      await db.collection("entries").doc(`${tierId}_${user.uid}`).update({ status: "forfeited" });
      setTab("standings");
    } catch (e) {
      alert("Couldn't forfeit: " + (e.message || "please try again.") + (String(e.message || "").toLowerCase().includes("permission") ? "\n\n(Your host needs to publish the latest Firestore rules.)" : ""));
    }
  };
  const leaveEntry = async (tierId) => {
    try {
      await db.collection("entries").doc(`${tierId}_${user.uid}`).delete();
      if (viewingTierId === tierId) setViewingTierId(null);
      setTab("compete");
    } catch (e) {
      alert("Couldn't leave: " + (e.message || "please try again.") + (String(e.message || "").toLowerCase().includes("permission") ? "\n\n(Your host needs to publish the latest Firestore rules.)" : ""));
    }
  };

  const submitPick = async () => {
    if (!myPick || !joinedTierId || !currentTier) return;
    if (currentTier.marginsMode && !(Number(myMargin) >= 1)) return; // margin required in margins mode
    const chosenTeam = myPick;
    setPickSubmitted(true); // show confirmation instantly, don't wait on the network
    setPickSaving(false);
    setPickStamp(chosenTeam);
    playThumpSound(74, false); // firm stamp thud, not the full smash
    setTimeout(() => { setPickStamp(null); setTab("standings"); }, 1700);
    try {
      const pick = { tierId: joinedTierId, roundId: effectiveRoundId, uid: user.uid, name: profile.name, avatarPreset: profile.avatarPreset || null, team: myPick, submittedAt: FieldValue.serverTimestamp() };
      if (currentTier.marginsMode) pick.margin = Math.max(1, Math.min(100, Math.round(Number(myMargin))));
      await db.collection("picks").doc(`${joinedTierId}_${effectiveRoundId}_${user.uid}`).set(pick);
    } catch (e) {
      setPickSubmitted(false); // roll back if it genuinely failed to save
    }
  };

  // Whoever creates a competition owns it. ownerUid = full control; adminUids = co-hosts the
  // owner has authorised to help run it. hostUids covers both for quick permission checks.
  const createTier = (data, payment) => db.collection("tiers").add({ name: data.name, tierLevel: data.tierLevel, roundId: data.roundId, startTime: Timestamp.fromDate(data.startTime), lockTime: Timestamp.fromDate(data.lockTime), rules: data.rules, lives: data.lives, reusePolicy: data.reusePolicy, marginsMode: !!data.marginsMode, payment: payment || null, code: genCode(), ownerUid: user.uid, adminUids: [], createdBy: user.uid, createdAt: FieldValue.serverTimestamp() });
  const addAdmin = (tierId, uid) => db.collection("tiers").doc(tierId).update({ adminUids: FieldValue.arrayUnion(uid) });
  const removeAdmin = (tierId, uid) => db.collection("tiers").doc(tierId).update({ adminUids: FieldValue.arrayRemove(uid) });

  // Called by HostTab AFTER the checkout step resolves (a free open, a simulated beta payment,
  // or — once PAYMENTS_LIVE is true — a real Stripe charge). `payment` is the record returned by
  // the checkout; we stamp it on the competition and mark the free trial as used.
  const handleCreateTier = async (data, payment) => {
    await createTier(data, payment);
    if (!profile.hasCreatedComp) db.collection("users").doc(user.uid).set({ hasCreatedComp: true }, { merge: true });
  };
  const updateTier = (id, data) => db.collection("tiers").doc(id).set({ name: data.name, tierLevel: data.tierLevel, roundId: data.roundId, startTime: Timestamp.fromDate(data.startTime), lockTime: Timestamp.fromDate(data.lockTime), rules: data.rules, lives: data.lives, reusePolicy: data.reusePolicy, marginsMode: !!data.marginsMode }, { merge: true });
  const deleteTier = (id) => db.collection("tiers").doc(id).delete();
  const kickEntrant = (tierId, uid, name) => {
    if (!confirm(`Kick ${name || "this entrant"} from the competition? They'll be marked as kicked and won't be able to submit further picks. You can restore them afterward if needed.`)) return;
    return db.collection("entries").doc(`${tierId}_${uid}`).update({ status: "kicked" });
  };
  // manual: true tells the results recompute to leave this player's status alone (host override).
  const restoreEntrant = (tierId, uid) => db.collection("entries").doc(`${tierId}_${uid}`).update({ status: "active", manual: true });
  const markEliminated = (tierId, uid) => db.collection("entries").doc(`${tierId}_${uid}`).update({ status: "eliminated", manual: true });

  const markWinner = async (tierId, uid, name) => {
    const tier = tiers.find((t) => t.id === tierId);
    if (!tier) return;
    const already = !!tier.winnerUid;
    const confirmMsg = already
      ? `"${tier.name}" already has a winner (${tier.winnerName || "someone"}). Mark ${name} as the last one standing instead? This just relabels the winner in the app — sort out the prize pool with your players directly.`
      : `Mark ${name} as the last one standing in "${tier.name}"? This records them as the winner in the app. The prize pool is paid out by you outside the app.`;
    if (!confirm(confirmMsg)) return;
    await db.collection("tiers").doc(tierId).update({ winnerUid: uid, winnerName: name, winnerAt: FieldValue.serverTimestamp() });
  };

  const cancelCompetition = async (tier) => {
    const snap = await db.collection("entries").where("tierId", "==", tier.id).get();
    const batch = db.batch();
    snap.docs.forEach((d) => {
      if (d.data().status !== "active") return;
      batch.update(d.ref, { status: "cancelled" });
    });
    batch.update(db.collection("tiers").doc(tier.id), { cancelled: true });
    await batch.commit();
  };

  if (screen === "loading" || !profile) return <div className="min-h-screen flex items-center justify-center text-neutral-500 text-sm" style={{ backgroundColor: BG, color: "var(--app-text)" }}>Loading…</div>;
  if (screen === "idcheck") return <IDCheckScreen initialName={profile.name} onVerified={(idInfo) => { updateProfile({ ...idInfo, ageVerified: true }); setScreen("howtoplay"); }} />;
  if (screen === "howtoplay") return <HowToPlayScreen onAccept={() => { updateProfile({ hasSeenHowToPlay: true }); setScreen("choosemode"); }} />;
  if (screen === "choosemode") return <ChooseModeScreen theme={theme}
    onHost={() => { updateProfile({ mode: "host", hasChosenMode: true }); setSport("nrl"); setScreen("app"); setTab("host"); }}
    onJoin={joinByCode}
    onJoined={(tierId) => { updateProfile({ mode: "player", hasChosenMode: true }); setSport("nrl"); setViewingTierId(tierId); setScreen("app"); setTab("pick"); }} />;
  if (screen === "sport") return <SportScreen userName={profile.name} showBack={!!sport} onBack={() => setScreen("app")} onPick={(s) => { setSport(s); setScreen("app"); }} />;

  // Host status: you're a host once you've chosen to host OR you already run a competition.
  // Players (who joined via a code) instead get a "Become a host" tab that lets them start
  // their own competition whenever they like.
  const hostsAnything = hostedTiers.length > 0;
  const isHostMode = profile.mode === "host" || hostsAnything;
  const navTabs = [
    { id: "compete", label: "Compete", Icon: NavTrophy },
    { id: "pick", label: "My Pick", Icon: NavTarget },
    { id: "standings", label: "Standings", Icon: NavBars },
    { id: "host", label: isHostMode ? "Host" : "Become a host", Icon: isHostMode ? NavClipboard : NavTrophy },
    { id: "settings", label: "Settings", Icon: NavGear },
  ];

  return (
    <div className="min-h-screen text-slate-100 pb-20" style={{ backgroundColor: BG, color: "var(--app-text)" }}>
      <header className="lms-header sticky top-0 z-30 px-5 pt-5 pb-4 flex items-center justify-between">
        <button onClick={() => setScreen("sport")} className="flex items-center gap-1 text-neutral-400 text-xs hover:text-neutral-200 transition"><ChevronLeft size={16} /> Sport</button>
        <BrandLockup layout="inline" emblemSize={24} />
        <span className="text-[10px] uppercase tracking-widest text-neutral-500 border adapt-border-10 rounded-full px-2 py-1">{sport}</span>
      </header>

      <main className="px-5 py-5 max-w-md mx-auto">
        {(tab === "pick" || tab === "standings") && joinedTierIds.filter((id) => { const t = tiers.find((x) => x.id === id); return t && !t.cancelled; }).length > 1 && (
          <div className="flex gap-2 mb-4 overflow-x-auto pb-1">
            {joinedTierIds.map((id) => {
              const t = tiers.find((x) => x.id === id);
              if (!t || t.cancelled) return null;
              const active = id === joinedTierId;
              return (
                <button key={id} onClick={() => setViewingTierId(id)}
                  className={`shrink-0 rounded-full px-3 py-1.5 text-xs font-medium border ${active ? `${theme.border} ${theme.bgSoft} ${theme.text}` : "adapt-border-10 text-neutral-400"}`}>
                  {t.name}
                </button>
              );
            })}
          </div>
        )}
        {tab === "compete" && (
          <div className="space-y-5">
            <JoinCodeCard onJoin={handleJoinByCode} theme={theme} />
            <div>
              <h4 className="text-sm font-semibold text-neutral-300 mb-2">Your competitions</h4>
              {tiers.filter((t) => myEntries[t.id] && !t.cancelled).length === 0 ? (
                <p className={`text-center text-sm text-neutral-500 py-8 rounded-2xl border ${PANEL_BORDER} bg-neutral-800`}>You haven't joined any competitions yet.<br />Enter an invite code above to jump into one.</p>
              ) : (
                <div className="space-y-4">
                  {tiers.filter((t) => myEntries[t.id] && !t.cancelled).map((tier) => <TierCard key={tier.id} tier={tier} now={now} onJoin={() => { setViewingTierId(tier.id); setTab("pick"); }} onInvite={setInvitingTier} joined theme={theme} />)}
                </div>
              )}
            </div>
          </div>
        )}
        {tab === "pick" && currentTier && currentRound && (
          <>
            <PickTab round={currentRound} myPick={myPick} lockedTeams={lockedTeams} submitted={pickSubmitted} locked={tipsLocked} stamping={!!pickStamp}
              lockCountdown={lockCountdown} lockUrgent={lockUrgent} eliminated={eliminated} entryStatus={myEntryStatus} onPick={(team) => { setMyPick(team); setPickSubmitted(false); }}
              marginsMode={!!currentTier.marginsMode} margin={myMargin} onMargin={(v) => { setMyMargin(v); setPickSubmitted(false); }}
              onSubmit={submitPick} onEdit={() => setPickSubmitted(false)} theme={theme} saving={pickSaving} />
            {myEntryStatus && myEntryStatus !== "cancelled" && (
              <LeaveCompetition active={myEntryStatus === "active"} onForfeit={() => forfeitEntry(currentTier.id)} onLeave={() => leaveEntry(currentTier.id)} />
            )}
          </>
        )}
        {tab === "pick" && !currentTier && <div className="text-center text-neutral-500 text-sm py-12">Join a competition first to make a pick.</div>}
        {tab === "standings" && currentTier && <StandingsTab players={players} locked={tipsLocked} lockCountdown={lockCountdown} lockUrgent={lockUrgent} entryCount={currentTier.entries} winnerUid={currentTier.winnerUid} winnerName={currentTier.winnerName} myUid={user.uid} marginsMode={!!currentTier.marginsMode} />}
        {tab === "standings" && !currentTier && <div className="text-center text-neutral-500 text-sm py-12">Join a competition to see the field.</div>}
        {tab === "host" && <HostTab tiers={hostedTiers} uid={user.uid} isHostMode={isHostMode} isOwnerOf={isOwnerOf} hasCreatedComp={!!profile.hasCreatedComp} onCreate={handleCreateTier} onUpdate={updateTier} onDelete={deleteTier} onKick={kickEntrant} onRestore={restoreEntrant} onMarkEliminated={markEliminated} onMarkWinner={markWinner} onCancel={cancelCompetition} onAddAdmin={addAdmin} onRemoveAdmin={removeAdmin} onEnsureCode={ensureCode} now={now} theme={theme} />}
        {tab === "settings" && (
          <SettingsTab profile={profile} uid={user.uid} onSaveNameEmail={updateProfile} onProfileChange={updateProfile} accent={accent} onAccentChange={(a) => updateProfile({ accent: a })} theme={theme} onSignOut={() => auth.signOut()} isHost={hostsAnything}
            history={Object.values(myEntries).filter((e) => e.status && e.status !== "active").map((e) => ({ id: e.id, tierName: tiers.find((t) => t.id === e.tierId)?.name || "Unknown competition", status: e.status }))} />
        )}
      </main>

      <nav className="lms-nav fixed bottom-0 inset-x-0 px-2 py-2 z-30">
        <div className="max-w-md mx-auto grid gap-1" style={{ gridTemplateColumns: `repeat(${navTabs.length}, minmax(0, 1fr))` }}>
          {navTabs.map(({ id, label, Icon }) => (
            <button key={id} onClick={() => setTab(id)} className={`flex flex-col items-center gap-1 py-2 rounded-xl text-[10px] font-medium transition ${tab === id ? `${theme.text} ${theme.bgSoft}` : "text-neutral-500 hover:text-neutral-300"}`}>
              <Icon active={tab === id} />{label}
            </button>
          ))}
        </div>
      </nav>

      {invitingTier && (<InviteModal tier={invitingTier} theme={theme} onClose={() => setInvitingTier(null)} />)}
      {pickStamp && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80">
          <div className="stamp-pop text-center">
            <div className={`border-4 ${theme.borderSoft} ${theme.text} font-scoreboard text-5xl tracking-widest px-8 py-3 uppercase bg-neutral-900`}
              style={{ textShadow: "0 0 22px currentColor", boxShadow: "0 0 34px currentColor" }}>
              {pickStamp}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function SplashScreen({ onFinish }) {
  const N = 14, SURV = 0;
  const order = [7, 3, 11, 5, 1, 9, 13, 4, 8, 12, 2, 10, 6]; // eliminate everyone but the survivor, scattered
  const R = 100;
  const [k, setK] = useState(0);       // number eliminated so far
  const [stage, setStage] = useState(0); // 0 = ring, 1 = winner flare + crown, 2 = wordmark, 3 = beta
  const [phase, setPhase] = useState("in");

  useEffect(() => {
    playIntroRiser();
    const start = 480, gap = 98;
    const timers = order.map((_, idx) => setTimeout(() => setK(idx + 1), start + idx * gap));
    const doneElim = start + order.length * gap;
    timers.push(setTimeout(() => { setStage(1); playSoftReveal(); }, doneElim + 260));
    timers.push(setTimeout(() => setStage(2), doneElim + 760));
    timers.push(setTimeout(() => setStage(3), doneElim + 1180));
    timers.push(setTimeout(() => setPhase("out"), doneElim + 2250));
    timers.push(setTimeout(() => onFinish(), doneElim + 2850));
    return () => timers.forEach(clearTimeout);
  }, []);

  const isDead = (i) => i !== SURV && order.indexOf(i) < k;
  // Everything is absolutely placed inside a fixed-size stage so nothing reflows or drifts
  // when the wordmark appears — the crown centre stays put. CX/CY = the ring/crown centre.
  const CX = 150, CY = 138;
  const dots = Array.from({ length: N }, (_, i) => {
    const ang = (-90 + i * (360 / N)) * Math.PI / 180;
    return { i, x: CX + Math.round(Math.cos(ang) * R), y: CY + Math.round(Math.sin(ang) * R) };
  });

  return (
    <div className={`fixed inset-0 z-50 flex items-center justify-center overflow-hidden transition-all duration-[650ms] ease-out ${phase === "out" ? "opacity-0 scale-[1.04]" : "opacity-100 scale-100"}`} style={{ backgroundColor: "#0b0c10" }}>
      <div className="lms-glow" style={{ position: "absolute", width: 520, height: 520, borderRadius: "9999px", background: "radial-gradient(circle, rgba(45,212,191,0.16), transparent 68%)", filter: "blur(20px)" }} />
      <div className="splash-vignette" />

      <div className="relative z-10" style={{ width: 300, height: 320 }}>
        {dots.map(({ i, x, y }) => {
          const survivor = i === SURV;
          const cls = survivor ? (stage >= 1 ? "dot-win" : "dot-in") : (isDead(i) ? "dot-dead" : "dot-in");
          return (
            <div key={i} className="absolute" style={{ left: x, top: y, transform: "translate(-50%,-50%)" }}>
              <div className={`intro-dot ${cls}`} style={{ animationDelay: survivor ? "0s" : `${0.3 + i * 0.02}s` }} />
              {survivor && stage >= 1 && <div className="win-ring" />}
            </div>
          );
        })}
        {stage >= 1 && (
          <div className="crown-bloom absolute" style={{ left: CX, top: CY }}>
            <div style={{ position: "absolute", inset: -16, borderRadius: "9999px", background: "radial-gradient(circle, rgba(255,190,90,0.45), transparent 70%)", filter: "blur(9px)" }} />
            <div className="relative" style={{ filter: "drop-shadow(0 0 16px rgba(255,190,90,0.55))" }}><BrandEmblem size={54} /></div>
          </div>
        )}
        {stage >= 2 && <h1 className="lms-mark font-scoreboard text-4xl sm:text-5xl whitespace-nowrap absolute text-center" style={{ left: "50%", top: 214, transform: "translateX(-50%)", color: "#f4f1ea" }}>LAST MAN STANDING</h1>}
        {stage >= 2 && <div className="lms-line absolute h-px w-40" style={{ left: "calc(50% - 80px)", top: 266, transformOrigin: "center", background: "linear-gradient(90deg, transparent, rgba(45,212,191,0.9), transparent)", animationDelay: "0.45s" }} />}
        {stage >= 3 && <p className="lms-fade absolute text-[11px] tracking-[0.45em] uppercase text-neutral-500 text-center" style={{ left: 0, right: 0, top: 284 }}>Beta</p>}
      </div>
    </div>
  );
}


function InviteLandingScreen({ params, onContinue }) {
  const name = params.get("name") || "Last Man Standing";
  const preset = getTierPreset(params.get("tier") || "bronze");
  const round = params.get("round") || "";
  const hours = params.get("hours") || "";
  const code = (params.get("code") || "").toUpperCase();
  return (
    <div className="min-h-screen text-slate-100 flex flex-col justify-center px-6 relative overflow-hidden" style={{ backgroundColor: "#050506" }}>
      <div className="smoke-layer-a" /><div className="smoke-layer-b" />
      <div className="relative z-10 max-w-sm mx-auto w-full">
        <div className="mb-6">
          <p className="text-center text-[11px] uppercase tracking-[0.35em] text-amber-300/80 mb-3">You're invited</p>
          <BrandLockup layout="stacked" emblemSize={48} />
        </div>

        <div className="relative overflow-hidden rounded-2xl border border-teal-400/40 bg-neutral-800 p-5" style={{ boxShadow: "0 0 30px rgba(45,212,191,0.15)" }}>
          <div className="flex items-center justify-between">
            <h3 className="text-lg font-semibold text-slate-100">{name}</h3>
            {round && <span className="text-xs text-neutral-500">{round}</span>}
          </div>
          <p className="text-sm text-neutral-400 mt-1">{preset.name} tier · {tierCapacityLabel(preset)}</p>
          {code && (
            <div className="mt-4 rounded-lg bg-black/30 border border-teal-400/20 p-3 text-center">
              <div className="text-[10px] uppercase tracking-[0.2em] text-neutral-500 mb-1">Your invite code</div>
              <div className="font-scoreboard text-3xl tracking-[0.3em] text-teal-300">{code}</div>
            </div>
          )}
          {hours && (
            <div className="mt-4 flex items-center justify-center gap-2 rounded-lg px-3 py-2 text-xs font-medium bg-rose-500/15 text-rose-300 animate-pulse">
              <Clock size={13} /> Locks in about {hours} hours — don't wait around!
            </div>
          )}
          <button onClick={onContinue} className="mt-5 w-full rounded-xl bg-teal-400 hover:bg-teal-300 text-neutral-950 font-semibold py-3 text-sm">
            Join now
          </button>
        </div>

        <p className="text-center text-[11px] text-neutral-500 mt-5">Create a free account, choose <span className="text-neutral-300">Join a competition</span>{code ? ", and enter the code above" : ""} — takes less than a minute.</p>
      </div>
    </div>
  );
}

function TapToEnterScreen({ onEnter }) {
  const handleTap = () => {
    getSharedAudioCtx(); // primed synchronously inside the real tap gesture — the most reliable moment to unlock audio
    onEnter();
  };
  return (
    <div onClick={handleTap} onTouchStart={handleTap} className="fixed inset-0 z-50 flex items-center justify-center overflow-hidden cursor-pointer" style={{ backgroundColor: "#050506" }}>
      <div className="smoke-layer-a" style={{ filter: "blur(24px) grayscale(1)" }} />
      <div className="smoke-layer-b" style={{ filter: "blur(30px) grayscale(1)" }} />
      <div className="relative z-10 text-center px-6">
        <div className="flex justify-center mb-5"><span className="brand-emblem-wrap"><BrandEmblem size={38} /></span></div>
        <p className="tap-pulse text-neutral-300 text-sm tracking-[0.35em] uppercase">Tap to enter</p>
      </div>
    </div>
  );
}

function App() {
  const [entered, setEntered] = useState(false);
  const [showSplash, setShowSplash] = useState(true);
  const [user, setUser] = useState(undefined);
  const [pinUnlocked, setPinUnlocked] = useState(false);
  const inviteParams = useMemo(() => new URLSearchParams(window.location.search), []);
  const [inviteDismissed, setInviteDismissed] = useState(false);
  useEffect(() => auth.onAuthStateChanged((u) => { setUser(u); setPinUnlocked(false); }), []);
  if (!entered) return <TapToEnterScreen onEnter={() => setEntered(true)} />;
  if (inviteParams.get("invite") && !inviteDismissed) {
    return <InviteLandingScreen params={inviteParams} onContinue={() => setInviteDismissed(true)} />;
  }
  if (showSplash) return <SplashScreen onFinish={() => setShowSplash(false)} />;
  if (user === undefined) return <div className="min-h-screen flex items-center justify-center text-neutral-500 text-sm" style={{ backgroundColor: BG, color: "var(--app-text)" }}>Loading…</div>;
  if (!user) return <AuthScreen />;
  const storedPinHash = window.localStorage.getItem(`lms_pin_${user.uid}`);
  if (storedPinHash && !pinUnlocked) {
    return <PinLockScreen uid={user.uid} onUnlock={() => setPinUnlocked(true)} onUseEmailInstead={() => auth.signOut()} />;
  }
  return <AppShell key={user.uid} user={user} />;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
