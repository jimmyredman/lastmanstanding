<style>
  @import url('https://fonts.googleapis.com/css2?family=Teko:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');
  :root { --app-bg: #212124; --app-text: #f1f5f9; --app-border-5: rgba(255,255,255,0.05); --app-border-10: rgba(255,255,255,0.1); --app-border-20: rgba(255,255,255,0.2); --app-hover: rgba(255,255,255,0.05); }
  .adapt-border-5 { border-color: var(--app-border-5) !important; }
  .adapt-border-10 { border-color: var(--app-border-10) !important; }
  .adapt-border-20 { border-color: var(--app-border-20) !important; }
  .adapt-hover:hover { background-color: var(--app-hover); }
  /* Light-background mode: flip the pale grey text utilities to dark so text is always
     the opposite of the background. Colored buttons/badges (text-white, text-neutral-950
     on accent fills, rose/violet chips) are intentionally left untouched. */
  .app-light .text-slate-100 { color: #191c22 !important; }
  .app-light .text-slate-200 { color: #22262e !important; }
  .app-light .text-slate-300 { color: #2e343f !important; }
  .app-light .text-neutral-200 { color: #26262a !important; }
  .app-light .text-neutral-300 { color: #34343a !important; }
  .app-light .text-neutral-400 { color: #45454d !important; }
  .app-light .text-neutral-500 { color: #55555d !important; }
  .app-light .text-neutral-600 { color: #4a4a52 !important; }
  /* Custom font colour override — wins over both default and light-mode contrast.
     Placed after .app-light so equal-specificity !important rules resolve in its favour. */
  .app-fontcolor .text-slate-100, .app-fontcolor .text-slate-200, .app-fontcolor .text-slate-300,
  .app-fontcolor .text-neutral-200, .app-fontcolor .text-neutral-300, .app-fontcolor .text-neutral-400,
  .app-fontcolor .text-neutral-500, .app-fontcolor .text-neutral-600 { color: var(--app-fontcolor) !important; }
  html, body { background: var(--app-bg); margin:0; font-family:'Inter', sans-serif; }
  .font-scoreboard { font-family: 'Teko', sans-serif; }

  @keyframes smokeDrift1 { 0% { transform: translate(-9%, -6%) scale(1); } 50% { transform: translate(7%, 5%) scale(1.2); } 100% { transform: translate(-9%, -6%) scale(1); } }
  @keyframes smokeDrift2 { 0% { transform: translate(8%, 6%) scale(1.15); } 50% { transform: translate(-7%, -5%) scale(0.92); } 100% { transform: translate(8%, 6%) scale(1.15); } }
  @keyframes glowPulse { 0%, 100% { text-shadow: 0 0 18px rgba(255,90,60,0.55), 0 0 40px rgba(255,60,40,0.3); } 50% { text-shadow: 0 0 28px rgba(255,110,70,0.8), 0 0 60px rgba(255,70,50,0.45); } }

  .smoke-layer-a { position:absolute; inset:-15%; background: radial-gradient(ellipse 40% 30% at 25% 35%, rgba(200,200,205,0.28), transparent 60%), radial-gradient(ellipse 35% 45% at 75% 65%, rgba(180,180,185,0.22), transparent 65%), radial-gradient(ellipse 50% 30% at 50% 80%, rgba(160,160,165,0.18), transparent 60%); filter: blur(24px); animation: smokeDrift1 11s ease-in-out infinite; mix-blend-mode: screen; }
  .smoke-layer-b { position:absolute; inset:-15%; background: radial-gradient(ellipse 45% 35% at 65% 20%, rgba(210,210,215,0.22), transparent 55%), radial-gradient(ellipse 30% 40% at 15% 70%, rgba(170,170,175,0.16), transparent 60%), radial-gradient(ellipse 40% 30% at 85% 85%, rgba(190,190,195,0.20), transparent 55%); filter: blur(30px); animation: smokeDrift2 14s ease-in-out infinite; mix-blend-mode: screen; }
  .smoke-noise { position:absolute; inset:-10%; mix-blend-mode: screen; opacity: 0.5; }
  .neon-title { animation: glowPulse 3.5s ease-in-out infinite; }

  @keyframes splashPop { 0% { transform: scale(0.4); opacity: 0; } 55% { transform: scale(1.15); opacity: 1; } 75% { transform: scale(0.96); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes splashRing { 0% { transform: scale(0.2); opacity: 0; border-width: 10px; } 45% { opacity: 0.85; } 100% { transform: scale(2.2); opacity: 0; border-width: 1px; } }
  @keyframes splashRing2 { 0% { transform: scale(0.2); opacity: 0; border-width: 6px; } 55% { opacity: 0.5; } 100% { transform: scale(2.6); opacity: 0; border-width: 1px; } }
  @keyframes splashSub { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
  .splash-logo { animation: splashPop 1.4s cubic-bezier(.2,1.4,.4,1) both; text-shadow: 0 0 20px rgba(255,90,60,0.7), 0 0 50px rgba(255,60,40,0.4); }
  .splash-ring { position: absolute; width: 160px; height: 160px; border-radius: 9999px; border: 2px solid rgba(255,90,60,0.6); animation: splashRing 2.2s ease-out both; }
  .splash-ring2 { position: absolute; width: 160px; height: 160px; border-radius: 9999px; border: 2px solid rgba(255,140,90,0.5); animation: splashRing2 2.2s ease-out 0.3s both; }
  .splash-sub { animation: splashSub 1s ease-out 1.1s both; }

// Names and avatars get copied into pick/entry documents at submit/join time (so historical
// records freeze correctly), but that means those copies go stale the moment someone changes
// their name or avatar in Settings. This hook does a live lookup against the real `users`
// profiles for a given set of uids, so any screen that shows a name/avatar can prefer the
// live version and always reflect the latest Settings changes. Firestore's "in" queries cap
// at 30 values, so a larger uid set is split into chunks and merged.
function useLiveProfiles(uids) {
  const [profiles, setProfiles] = useState({});
  const key = uids.slice().sort().join(",");
  useEffect(() => {
    const unique = key ? key.split(",") : [];
    if (unique.length === 0) { setProfiles({}); return; }
    const chunks = [];
    for (let i = 0; i < unique.length; i += 30) chunks.push(unique.slice(i, i + 30));
    const merged = {};
    let pending = chunks.length;
    const unsubs = chunks.map((chunk) =>
      db.collection("users").where(FieldPath.documentId(), "in", chunk).onSnapshot((snap) => {
        snap.docs.forEach((d) => { merged[d.id] = d.data(); });
        setProfiles({ ...merged });
      })
    );
    return () => unsubs.forEach((u) => u());
  }, [key]);
  return profiles;
}

// Shared audio context for the whole app. Browsers block sound until the user has
// interacted with the page at all — creating a fresh AudioContext each time (as the
// splash screen used to) meant it was blocked on every truly first load. Reusing one
// shared, primed context means sound works reliably everywhere after the very first tap.
function getSharedAudioCtx() {
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx) return null;
  if (!window.__lmsAudioCtx) window.__lmsAudioCtx = new Ctx();
  if (window.__lmsAudioCtx.state === "suspended") window.__lmsAudioCtx.resume().catch(() => {});
  return window.__lmsAudioCtx;
}

function playThumpSound(freq, boom) {
  try {
    const ctx = getSharedAudioCtx();
    if (!ctx) return;
    const now = ctx.currentTime;
    const dur = boom ? 0.55 : 0.32;

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(freq * 1.7, now);
    osc.frequency.exponentialRampToValueAtTime(Math.max(freq * 0.3, 18), now + dur);
    gain.gain.setValueAtTime(boom ? 1.0 : 0.75, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + dur + 0.05);

    const clickLen = Math.floor(ctx.sampleRate * 0.06);
    const buffer = ctx.createBuffer(1, clickLen, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < clickLen; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / clickLen);
    const click = ctx.createBufferSource();
    click.buffer = buffer;
    const clickGain = ctx.createGain();
    clickGain.gain.setValueAtTime(boom ? 0.55 : 0.4, now);
    clickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    click.connect(clickGain); clickGain.connect(ctx.destination);
    click.start(now);
  } catch (e) { /* audio blocked or unavailable — visuals still carry the moment */ }
}

function playBellStrike(ctx, t, fundamental) {
  // Bells ring with inharmonic (non-whole-number) overtone ratios, not simple harmonics —
  // that's what gives a struck bell its metallic "clang" instead of sounding like a soft chime.
  const partials = [1, 2.4, 3.8];
  const gains = [0.55, 0.28, 0.16];
  partials.forEach((mult, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(fundamental * mult, t);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(gains[i], t + 0.008);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.7);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.75);
  });
  // sharp metallic strike transient right at the hit
  const clickLen = Math.floor(ctx.sampleRate * 0.02);
  const buffer = ctx.createBuffer(1, clickLen, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < clickLen; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / clickLen);
  const click = ctx.createBufferSource();
  click.buffer = buffer;
  const clickGain = ctx.createGain();
  clickGain.gain.setValueAtTime(0.35, t);
  clickGain.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
  click.connect(clickGain); clickGain.connect(ctx.destination);
  click.start(t);
}

function playDingSound() {
  try {
    const ctx = getSharedAudioCtx();
    if (!ctx) return;
    const now = ctx.currentTime;
    playBellStrike(ctx, now, 850);
    playBellStrike(ctx, now + 0.32, 850);
  } catch (e) { /* audio blocked or unavailable */ }
}

function playCashSound() {
  try {
    const ctx = getSharedAudioCtx();
    if (!ctx) return;
    const now = ctx.currentTime;
    [[900, now], [1350, now + 0.08]].forEach(([freq, t]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.32, t + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.28);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.3);
    });
  } catch (e) { /* audio blocked or unavailable */ }
}

async function hashPin(pin, salt) {
  const enc = new TextEncoder();
  const data = enc.encode(`${pin}:${salt}`);
  const buf = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, "0")).join("");
}

function calcAge(dobString) {
  if (!dobString) return null;
  const dob = new Date(dobString);
  if (isNaN(dob.getTime())) return null;
  const today = new Date();
  let age = today.getFullYear() - dob.getFullYear();
  const m = today.getMonth() - dob.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--;
  return age;
}

const AU_STATES = ["NSW", "VIC", "QLD", "WA", "SA", "TAS", "ACT", "NT"];

function IDCheckScreen({ initialName, onVerified }) {
  const [fullName, setFullName] = useState(initialName || "");
  const [dob, setDob] = useState("");
  const [licenceNumber, setLicenceNumber] = useState("");
  const [licenceState, setLicenceState] = useState("NSW");
  const [checked, setChecked] = useState(false);
  const [denied, setDenied] = useState(false);
  const canSubmit = fullName && dob && licenceNumber;
  const submit = () => {
    const age = calcAge(dob); setChecked(true);
    if (age === null || age < 18) setDenied(true);
    else { setDenied(false); onVerified({ fullName, dob, licenceNumber, licenceState, age }); }
  };
  const tryAgain = () => { setChecked(false); setDenied(false); setDob(""); setLicenceNumber(""); };

  if (checked && denied) {
    return (
      <div className="min-h-screen text-slate-100 flex flex-col justify-center px-6" style={{ backgroundColor: BG, color: "var(--app-text)" }}>
        <div className="max-w-sm mx-auto w-full text-center">
          <div className="mx-auto mb-4 h-14 w-14 rounded-full bg-rose-500/10 flex items-center justify-center"><ShieldAlert size={26} className="text-rose-400" /></div>
          <h2 className="font-scoreboard text-2xl tracking-wide text-rose-400">ACCESS DENIED</h2>
          <p className="text-sm text-neutral-400 mt-2 leading-relaxed">Our records show you're under 18. You must be 18 or older to use this app.</p>
          <button onClick={tryAgain} className="mt-6 w-full rounded-xl bg-neutral-800 border adapt-border-10 text-slate-200 font-semibold py-3 text-sm">Go back</button>
        </div>
      </div>
    );
  }
  return (
    <div className="min-h-screen text-slate-100 flex flex-col justify-center px-6" style={{ backgroundColor: BG, color: "var(--app-text)" }}>
      <div className="max-w-sm mx-auto w-full">
        <h2 className="font-scoreboard text-3xl tracking-wide mb-1">VERIFY YOUR DETAILS</h2>
        <p className="text-sm text-neutral-500 mb-6">Quick licence check — required to confirm you're 18+.</p>

          <input value={fullName} onChange={(e) => setFullName(e.target.value)} placeholder="Full legal name"

          <div><label className="text-[11px] text-neutral-500 mb-1 block">Date of birth</label>
            <input value={dob} onChange={(e) => setDob(e.target.value)} type="date" className={`w-full rounded-xl bg-neutral-800 border ${PANEL_BORDER} px-4 py-3 text-sm text-slate-100 outline-none focus:border-teal-400`} /></div>
          <input value={licenceNumber} onChange={(e) => setLicenceNumber(e.target.value)} placeholder="Driver licence number"
            className={`w-full rounded-xl bg-neutral-800 border ${PANEL_BORDER} px-4 py-3 text-sm text-slate-100 placeholder:text-neutral-500 outline-none focus:border-teal-400`} />
          <div><label className="text-[11px] text-neutral-500 mb-1 block">Licence state</label>
            <select value={licenceState} onChange={(e) => setLicenceState(e.target.value)} className={`w-full rounded-xl bg-neutral-800 border ${PANEL_BORDER} px-4 py-3 text-sm text-slate-100 outline-none focus:border-teal-400`}>
              {AU_STATES.map((s) => <option key={s} value={s}>{s}</option>)}

        </div>
        <button disabled={!canSubmit} onClick={submit} className="mt-5 w-full rounded-xl bg-teal-400 hover:bg-teal-300 disabled:opacity-40 text-neutral-950 font-semibold py-3 text-sm">Verify my details</button>

}

function TierCard({ tier, now, onJoin, onInvite, joined, theme }) {
  const isHigh = tier.buyIn >= 50;
  const closeTime = tier.lockTime || tier.startTime; // entries close at lockout, which is always before kickoff
  const msToClose = closeTime.getTime() - now.getTime();
  const entriesClosed = msToClose <= 0;
  const isUrgent = !entriesClosed && msToClose <= 1000 * 60 * 60 * 6;
  const started = now.getTime() >= tier.startTime.getTime();
  const countdown = formatCountdown(msToClose);
  const [rulesOpen, setRulesOpen] = useState(false);
  const roundLabel = getRound(tier.roundId).label;
  const netPool = tier.pool * (1 - PLATFORM_FEE_RATE);
  return (
    <div className={`relative overflow-hidden rounded-2xl border ${isHigh ? "border-violet-500/40 bg-gradient-to-b from-violet-950/30 to-neutral-800" : `${theme.borderSoft} bg-neutral-800`} p-5`}>
      {joined && (
        <div className="stamp-pop absolute inset-0 flex items-center justify-center pointer-events-none z-10">
          <div className="border-4 border-teal-400 text-teal-300 font-scoreboard text-4xl tracking-widest px-6 py-1 -rotate-[18deg]" style={{ textShadow: "0 0 18px rgba(45,212,191,0.7)", boxShadow: "0 0 24px rgba(45,212,191,0.35)" }}>
            YOU'RE IN
          </div>
        </div>
      )}
      {isHigh && (<div className="inline-flex items-center gap-1 mb-2 rounded-full bg-violet-500 px-3 py-1 text-[10px] font-bold uppercase tracking-wider text-white"><Crown size={12} /> High Stakes</div>)}
      <div className="flex items-center justify-between"><h3 className="text-lg font-semibold text-slate-100">{tier.name}</h3><span className="text-xs text-neutral-500">{roundLabel}</span></div>
      <p className="text-sm text-neutral-400 mt-1">${tier.buyIn} buy-in · winner takes the pool</p>
      <div className={`mt-4 flex items-center justify-center gap-2 rounded-lg px-3 py-2 text-xs font-medium ${entriesClosed ? "bg-rose-500/10 text-rose-400" : isUrgent ? "bg-rose-500/15 text-rose-300 animate-pulse" : "bg-amber-400/10 text-amber-300"}`}>
        <Clock size={13} />{entriesClosed ? (started ? "Entries closed — round underway" : "Entries closed — picks have locked for this round") : isUrgent ? `Locking in ${countdown} — last chance to join!` : `Entries close in ${countdown} (picks lock 24h before the round's first game)`}
      </div>
      <div className={`mt-4 flex items-center justify-around rounded-xl bg-black/30 border ${PANEL_BORDER} py-4`}>
        <Scoreboard value={`$${netPool.toLocaleString(undefined, { maximumFractionDigits: 0 })}`} label="Prize Pool" accent="gold" />
        <div className="h-10 w-px bg-white/10" /><Scoreboard value={tier.entries} label="Entries" accent={isHigh ? "text-violet-300" : theme.text} />
      </div>
      <p className="text-[10px] text-neutral-500 text-center mt-1">Prize pool shown after 10% LMS operating fee</p>
      {tier.rules && (
        <div className="mt-4">
          <button onClick={() => setRulesOpen((o) => !o)} className="flex items-center gap-1 text-xs text-neutral-400 hover:text-neutral-200">
            <ChevronDown size={12} className={`transition-transform ${rulesOpen ? "rotate-180" : ""}`} /> {rulesOpen ? "Hide rules" : "View rules"}
          </button>
          {rulesOpen && <p className={`mt-2 rounded-lg bg-black/30 border ${PANEL_BORDER} p-3 text-xs text-neutral-300 whitespace-pre-wrap`}>{tier.rules}</p>}
        </div>
      )}
      {joined ? (
        entriesClosed ? (
          <div className={`mt-5 w-full rounded-xl py-3 text-sm font-medium text-center border ${PANEL_BORDER} text-neutral-500`}>
            Entries have closed — invites aren't available for this competition anymore
          </div>
        ) : (
          <button onClick={() => onInvite(tier)}
            className="mt-5 w-full rounded-xl py-3 text-sm font-semibold border-2 border-teal-400 text-teal-300 transition hover:bg-teal-400/10"
            style={{ boxShadow: "0 0 16px rgba(45,212,191,0.4)", textShadow: "0 0 8px rgba(45,212,191,0.6)" }}>
            Invite your friends
          </button>
        )
      ) : (
        <button onClick={() => onJoin(tier)} disabled={entriesClosed}
          className={`mt-5 w-full rounded-xl py-3 text-sm font-semibold transition ${entriesClosed ? "bg-neutral-700 text-neutral-500 cursor-default" : isHigh ? "bg-violet-500 text-white hover:bg-violet-400" : `${theme.bg} text-neutral-950 ${theme.bgHover}`}`}>
          {entriesClosed ? "Entries closed" : `Enter for $${tier.buyIn}`}
        </button>
      )}
    </div>
  );
}

function DepositModal({ onClose, onConfirm, theme }) {

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/70 p-4">

        <p className="text-[10px] text-amber-300 font-semibold mb-4 leading-relaxed">FOR BETA MODE THIS IS ONLY A SIMULATION, NO REAL MONEY WILL BE USED.</p>

        {step === "method" && (
          <>
            <div className="grid grid-cols-4 gap-2 mb-4">{presets.map((p) => (<button key={p} onClick={() => setAmount(p)} className={`rounded-lg py-2 text-sm font-semibold border ${amount === p ? `${theme.border} ${theme.bgSoft} ${theme.text}` : "adapt-border-10 text-neutral-300"}`}>${p}</button>))}</div>

              <button onClick={() => setStep("cardform")} className="w-full flex items-center justify-center gap-2 rounded-xl py-3 text-sm font-semibold bg-neutral-700 text-neutral-200">

              <input value={cardNumber} onChange={(e) => setCardNumber(e.target.value)} placeholder="Card number" inputMode="numeric" maxLength={19}
                className={`w-full rounded-lg bg-black/30 border ${PANEL_BORDER} px-3 py-2.5 text-sm text-slate-100 placeholder:text-neutral-500 outline-none`} />
              <div className="flex gap-2">
                <input value={cardExpiry} onChange={(e) => setCardExpiry(e.target.value)} placeholder="MM/YY" maxLength={5}
                  className={`flex-1 rounded-lg bg-black/30 border ${PANEL_BORDER} px-3 py-2.5 text-sm text-slate-100 placeholder:text-neutral-500 outline-none`} />
                <input value={cardCvc} onChange={(e) => setCardCvc(e.target.value)} placeholder="CVC" inputMode="numeric" maxLength={4}
                  className={`flex-1 rounded-lg bg-black/30 border ${PANEL_BORDER} px-3 py-2.5 text-sm text-slate-100 placeholder:text-neutral-500 outline-none`} />
              </div>
              <p className="text-[10px] text-neutral-500">Simulated card entry — nothing here is transmitted or stored.</p>
            </div>
            <div className="grid grid-cols-4 gap-2 mb-4">{presets.map((p) => (<button key={p} onClick={() => setAmount(p)} className={`rounded-lg py-2 text-sm font-semibold border ${amount === p ? `${theme.border} ${theme.bgSoft} ${theme.text}` : "adapt-border-10 text-neutral-300"}`}>${p}</button>))}</div>
            <div className="flex gap-2">
              <button onClick={() => setStep("method")} className="flex-1 rounded-xl border adapt-border-10 text-neutral-300 py-3 text-sm">Back</button>
              <button onClick={payCard} disabled={!cardValid} className={`flex-1 rounded-xl ${theme.bg} ${theme.bgHover} disabled:opacity-40 text-neutral-950 font-semibold py-3 text-sm`}>Add ${amount}</button>

function ConfettiBurst() {
  const colors = ["#facc15", "#2dd4bf", "#a78bfa", "#fb7185", "#60a5fa", "#f5f5f5"];
  const pieces = useMemo(() => Array.from({ length: 30 }, (_, i) => ({
    left: Math.random() * 100,
    delay: Math.random() * 0.35,
    duration: 1.7 + Math.random() * 1.3,
    color: colors[i % colors.length],
    rot: Math.round(Math.random() * 360 - 180),
    drift: Math.round(Math.random() * 70 - 35),
    size: 6 + Math.round(Math.random() * 5),
  })), []);
  return (
    <div className="absolute inset-0 overflow-hidden pointer-events-none rounded-xl">
      {pieces.map((p, i) => (
        <span key={i} className="confetti-piece" style={{
          left: `${p.left}%`, backgroundColor: p.color, width: p.size, height: Math.round(p.size * 0.6),
          animationDelay: `${p.delay}s`, animationDuration: `${p.duration}s`,
          "--drift": `${p.drift}px`, "--rot": `${p.rot}deg`,
        }} />
      ))}
    </div>
  );
}

function StandingsTab({ players, locked, poolAmount, lockCountdown, lockUrgent, entryCount, winnerUid, winnerName, winnerPayout, myUid }) {
  const grouped = useMemo(() => {
    const withPick = players.filter((p) => p.pick);
    const noPick = players.filter((p) => !p.pick);
    const map = {};
    withPick.forEach((p) => { (map[p.pick] = map[p.pick] || []).push(p); });
    const groups = Object.entries(map).sort((a, b) => b[1].length - a[1].length);
    return { groups, noPick };
  }, [players]);

  const placeholderCount = Math.max(entryCount || 0, players.length);
  const isYouWinner = winnerUid && winnerUid === myUid;

  return (
    <div className="space-y-4">
      {winnerUid && (
        <div className={`relative overflow-hidden rounded-xl border p-5 text-center ${isYouWinner ? "border-amber-400/50 bg-amber-400/10" : `${PANEL_BORDER} bg-neutral-800`}`}>
          {isYouWinner && <ConfettiBurst />}
          {isYouWinner ? (
            <>
              <div className="stamp-pop relative">
                <div className="inline-block border-4 border-amber-400 text-amber-300 font-scoreboard text-2xl sm:text-3xl tracking-wide px-5 py-2 -rotate-[6deg] uppercase"
                  style={{ textShadow: "0 0 18px rgba(251,191,36,0.7)", boxShadow: "0 0 24px rgba(251,191,36,0.35)" }}>
                  Congratulations — you won!
                </div>
              </div>
              <p className="text-sm text-amber-200 mt-4 relative">${(winnerPayout || 0).toLocaleString(undefined, { maximumFractionDigits: 2 })} has been added to your wallet.</p>
            </>
          ) : (
            <p className="text-sm text-slate-200 flex items-center justify-center gap-2">
              <Crown size={16} className="text-amber-400 crown-glow" />
              <span><span className="font-semibold">{winnerName || "A player"}</span> won the pool — ${(winnerPayout || 0).toLocaleString(undefined, { maximumFractionDigits: 2 })}!</span>
            </p>
          )}
        </div>
      )}
      <div className={`rounded-xl bg-black/30 border ${PANEL_BORDER} p-4 flex items-center justify-around`}>
        <Scoreboard value={players.filter((p) => p.status !== "L").length} label="Still Alive" accent="text-teal-300" />
        <div className="h-10 w-px bg-white/10" /><Scoreboard value={`$${poolAmount.toLocaleString(undefined, { maximumFractionDigits: 0 })}`} label="Prize Pool" accent="gold" />
      </div>
      <div>
        <h4 className="text-sm font-semibold text-neutral-300 mb-2 flex items-center gap-2">{locked ? <Eye size={14} className="text-teal-300" /> : <EyeOff size={14} className="text-neutral-500" />}This round's tips</h4>
        {!locked ? (
          <div className={`rounded-xl border ${PANEL_BORDER} bg-neutral-800 p-4`}>
            <p className="text-center text-sm text-neutral-500 mb-4">Everyone's tips stay hidden until picks lock.</p>
            {lockCountdown && <p className={`text-center text-xs mb-4 ${lockUrgent ? "text-rose-300 font-semibold animate-pulse" : "text-amber-300"}`}>{lockUrgent ? `Locking in ${lockCountdown} — almost time! ` : `Locking in ${lockCountdown} — `}24 hours before the round's first game kicks off. Once locked, only your host can change results.</p>}
            {placeholderCount > 0 && (
              <div className="grid grid-cols-6 gap-2">
                {Array.from({ length: placeholderCount }).map((_, i) => (
                  <div key={i} className="h-9 w-9 rounded-full bg-white/5 border adapt-border-10 flex items-center justify-center mx-auto">
                    <span className="text-neutral-600 text-xs">?</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        ) : players.length === 0 ? (
          <div className={`rounded-xl border ${PANEL_BORDER} bg-neutral-800 px-4 py-5 text-center text-sm text-neutral-500`}>Nobody has entered yet.</div>
        ) : (
          <div className="space-y-3">
            {grouped.groups.map(([team, group]) => (
              <div key={team} className={`rounded-xl border ${PANEL_BORDER} overflow-hidden`}>
                <div className="flex items-center gap-2 px-4 py-2 bg-black/30">
                  <TeamBadge team={team} size={22} />
                  <span className="text-xs font-semibold text-slate-200">{team}</span>
                  <span className="text-[10px] text-neutral-500">· {group.length} tipped this</span>
                </div>
                {group.map((p) => (
                  <div key={p.uid} className={`flex items-center justify-between px-4 py-2.5 text-sm border-t adapt-border-5 ${p.isYou ? "bg-teal-400/5" : ""}`}>
                    <div className="flex items-center gap-2">
                      <UserAvatar preset={p.avatarPreset} name={p.name} size={24} />

                      <TeamBadge team={p.pick} size={18} />
                      {p.status && (<span className={`inline-flex h-5 w-5 items-center justify-center rounded ${p.status === "W" ? "bg-teal-400/20 text-teal-300" : "bg-rose-500/20 text-rose-400"}`}>{p.status === "W" ? <Check size={12} /> : <X size={12} />}</span>)}
                    </div>

                ))}
              </div>
            ))}
            {grouped.noPick.length > 0 && (
              <div className={`rounded-xl border ${PANEL_BORDER} overflow-hidden`}>
                <div className="px-4 py-2 bg-black/30"><span className="text-xs font-semibold text-rose-400">No pick submitted</span></div>
                {grouped.noPick.map((p) => (
                  <div key={p.uid} className={`flex items-center justify-between px-4 py-2.5 text-sm border-t adapt-border-5 ${p.isYou ? "bg-teal-400/5" : ""}`}>

                    </div>
                  </div>
                ))}
              </div>

        )}
      </div>
      <div>
        <h4 className="text-sm font-semibold text-neutral-300 mb-2">Overall standings</h4>

          {players.length === 0 && <div className="px-4 py-6 text-center text-sm text-neutral-500">No entries yet.</div>}
          {players.map((p) => (
            <div key={p.uid} className={`flex items-center justify-between px-4 py-3 text-sm border-t adapt-border-5 first:border-t-0 ${p.status === "L" ? "opacity-40" : ""} ${p.isYou ? "bg-teal-400/5" : ""}`}>
              <div className="flex items-center gap-2">
                <UserAvatar preset={p.avatarPreset} name={p.name} size={24} />
                <span className="text-slate-200">{p.name}{p.isYou ? " (you)" : ""}</span>
              </div>
              {p.status && (<span className={`inline-flex h-5 w-5 items-center justify-center rounded ${p.status === "W" ? "bg-teal-400/20 text-teal-300" : "bg-rose-500/20 text-rose-400"}`}>{p.status === "W" ? <Check size={12} /> : <X size={12} />}</span>)}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function PinSettings({ uid, theme, onChange }) {
  const [hasPin, setHasPin] = useState(() => !!window.localStorage.getItem(`lms_pin_${uid}`));
  const [editing, setEditing] = useState(false);
  const [pin1, setPin1] = useState("");
  const [pin2, setPin2] = useState("");
  const [error, setError] = useState("");
  const [saved, setSaved] = useState(false);

  useEffect(() => { onChange && onChange(hasPin); }, [hasPin]);

  const save = async () => {
    setError("");
    if (pin1.length < 4) { setError("PIN must be at least 4 digits"); return; }
    if (pin1 !== pin2) { setError("PINs don't match"); return; }
    const hash = await hashPin(pin1, uid);
    window.localStorage.setItem(`lms_pin_${uid}`, hash);
    setHasPin(true); setEditing(false); setPin1(""); setPin2("");
    setSaved(true); setTimeout(() => setSaved(false), 1500);
  };
  const remove = () => { window.localStorage.removeItem(`lms_pin_${uid}`); setHasPin(false); setEditing(false); };

  return (
    <div>
      <h4 className="text-sm font-semibold text-neutral-300 mb-2">Quick PIN unlock</h4>
      <div className={`rounded-xl border ${PANEL_BORDER} bg-neutral-800 p-4`}>
        <p className="text-xs text-neutral-500 mb-3">Set a PIN to unlock the app quickly on this device — once set, it replaces retyping your password on this device. This doesn't change your account password.</p>
        {!editing ? (
          hasPin ? (
            <div className="flex items-center justify-between">
              <span className={`text-xs ${theme.text} flex items-center gap-1`}><Check size={12} /> PIN set on this device{saved ? " — saved" : ""}</span>
              <div className="flex gap-2">
                <button onClick={() => setEditing(true)} className="text-xs text-neutral-300 underline">Change</button>
                <button onClick={remove} className="text-xs text-rose-400 underline">Remove</button>
              </div>
            </div>
          ) : (
            <button onClick={() => setEditing(true)} className={`w-full rounded-lg ${theme.bg} ${theme.bgHover} text-neutral-950 font-semibold py-2 text-sm`}>Set a PIN</button>
          )
        ) : (
          <div className="space-y-2">
            <input value={pin1} onChange={(e) => setPin1(e.target.value.replace(/\D/g, "").slice(0, 6))} type="password" inputMode="numeric" placeholder="New PIN (4-6 digits)"
              className="w-full rounded-lg bg-black/30 border adapt-border-10 px-3 py-2 text-sm text-slate-100 placeholder:text-neutral-500 outline-none" />
            <input value={pin2} onChange={(e) => setPin2(e.target.value.replace(/\D/g, "").slice(0, 6))} type="password" inputMode="numeric" placeholder="Confirm PIN"
              className="w-full rounded-lg bg-black/30 border adapt-border-10 px-3 py-2 text-sm text-slate-100 placeholder:text-neutral-500 outline-none" />
            {error && <p className="text-xs text-rose-400">{error}</p>}
            <div className="flex gap-2">
              <button onClick={() => { setEditing(false); setError(""); setPin1(""); setPin2(""); }} className="flex-1 rounded-lg border adapt-border-10 text-neutral-300 py-2 text-sm">Cancel</button>
              <button onClick={save} className={`flex-1 rounded-lg ${theme.bg} ${theme.bgHover} text-neutral-950 font-semibold py-2 text-sm`}>Save PIN</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function HostResultsPanel({ tier, now, theme }) {
  const [open, setOpen] = useState(false);
  const [results, setResults] = useState({});
  const [finalized, setFinalized] = useState(false);
  const [wipeoutSurvived, setWipeoutSurvived] = useState(false);
  const [picks, setPicks] = useState([]);
  const [entries, setEntries] = useState([]);
  const round = getRound(tier.roundId);
  const effectiveFixtures = tier.fixtureOverrides || round.fixtures;
  const resultsDocId = `${tier.id}_${tier.roundId}`;
  const locked = tier.lockTime ? now.getTime() >= tier.lockTime.getTime() : false;

  useEffect(() => {
    if (!open) return;
    const unsubResults = db.collection("results").doc(resultsDocId).onSnapshot((doc) => {
      const data = doc.exists ? doc.data() : {};
      setResults(data.fixtureResults || {});
      setFinalized(!!data.finalized);
      setWipeoutSurvived(!!data.wipeoutSurvived);
    });
    const unsubPicks = db.collection("picks").where("tierId", "==", tier.id).where("roundId", "==", tier.roundId).onSnapshot((snap) => setPicks(snap.docs.map((d) => d.data())));
    const unsubEntries = db.collection("entries").where("tierId", "==", tier.id).onSnapshot((snap) => setEntries(snap.docs.map((d) => ({ id: d.id, ...d.data() }))));
    return () => { unsubResults(); unsubPicks(); unsubEntries(); };
  }, [open, tier.id, tier.roundId]);

  const setFixtureResult = (i, winner) => db.collection("results").doc(resultsDocId).set({ fixtureResults: { ...results, [i]: winner } }, { merge: true });

  // Re-runnable on purpose: hosts can come back and correct a result any time, even after
  // confirming once — this both eliminates new losers and restores anyone wrongly eliminated
  // by a previous (mistaken) confirmation, without touching anyone kicked or refunded.
  const applyResults = async () => {
    const eligible = entries.filter((e) => e.status === "active" || e.status === "eliminated");
    const decided = picks.filter((p) => eligible.some((e) => e.uid === p.uid)).map((p) => {
      const fi = effectiveFixtures.findIndex((f) => f.home === p.team || f.away === p.team);
      const winner = results[fi];
      return { uid: p.uid, status: winner ? (winner === p.team ? "W" : "L") : null };
    }).filter((p) => p.status);
    if (decided.length === 0) return;

    const allLost = decided.every((p) => p.status === "L");
    const batch = db.batch();
    if (allLost) {
      // Special rule: if literally everyone loses, restore anyone this round had eliminated and
      // redo the same round — don't advance, since nobody actually survived to move forward.
      decided.forEach((p) => {
        const entry = eligible.find((e) => e.uid === p.uid);
        if (entry.status === "eliminated") batch.update(db.collection("entries").doc(`${tier.id}_${p.uid}`), { status: "active" });
      });
      batch.set(db.collection("results").doc(resultsDocId), { finalized: true, wipeoutSurvived: true }, { merge: true });
    } else {
      decided.forEach((p) => {
        const entry = eligible.find((e) => e.uid === p.uid);
        if (p.status === "L" && entry.status === "active") batch.update(db.collection("entries").doc(`${tier.id}_${p.uid}`), { status: "eliminated" });
        if (p.status === "W" && entry.status === "eliminated") batch.update(db.collection("entries").doc(`${tier.id}_${p.uid}`), { status: "active" });
      });
      batch.set(db.collection("results").doc(resultsDocId), { finalized: true, wipeoutSurvived: false }, { merge: true });

      // Automatically move the competition to the next round now that results are in —
      // survivors carry forward, losers stay eliminated, no manual step needed.
      const idx = NRL_ROUNDS.findIndex((r) => r.id === tier.roundId);
      const next = NRL_ROUNDS[idx + 1];
      if (next) {
        batch.set(db.collection("tiers").doc(tier.id), {
          roundId: next.id, previousRoundId: tier.roundId,
          startTime: Timestamp.fromDate(next.firstKickoff),
          lockTime: Timestamp.fromDate(new Date(next.firstKickoff.getTime() - 1000 * 60 * 60 * 24)),
          fixtureOverrides: FieldValue.delete(),
        }, { merge: true });
      }
    }
    await batch.commit();
  };

  if (!locked) return <p className="mt-3 text-[11px] text-neutral-500">Results entry unlocks once picks lock for this round.</p>;

  return (
    <div className="mt-3">
      <button onClick={() => setOpen((o) => !o)} className="flex items-center gap-1 text-xs text-neutral-400 hover:text-neutral-200">
        <ChevronDown size={12} className={`transition-transform ${open ? "rotate-180" : ""}`} /> {open ? "Hide round results" : "Enter round results"}
      </button>
      {open && (
        <div className="mt-2 space-y-2">
          <FixtureEditor tier={tier} effectiveFixtures={effectiveFixtures} theme={theme} />
          {effectiveFixtures.map((f, i) => (
            <div key={i} className="flex items-center justify-between rounded-lg bg-black/30 px-3 py-2">
              <span className="text-xs text-neutral-400">{f.home} vs {f.away}</span>
              <div className="flex gap-1">
                {[f.home, f.away].map((team) => (
                  <button key={team} onClick={() => setFixtureResult(i, team)} className={`rounded px-2 py-1 text-[11px] font-medium ${results[i] === team ? `${theme.bg} text-neutral-950` : "bg-neutral-700 text-neutral-300"}`}>{team} won</button>
                ))}
              </div>
            </div>
          ))}
          {finalized && (
            <p className="text-[11px] text-teal-300 flex items-start gap-1"><Check size={12} className="mt-0.5 shrink-0" /> Last confirmed — eliminations applied{wipeoutSurvived ? "." : " and the competition has moved to the next round."}{wipeoutSurvived ? " Everyone lost this round, so nobody was eliminated — same round repeats (as per the rules)." : ""}</p>
          )}
          <button onClick={applyResults} className={`w-full rounded-lg ${theme.bg} ${theme.bgHover} text-neutral-950 font-semibold py-2 text-sm`}>
            {finalized ? "Update results & re-apply" : "Confirm round results"}
          </button>
          <p className="text-[10px] text-neutral-500">Confirming applies eliminations and automatically moves survivors to the next round — no manual step needed. You can come back and correct a result any time if a mistake was made.</p>
        </div>
      )}
    </div>
  );
}

    const inviteUrl = `${baseUrl}?invite=1&name=${encodeURIComponent(tier.name)}&buyIn=${tier.buyIn}&round=${encodeURIComponent(roundLabel)}&hours=${hoursLeft}`;
    const subject = "You're invited to play Last Man Standing!";
    const body = `You're invited to play Last Man Standing!\n\nJoin "${tier.name}" — a $${tier.buyIn} buy-in competition. ${roundLabel} locks in about ${hoursLeft} hours, so don't wait around!\n\nTap the link below to see the competition and jump in:\n${inviteUrl}\n\nHurry — last one standing takes the pool!`;

                      </div>
                    ) : (
                      <button onClick={() => setCancelling(tier.id)} className="mt-3 w-full flex items-center justify-center gap-2 rounded-lg border border-rose-500/40 bg-rose-500/10 text-rose-300 hover:bg-rose-500/20 font-semibold py-2.5 text-sm">
                        <Ban size={15} /> Cancel competition &amp; refund everyone
                      </button>
                    )}
                  </>
                )}
              </>
            )}
          </div>
          );
        })}
        {tiers.length === 0 && <p className="text-center text-sm text-neutral-500 py-6">No competitions yet — create the first one above.</p>}
      </div>
      {managingTierId && (
        <EntrantsModal tier={tiers.find((t) => t.id === managingTierId)} theme={theme} onKick={onKick} onRestore={onRestore} onMarkEliminated={onMarkEliminated} onMarkWinner={onMarkWinner} onClose={() => setManagingTierId(null)} />
      )}
      {invitingTierId && (
        <InviteModal tier={tiers.find((t) => t.id === invitingTierId)} theme={theme} onClose={() => setInvitingTierId(null)} />
      )}
    </div>
  );
}

function AppShell({ user }) {
  const [profile, setProfile] = useState(null);
  const [screen, setScreen] = useState("loading");
  const screenInitialized = useRef(false);
  const [sport, setSport] = useState(null);
  const [tab, setTab] = useState("compete");
  const [now, setNow] = useState(new Date());

  const [transactions, setTransactions] = useState([]);
  const [showDeposit, setShowDeposit] = useState(false);
  const [showWithdraw, setShowWithdraw] = useState(false);

  const [rawTiers, setRawTiers] = useState([]);
  const [entryCounts, setEntryCounts] = useState({});
  const [myEntries, setMyEntries] = useState({});
  const [viewingTierId, setViewingTierId] = useState(null);
  const [entryTarget, setEntryTarget] = useState(null);
  const [invitingTier, setInvitingTier] = useState(null);
  const [entryError, setEntryError] = useState("");

  const [allPicks, setAllPicks] = useState([]);
  const [myPick, setMyPick] = useState(null);
  const [pickSubmitted, setPickSubmitted] = useState(false);
  const [pickStamp, setPickStamp] = useState(null); // team name while the confirmation stamp shows
  const [pickSaving, setPickSaving] = useState(false);
  const [results, setResults] = useState({});
  const [picksLoaded, setPicksLoaded] = useState(false);

  const accent = profile?.accent || "teal";
  const bgMode = profile?.bgMode || "black";
  const fontColor = profile?.fontColor || null;
  const fontSize = profile?.fontSize || "small";
  useEffect(() => {
    const mode = BG_MODES.find((m) => m.id === bgMode) || BG_MODES[0];
    document.documentElement.style.setProperty("--app-bg", mode.hex);
    document.documentElement.style.setProperty("--app-text", mode.text);
    if (mode.light) {
      document.documentElement.classList.add("app-light");
      document.documentElement.style.setProperty("--app-border-5", "rgba(0,0,0,0.06)");
      document.documentElement.style.setProperty("--app-border-10", "rgba(0,0,0,0.13)");
      document.documentElement.style.setProperty("--app-border-20", "rgba(0,0,0,0.22)");
      document.documentElement.style.setProperty("--app-hover", "rgba(0,0,0,0.05)");
    } else {
      document.documentElement.classList.remove("app-light");
      document.documentElement.style.setProperty("--app-border-5", "rgba(255,255,255,0.05)");
      document.documentElement.style.setProperty("--app-border-10", "rgba(255,255,255,0.1)");
      document.documentElement.style.setProperty("--app-border-20", "rgba(255,255,255,0.2)");
      document.documentElement.style.setProperty("--app-hover", "rgba(255,255,255,0.05)");
    }
    // Custom font colour (overrides the auto contrast when chosen)
    const fc = FONT_COLORS.find((c) => c.id === fontColor);
    if (fc) {
      document.documentElement.classList.add("app-fontcolor");
      document.documentElement.style.setProperty("--app-fontcolor", fc.hex);
    } else {
      document.documentElement.classList.remove("app-fontcolor");
      document.documentElement.style.removeProperty("--app-fontcolor");
    }
    // Font size (scales all rem-based text)
    const fs = FONT_SIZES.find((s) => s.id === fontSize) || FONT_SIZES[0];
    document.documentElement.style.fontSize = fs.px;
  }, [bgMode, fontColor, fontSize]);
  const theme = useAccentTheme(accent);

  useEffect(() => { const id = setInterval(() => setNow(new Date()), 30000); return () => clearInterval(id); }, []);

  // FIX: previously used `screen` inside this closure, which went stale and re-fired
  // setScreen("sport") on every profile update (settings edits, avatar uploads, etc).
  // Using a ref instead means this only ever runs once, on the very first load.
  useEffect(() => {
    const unsub = db.collection("users").doc(user.uid).onSnapshot((doc) => {
      if (doc.exists) {
        const data = doc.data();
        setProfile(data);
        if (!screenInitialized.current) {
          screenInitialized.current = true;
          if (!data.ageVerified) setScreen("idcheck");
          else if (!data.hasSeenHowToPlay) setScreen("howtoplay");
          else setScreen("sport");
        }
      }
    });
    return unsub;
  }, [user.uid]);

  useEffect(() => {
    const unsub = db.collection("users").doc(user.uid).collection("transactions").orderBy("createdAt", "desc").limit(20)
      .onSnapshot((snap) => setTransactions(snap.docs.map((d) => ({ id: d.id, ...d.data() }))));
    return unsub;
  }, [user.uid]);

  useEffect(() => {
    const unsub = db.collection("tiers").onSnapshot((snap) => {
      setRawTiers(snap.docs.map((d) => { const data = d.data(); return { id: d.id, ...data, startTime: data.startTime.toDate(), lockTime: data.lockTime ? data.lockTime.toDate() : null }; }));
    });
    return unsub;
  }, []);

  useEffect(() => {
    const unsubs = rawTiers.map((tier) => db.collection("entries").where("tierId", "==", tier.id).onSnapshot((snap) => setEntryCounts((prev) => ({ ...prev, [tier.id]: snap.size }))));
    const unsubMine = db.collection("entries").where("uid", "==", user.uid).onSnapshot((snap) => { const mine = {}; snap.docs.forEach((d) => { mine[d.data().tierId] = { id: d.id, ...d.data() }; }); setMyEntries(mine); });
    return () => { unsubs.forEach((u) => u()); unsubMine(); };
  }, [rawTiers.map((t) => t.id).join(","), user.uid]);

  const joinedTierIds = Object.keys(myEntries);
  const tiers = useMemo(() => rawTiers.map((t) => ({ ...t, startLabel: formatStartLabel(t.startTime), entries: entryCounts[t.id] || 0, pool: (entryCounts[t.id] || 0) * t.buyIn })), [rawTiers, entryCounts]);
  // viewingTierId is which joined competition you're actively looking at on My Pick / Standings —
  // falls back to whichever joined competition comes first if nothing's been explicitly chosen yet.
  const joinedTierId = (viewingTierId && myEntries[viewingTierId]) ? viewingTierId : (joinedTierIds[0] || null);
  const currentTier = tiers.find((t) => t.id === joinedTierId);
  // Older competitions created before round selection existed won't have a roundId yet —
  // fall back to the first known round so they still work instead of crashing.
  const effectiveRoundId = currentTier?.roundId || NRL_ROUNDS[0].id;
  const currentRound = currentTier ? { ...getRound(effectiveRoundId), fixtures: currentTier.fixtureOverrides || getRound(effectiveRoundId).fixtures } : null;

  useEffect(() => {
    setPicksLoaded(false);
    if (!joinedTierId || !currentTier) { setAllPicks([]); setMyPick(null); setPickSubmitted(false); return; }
    const unsubPicks = db.collection("picks").where("tierId", "==", joinedTierId).where("roundId", "==", effectiveRoundId).onSnapshot((snap) => {
      const list = snap.docs.map((d) => d.data()); setAllPicks(list);
      const mine = list.find((p) => p.uid === user.uid);
      if (mine) { setMyPick(mine.team); setPickSubmitted(true); } else { setMyPick(null); setPickSubmitted(false); }
      setPicksLoaded(true);
    });
    const unsubResults = db.collection("results").doc(`${joinedTierId}_${effectiveRoundId}`).onSnapshot((doc) => {
      const data = doc.exists ? doc.data() : {};
      setResults(data.fixtureResults || {});
    });
    return () => { unsubPicks(); unsubResults(); };
  }, [joinedTierId, effectiveRoundId, user.uid]);

  const lockTime = currentTier?.lockTime || null;
  const tipsLocked = lockTime ? now.getTime() >= lockTime.getTime() : false;
  const msToLock = lockTime ? lockTime.getTime() - now.getTime() : null;
  const lockCountdown = lockTime ? formatCountdown(msToLock) : "";
  const lockUrgent = !tipsLocked && msToLock !== null && msToLock <= 1000 * 60 * 60 * 6;

  const standingsProfiles = useLiveProfiles(useMemo(() => allPicks.map((p) => p.uid), [allPicks]));

  const players = useMemo(() => {
    if (!currentRound) return [];
    return allPicks.map((p) => {
      const fixtureIndex = currentRound.fixtures.findIndex((f) => f.home === p.team || f.away === p.team);
      const winner = results[fixtureIndex];
      const status = winner ? (winner === p.team ? "W" : "L") : null;
      const live = standingsProfiles[p.uid];
      return { uid: p.uid, name: live?.name || p.name, avatarPreset: live ? (live.avatarPreset || null) : (p.avatarPreset || null), pick: p.team, isYou: p.uid === user.uid, status };
    });
  }, [allPicks, results, user.uid, currentRound, standingsProfiles]);

  const myStatus = players.find((p) => p.isYou)?.status || null;
  const myEntryStatus = myEntries[joinedTierId]?.status;
  const eliminated = !!myEntryStatus && myEntryStatus !== "active"; // covers eliminated, kicked, and refunded alike

  // The team you can't reuse is whatever you picked in this competition's *previous* round
  // (only relevant once a host has advanced the competition past round 1).
  const [lockedTeam, setLockedTeam] = useState(null);
  useEffect(() => {
    if (!joinedTierId || !currentTier?.previousRoundId) { setLockedTeam(null); return; }
    let cancelled = false;
    db.collection("picks").doc(`${joinedTierId}_${currentTier.previousRoundId}_${user.uid}`).get().then((doc) => {
      if (!cancelled) setLockedTeam(doc.exists ? doc.data().team : null);
    }).catch(() => { if (!cancelled) setLockedTeam(null); });
    return () => { cancelled = true; };
  }, [joinedTierId, currentTier?.previousRoundId, user.uid]);

  // If tips have locked and this user never submitted a pick, auto-assign a random
  // team on their behalf (excluding whichever team they can't reuse), per the rules.
  //
  // This runs off the reactive picks listener (picksLoaded/myPick/pickSubmitted), and
  // that listener can momentarily report "no pick yet" right after switching between
  // competitions — Firestore's onSnapshot can deliver an early, not-yet-server-confirmed
  // result for a tierId+roundId query it hasn't run before in this session, before
  // correcting itself a moment later. If this effect wrote blindly on that first signal,
  // it could stomp a real, already-locked-in pick with a fresh random one. So the write
  // itself is wrapped in a transaction that re-checks the actual server state at write
  // time and only assigns a pick if one truly doesn't exist yet — the reactive state above
  // only decides *whether to try*, never *whether it's safe to overwrite*.
  useEffect(() => {
    if (!picksLoaded || !tipsLocked || !joinedTierId || !currentRound || eliminated || myPick || pickSubmitted) return;
    const available = currentRound.fixtures.flatMap((f) => [f.home, f.away]).filter((t) => t !== lockedTeam);
    if (available.length === 0) return;
    const pickRef = db.collection("picks").doc(`${joinedTierId}_${effectiveRoundId}_${user.uid}`);
    let cancelled = false;
    db.runTransaction(async (tx) => {
      const existing = await tx.get(pickRef);
      if (existing.exists) return existing.data().team; // a real pick is already there server-side — never touch it
      const randomTeam = available[Math.floor(Math.random() * available.length)];
      tx.set(pickRef, {
        tierId: joinedTierId, roundId: effectiveRoundId, uid: user.uid, name: profile.name, avatarPreset: profile.avatarPreset || null, team: randomTeam,
        submittedAt: FieldValue.serverTimestamp(), autoAssigned: true,
      });
      return randomTeam;
    }).then((team) => {
      if (cancelled || !team) return;
      setMyPick(team);
      setPickSubmitted(true);
    }).catch(() => {});
    return () => { cancelled = true; };
  }, [picksLoaded, tipsLocked, joinedTierId, currentRound, eliminated, myPick, pickSubmitted, lockedTeam]);

  const updateProfile = (patch) => db.collection("users").doc(user.uid).set(patch, { merge: true });

  const confirmEntry = async () => {
    const tier = entryTarget; setEntryError("");
    try {
      await db.runTransaction(async (tx) => {
        const userRef = db.collection("users").doc(user.uid);
        const userDoc = await tx.get(userRef);
        const bal = userDoc.data().walletBalance || 0;
        if (bal < tier.buyIn) throw new Error("Insufficient balance");
        tx.update(userRef, { walletBalance: FieldValue.increment(-tier.buyIn) });
        tx.set(db.collection("users").doc(user.uid).collection("transactions").doc(), { label: `${tier.name} entry`, amount: -tier.buyIn, createdAt: FieldValue.serverTimestamp() });
        tx.set(db.collection("entries").doc(`${tier.id}_${user.uid}`), { tierId: tier.id, uid: user.uid, name: profile.name, status: "active", joinedAt: FieldValue.serverTimestamp() });
      });
      playDingSound();
      setViewingTierId(tier.id);
      setEntryTarget(null); setTab("pick");
    } catch (e) { setEntryError(e.message); }
  };

  const submitPick = async () => {
    if (!myPick || !joinedTierId || !currentTier) return;
    const chosenTeam = myPick;
    setPickSubmitted(true); // show confirmation instantly, don't wait on the network
    setPickSaving(false);
    setPickStamp(chosenTeam);
    playThumpSound(60, true);
    setTimeout(() => { setPickStamp(null); setTab("standings"); }, 1700);
    try {
      await db.collection("picks").doc(`${joinedTierId}_${effectiveRoundId}_${user.uid}`).set({ tierId: joinedTierId, roundId: effectiveRoundId, uid: user.uid, name: profile.name, avatarPreset: profile.avatarPreset || null, team: myPick, submittedAt: FieldValue.serverTimestamp() });
    } catch (e) {
      setPickSubmitted(false); // roll back if it genuinely failed to save
    }
  };

  const createTier = (data) => db.collection("tiers").add({ name: data.name, buyIn: data.buyIn, roundId: data.roundId, startTime: Timestamp.fromDate(data.startTime), lockTime: Timestamp.fromDate(data.lockTime), rules: data.rules, createdBy: user.uid, createdAt: FieldValue.serverTimestamp() });
  const updateTier = (id, data) => db.collection("tiers").doc(id).set({ name: data.name, buyIn: data.buyIn, roundId: data.roundId, startTime: Timestamp.fromDate(data.startTime), lockTime: Timestamp.fromDate(data.lockTime), rules: data.rules }, { merge: true });
  const deleteTier = (id) => db.collection("tiers").doc(id).delete();
  const kickEntrant = (tierId, uid, name) => {
    if (!confirm(`Kick ${name || "this entrant"} from the competition? They'll be marked as kicked and won't be able to submit further picks. You can restore them afterward if needed.`)) return;
    return db.collection("entries").doc(`${tierId}_${uid}`).update({ status: "kicked" });
  };
  const restoreEntrant = (tierId, uid) => db.collection("entries").doc(`${tierId}_${uid}`).update({ status: "active" });
  const markEliminated = (tierId, uid) => db.collection("entries").doc(`${tierId}_${uid}`).update({ status: "eliminated" });

  const markWinner = async (tierId, uid, name) => {
    const tier = tiers.find((t) => t.id === tierId);
    if (!tier) return;
    const netPool = tier.pool * (1 - PLATFORM_FEE_RATE);
    const already = !!tier.winnerUid;
    const confirmMsg = already
      ? `"${tier.name}" already has a winner (${tier.winnerName || "someone"}). Mark ${name} as the winner instead? The $${netPool.toLocaleString(undefined, { maximumFractionDigits: 2 })} pool was already paid out once — this only relabels the winner and won't pay out again. Fix wallets manually if you're correcting a mistake.`
      : `Mark ${name} as the winner of "${tier.name}"? This pays out the $${netPool.toLocaleString(undefined, { maximumFractionDigits: 2 })} prize pool to their wallet right away and can't be undone automatically.`;
    if (!confirm(confirmMsg)) return;
    await db.runTransaction(async (tx) => {
      const tierRef = db.collection("tiers").doc(tierId);
      const tierDoc = await tx.get(tierRef);
      const existingWinner = tierDoc.exists ? tierDoc.data().winnerUid : null;
      tx.update(tierRef, { winnerUid: uid, winnerName: name, winnerAt: FieldValue.serverTimestamp(), winnerPayout: netPool });
      if (existingWinner) return; // pool already paid out for this competition — never pay twice
      const userRef = db.collection("users").doc(uid);
      tx.update(userRef, { walletBalance: FieldValue.increment(netPool) });
      tx.set(userRef.collection("transactions").doc(), { label: `Won "${tier.name}"`, amount: netPool, createdAt: FieldValue.serverTimestamp() });
    });
  };

  const cancelAndRefund = async (tier) => {
    const snap = await db.collection("entries").where("tierId", "==", tier.id).get();
    const batch = db.batch();
    snap.docs.forEach((d) => {
      const entry = d.data();
      if (entry.status !== "active") return;
      batch.update(d.ref, { status: "refunded" });
      batch.update(db.collection("users").doc(entry.uid), { walletBalance: FieldValue.increment(tier.buyIn) });
      batch.set(db.collection("users").doc(entry.uid).collection("transactions").doc(), {
        label: `Refund — ${tier.name} cancelled`, amount: tier.buyIn, createdAt: FieldValue.serverTimestamp(),
      });
    });
    batch.update(db.collection("tiers").doc(tier.id), { cancelled: true });
    await batch.commit();
  };

  const rollingEarnings = useMemo(() => tiers.filter((t) => !t.cancelled).reduce((sum, t) => sum + t.pool * PLATFORM_FEE_RATE, 0), [tiers]);

  if (screen === "loading" || !profile) return <div className="min-h-screen flex items-center justify-center text-neutral-500 text-sm" style={{ backgroundColor: BG, color: "var(--app-text)" }}>Loading…</div>;
  if (screen === "idcheck") return <IDCheckScreen initialName={profile.name} onVerified={(idInfo) => { updateProfile({ ...idInfo, ageVerified: true }); setScreen("howtoplay"); }} />;
  if (screen === "howtoplay") return <HowToPlayScreen onAccept={() => { updateProfile({ hasSeenHowToPlay: true }); setScreen("sport"); }} />;
  if (screen === "sport") return <SportScreen userName={profile.name} showBack={!!sport} onBack={() => setScreen("app")} onPick={(s) => { setSport(s); setScreen("app"); }} />;

  const isHost = profile.role === "host";
  const navTabs = [
    { id: "compete", label: "Compete", Icon: NavTrophy },
    { id: "pick", label: "My Pick", Icon: NavTarget },
    { id: "standings", label: "Standings", Icon: NavBars },
    { id: "wallet", label: "Wallet", Icon: NavWallet },
    ...(isHost ? [{ id: "host", label: "Host", Icon: NavClipboard }] : []),
    { id: "settings", label: "Settings", Icon: NavGear },
  ];

  return (
    <div className="min-h-screen text-slate-100 pb-20" style={{ backgroundColor: BG, color: "var(--app-text)" }}>
      <header className="px-5 pt-6 pb-4 border-b adapt-border-5 flex items-center justify-between">
        <button onClick={() => setScreen("sport")} className="flex items-center gap-1 text-neutral-400 text-xs hover:text-neutral-200"><ChevronLeft size={16} /> Sport</button>
        <div className="flex items-center gap-2"><Crown className="text-amber-400 crown-glow" size={20} /><h1 className="font-scoreboard text-2xl tracking-wide">LAST MAN STANDING</h1></div>
        <span className="text-[11px] uppercase tracking-widest text-neutral-500 border adapt-border-10 rounded-full px-2 py-1">{sport}</span>
      </header>

      <main className="px-5 py-5 max-w-md mx-auto">
        {(tab === "pick" || tab === "standings") && joinedTierIds.length > 1 && (
          <div className="flex gap-2 mb-4 overflow-x-auto pb-1">
            {joinedTierIds.map((id) => {
              const t = tiers.find((x) => x.id === id);
              if (!t) return null;
              const active = id === joinedTierId;
              return (
                <button key={id} onClick={() => { setViewingTierId(id); setMyPick(null); setPickSubmitted(false); }}
                  className={`shrink-0 rounded-full px-3 py-1.5 text-xs font-medium border ${active ? `${theme.border} ${theme.bgSoft} ${theme.text}` : "adapt-border-10 text-neutral-400"}`}>
                  {t.name}
                </button>
              );
            })}
          </div>
        )}
        {tab === "compete" && (
          <div className="space-y-4">
            <p className="text-sm text-neutral-500">Pick a tier, and survive the rounds.</p>
            {tiers.filter((t) => !t.cancelled).length === 0 && <p className="text-center text-sm text-neutral-500 py-12">No competitions live yet — ask your host to set one up.</p>}
            {tiers.filter((t) => !t.cancelled).map((tier) => <TierCard key={tier.id} tier={tier} now={now} onJoin={setEntryTarget} onInvite={setInvitingTier} joined={!!myEntries[tier.id]} theme={theme} />)}
          </div>
        )}
        {tab === "pick" && currentTier && currentRound && (
          <PickTab round={currentRound} myPick={myPick} lockedTeam={lockedTeam} submitted={pickSubmitted} locked={tipsLocked} stamping={!!pickStamp}
            lockCountdown={lockCountdown} lockUrgent={lockUrgent} eliminated={eliminated} entryStatus={myEntryStatus} onPick={(team) => { setMyPick(team); setPickSubmitted(false); }}
            onSubmit={submitPick} onEdit={() => setPickSubmitted(false)} theme={theme} saving={pickSaving} />
        )}
        {tab === "pick" && !currentTier && <div className="text-center text-neutral-500 text-sm py-12">Join a competition first to make a pick.</div>}
        {tab === "standings" && currentTier && <StandingsTab players={players} locked={tipsLocked} poolAmount={currentTier.pool * (1 - PLATFORM_FEE_RATE)} lockCountdown={lockCountdown} lockUrgent={lockUrgent} entryCount={currentTier.entries} winnerUid={currentTier.winnerUid} winnerName={currentTier.winnerName} winnerPayout={currentTier.winnerPayout} myUid={user.uid} />}
        {tab === "standings" && !currentTier && <div className="text-center text-neutral-500 text-sm py-12">Join a competition to see the field.</div>}
        {tab === "wallet" && <WalletTab balance={profile.walletBalance || 0} transactions={transactions} onDeposit={() => setShowDeposit(true)} onWithdraw={() => setShowWithdraw(true)} theme={theme} />}
        {tab === "host" && isHost && <HostTab tiers={tiers} onCreate={createTier} onUpdate={updateTier} onDelete={deleteTier} onKick={kickEntrant} onRestore={restoreEntrant} onMarkEliminated={markEliminated} onMarkWinner={markWinner} onCancelRefund={cancelAndRefund} rollingEarnings={rollingEarnings} now={now} theme={theme} />}
        {tab === "settings" && (
          <SettingsTab profile={profile} uid={user.uid} onSaveNameEmail={updateProfile} onProfileChange={updateProfile} accent={accent} onAccentChange={(a) => updateProfile({ accent: a })} theme={theme} onSignOut={() => auth.signOut()} isHost={isHost}
            history={Object.values(myEntries).filter((e) => e.status && e.status !== "active").map((e) => ({ id: e.id, tierName: tiers.find((t) => t.id === e.tierId)?.name || "Unknown competition", status: e.status }))} />
        )}
      </main>

      <nav className="fixed bottom-0 inset-x-0 border-t adapt-border-10 px-2 py-2" style={{ backgroundColor: BG, opacity: 0.98 }}>
        <div className="max-w-md mx-auto grid gap-1" style={{ gridTemplateColumns: `repeat(${navTabs.length}, minmax(0, 1fr))` }}>
          {navTabs.map(({ id, label, Icon }) => (
            <button key={id} onClick={() => setTab(id)} className={`flex flex-col items-center gap-1 py-2 rounded-lg text-[10px] ${tab === id ? theme.text : "text-neutral-500"}`}>
              <Icon active={tab === id} />{label}
            </button>
          ))}
        </div>
      </nav>

      {entryTarget && (<EntryConfirmModal tier={entryTarget} balance={profile.walletBalance || 0} onClose={() => { setEntryTarget(null); setEntryError(""); }} onConfirm={confirmEntry} onGoToWallet={() => { setEntryTarget(null); setTab("wallet"); setShowDeposit(true); }} theme={theme} error={entryError} />)}
      {invitingTier && (<InviteModal tier={invitingTier} theme={theme} onClose={() => setInvitingTier(null)} />)}
      {pickStamp && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80">
          <div className="stamp-pop text-center">
            <div className={`border-4 ${theme.borderSoft} ${theme.text} font-scoreboard text-5xl tracking-widest px-8 py-3 -rotate-[8deg] uppercase bg-neutral-900`}
              style={{ textShadow: "0 0 22px currentColor", boxShadow: "0 0 34px currentColor" }}>
              {pickStamp}
            </div>
          </div>
        </div>
      )}
      {showDeposit && (<DepositModal onClose={() => setShowDeposit(false)} theme={theme} onConfirm={async (amount) => { await db.collection("users").doc(user.uid).update({ walletBalance: FieldValue.increment(amount) }); await db.collection("users").doc(user.uid).collection("transactions").add({ label: "Balance added", amount, createdAt: FieldValue.serverTimestamp() }); }} />)}
      {showWithdraw && (<WithdrawModal balance={profile.walletBalance || 0} onClose={() => setShowWithdraw(false)} theme={theme} onConfirm={async (amount) => { await db.collection("users").doc(user.uid).update({ walletBalance: FieldValue.increment(-amount) }); await db.collection("users").doc(user.uid).collection("transactions").add({ label: "Withdrawal", amount: -amount, createdAt: FieldValue.serverTimestamp() }); }} />)}
    </div>
  );
}

function ImpactBurst({ big = false }) {
  // A burst of dust and rock chips at the base of a word the instant it slams down —
  // fixed, hand-tuned trajectories (not random) so it looks the same and reads clean
  // every time, just scattering outward and falling as it fades.
  const chips = big
    ? [
        { dx: -42, dy: -16, rot: -150, delay: 0.00, size: 7 },
        { dx: 38, dy: -20, rot: 130, delay: 0.02, size: 6 },
        { dx: -24, dy: 12, rot: -85, delay: 0.05, size: 5 },
        { dx: 28, dy: 15, rot: 105, delay: 0.01, size: 6 },
        { dx: -50, dy: 8, rot: -170, delay: 0.06, size: 5 },
        { dx: 48, dy: 4, rot: 160, delay: 0.03, size: 7 },
        { dx: -12, dy: -32, rot: -65, delay: 0.07, size: 4 },
        { dx: 14, dy: -30, rot: 75, delay: 0.02, size: 4 },
        { dx: -34, dy: 20, rot: -120, delay: 0.04, size: 4 },
        { dx: 32, dy: 22, rot: 115, delay: 0.05, size: 4 },
      ]
    : [
        { dx: -28, dy: -12, rot: -110, delay: 0.00, size: 5 },
        { dx: 26, dy: -14, rot: 100, delay: 0.02, size: 5 },
        { dx: -17, dy: 9, rot: -70, delay: 0.03, size: 4 },
        { dx: 19, dy: 10, rot: 90, delay: 0.01, size: 4 },
        { dx: -34, dy: 5, rot: -130, delay: 0.04, size: 4 },
        { dx: 32, dy: 3, rot: 120, delay: 0.02, size: 5 },
      ];
  return (
    <div className="absolute left-1/2 bottom-0 pointer-events-none" style={{ transform: "translateX(-50%)" }}>
      <div className={big ? "dust-puff dust-puff-big" : "dust-puff"} />
      {chips.map((c, i) => (
        <span key={i} className="debris-chip" style={{ "--dx": `${c.dx}px`, "--dy": `${c.dy}px`, "--rot": `${c.rot}deg`, width: c.size, height: c.size, animationDelay: `${c.delay}s` }} />
      ))}
    </div>
  );
}

function SplashScreen({ onFinish }) {
  const [revealCount, setRevealCount] = useState(0);
  const [showSub, setShowSub] = useState(false);
  const [phase, setPhase] = useState("in");

  const playThump = (freq, boom) => playThumpSound(freq, boom);

  useEffect(() => {
    const timers = [
      setTimeout(() => { setRevealCount(1); playThump(85, false); }, 300),   // LAST. — low thud
      setTimeout(() => { setRevealCount(2); playThump(70, false); }, 1300),  // MAN. — a bit heavier
      setTimeout(() => { setRevealCount(3); playThump(48, true); }, 2400),   // STANDING! — full boom
      setTimeout(() => setShowSub(true), 2900),
      setTimeout(() => setPhase("out"), 4500),
      setTimeout(() => onFinish(), 5050),
    ];
    return () => timers.forEach(clearTimeout);
  }, []);

  return (
    <div className={`fixed inset-0 z-50 flex flex-col items-center justify-center overflow-hidden transition-all duration-[600ms] ${phase === "out" ? "opacity-0 scale-150" : "opacity-100 scale-100"}`} style={{ backgroundColor: "#050506" }}>
      <div className={`flex flex-col items-center gap-0.5 relative ${revealCount > 0 ? `ground-shake-${revealCount}` : ""}`}>
        {revealCount >= 1 && (
          <div className="relative">
            <div className="word-slam font-scoreboard text-5xl tracking-wide" style={{ color: "#fff1e0" }}>LAST.</div>
            <ImpactBurst />
          </div>
        )}
        {revealCount >= 2 && (
          <div className="relative">
            <div className="word-slam font-scoreboard text-5xl tracking-wide" style={{ color: "#fff1e0" }}>MAN.</div>
            <ImpactBurst />
          </div>
        )}
        {revealCount >= 3 && (
          <div className="relative">
            <div className="word-slam-big font-scoreboard text-6xl tracking-wide" style={{ color: "#fff1e0" }}>STANDING!</div>
            <ImpactBurst big />
          </div>
        )}
        {showSub && <p className="splash-sub text-[11px] tracking-[0.4em] uppercase text-neutral-400 mt-4 text-center relative">Beta</p>}
      </div>
    </div>
  );
}


function InviteLandingScreen({ params, onContinue }) {
  const name = params.get("name") || "Last Man Standing";
  const buyIn = params.get("buyIn") || "5";
  const round = params.get("round") || "";
  const hours = params.get("hours") || "";
  return (
    <div className="min-h-screen text-slate-100 flex flex-col justify-center px-6 relative overflow-hidden" style={{ backgroundColor: "#050506" }}>
      <div className="smoke-layer-a" /><div className="smoke-layer-b" />
      <div className="relative z-10 max-w-sm mx-auto w-full">
        <div className="text-center mb-6">
          <span className="text-[11px] uppercase tracking-[0.35em] text-rose-400">You're invited</span>
          <h1 className="neon-title font-scoreboard text-4xl tracking-wide mt-1" style={{ color: "#fff1e0" }}>LAST MAN STANDING</h1>
        </div>

        <div className="relative overflow-hidden rounded-2xl border border-teal-400/40 bg-neutral-800 p-5" style={{ boxShadow: "0 0 30px rgba(45,212,191,0.15)" }}>
          <div className="flex items-center justify-between">
            <h3 className="text-lg font-semibold text-slate-100">{name}</h3>
            {round && <span className="text-xs text-neutral-500">{round}</span>}
          </div>
          <p className="text-sm text-neutral-400 mt-1">${buyIn} buy-in · winner takes the pool</p>
          {hours && (
            <div className="mt-4 flex items-center justify-center gap-2 rounded-lg px-3 py-2 text-xs font-medium bg-rose-500/15 text-rose-300 animate-pulse">
              <Clock size={13} /> Locks in about {hours} hours — don't wait around!
            </div>
          )}
          <button onClick={onContinue} className="mt-5 w-full rounded-xl bg-teal-400 hover:bg-teal-300 text-neutral-950 font-semibold py-3 text-sm">
            Join now
          </button>
        </div>

        <p className="text-center text-[11px] text-neutral-500 mt-5">Create a free account to jump in — takes less than a minute.</p>
      </div>
    </div>
  );
}

function TapToEnterScreen({ onEnter }) {
  const handleTap = () => {
    getSharedAudioCtx(); // primed synchronously inside the real tap gesture — the most reliable moment to unlock audio
    onEnter();
  };
  return (
    <div onClick={handleTap} onTouchStart={handleTap} className="fixed inset-0 z-50 flex items-center justify-center overflow-hidden cursor-pointer" style={{ backgroundColor: "#050506" }}>
      <div className="smoke-layer-a" style={{ filter: "blur(24px) grayscale(1)" }} />
      <div className="smoke-layer-b" style={{ filter: "blur(30px) grayscale(1)" }} />
      <div className="relative z-10 text-center px-6">
        <Crown className="text-amber-400 crown-glow mx-auto mb-5" size={30} />
        <p className="tap-pulse text-neutral-300 text-sm tracking-[0.35em] uppercase">Tap to enter</p>
      </div>
    </div>
  );
}

function App() {
  const [entered, setEntered] = useState(false);
  const [showSplash, setShowSplash] = useState(true);
  const [user, setUser] = useState(undefined);
  const [pinUnlocked, setPinUnlocked] = useState(false);
  const inviteParams = useMemo(() => new URLSearchParams(window.location.search), []);
  const [inviteDismissed, setInviteDismissed] = useState(false);
  useEffect(() => auth.onAuthStateChanged((u) => { setUser(u); setPinUnlocked(false); }), []);
  if (!entered) return <TapToEnterScreen onEnter={() => setEntered(true)} />;
  if (inviteParams.get("invite") && !inviteDismissed) {
    return <InviteLandingScreen params={inviteParams} onContinue={() => setInviteDismissed(true)} />;
  }
  if (showSplash) return <SplashScreen onFinish={() => setShowSplash(false)} />;
  if (user === undefined) return <div className="min-h-screen flex items-center justify-center text-neutral-500 text-sm" style={{ backgroundColor: BG, color: "var(--app-text)" }}>Loading…</div>;
  if (!user) return <AuthScreen />;
  const storedPinHash = window.localStorage.getItem(`lms_pin_${user.uid}`);
  if (storedPinHash && !pinUnlocked) {
    return <PinLockScreen uid={user.uid} onUnlock={() => setPinUnlocked(true)} onUseEmailInstead={() => auth.signOut()} />;
  }
  return <AppShell key={user.uid} user={user} />;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
