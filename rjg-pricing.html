<script type="text/plain" id="app-source">
const { useState, useMemo, useEffect, useLayoutEffect, useRef, useCallback, createContext, useContext } = React;

/* =========================================================================
   Helpers
   ========================================================================= */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const now = () => Date.now();
const num = (v) => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };
const round2 = (n) => Math.round((n + Number.EPSILON) * 100) / 100;
// Group units of measure into families so takeoff / floor-plan measurements only
// attach database items measured the same way (an m² area → m² items, etc.).
const unitFamily = (u) => {
  const s = String(u || "").toLowerCase().replace(/[\s.]/g, "");
  if (!s) return "";
  if (s === "m2" || s.includes("²") || s.includes("sq") || /m\^?2$/.test(s)) return "area";
  if (s === "m3" || s.includes("³") || s.includes("cum") || s.includes("cbm") || /m\^?3$/.test(s)) return "volume";
  if (/^(m|lm|rm|linm|linealm|lineal|metre|meter|l\/m)$/.test(s)) return "length";
  if (/^(ea|each|no|nr|num|item|unit|pc|pcs|qty)$/.test(s)) return "count";
  return "u:" + s;   // hr, dy, w, etc. stay in their own family
};
// The measurement family a takeoff tool produces.
const toolUnitFamily = (tool) => tool === "area" ? "area" : tool === "count" ? "count" : "length";
const money = (n) => "$" + (round2(n)).toLocaleString("en-AU", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDate = (ts) => new Date(ts).toLocaleDateString("en-AU", { day: "2-digit", month: "short", year: "numeric" });
const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
function shoelace(pts){ let s = 0; for (let i = 0; i < pts.length; i++){ const j = (i + 1) % pts.length; s += pts[i].x * pts[j].y - pts[j].x * pts[i].y; } return Math.abs(s) / 2; }
function perimeter(pts, closed){ let s = 0; for (let i = 0; i < pts.length - 1; i++) s += dist(pts[i], pts[i+1]); if (closed && pts.length > 2) s += dist(pts[pts.length-1], pts[0]); return s; }
function centroid(pts){ let x = 0, y = 0; pts.forEach(p => { x += p.x; y += p.y; }); return { x: x / pts.length, y: y / pts.length }; }
function pointInPoly(p, pts){ let inside = false; for (let i = 0, j = pts.length - 1; i < pts.length; j = i++){ const xi = pts[i].x, yi = pts[i].y, xj = pts[j].x, yj = pts[j].y; if (((yi > p.y) !== (yj > p.y)) && (p.x < (xj - xi) * (p.y - yi) / ((yj - yi) || 1e-9) + xi)) inside = !inside; } return inside; }
function download(filename, blob){ const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = filename; a.click(); setTimeout(() => URL.revokeObjectURL(url), 2000); }

/* =========================================================================
   IndexedDB (offline-first storage)
   ========================================================================= */
const DB_NAME = "rjg_pricing", DB_VER = 1;
function openDb(){
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = () => {
      const db = r.result;
      if (!db.objectStoreNames.contains("items")) db.createObjectStore("items", { keyPath: "id" });
      if (!db.objectStoreNames.contains("projects")) db.createObjectStore("projects", { keyPath: "id" });
      if (!db.objectStoreNames.contains("kv")) db.createObjectStore("kv");
    };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function dbAll(store){ const db = await openDb(); return new Promise((res, rej) => { const r = db.transaction(store).objectStore(store).getAll(); r.onsuccess = () => res(r.result || []); r.onerror = () => rej(r.error); }); }
async function dbPut(store, val, key){ const db = await openDb(); return new Promise((res, rej) => { const t = db.transaction(store, "readwrite"); const os = t.objectStore(store); (key !== undefined ? os.put(val, key) : os.put(val)); t.oncomplete = () => res(); t.onerror = () => rej(t.error); }); }
async function dbGet(store, key){ const db = await openDb(); return new Promise((res, rej) => { const r = db.transaction(store).objectStore(store).get(key); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); }); }
async function dbDel(store, key){ const db = await openDb(); return new Promise((res, rej) => { const t = db.transaction(store, "readwrite"); t.objectStore(store).delete(key); t.oncomplete = () => res(); t.onerror = () => rej(t.error); }); }
// Bulk-write many records into a store in one transaction (used for seeding).
async function dbBulkPut(store, records){ const db = await openDb(); return new Promise((res, rej) => { const t = db.transaction(store, "readwrite"); const os = t.objectStore(store); records.forEach(r => os.put(r)); t.oncomplete = () => res(); t.onerror = () => rej(t.error); }); }
// Pre-load the RJG price register (vendor/seed-items.json) on a fresh device so
// the pricing DB is populated by default. Returns the seeded items, or [] if the
// seed file can't be fetched (e.g. first run offline) — leaving the flag unset so
// it retries next launch.
async function seedDefaultItems(){
  try {
    const res = await fetch("./vendor/seed-items.json", { cache: "no-cache" });
    if (!res.ok) return [];
    const raw = await res.json();
    if (!Array.isArray(raw) || !raw.length) return [];
    const t0 = now();
    const items = raw.map((a, i) => ({ ...a, rate: num(a.rate), id: uid() + "-" + i, updatedAt: t0 }));
    await dbBulkPut("items", items);
    await dbPut("kv", true, "seeded");
    return items;
  } catch (_) { return []; }
}

/* =========================================================================
   Defaults
   ========================================================================= */
const APP_VERSION = "v51 · 21 Jul 2026";        // shown in Settings so you can confirm the live build
const SEED_PRICES_DATE = "19 Jul 2026";         // date of the built-in price register (shown until a device imports its own)
const MASTER_PRICES_TS = Date.parse("2026-07-19");   // release time of the current master list; devices last updated before this are flagged out of date
const COST_TYPES = ["Material", "Labour", "Equipment", "Plant", "Crew", "Subcontractor", "Prelim", "Other"];
// Job kinds chosen when a job is created. "new" is the original quote flow and must stay unchanged.
const JOB_KINDS = {
  new:       { label: "New job / quote",           short: "Quote", prefix: "RJG-Q", seq: "quoteSeq", priced: true,  badge: "#02224B" },
  rfq:       { label: "Subcontractor price request", short: "RFQ",  prefix: "RFQ-",  seq: "rfqSeq",   priced: false, badge: "#0f766e" },
  variation: { label: "Variation to a client",      short: "VPR",  prefix: "VPR-",  seq: "vprSeq",   priced: true,  badge: "#b45309" },
};
const jobKind = (p) => (p && JOB_KINDS[p.kind]) ? p.kind : "new";
const DEFAULT_LOGO = "./vendor/rjg-logo.png";   // real RJG logo (white on navy)
const DEFAULT_SETTINGS = {
  company: "RJG Builders",
  abn: "90 643 458 575",
  license: "15209842",
  address: "17 Hugh Ryan Drive, Garbutt, QLD 4814",
  phone: "0408 822 694",
  email: "james@rjgbuilders.com.au",
  website: "www.rjgbuilders.com.au",
  logo: "",               // dataURL override; falls back to DEFAULT_LOGO
  brand: "#02224B",       // RJG corporate blue
  brand2: "#2B5AA0",      // accent tint
  gst: 10,                 // %
  defaultMargin: 20,       // %
  quoteSeq: 1,
  rfqSeq: 1,
  vprSeq: 1,
  validity: "14 days",
  noticeToStart: "2 weeks minimum",
  paymentTerms: "14 days from invoice",
  formDocNo: "",           // RFQ / Variation form doc-control
  formDocVer: "",
  formDocRelease: "",
  terms: "All prices are exclusive of GST unless otherwise stated.\nQuotation based on the scope described above; anything not listed is excluded.\nPrices subject to final site measure and inspection.\nWork carried out in accordance with RJG Builders' IBMS quality and safety systems."
};

/* =========================================================================
   Store (context)
   ========================================================================= */
const Store = createContext(null);
const useStore = () => useContext(Store);

function StoreProvider({ children }){
  const [items, setItems] = useState([]);
  const [projects, setProjects] = useState([]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [ready, setReady] = useState(false);
  const [toast, setToast] = useState(null);

  useEffect(() => {
    (async () => {
      let [it, pr, kv, seeded] = await Promise.all([dbAll("items"), dbAll("projects"), dbGet("kv", "settings"), dbGet("kv", "seeded")]);
      // First run on a fresh device: pre-load the RJG price register so it's there
      // by default — no manual import needed. The "seeded" flag means we only ever
      // do this once, so clearing items on purpose won't bring them back.
      if (!it.length && !seeded) { it = await seedDefaultItems(); if (it.length){ kv = { ...(kv || {}), pricesUpdatedAt: MASTER_PRICES_TS, pricesSource: "Built-in RJG list (" + SEED_PRICES_DATE + ")" }; await dbPut("kv", kv, "settings"); } }
      setItems(it);
      setProjects(pr.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0)));
      if (kv) setSettings({ ...DEFAULT_SETTINGS, ...kv });
      setReady(true);
    })();
  }, []);

  const notify = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  // ---- settings ----
  const saveSettings = async (patch) => { const next = { ...settings, ...patch }; setSettings(next); await dbPut("kv", next, "settings"); };

  // ---- price items ----
  const upsertItem = async (item) => {
    const rec = { ...item, id: item.id || uid(), updatedAt: now() };
    await dbPut("items", rec);
    setItems((prev) => { const i = prev.findIndex(p => p.id === rec.id); if (i === -1) return [...prev, rec]; const c = prev.slice(); c[i] = rec; return c; });
    return rec;
  };
  // Merge-by-code: an incoming row with a code that already exists updates that
  // item in place (so re-imports refresh rates instead of duplicating). Rows
  // without a code, or with a new code, are added fresh.
  const bulkUpsertItems = async (arr) => {
    let created = 0, updated = 0;
    const stamped = arr.map(a => {
      const code = String(a.code || "").trim();
      const existing = code ? items.find(p => String(p.code || "").trim().toLowerCase() === code.toLowerCase()) : null;
      if (existing) { updated++; return { ...existing, ...a, id: existing.id, updatedAt: now() }; }
      created++; return { ...a, id: a.id || uid(), updatedAt: now() };
    });
    for (const r of stamped) await dbPut("items", r);
    setItems((prev) => { const map = new Map(prev.map(p => [p.id, p])); stamped.forEach(r => map.set(r.id, r)); return [...map.values()]; });
    return { created, updated, total: stamped.length };
  };
  const deleteItem = async (id) => { await dbDel("items", id); setItems(prev => prev.filter(p => p.id !== id)); };
  const clearItems = async () => { for (const it of items) await dbDel("items", it.id); setItems([]); };

  // ---- projects ----
  const upsertProject = async (proj) => {
    const rec = { ...proj, id: proj.id || uid(), updatedAt: now(), createdAt: proj.createdAt || now() };
    await dbPut("projects", rec);
    setProjects((prev) => { const i = prev.findIndex(p => p.id === rec.id); let c; if (i === -1) c = [rec, ...prev]; else { c = prev.slice(); c[i] = rec; } return c.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0)); });
    return rec;
  };
  const deleteProject = async (id) => { await dbDel("projects", id); setProjects(prev => prev.filter(p => p.id !== id)); };

  const value = { items, projects, settings, ready, notify, saveSettings, upsertItem, bulkUpsertItems, deleteItem, clearItems, upsertProject, deleteProject, setItems, setProjects };
  return (
    <Store.Provider value={value}>
      {children}
      {toast && <div className="fixed left-1/2 -translate-x-1/2 bottom-24 z-[100] px-4 py-2 rounded-lg text-white text-sm font-semibold shadow-lg" style={{ background: "var(--brand)" }}>{toast}</div>}
    </Store.Provider>
  );
}

/* =========================================================================
   UI primitives
   ========================================================================= */
function Modal({ open, onClose, title, children, wide }){
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" style={{ background: "rgba(10,15,25,.5)" }} onClick={onClose}>
      <div className={"card w-full " + (wide ? "sm:max-w-3xl" : "sm:max-w-md") + " max-h-[92vh] overflow-y-auto rounded-b-none sm:rounded-2xl"} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between px-4 py-3 border-b sticky top-0 z-10" style={{ borderColor: "var(--line)", background: "var(--paper)" }}>
          <h3 className="font-bold text-base">{title}</h3>
          <button className="btn btn-ghost !p-2" onClick={onClose}><IcX size={16} /></button>
        </div>
        <div className="p-4">{children}</div>
      </div>
    </div>
  );
}
function Field({ label, children }){ return <div><label className="lbl">{label}</label>{children}</div>; }
// Numeric input you can fully clear and retype; decimal keypad on mobile; selects all on focus.
function NumInput({ value, onCommit, className = "inp", placeholder, style }){
  const [s, setS] = useState(value == null || value === "" ? "" : String(value));
  const editing = useRef(false);
  useEffect(() => { if (!editing.current) setS(value == null || value === "" ? "" : String(value)); }, [value]);
  const commit = (raw) => { let n = parseFloat(raw); if (isNaN(n)) n = 0; onCommit(n); return n; };
  return <input type="text" inputMode="decimal" enterKeyHint="done" className={className} style={style} placeholder={placeholder} value={s}
    onFocus={(e) => { editing.current = true; try { e.target.select(); } catch(_){} }}
    onBlur={() => { editing.current = false; setS(String(commit(s))); }}
    onChange={(e) => { const v = e.target.value; if (v === "" || /^-?\d*\.?\d*$/.test(v)) { setS(v); if (v !== "" && v !== "-" && v !== "." && v !== "-." && !isNaN(parseFloat(v))) onCommit(parseFloat(v)); } }} />;
}
// Text input that selects all on focus so tapping lets you retype immediately.
function TextInput(props){ const { onFocusSelect, ...rest } = props; return <input {...rest} onFocus={(e) => { try { e.target.select(); } catch(_){} if (props.onFocus) props.onFocus(e); }} />; }
function Empty({ icon, title, sub }){ return (
  <div className="flex flex-col items-center justify-center text-center py-16 px-6" style={{ color: "var(--muted)" }}>
    <div className="mb-3 opacity-40">{icon}</div>
    <div className="font-semibold text-ink" style={{ color: "var(--ink)" }}>{title}</div>
    {sub && <div className="text-sm mt-1 max-w-xs">{sub}</div>}
  </div>
); }

function SettingsScreen(){
  const { settings, saveSettings, items, projects, notify, bulkUpsertItems, setItems, setProjects } = useStore();
  const [f, setF] = useState(settings);
  useEffect(() => setF(settings), [settings]);
  const set = (k, v) => setF(p => ({ ...p, [k]: v }));

  const onLogo = (e) => { const file = e.target.files[0]; if (!file) return; const r = new FileReader(); r.onload = () => set("logo", r.result); r.readAsDataURL(file); };
  const save = () => { saveSettings(f); notify("Settings saved"); };

  const backup = () => download("rjg-backup-" + new Date().toISOString().slice(0,10) + ".json", new Blob([JSON.stringify({ settings, items, projects }, null, 2)], { type: "application/json" }));
  // Re-load the built-in RJG price register. Merge-by-code refreshes rates on
  // existing items and adds any that are missing — no duplicates.
  const restoreDefaults = async () => {
    if (items.length && !confirm("Replace your price list with the built-in RJG list (" + SEED_PRICES_DATE + ")? Your current items are removed and replaced — anything not in the built-in list will be gone.")) return;
    try {
      const res = await fetch("./vendor/seed-items.json", { cache: "no-cache" });
      if (!res.ok) throw new Error("fetch");
      const raw = await res.json();
      for (const it of items) await dbDel("items", it.id);   // full replace — clear then load
      const t0 = now();
      const fresh = raw.map((a, i) => ({ ...a, rate: num(a.rate), id: uid() + "-" + i, updatedAt: t0 }));
      for (const r of fresh) await dbPut("items", r);
      setItems(fresh);
      await dbPut("kv", true, "seeded");
      await saveSettings({ pricesUpdatedAt: MASTER_PRICES_TS, pricesSource: "Built-in RJG list (" + SEED_PRICES_DATE + ")" });
      notify("Price list replaced — " + fresh.length + " items");
    } catch (e) { alert("Couldn't load the default price list."); }
  };
  // Clear the offline cache + service worker and reload the newest build.
  // Only wipes caches/SW — your price items and jobs (IndexedDB) are untouched.
  const forceUpdate = async () => {
    try {
      if (window.caches) { const keys = await caches.keys(); await Promise.all(keys.map(k => caches.delete(k))); }
      if (navigator.serviceWorker) { const regs = await navigator.serviceWorker.getRegistrations(); await Promise.all(regs.map(r => r.unregister())); }
    } catch (e) {}
    // location.reload(true) is unreliable on iOS/standalone — load a fresh, cache-busted URL
    // so the newest build is fetched from the network (the SW is gone at this point).
    const base = location.href.split("#")[0].split("?")[0];
    location.replace(base + "?fu=" + Date.now());
  };
  const restore = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = async () => {
      try {
        const data = JSON.parse(r.result);
        if (data.settings) await saveSettings(data.settings);
        if (Array.isArray(data.items)) { for (const it of data.items) await dbPut("items", it); setItems(data.items); }
        if (Array.isArray(data.projects)) { for (const p of data.projects) await dbPut("projects", p); setProjects(data.projects.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0))); }
        notify("Backup restored");
      } catch (err) { alert("Could not read backup file."); }
    };
    r.readAsText(file);
  };

  return (
    <div className="max-w-2xl mx-auto p-4 space-y-4 pb-28">
      <h2 className="text-lg font-bold">Settings</h2>

      <div className="card p-4 space-y-3">
        <div className="font-semibold text-sm brand-text">Company & letterhead</div>
        <Field label="Company name"><input className="inp" value={f.company} onChange={e => set("company", e.target.value)} /></Field>
        <div className="grid grid-cols-2 gap-3">
          <Field label="ABN"><input className="inp" value={f.abn} onChange={e => set("abn", e.target.value)} /></Field>
          <Field label="Builder licence #"><input className="inp" value={f.license} onChange={e => set("license", e.target.value)} /></Field>
        </div>
        <Field label="Address"><input className="inp" value={f.address} onChange={e => set("address", e.target.value)} /></Field>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Phone"><input className="inp" value={f.phone} onChange={e => set("phone", e.target.value)} /></Field>
          <Field label="Email"><input className="inp" value={f.email} onChange={e => set("email", e.target.value)} /></Field>
        </div>
        <Field label="Website"><input className="inp" value={f.website} onChange={e => set("website", e.target.value)} /></Field>
        <Field label="Logo (shown on app & quotes)">
          <div className="flex items-center gap-3">
            <div className="rounded flex items-center px-3" style={{ background: "var(--brand)", height: 56 }}><img src={f.logo || DEFAULT_LOGO} alt="logo" style={{ height: 40 }} /></div>
            <label className="btn btn-ghost cursor-pointer"><IcUpload size={16} /> {f.logo ? "Replace" : "Override"}<input type="file" accept="image/*" className="hidden" onChange={onLogo} /></label>
            {f.logo && <button className="btn btn-ghost" onClick={() => set("logo", "")}>Use default</button>}
          </div>
          <p className="text-xs mt-1" style={{ color: "var(--muted)" }}>Defaults to the official RJG logo. Upload only to override.</p>
        </Field>
      </div>

      <div className="card p-4 space-y-3">
        <div className="font-semibold text-sm brand-text">Brand colours</div>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Primary"><div className="flex gap-2 items-center"><input type="color" value={f.brand} onChange={e => set("brand", e.target.value)} className="h-10 w-12 rounded border" /><input className="inp" value={f.brand} onChange={e => set("brand", e.target.value)} /></div></Field>
          <Field label="Accent"><div className="flex gap-2 items-center"><input type="color" value={f.brand2} onChange={e => set("brand2", e.target.value)} className="h-10 w-12 rounded border" /><input className="inp" value={f.brand2} onChange={e => set("brand2", e.target.value)} /></div></Field>
        </div>
        <p className="text-xs" style={{ color: "var(--muted)" }}>Tip: paste your exact RJG hex values here to re-skin the whole app and quote letterhead.</p>
      </div>

      <div className="card p-4 space-y-3">
        <div className="font-semibold text-sm brand-text">Pricing & quote defaults</div>
        <div className="grid grid-cols-2 gap-3">
          <Field label="GST rate (%)"><NumInput value={f.gst} onCommit={v => set("gst", v)} /></Field>
          <Field label="Default margin (%)"><NumInput value={f.defaultMargin} onCommit={v => set("defaultMargin", v)} /></Field>
        </div>
        <div className="grid grid-cols-3 gap-3">
          <Field label="Price valid for"><input className="inp" value={f.validity} onChange={e => set("validity", e.target.value)} /></Field>
          <Field label="Notice to start"><input className="inp" value={f.noticeToStart} onChange={e => set("noticeToStart", e.target.value)} /></Field>
          <Field label="Payment terms"><input className="inp" value={f.paymentTerms} onChange={e => set("paymentTerms", e.target.value)} /></Field>
        </div>
        <Field label="Default terms & conditions"><textarea className="inp" rows="4" value={f.terms} onChange={e => set("terms", e.target.value)} /></Field>
        <div className="text-xs font-bold uppercase mt-2" style={{ color: "var(--muted)" }}>RFQ / Variation form — document control</div>
        <div className="grid grid-cols-3 gap-3">
          <Field label="Document No."><input className="inp" value={f.formDocNo || ""} onChange={e => set("formDocNo", e.target.value)} /></Field>
          <Field label="Version No."><input className="inp" value={f.formDocVer || ""} onChange={e => set("formDocVer", e.target.value)} /></Field>
          <Field label="Release date"><input className="inp" value={f.formDocRelease || ""} onChange={e => set("formDocRelease", e.target.value)} /></Field>
        </div>
      </div>

      <button className="btn btn-primary w-full" onClick={save}><IcCheck size={16} /> Save settings</button>

      <div className="card p-4 space-y-3">
        <div className="font-semibold text-sm brand-text">Backup & transfer (offline)</div>
        <p className="text-xs" style={{ color: "var(--muted)" }}>Everything is stored on this device. Export a backup to move it to another phone/tablet or keep a copy.</p>
        <div className="flex gap-2 flex-wrap">
          <button className="btn btn-ghost" onClick={backup}><IcUpload size={16} /> Export backup</button>
          <label className="btn btn-ghost cursor-pointer"><IcUpload size={16} style={{ transform: "rotate(180deg)" }} /> Restore backup<input type="file" accept="application/json" className="hidden" onChange={restore} /></label>
          <button className="btn btn-ghost" onClick={restoreDefaults}><IcPrice size={16} /> Load / reset to built-in price list</button>
        </div>
        <div className="text-xs" style={{ color: "var(--muted)" }}>{items.length} price items · {projects.length} jobs stored.</div>
        <div className="flex items-center justify-between gap-2 flex-wrap">
          <div className="text-xs" style={{ color: "var(--muted)" }}>App version <b>{APP_VERSION}</b></div>
          <button className="btn btn-ghost !py-1 text-xs" onClick={forceUpdate}><IcGrid size={14} /> Force update</button>
        </div>
        <p className="text-xs" style={{ color: "var(--muted)" }}>Seeing an old version? Tap Force update — it clears the cache and reloads the latest build. Your saved data stays.</p>

  );

function ImportModal({ open, onClose }){
  const { bulkUpsertItems, notify, saveSettings, items, setItems } = useStore();
  const [rows, setRows] = useState(null);     // array of arrays
  const [fileName, setFileName] = useState("");
  const [headers, setHeaders] = useState([]);
  const [mode, setMode] = useState("merge");  // merge = update+add; replace = make the DB exactly this file
  const stampImport = () => saveSettings({ pricesUpdatedAt: now(), pricesSource: fileName || "Excel import" });
  // Merge (update-by-code + add) or Replace (clear everything, then load this file).
  const commitItems = async (arr) => {
    if (mode === "replace"){
      for (const it of items) await dbDel("items", it.id);
      const t0 = now(); const fresh = arr.map((a, i) => ({ ...a, rate: num(a.rate), id: uid() + "-" + i, updatedAt: t0 }));
      for (const r of fresh) await dbPut("items", r);
      setItems(fresh);
      return { created: fresh.length, updated: 0, total: fresh.length, replaced: true };
    }
    return await bulkUpsertItems(arr);
  };
  const importMsg = (res) => res.replaced ? ("Price list replaced — " + res.total + " items") : (res.updated ? (res.created + " added · " + res.updated + " updated") : (res.created + " items imported"));
  const [map, setMap] = useState({ code: "", description: "", category: "", type: "", unit: "", rate: "", supplier: "" });
  const [defaultType, setDefaultType] = useState("Material");
  const [busy, setBusy] = useState(false);
  const [preset, setPreset] = useState(null);      // derived items when a known template (e.g. ProEst/Forma) is detected

  useEffect(() => { if (!open) { setRows(null); setHeaders([]); setPreset(null); setMode("merge"); setFileName(""); } }, [open]);

  // Detect + parse a ProEst / Autodesk Forma "Line item Library Import" export.
  // Header sits ~row 26, real data below it, and each row can carry material,
  // labour and subcontract costs across separate columns — so we derive one
  // rate + cost type per line rather than asking the user to map columns.
  const parseProEst = (aoa) => {
    const hdr = aoa.findIndex(r => r.some(c => /line item name/i.test(String(c))));
    if (hdr === -1) return null;
    const H = aoa[hdr].map(c => String(c).toLowerCase());
    const col = (...keys) => H.findIndex(h => keys.some(k => h.includes(k)));
    const cA = col("line item name"), cU = col("unit of measure"), cM = col("material cost"),
          cLd = col("labor description", "labour description"), cLp = col("labor productivity", "labour productivity"),
          cEd = col("equipment description"), cSub = col("subcontractor"), cCrew = col("crew");
    const out = [];
    for (let i = hdr + 1; i < aoa.length; i++){
      const row = aoa[i];
      const rawName = String(row[cA] || "").trim();
      if (!rawName || /example/i.test(rawName)) continue;
      const m = rawName.match(/^(\d[\d.]*\d|\d+)\s+([\s\S]*)$/);
      const code = m ? m[1] : "";
      const description = (m ? m[2] : rawName).trim();
      if (!description) continue;
      const unit = String(row[cU] || "").trim().toLowerCase() || "ea";
      const matCost = cM  >= 0 ? num(row[cM])  : 0;
      const sub     = cSub>= 0 ? num(row[cSub]): 0;
      const labDesc = cLd >= 0 ? String(row[cLd] || "").trim() : "";
      const labProd = cLp >= 0 ? num(row[cLp]) : 0;
      const equipDesc = cEd >= 0 ? String(row[cEd] || "").trim() : "";
      const crew = cCrew >= 0 ? String(row[cCrew] || "").trim() : "";
      let type = "Material", rate = 0;
      if (matCost > 0)      { type = "Material"; rate = matCost; }
      else if (sub > 0)     { type = "Subcontractor"; rate = sub; }
      else if (labDesc)     { type = "Labour"; }
      else if (equipDesc)   { type = "Equipment"; }
      const notes = [];
      if (labDesc)   notes.push("Labour: " + labDesc + (labProd ? " · " + labProd + " /hr" : ""));
      if (equipDesc) notes.push("Plant: " + equipDesc);
      if (crew && !/^0$/.test(crew)) notes.push("Crew: " + crew);
      out.push({ code, description, category: "", type, unit, rate: round2(rate), supplier: "", notes: notes.join(" · ") });
    }
    return out.length ? out : null;
  };

  const guess = (hs) => {
    const find = (...keys) => { const i = hs.findIndex(h => keys.some(k => String(h).toLowerCase().replace(/[^a-z0-9]/g, "").includes(k))); return i === -1 ? "" : String(i); };
    return { code: find("code", "sku", "itemno", "ref"), description: find("desc", "item", "name", "product"), category: find("categ", "group", "trade", "classific"), type: find("costtype", "type", "kind"), unit: find("unit", "uom", "measure"), rate: find("rateexgst", "rate", "unitcost", "unitprice", "sell", "price", "amount", "hourly"), supplier: find("supplier", "vendor", "brand") };
  };
  const normType = (v) => { const s = String(v || "").toLowerCase(); return COST_TYPES.find(t => s.includes(t.toLowerCase())) || (/labou?r|hour|wage/.test(s) ? "Labour" : /equip|plant|machine/.test(s) ? "Equipment" : /crew|gang/.test(s) ? "Crew" : /sub|contractor/.test(s) ? "Subcontractor" : ""); };

  const onFile = (e) => {
    const file = e.target.files[0]; if (!file) return;
    setFileName(file.name);
    const r = new FileReader();
    r.onload = () => {
      try {
        const wb = XLSX.read(new Uint8Array(r.result), { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" }).filter(row => row.some(c => String(c).trim() !== ""));
        if (aoa.length < 2) { alert("No data rows found."); return; }
        const pe = parseProEst(aoa);
        if (pe) { setPreset(pe); return; }   // recognised ProEst / Forma export — no manual mapping needed
        const hs = aoa[0].map(h => String(h).trim());
        setHeaders(hs); setRows(aoa.slice(1)); setMap(guess(hs));
      } catch (err) { alert("Could not read file. Use .xlsx or .csv."); }
    };
    r.readAsArrayBuffer(file);
  };

  const doImport = async () => {
    if (map.description === "") { alert("Map at least the Description column."); return; }
    setBusy(true);
    const g = (row, key) => map[key] === "" ? "" : row[parseInt(map[key])];
    const mapped = rows.map(row => ({
      code: String(g(row, "code") || "").trim(),
      description: String(g(row, "description") || "").trim(),
      category: String(g(row, "category") || "").trim(),
      type: (map.type !== "" && normType(g(row, "type"))) || defaultType,
      unit: String(g(row, "unit") || "ea").trim() || "ea",
      rate: num(g(row, "rate")),
      supplier: String(g(row, "supplier") || "").trim()
    })).filter(it => it.description);
    const res = await commitItems(mapped);
    stampImport();
    setBusy(false);
    notify(importMsg(res));
    onClose();
  };

  const template = () => {
    const ws = XLSX.utils.aoa_to_sheet([["Code", "Description", "Category", "Unit", "Rate (ex GST)", "Supplier"], ["DEMO-01", "Example item — 90x45 MGP10 pine", "Framing", "lm", 4.85, "Local Supplier"]]);
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Cost Register"); XLSX.writeFile(wb, "RJG-cost-register-template.xlsx");
  };

  const doImportPreset = async () => {
    setBusy(true);
    const res = await commitItems(preset);
    stampImport();
    setBusy(false);
    notify(importMsg(res));
    onClose();
  };

  const fields = [["code", "Code"], ["description", "Description *"], ["category", "Category"], ["type", "Cost type (optional)"], ["unit", "Unit"], ["rate", "Rate (ex GST)"], ["supplier", "Supplier"]];

  const presetBreak = preset ? COST_TYPES.map(t => [t, preset.filter(p => p.type === t).length]).filter(([, n]) => n > 0) : [];
  const presetPriced = preset ? preset.filter(p => p.rate > 0).length : 0;
  const modeChooser = (
    <div className="rounded-lg p-2.5 text-xs" style={{ border: "1px solid var(--line)" }}>
      <div className="font-semibold mb-1.5">How to apply this import{items.length ? " — you currently have " + items.length + " items" : ""}</div>
      <div className="flex gap-2">
        <button className={"tab flex-1 " + (mode === "merge" ? "tab-active" : "card")} onClick={() => setMode("merge")}>Merge — update &amp; add</button>
        <button className={"tab flex-1 " + (mode === "replace" ? "tab-active" : "card")} onClick={() => setMode("replace")}>Replace — exactly this file</button>
      </div>
      <div className="mt-1.5" style={{ color: mode === "replace" ? "#b45309" : "var(--muted)" }}>{mode === "replace" ? "Clears your current price list first — any item not in this file will be removed." : "Updates matching items by code and adds new ones; everything else is kept."}</div>
    </div>
  );

  return (
    <Modal open={open} onClose={onClose} title="Import cost register" wide>
      {preset ? (
        <div className="space-y-4">
          <div className="rounded-lg p-3 text-sm" style={{ background: "rgba(2,34,75,.06)", border: "1px solid var(--line)" }}>
            <div className="font-semibold brand-text">ProEst / Forma library detected</div>
            <div style={{ color: "var(--muted)" }}>Columns mapped automatically — no manual step needed.</div>
          </div>
          <div className="text-sm font-semibold">{preset.length} line items ready · {presetPriced} with a rate</div>
          <div className="flex flex-wrap gap-2">
            {presetBreak.map(([t, n]) => <span key={t} className="chip">{t}: {n}</span>)}
          </div>
          <div className="card p-3 text-xs overflow-x-auto" style={{ background: "var(--bg)" }}>
            <div className="font-semibold mb-1">Preview (first 6)</div>
            {preset.slice(0, 6).map((it, i) => (
              <div key={i} className="whitespace-nowrap">{it.code ? it.code + " · " : ""}{it.description} — <b>{it.type}</b> · {it.unit}{it.rate > 0 ? " · " + money(it.rate) : " · (no $ in file)"}</div>
            ))}
          </div>
          <p className="text-xs" style={{ color: "var(--muted)" }}>Rates come from the file's Material or Subcontractor columns (ex GST). Labour/Plant rows carry the trade + productivity in Notes; add their $ rate later or import your Labor/Equipment library files.</p>
          {modeChooser}
          <div className="flex gap-2">
            <button className="btn btn-ghost flex-1" onClick={() => setPreset(null)}>Back</button>
            <button className="btn btn-primary flex-1" disabled={busy} onClick={doImportPreset}><IcCheck size={16} /> {mode === "replace" ? "Replace with" : "Import"} {preset.length} items</button>
          </div>
        </div>
      ) : !rows ? (
        <div className="space-y-4">
          <p className="text-sm" style={{ color: "var(--muted)" }}>Upload your cost register as <b>.xlsx</b> or <b>.csv</b>. A <b>ProEst / Forma</b> library export is recognised automatically; for any other file the first row should be column headers and you'll map columns on the next step.</p>

/* =========================================================================
   TAKEOFF CANVAS (PDF / photo measure + markup)
   ========================================================================= */
const MEASURE_TOOLS = ["length", "area", "count"];
const TOOL_LABELS = { pan: "Pan / zoom", edit: "Adjust points", calibrate: "Set scale", length: "Length", area: "Area", count: "Count", pen: "Draw", arrow: "Arrow", rect: "Box", text: "Text" };
const MARKUP_COLORS = ["#e11d48", "#2563eb", "#16a34a", "#ea580c", "#eab308", "#111827", "#ffffff"];

function TakeoffCanvas({ drawing, onChange, onAddToQuote, priced = true }){
  const { items, notify } = useStore();
  const wrapRef = useRef(null);
  const canvasRef = useRef(null);
  const imgRef = useRef(null);
  const [tool, setTool] = useState("pan");
  const [zoom, setZoom] = useState(1);
  const gPointers = useRef(new Map());   // active pointers for pinch / pan gestures
  const pinch = useRef(null);
  const panRef = useRef(null);
  const [color, setColor] = useState("#e11d48");
  const [areaMode, setAreaMode] = useState("polygon");   // polygon | box | circle
  const [draft, setDraft] = useState(null); // {tool, points:[]}
  const [wrapW, setWrapW] = useState(360);
  const [editDrag, setEditDrag] = useState(null); // {kind:'scale'|'ann', key/id, idx}
  const [, force] = useState(0);

  const anns = drawing.annotations || [];
  const scaleLine = drawing.scaleLine || null;   // { a, b, real } — keep the calibration line so it can be re-adjusted
  const mpp = scaleLine ? (scaleLine.real / (dist(scaleLine.a, scaleLine.b) || 1)) : (drawing.scaleMpp || null);

  // load bg image
  useEffect(() => {
    if (!drawing.bg) return;
    const im = new Image();
    im.onload = () => { imgRef.current = im; force(x => x + 1); };
    im.src = drawing.bg;
  }, [drawing.bg]);

  useEffect(() => {
    const measure = () => { if (wrapRef.current) setWrapW(wrapRef.current.clientWidth); };
    measure(); window.addEventListener("resize", measure); return () => window.removeEventListener("resize", measure);
  }, []);

  // Mouse-wheel / trackpad zoom that keeps the point under the cursor fixed.
  const zoomAnchor = useRef(null);
  useEffect(() => {
    const wrap = wrapRef.current; if (!wrap) return;
    const onWheel = (e) => {
      e.preventDefault();
      const rect = wrap.getBoundingClientRect();
      const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
      const cw = wrap.scrollWidth || 1, ch = wrap.scrollHeight || 1;
      const fx = (wrap.scrollLeft + sx) / cw, fy = (wrap.scrollTop + sy) / ch;   // content fraction under cursor
      zoomAnchor.current = { fx, fy, sx, sy };
      setZoom(z => clamp(z * (e.deltaY < 0 ? 1.12 : 1/1.12), 0.5, 16));
    };
    wrap.addEventListener("wheel", onWheel, { passive: false });
    return () => wrap.removeEventListener("wheel", onWheel);
  }, []);
  useLayoutEffect(() => {
    const wrap = wrapRef.current, a = zoomAnchor.current; if (!wrap || !a) return;
    wrap.scrollLeft = a.fx * wrap.scrollWidth - a.sx;
    wrap.scrollTop = a.fy * wrap.scrollHeight - a.sy;
    zoomAnchor.current = null;
  }, [zoom]);

  const natW = drawing.natW || 1000, natH = drawing.natH || 700;
  const baseScale = wrapW / natW;              // fit width
  const displayScale = baseScale * zoom;       // image-space px -> screen px
  const cssW = natW * displayScale, cssH = natH * displayScale;

  const measureVal = (a) => {
    if (!mpp) return null;
    if (a.tool === "length" || a.tool === "arrow") return perimeter(a.points, false) * mpp;
    if (a.tool === "area") return shoelace(a.points) * mpp * mpp;
    if (a.tool === "count") return a.points.length;
    return null;
  };
  const valLabel = (a) => {
    const v = measureVal(a); if (v === null) return "";
    if (a.tool === "area") return round2(v).toFixed(2) + " m²";
    if (a.tool === "count") return v + " no.";
    return round2(v).toFixed(2) + " m";
  };

  const measIds = anns.filter(x => MEASURE_TOOLS.includes(x.tool)).map(x => x.id);
  // draw one annotation. S = image→canvas scale for point positions; k = stroke/font
  // scale so lines stay a constant screen size live and scale up in the snapshot.
  const drawOne = (ctx, a, S, isDraft, k) => {
    ctx.save();
    ctx.lineWidth = 2.2*k; ctx.strokeStyle = a.color || color; ctx.fillStyle = a.color || color;
    ctx.font = "600 " + (13*k) + "px system-ui"; ctx.textAlign = "center";
    const P = a.points.map(p => ({ x: p.x * S, y: p.y * S }));
    if (a.tool === "count") {
      P.forEach((p, i) => { ctx.beginPath(); ctx.arc(p.x, p.y, 8*k, 0, 7); ctx.fill(); ctx.fillStyle = "#fff"; ctx.fillText(i + 1, p.x, p.y + 4*k); ctx.fillStyle = a.color || color; });
    } else if (a.tool === "text") {
      ctx.textAlign = "left"; ctx.font = "700 " + (15*k) + "px system-ui"; if (P[0]) ctx.fillText(a.text || "Text", P[0].x, P[0].y);
    } else if (a.tool === "rect" && P.length >= 2) {
      ctx.strokeRect(P[0].x, P[0].y, P[1].x - P[0].x, P[1].y - P[0].y);
    } else if (a.tool === "area") {
      ctx.beginPath(); P.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y)); if (!isDraft) ctx.closePath();
      ctx.globalAlpha = 0.16; ctx.fill(); ctx.globalAlpha = 1; ctx.stroke();
      P.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 3.5*k, 0, 7); ctx.fill(); });
    } else {
      ctx.beginPath(); P.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y)); ctx.stroke();
      P.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 3.5*k, 0, 7); ctx.fill(); });
      if (a.tool === "arrow" && P.length >= 2) {
        const p2 = P[P.length - 1], p1 = P[P.length - 2], ang = Math.atan2(p2.y - p1.y, p2.x - p1.x);
        ctx.beginPath(); ctx.moveTo(p2.x, p2.y); ctx.lineTo(p2.x - 12*k * Math.cos(ang - .4), p2.y - 12*k * Math.sin(ang - .4)); ctx.moveTo(p2.x, p2.y); ctx.lineTo(p2.x - 12*k * Math.cos(ang + .4), p2.y - 12*k * Math.sin(ang + .4)); ctx.stroke();
      }
    }
    if (!isDraft && MEASURE_TOOLS.includes(a.tool) && mpp) {
      const c = a.tool === "count" ? P[0] : centroid(P);
      const no = measIds.indexOf(a.id) + 1;
      if (c) {
        const t = (a.name ? a.name + " · " : "") + valLabel(a);
        ctx.font = "700 " + (12*k) + "px system-ui"; ctx.textAlign = "left";
        const tw = ctx.measureText(t).width, badge = 20*k, pad = 6*k, w = badge + pad + tw + 8*k, bx = c.x - w/2, by = c.y - 24*k;
        ctx.fillStyle = "rgba(17,24,39,.85)"; ctx.fillRect(bx, by, w, 20*k);
        ctx.fillStyle = a.color || color; ctx.beginPath(); ctx.arc(bx + 10*k, by + 10*k, 8*k, 0, 7); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.fillText(no, bx + 10*k, by + 14*k);
        ctx.textAlign = "left"; ctx.fillText(t, bx + badge + pad, by + 14*k);
      }
    }
    ctx.restore();
  };
  const drawScale = (ctx, S, k) => {
    if (!scaleLine) return; const a = { x: scaleLine.a.x*S, y: scaleLine.a.y*S }, b = { x: scaleLine.b.x*S, y: scaleLine.b.y*S };
    ctx.save(); ctx.strokeStyle = "#0ea5b7"; ctx.fillStyle = "#0ea5b7"; ctx.lineWidth = 2*k; ctx.setLineDash([6*k,4*k]);
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); ctx.setLineDash([]);
    [a,b].forEach(p => { ctx.beginPath(); ctx.arc(p.x,p.y,4*k,0,7); ctx.fill(); });
    const m = { x: (a.x+b.x)/2, y: (a.y+b.y)/2 }, t = "scale " + round2(scaleLine.real) + " m";
    ctx.font = "700 " + (12*k) + "px system-ui"; ctx.textAlign = "center"; const tw = ctx.measureText(t).width;
    ctx.fillStyle = "rgba(14,165,183,.9)"; ctx.fillRect(m.x-tw/2-4*k, m.y-20*k, tw+8*k, 16*k); ctx.fillStyle = "#fff"; ctx.fillText(t, m.x, m.y-8*k);
    ctx.restore();
  };
  // full paint used by both the live canvas and the offscreen snapshot
  const paint = (ctx, S, k, live) => {
    if (imgRef.current) ctx.drawImage(imgRef.current, 0, 0, natW*S, natH*S);
    else { ctx.fillStyle = "#eef1f5"; ctx.fillRect(0, 0, natW*S, natH*S); }
    drawScale(ctx, S, k);
    anns.forEach(a => drawOne(ctx, a, S, false, k));
    if (live && draft) drawOne(ctx, draft, S, true, k);
    if (live && tool === "edit"){
      ctx.save(); ctx.fillStyle = "#fff"; ctx.lineWidth = 2;
      const dot = (p) => { ctx.beginPath(); ctx.arc(p.x*S, p.y*S, 7, 0, 7); ctx.fill(); ctx.stroke(); };
      if (scaleLine){ ctx.strokeStyle = "#0ea5b7"; dot(scaleLine.a); dot(scaleLine.b); }
      ctx.strokeStyle = "#e8792b"; anns.forEach(a => a.points.forEach(dot));
      ctx.restore();
    }
  };
  // draw the live canvas (strokes stay constant screen size → k = 1, points scaled by displayScale)
  useEffect(() => {
    const cv = canvasRef.current; if (!cv) return;
    const dpr = window.devicePixelRatio || 1;
    cv.width = Math.max(1, cssW * dpr); cv.height = Math.max(1, cssH * dpr);
    cv.style.width = cssW + "px"; cv.style.height = cssH + "px";
    const ctx = cv.getContext("2d"); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, cssW, cssH);
    paint(ctx, displayScale, 1, true);
  }, [anns, draft, scaleLine, editDrag, tool, cssW, cssH, displayScale, mpp, color]);

  // keep a full-resolution marked-up snapshot so the quote/report always show the takeoff lines
  const snapKey = JSON.stringify({ a: anns.map(x => [x.tool, x.name, x.color, x.points]), s: scaleLine });
  const lastSnap = useRef("");
  useEffect(() => {
    if (!imgRef.current || !anns.length) return;
    if (lastSnap.current === snapKey) return;
    const id = setTimeout(() => {
      try {
        const oc = document.createElement("canvas"); oc.width = natW; oc.height = natH;
        const octx = oc.getContext("2d"); paint(octx, 1, Math.max(1.6, natW/700), false);
        lastSnap.current = snapKey;
        onChange({ ...drawing, snapshot: oc.toDataURL("image/jpeg", 0.85) });
      } catch(e){}
    }, 700);
    return () => clearTimeout(id);
  }, [snapKey]);

  const toImg = (e) => { const r = canvasRef.current.getBoundingClientRect(); return { x: (e.clientX - r.left) / displayScale, y: (e.clientY - r.top) / displayScale }; };

  const commit = (d) => {
    if (d.tool === "calibrate") {
      const px = dist(d.points[0], d.points[1]);
      const real = parseFloat(prompt("Real length of the line you drew, in metres:", scaleLine ? String(scaleLine.real) : "1"));
      if (real && px > 0) { onChange({ ...drawing, scaleLine: { a: d.points[0], b: d.points[1], real }, scaleMpp: real / px }); }
      setDraft(null); return;
    }
    const ann = { id: uid(), tool: d.tool, points: d.points, color };
    if (d.tool === "text") { const t = prompt("Text:", ""); if (!t) { setDraft(null); return; } ann.text = t; }
    onChange({ ...drawing, annotations: [...anns, ann] });
    setDraft(null);
  };

  // shared pinch-zoom + two-finger / pan-tool panning (fingers, pencil or mouse)
  const startPinch = () => {
    const wrap = wrapRef.current, pts = [...gPointers.current.values()], rect = wrap.getBoundingClientRect();
    const mx = (pts[0].x + pts[1].x)/2 - rect.left, my = (pts[0].y + pts[1].y)/2 - rect.top;
    pinch.current = { d0: Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y) || 1, z0: zoom, fx: (wrap.scrollLeft + mx)/(wrap.scrollWidth || 1), fy: (wrap.scrollTop + my)/(wrap.scrollHeight || 1) };
    panRef.current = null; setDraft(null);
  };
  const onDown = (e) => {
    gPointers.current.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (gPointers.current.size >= 2) { startPinch(); return; }
    if (tool === "pan") { const wrap = wrapRef.current; panRef.current = { x: e.clientX, y: e.clientY, sl: wrap.scrollLeft, st: wrap.scrollTop }; return; }
    e.preventDefault();
    const p = toImg(e);
    if (tool === "edit") {   // grab the nearest scale endpoint or annotation vertex
      const thr = 14 / displayScale;
      if (scaleLine){ if (dist(p, scaleLine.a) < thr){ setEditDrag({ kind: "scale", key: "a" }); return; } if (dist(p, scaleLine.b) < thr){ setEditDrag({ kind: "scale", key: "b" }); return; } }
      for (let i = anns.length - 1; i >= 0; i--){ const a = anns[i]; for (let j = 0; j < a.points.length; j++){ if (dist(p, a.points[j]) < thr){ setEditDrag({ kind: "ann", id: a.id, idx: j }); return; } } }
      return;
    }
    const twoPt = ["calibrate", "length", "arrow", "rect"].includes(tool);
    const multi = ["area", "pen"].includes(tool);
    if (tool === "count") {
      setDraft(d => d && d.tool === "count" ? { ...d, points: [...d.points, p] } : { tool: "count", points: [p] });

    if (tool === "text") { commit({ tool: "text", points: [p] }); return; }

        return null;
      });

    if (multi) { setDraft(d => d && d.tool === tool ? { ...d, points: [...d.points, p] } : { tool, points: [p] }); return; }

    if (editDrag) {
      const p = toImg(e);
      if (editDrag.kind === "scale"){ onChange({ ...drawing, scaleLine: { ...scaleLine, [editDrag.key]: p } }); return; }
      onChange({ ...drawing, annotations: anns.map(a => a.id === editDrag.id ? { ...a, points: a.points.map((pt, k) => k === editDrag.idx ? p : pt) } : a) });

  const renameAnn = (id, name) => onChange({ ...drawing, annotations: anns.map(a => a.id === id ? { ...a, name } : a) });

  );

  if (s.type === "door"){
    ctx.beginPath(); ctx.moveTo(-half, 0); ctx.lineTo(-half, -6); ctx.moveTo(half, 0); ctx.lineTo(half, -6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-half, 0); ctx.lineTo(-half, -w); ctx.stroke();

    ctx.beginPath(); ctx.moveTo(-half, 0); ctx.lineTo(-half, -6); ctx.moveTo(half, 0); ctx.lineTo(half, -6); ctx.stroke();  // jambs
    ctx.beginPath(); ctx.moveTo(-half, 0); ctx.lineTo(-half, -w/2); ctx.moveTo(half, 0); ctx.lineTo(half, -w/2); ctx.stroke();  // two leaves
    ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(-half, 0, w/2, -Math.PI/2, 0); ctx.stroke(); ctx.beginPath(); ctx.arc(half, 0, w/2, -Math.PI, -Math.PI/2); ctx.stroke();

    ctx.lineWidth = 2.4; ctx.beginPath(); ctx.moveTo(-half, -3); ctx.lineTo(half, -3); ctx.moveTo(-half, 3); ctx.lineTo(half, 3); ctx.stroke();  // track
    ctx.lineWidth = 3.4; ctx.beginPath(); ctx.moveTo(-half, 0); ctx.lineTo(2, 0); ctx.stroke(); ctx.beginPath(); ctx.moveTo(-2, 3); ctx.lineTo(half, 3); ctx.stroke();  // overlapping panels

    ctx.lineWidth = 2.6; ctx.beginPath(); ctx.moveTo(-half, -5); ctx.lineTo(-half, 5); ctx.moveTo(half, -5); ctx.lineTo(half, 5); ctx.stroke();   // jambs
    ctx.lineWidth = 1.4; ctx.setLineDash([3,3]); for (let i = -3; i <= 3; i++){ ctx.beginPath(); ctx.moveTo(-half, i*1.6); ctx.lineTo(half, i*1.6); ctx.stroke(); }  // roller slats

    ctx.lineWidth = 2.4;
    ctx.beginPath(); ctx.moveTo(-half, -3); ctx.lineTo(half, -3); ctx.moveTo(-half, 3); ctx.lineTo(half, 3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-half, -6); ctx.lineTo(-half, 6); ctx.moveTo(half, -6); ctx.lineTo(half, 6); ctx.stroke();

  } else if (s.type === "bench"){

    ctx.lineWidth = 3.2; ctx.beginPath(); ctx.moveTo(-half, -hh); ctx.lineTo(half, -hh); ctx.stroke();  // backrest
    ctx.lineWidth = 1; const nb = Math.max(3, Math.round(w / 11)); for (let i = 1; i < nb; i++){ const x = -half + w*i/nb; ctx.beginPath(); ctx.moveTo(x, -hh + 4); ctx.lineTo(x, hh - 1); ctx.stroke(); }
  } else if (s.type === "kitchen"){

    ctx.lineWidth = 1; ctx.strokeStyle = "#9aa3b2"; const cells = Math.max(1, Math.round(w / Math.max(24, h*0.9)));

  } else if (s.type === "island"){
    ctx.fillStyle = "rgba(2,34,75,.05)"; ctx.lineWidth = 2.6; rrect(ctx, -half, -hh, w, h, 3); ctx.fill(); ctx.stroke();          // benchtop
    ctx.lineWidth = 1.4; ctx.strokeStyle = "#9aa3b2"; rrect(ctx, -half + 5, -hh + 5, w - 10, h - 10, 2); ctx.stroke();            // cabinet inset
  } else if (s.type === "car"){
    const bl = brand;
    ctx.fillStyle = "rgba(2,34,75,.05)"; ctx.strokeStyle = bl; ctx.lineWidth = 2.6;
    rrect(ctx, -half, -hh, w, h, hh*0.42); ctx.fill(); ctx.stroke();                          // body
    ctx.lineWidth = 1.7; rrect(ctx, -w*0.16, -h*0.34, w*0.44, h*0.68, hh*0.22); ctx.stroke();  // cabin
    ctx.beginPath(); ctx.moveTo(w*0.28, -h*0.30); ctx.lineTo(w*0.40, -h*0.16); ctx.moveTo(w*0.28, h*0.30); ctx.lineTo(w*0.40, h*0.16); ctx.stroke(); // windscreen
    ctx.beginPath(); ctx.moveTo(-w*0.20, -h*0.30); ctx.lineTo(-w*0.30, -h*0.15); ctx.moveTo(-w*0.20, h*0.30); ctx.lineTo(-w*0.30, h*0.15); ctx.stroke(); // rear window
    ctx.fillStyle = bl; const ww = w*0.12, wh = Math.max(3, h*0.16);                            // wheels

  } else if (s.type === "tree"){
    ctx.fillStyle = "rgba(34,139,60,.20)"; ctx.strokeStyle = "#228b3c"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, half, 0, 7); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#7a5230"; ctx.beginPath(); ctx.arc(0, 0, Math.max(3, w*0.08), 0, 7); ctx.fill();
  } else if (s.type === "fence" || s.type === "fence_black" || s.type === "fence_glass"){
    const col = s.type === "fence_black" ? "#2a2f36" : s.type === "fence_glass" ? "#5fa9d6" : brand;
    ctx.strokeStyle = col; ctx.fillStyle = col;
    if (s.type === "fence_glass"){ ctx.globalAlpha = 0.5; ctx.fillRect(-half, -3, w, 6); ctx.globalAlpha = 1; ctx.lineWidth = 2; ctx.strokeRect(-half, -3, w, 6); }

      const n = Math.max(2, Math.round(w / 14)); for (let i = 0; i <= n; i++){ const x = -half + (w * i / n); ctx.beginPath(); ctx.moveTo(x, -5); ctx.lineTo(x, 5); ctx.stroke(); } }
  } else if (s.type === "gate" || s.type === "gate_black" || s.type === "gate_glass"){
    const col = GATE_COLORS[s.type] || brand; ctx.strokeStyle = col; ctx.fillStyle = col;
    ctx.lineWidth = 3.4; ctx.beginPath(); ctx.moveTo(-half, -6); ctx.lineTo(-half, 6); ctx.moveTo(half, -6); ctx.lineTo(half, 6); ctx.stroke();  // gate posts
    ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(-half, 0); ctx.lineTo(-half, -w); ctx.stroke();                                                 // gate leaf (open)
    ctx.lineWidth = 1.4; ctx.beginPath(); ctx.arc(-half, 0, w, -Math.PI/2, 0); ctx.stroke();                                                       // swing arc
  } else if (s.type === "pool"){
    ctx.fillStyle = "rgba(56,150,220,.25)"; ctx.strokeStyle = "#2f6fb0"; ctx.lineWidth = 3; rrect(ctx, -half, -hh, w, h, Math.min(w,h)*0.28); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#2f6fb0"; ctx.font = "600 11px system-ui"; ctx.textAlign = "center"; ctx.fillText("POOL", 0, 4);
  } else if (s.type === "chair"){
    ctx.lineWidth = 2.2; rrect(ctx, -half, -hh, w, h, 3); ctx.stroke(); ctx.beginPath(); ctx.moveTo(-half, -hh); ctx.lineTo(half, -hh); ctx.stroke();
  } else if (s.type === "bed"){
    ctx.lineWidth = 2.5; rrect(ctx, -half, -hh, w, h, 4); ctx.stroke();
    ctx.lineWidth = 1.6; ctx.beginPath(); ctx.moveTo(-half, -hh + h*0.28); ctx.lineTo(half, -hh + h*0.28); ctx.stroke();       // pillow line
    rrect(ctx, -half + w*0.12, -hh + h*0.05, w*0.34, h*0.16, 3); ctx.stroke(); rrect(ctx, half - w*0.46, -hh + h*0.05, w*0.34, h*0.16, 3); ctx.stroke();
  } else if (s.type === "sink"){
    ctx.lineWidth = 2.2; rrect(ctx, -half, -hh, w, h, 4); ctx.stroke(); ctx.beginPath(); ctx.arc(0, h*0.05, Math.max(2, w*0.18), 0, 7); ctx.stroke(); ctx.beginPath(); ctx.arc(0, -hh*0.6, Math.max(1.5, w*0.06), 0, 7); ctx.stroke();
  } else if (s.type === "toilet"){
    ctx.lineWidth = 2.2; rrect(ctx, -half*0.84, -hh, w*0.84, h*0.28, 3); ctx.stroke();                                        // cistern

  } else if (s.type === "shower"){
    ctx.fillStyle = "rgba(95,169,214,.15)"; ctx.lineWidth = 2.4; rrect(ctx, -half, -hh, w, h, 3); ctx.fill(); ctx.stroke();   // tray
    ctx.lineWidth = 1.4; ctx.beginPath(); ctx.moveTo(-half, -hh); ctx.lineTo(half, hh); ctx.moveTo(half, -hh); ctx.lineTo(-half, hh); ctx.stroke();  // glass cross

  } else if (s.type === "bath"){
    ctx.lineWidth = 2.5; rrect(ctx, -half, -hh, w, h, hh*0.4); ctx.stroke();                                                  // outer
    ctx.lineWidth = 1.6; rrect(ctx, -half + w*0.06, -hh + h*0.14, w*0.72, h*0.72, hh*0.35); ctx.stroke();                     // inner tub
    ctx.beginPath(); ctx.arc(half - w*0.12, 0, Math.max(1.5, w*0.04), 0, 7); ctx.stroke();                                    // plug
  } else if (s.type === "bush"){
    ctx.fillStyle = "rgba(76,164,89,.30)"; ctx.strokeStyle = "#3c8f4a"; ctx.lineWidth = 1.8;
    [[0,0,half*0.66],[-half*0.5,half*0.22,half*0.5],[half*0.5,half*0.22,half*0.5],[0,-half*0.45,half*0.5]].forEach(([bx,by,br]) => { ctx.beginPath(); ctx.arc(bx,by,br,0,7); ctx.fill(); ctx.stroke(); });
  } else if (s.type === "gazebo"){
    ctx.fillStyle = "rgba(2,34,75,.05)"; ctx.lineWidth = 2.6; rrect(ctx, -half, -hh, w, h, 4); ctx.fill(); ctx.stroke();       // footprint
    ctx.lineWidth = 1.6; ctx.strokeStyle = brand; const grf = s.roof || "hip";
    if (grf === "gable"){ ctx.beginPath(); ctx.moveTo(-half, 0); ctx.lineTo(half, 0); ctx.stroke(); }                          // ridge along long axis
    else if (grf === "skillion"){ ctx.beginPath(); ctx.moveTo(-half, -hh*0.5); ctx.lineTo(half, -hh*0.5); ctx.stroke(); }
    else if (grf === "hip"){ ctx.beginPath(); ctx.moveTo(-half,-hh); ctx.lineTo(half,hh); ctx.moveTo(half,-hh); ctx.lineTo(-half,hh); ctx.stroke(); }  // hip lines to ridge
    ctx.fillStyle = brand; [[-half,-hh],[half,-hh],[half,hh],[-half,hh]].forEach(([px,py]) => { ctx.beginPath(); ctx.arc(px,py,4,0,7); ctx.fill(); });   // posts
  } else if (s.type === "shed"){
    ctx.fillStyle = "rgba(2,34,75,.06)"; ctx.lineWidth = 2.8; rrect(ctx, -half, -hh, w, h, 2); ctx.fill(); ctx.stroke();       // footprint
    ctx.lineWidth = 1.4; ctx.strokeStyle = "#9aa3b2"; const srf = s.roof || "gable";

    } else if (s.type === "downlight"){                                  // filled dot in a ring

    } else if (s.type === "pendant"){                                    // ceiling rose + drop + shade
      ctx.beginPath(); ctx.arc(0, -r*0.6, r*0.28, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.moveTo(0, -r*0.6); ctx.lineTo(0, r*0.1); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, r*0.4, r*0.6, Math.PI, 0); ctx.stroke();
    } else if (s.type === "fan"){                                        // ceiling fan: hub + 4 blades
      ctx.beginPath(); ctx.arc(0, 0, r*0.16, 0, 7); ctx.fill();
      for (let i = 0; i < 4; i++){ ctx.save(); ctx.rotate(i * Math.PI/2); ctx.lineWidth = lw; ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(r*0.55, -r*0.28, r, -r*0.05); ctx.stroke(); ctx.restore(); }
    } else if (s.type === "exhaust"){                                    // fan in a box
      ctx.strokeRect(-r, -r, r*2, r*2);
      ctx.beginPath(); ctx.arc(0, 0, r*0.2, 0, 7); ctx.fill();
      for (let i = 0; i < 4; i++){ ctx.save(); ctx.rotate(i * Math.PI/2); ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(r*0.5, -r*0.3, r*0.85, 0); ctx.stroke(); ctx.restore(); }
    } else if (s.type === "aircon"){                                     // wall split head: rounded box + louvres
      ctx.fillStyle = "rgba(2,34,75,.05)"; rrect(ctx, -half, -hh, w, h, Math.min(hh, 4)); ctx.fill(); ctx.stroke();
      ctx.fillStyle = brand; ctx.lineWidth = Math.max(1, lw*0.7);
      const nb = Math.max(3, Math.round(w/9)); for (let i = 1; i < nb; i++){ const x = -half + w*i/nb; ctx.beginPath(); ctx.moveTo(x, -hh*0.4); ctx.lineTo(x, hh*0.4); ctx.stroke(); }
      ctx.font = "700 " + Math.max(6, Math.round(h*0.5)) + "px system-ui"; ctx.fillText("A/C", 0, -hh - h*0.35);
    } else if (s.type === "gpo"){                                        // power point: half-disc + two contacts
      ctx.beginPath(); ctx.arc(0, 0, r, Math.PI, 0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-r, 0); ctx.lineTo(r, 0); ctx.stroke();
      ctx.lineWidth = Math.max(1, lw*0.8); ctx.beginPath(); ctx.moveTo(-r*0.35, 0); ctx.lineTo(-r*0.35, -r*0.5); ctx.moveTo(r*0.35, 0); ctx.lineTo(r*0.35, -r*0.5); ctx.stroke();
    } else if (s.type === "switch"){                                     // light switch: dot + lever
      ctx.beginPath(); ctx.arc(0, 0, r*0.32, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(r*0.9, -r*0.9); ctx.stroke();
      ctx.beginPath(); ctx.arc(r*0.9, -r*0.9, r*0.18, 0, 7); ctx.stroke();
    } else if (s.type === "smoke"){                                      // smoke alarm: circle + SD
      ctx.beginPath(); ctx.arc(0, 0, r, 0, 7); ctx.stroke();
      ctx.font = "700 " + Math.max(6, Math.round(r*0.8)) + "px system-ui"; ctx.fillText("SD", 0, 0);
    } else if (s.type === "hws"){                                        // hot water unit: rounded box + HWS
      ctx.fillStyle = "rgba(2,34,75,.05)"; rrect(ctx, -half, -hh, w, h, Math.min(w,h)*0.2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = brand; ctx.font = "700 " + Math.max(6, Math.round(r*0.55)) + "px system-ui"; ctx.fillText("HWS", 0, 0);
    }
  }
  ctx.restore();
}

/* ---- measurable floor-plan export ---------------------------------------
   Renders the whole plan to an off-screen canvas at a chosen output scale
   (px per metre), draws every room/wall/surface/object/markup with dimension
   labels plus a printed scale bar, then places it on an A3-landscape PDF and
   states the true paper scale (1:N) so the drawing can be measured off. */
function renderPlanExport(plan, brand){
  const mpp = (plan.gridMetres || 0.5) / (plan.gridPx || 28);   // metres per world px
  const rooms = plan.rooms || [], stamps = plan.stamps || [], markups = plan.markups || [];
  // bounds of everything drawn (world px)
  const pts = [];
  rooms.forEach(r => r.points.forEach(p => pts.push(p)));
  stamps.forEach(s => { const e = Math.max(stampW(s), stampD(s)) / 2 + 6; pts.push({ x: s.x - e, y: s.y - e }, { x: s.x + e, y: s.y + e }); });
  markups.forEach(m => { if (m.a) pts.push(m.a); if (m.b) pts.push(m.b); });
  if (!pts.length) return null;
  const minX = Math.min(...pts.map(p => p.x)), maxX = Math.max(...pts.map(p => p.x));
  const minY = Math.min(...pts.map(p => p.y)), maxY = Math.max(...pts.map(p => p.y));
  const wWpx = Math.max(1, maxX - minX), wHpx = Math.max(1, maxY - minY);
  const wM = wWpx * mpp, hM = wHpx * mpp;
  // output px per metre — target the longest side around 2200px for a crisp print
  const sc = clamp(2200 / Math.max(wM, hM), 40, 400);
  const k = mpp * sc;                          // output px per world px
  const padM = 1.2, pad = padM * sc;           // 1.2 m margin for labels + scale bar
  const barM = 0.9 * sc;                       // reserved band under the plan for the scale bar
  const W = Math.round(wWpx * k + pad * 2), H = Math.round(wHpx * k + pad * 2 + barM);
  const cv = document.createElement("canvas"); cv.width = W; cv.height = H;
  const ctx = cv.getContext("2d");
  ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, W, H);
  ctx.save();
  // world → output transform (so drawStamp and world-coord drawing just work)
  ctx.setTransform(k, 0, 0, k, pad - minX * k, pad - minY * k);
  const lw = 1 / k;                            // 1 output px in world units, for crisp hairlines
  // light grid (0.5 m)
  const gm = 0.5 / mpp;                        // grid step in world px
  ctx.lineWidth = lw; ctx.strokeStyle = "#eef1f5";
  for (let gx = Math.floor(minX / gm) * gm; gx <= maxX; gx += gm){ ctx.beginPath(); ctx.moveTo(gx, minY); ctx.lineTo(gx, maxY); ctx.stroke(); }
  for (let gy = Math.floor(minY / gm) * gm; gy <= maxY; gy += gm){ ctx.beginPath(); ctx.moveTo(minX, gy); ctx.lineTo(maxX, gy); ctx.stroke(); }
  const px = (n) => n / k;                      // helper: output px → world units at current transform
  ctx.lineJoin = "round"; ctx.lineCap = "round"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  const label = (x, y, txt, col, sizePx) => { ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0); const ox = (x * k) + (pad - minX * k), oy = (y * k) + (pad - minY * k); ctx.fillStyle = col; ctx.font = "600 " + (sizePx || 13) + "px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(txt, ox, oy); ctx.restore(); };
  const edgeLen = (a, b) => { const L = dist(a, b) * mpp; if (L < 0.05) return; const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2; label(mx, my, L.toFixed(2) + " m", "#5b6472", 12); };
  // surfaces + rooms
  rooms.forEach(r => {
