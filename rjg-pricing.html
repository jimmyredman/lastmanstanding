<script type="text/plain" id="app-source">
const { useState, useMemo, useEffect, useRef, useCallback, createContext, useContext } = React;

/* =========================================================================
   Helpers
   ========================================================================= */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const now = () => Date.now();
const num = (v) => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };
const round2 = (n) => Math.round((n + Number.EPSILON) * 100) / 100;
const money = (n) => "$" + (round2(n)).toLocaleString("en-AU", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDate = (ts) => new Date(ts).toLocaleDateString("en-AU", { day: "2-digit", month: "short", year: "numeric" });
const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
function shoelace(pts){ let s = 0; for (let i = 0; i < pts.length; i++){ const j = (i + 1) % pts.length; s += pts[i].x * pts[j].y - pts[j].x * pts[i].y; } return Math.abs(s) / 2; }
function perimeter(pts, closed){ let s = 0; for (let i = 0; i < pts.length - 1; i++) s += dist(pts[i], pts[i+1]); if (closed && pts.length > 2) s += dist(pts[pts.length-1], pts[0]); return s; }
function centroid(pts){ let x = 0, y = 0; pts.forEach(p => { x += p.x; y += p.y; }); return { x: x / pts.length, y: y / pts.length }; }
function download(filename, blob){ const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = filename; a.click(); setTimeout(() => URL.revokeObjectURL(url), 2000); }

/* =========================================================================
   IndexedDB (offline-first storage)
   ========================================================================= */
const DB_NAME = "rjg_pricing", DB_VER = 1;
function openDb(){
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = () => {
      const db = r.result;
      if (!db.objectStoreNames.contains("items")) db.createObjectStore("items", { keyPath: "id" });
      if (!db.objectStoreNames.contains("projects")) db.createObjectStore("projects", { keyPath: "id" });
      if (!db.objectStoreNames.contains("kv")) db.createObjectStore("kv");
    };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function dbAll(store){ const db = await openDb(); return new Promise((res, rej) => { const r = db.transaction(store).objectStore(store).getAll(); r.onsuccess = () => res(r.result || []); r.onerror = () => rej(r.error); }); }
async function dbPut(store, val, key){ const db = await openDb(); return new Promise((res, rej) => { const t = db.transaction(store, "readwrite"); const os = t.objectStore(store); (key !== undefined ? os.put(val, key) : os.put(val)); t.oncomplete = () => res(); t.onerror = () => rej(t.error); }); }
async function dbGet(store, key){ const db = await openDb(); return new Promise((res, rej) => { const r = db.transaction(store).objectStore(store).get(key); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); }); }
async function dbDel(store, key){ const db = await openDb(); return new Promise((res, rej) => { const t = db.transaction(store, "readwrite"); t.objectStore(store).delete(key); t.oncomplete = () => res(); t.onerror = () => rej(t.error); }); }

/* =========================================================================
   Defaults
   ========================================================================= */
const APP_VERSION = "v18 · 18 Jul 2026";        // shown in Settings so you can confirm the live build
const COST_TYPES = ["Material", "Labour", "Equipment", "Plant", "Crew", "Subcontractor", "Prelim", "Other"];
const DEFAULT_LOGO = "./vendor/rjg-logo.png";   // real RJG logo (white on navy)
const DEFAULT_SETTINGS = {
  company: "RJG Builders",
  abn: "90 643 458 575",
  license: "15209842",
  address: "17 Hugh Ryan Drive, Garbutt, QLD 4814",
  phone: "0408 822 694",
  email: "james@rjgbuilders.com.au",
  website: "www.rjgbuilders.com.au",
  logo: "",               // dataURL override; falls back to DEFAULT_LOGO
  brand: "#02224B",       // RJG corporate blue
  brand2: "#2B5AA0",      // accent tint
  gst: 10,                 // %
  defaultMargin: 20,       // %
  quoteSeq: 1,
  validity: "14 days",
  noticeToStart: "2 weeks minimum",
  paymentTerms: "14 days from invoice",
  terms: "All prices are exclusive of GST unless otherwise stated.\nQuotation based on the scope described above; anything not listed is excluded.\nPrices subject to final site measure and inspection.\nWork carried out in accordance with RJG Builders' IBMS quality and safety systems."
};

/* =========================================================================
   Store (context)
   ========================================================================= */
const Store = createContext(null);
const useStore = () => useContext(Store);

function StoreProvider({ children }){
  const [items, setItems] = useState([]);
  const [projects, setProjects] = useState([]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [ready, setReady] = useState(false);
  const [toast, setToast] = useState(null);

  useEffect(() => {
    (async () => {
      const [it, pr, kv] = await Promise.all([dbAll("items"), dbAll("projects"), dbGet("kv", "settings")]);
      setItems(it);
      setProjects(pr.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0)));
      if (kv) setSettings({ ...DEFAULT_SETTINGS, ...kv });
      setReady(true);
    })();
  }, []);

  const notify = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  // ---- settings ----
  const saveSettings = async (patch) => { const next = { ...settings, ...patch }; setSettings(next); await dbPut("kv", next, "settings"); };

  // ---- price items ----
  const upsertItem = async (item) => {
    const rec = { ...item, id: item.id || uid(), updatedAt: now() };
    await dbPut("items", rec);
    setItems((prev) => { const i = prev.findIndex(p => p.id === rec.id); if (i === -1) return [...prev, rec]; const c = prev.slice(); c[i] = rec; return c; });
    return rec;
  };
  const bulkUpsertItems = async (arr) => {
    const stamped = arr.map(a => ({ ...a, id: a.id || uid(), updatedAt: now() }));
    for (const r of stamped) await dbPut("items", r);
    setItems((prev) => { const map = new Map(prev.map(p => [p.id, p])); stamped.forEach(r => map.set(r.id, r)); return [...map.values()]; });
    return stamped.length;
  };
  const deleteItem = async (id) => { await dbDel("items", id); setItems(prev => prev.filter(p => p.id !== id)); };
  const clearItems = async () => { for (const it of items) await dbDel("items", it.id); setItems([]); };

  // ---- projects ----
  const upsertProject = async (proj) => {
    const rec = { ...proj, id: proj.id || uid(), updatedAt: now(), createdAt: proj.createdAt || now() };
    await dbPut("projects", rec);
    setProjects((prev) => { const i = prev.findIndex(p => p.id === rec.id); let c; if (i === -1) c = [rec, ...prev]; else { c = prev.slice(); c[i] = rec; } return c.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0)); });
    return rec;
  };
  const deleteProject = async (id) => { await dbDel("projects", id); setProjects(prev => prev.filter(p => p.id !== id)); };

  const value = { items, projects, settings, ready, notify, saveSettings, upsertItem, bulkUpsertItems, deleteItem, clearItems, upsertProject, deleteProject, setItems, setProjects };
  return (
    <Store.Provider value={value}>
      {children}
      {toast && <div className="fixed left-1/2 -translate-x-1/2 bottom-24 z-[100] px-4 py-2 rounded-lg text-white text-sm font-semibold shadow-lg" style={{ background: "var(--brand)" }}>{toast}</div>}
    </Store.Provider>
  );
}

/* =========================================================================

const I = (d, vb = "0 0 24 24") => ({ size = 20, className = "", style } = {}) =>
  <svg width={size} height={size} viewBox={vb} fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}>{d}</svg>;
const IcJobs = I(<><path d="M3 7h18v13H3z"/><path d="M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2"/></>);
const IcPrice = I(<><path d="M20 12l-8 8-9-9V4h7z"/><circle cx="7.5" cy="7.5" r="1.3"/></>);

/* =========================================================================
   UI primitives
   ========================================================================= */
function Modal({ open, onClose, title, children, wide }){
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" style={{ background: "rgba(10,15,25,.5)" }} onClick={onClose}>
      <div className={"card w-full " + (wide ? "sm:max-w-3xl" : "sm:max-w-md") + " max-h-[92vh] overflow-y-auto rounded-b-none sm:rounded-2xl"} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between px-4 py-3 border-b sticky top-0 z-10" style={{ borderColor: "var(--line)", background: "var(--paper)" }}>
          <h3 className="font-bold text-base">{title}</h3>
          <button className="btn btn-ghost !p-2" onClick={onClose}><IcX size={16} /></button>
        </div>
        <div className="p-4">{children}</div>
      </div>
    </div>
  );
}
function Field({ label, children }){ return <div><label className="lbl">{label}</label>{children}</div>; }
// Numeric input you can fully clear and retype; decimal keypad on mobile; selects all on focus.
function NumInput({ value, onCommit, className = "inp", placeholder, style }){
  const [s, setS] = useState(value == null || value === "" ? "" : String(value));
  const editing = useRef(false);
  useEffect(() => { if (!editing.current) setS(value == null || value === "" ? "" : String(value)); }, [value]);
  const commit = (raw) => { let n = parseFloat(raw); if (isNaN(n)) n = 0; onCommit(n); return n; };
  return <input type="text" inputMode="decimal" enterKeyHint="done" className={className} style={style} placeholder={placeholder} value={s}
    onFocus={(e) => { editing.current = true; try { e.target.select(); } catch(_){} }}
    onBlur={() => { editing.current = false; setS(String(commit(s))); }}
    onChange={(e) => { const v = e.target.value; if (v === "" || /^-?\d*\.?\d*$/.test(v)) { setS(v); if (v !== "" && v !== "-" && v !== "." && v !== "-." && !isNaN(parseFloat(v))) onCommit(parseFloat(v)); } }} />;
}
// Text input that selects all on focus so tapping lets you retype immediately.
function TextInput(props){ const { onFocusSelect, ...rest } = props; return <input {...rest} onFocus={(e) => { try { e.target.select(); } catch(_){} if (props.onFocus) props.onFocus(e); }} />; }
function Empty({ icon, title, sub }){ return (
  <div className="flex flex-col items-center justify-center text-center py-16 px-6" style={{ color: "var(--muted)" }}>
    <div className="mb-3 opacity-40">{icon}</div>
    <div className="font-semibold text-ink" style={{ color: "var(--ink)" }}>{title}</div>
    {sub && <div className="text-sm mt-1 max-w-xs">{sub}</div>}
  </div>
); }

/* =========================================================================
   SETTINGS
   ========================================================================= */
function SettingsScreen(){
  const { settings, saveSettings, items, projects, notify, bulkUpsertItems, setItems, setProjects } = useStore();
  const [f, setF] = useState(settings);
  useEffect(() => setF(settings), [settings]);
  const set = (k, v) => setF(p => ({ ...p, [k]: v }));

  const onLogo = (e) => { const file = e.target.files[0]; if (!file) return; const r = new FileReader(); r.onload = () => set("logo", r.result); r.readAsDataURL(file); };
  const save = () => { saveSettings(f); notify("Settings saved"); };

  const backup = () => download("rjg-backup-" + new Date().toISOString().slice(0,10) + ".json", new Blob([JSON.stringify({ settings, items, projects }, null, 2)], { type: "application/json" }));
  const restore = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = async () => {
      try {
        const data = JSON.parse(r.result);
        if (data.settings) await saveSettings(data.settings);
        if (Array.isArray(data.items)) { for (const it of data.items) await dbPut("items", it); setItems(data.items); }
        if (Array.isArray(data.projects)) { for (const p of data.projects) await dbPut("projects", p); setProjects(data.projects.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0))); }
        notify("Backup restored");
      } catch (err) { alert("Could not read backup file."); }
    };
    r.readAsText(file);
  };

  return (
    <div className="max-w-2xl mx-auto p-4 space-y-4 pb-28">
      <h2 className="text-lg font-bold">Settings</h2>

      <div className="card p-4 space-y-3">
        <div className="font-semibold text-sm brand-text">Company & letterhead</div>
        <Field label="Company name"><input className="inp" value={f.company} onChange={e => set("company", e.target.value)} /></Field>
        <div className="grid grid-cols-2 gap-3">
          <Field label="ABN"><input className="inp" value={f.abn} onChange={e => set("abn", e.target.value)} /></Field>
          <Field label="Builder licence #"><input className="inp" value={f.license} onChange={e => set("license", e.target.value)} /></Field>
        </div>
        <Field label="Address"><input className="inp" value={f.address} onChange={e => set("address", e.target.value)} /></Field>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Phone"><input className="inp" value={f.phone} onChange={e => set("phone", e.target.value)} /></Field>
          <Field label="Email"><input className="inp" value={f.email} onChange={e => set("email", e.target.value)} /></Field>
        </div>
        <Field label="Website"><input className="inp" value={f.website} onChange={e => set("website", e.target.value)} /></Field>
        <Field label="Logo (shown on app & quotes)">
          <div className="flex items-center gap-3">
            <div className="rounded flex items-center px-3" style={{ background: "var(--brand)", height: 56 }}><img src={f.logo || DEFAULT_LOGO} alt="logo" style={{ height: 40 }} /></div>
            <label className="btn btn-ghost cursor-pointer"><IcUpload size={16} /> {f.logo ? "Replace" : "Override"}<input type="file" accept="image/*" className="hidden" onChange={onLogo} /></label>
            {f.logo && <button className="btn btn-ghost" onClick={() => set("logo", "")}>Use default</button>}
          </div>
          <p className="text-xs mt-1" style={{ color: "var(--muted)" }}>Defaults to the official RJG logo. Upload only to override.</p>
        </Field>
      </div>

      <div className="card p-4 space-y-3">
        <div className="font-semibold text-sm brand-text">Brand colours</div>
        <div className="grid grid-cols-2 gap-3">

  const save = async () => { if (!f.description.trim()) { alert("Description required"); return; } await upsertItem({ ...f, rate: num(f.rate) }); notify(item ? "Item updated" : "Item added"); onClose(); };

    <Modal open={open} onClose={onClose} title={item ? "Edit price item" : "New price item"}>

function ImportModal({ open, onClose }){
  const { bulkUpsertItems, notify } = useStore();
  const [rows, setRows] = useState(null);     // array of arrays
  const [headers, setHeaders] = useState([]);
  const [map, setMap] = useState({ code: "", description: "", category: "", type: "", unit: "", rate: "", supplier: "" });
  const [defaultType, setDefaultType] = useState("Material");
  const [busy, setBusy] = useState(false);

  useEffect(() => { if (!open) { setRows(null); setHeaders([]); } }, [open]);

  const guess = (hs) => {
    const find = (...keys) => { const i = hs.findIndex(h => keys.some(k => String(h).toLowerCase().replace(/[^a-z0-9]/g, "").includes(k))); return i === -1 ? "" : String(i); };
    return { code: find("code", "sku", "itemno", "ref"), description: find("desc", "item", "name", "product"), category: find("categ", "group", "trade", "classific"), type: find("costtype", "type", "kind"), unit: find("unit", "uom", "measure"), rate: find("rate", "cost", "price", "unitcost", "sell", "amount", "hourly"), supplier: find("supplier", "vendor", "brand") };
  };
  const normType = (v) => { const s = String(v || "").toLowerCase(); return COST_TYPES.find(t => s.includes(t.toLowerCase())) || (/labou?r|hour|wage/.test(s) ? "Labour" : /equip|plant|machine/.test(s) ? "Equipment" : /crew|gang/.test(s) ? "Crew" : /sub|contractor/.test(s) ? "Subcontractor" : ""); };

  const onFile = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const wb = XLSX.read(new Uint8Array(r.result), { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" }).filter(row => row.some(c => String(c).trim() !== ""));
        if (aoa.length < 2) { alert("No data rows found."); return; }
        const hs = aoa[0].map(h => String(h).trim());
        setHeaders(hs); setRows(aoa.slice(1)); setMap(guess(hs));
      } catch (err) { alert("Could not read file. Use .xlsx or .csv."); }
    };
    r.readAsArrayBuffer(file);
  };

  const doImport = async () => {
    if (map.description === "") { alert("Map at least the Description column."); return; }
    setBusy(true);
    const g = (row, key) => map[key] === "" ? "" : row[parseInt(map[key])];
    const items = rows.map(row => ({
      code: String(g(row, "code") || "").trim(),
      description: String(g(row, "description") || "").trim(),
      category: String(g(row, "category") || "").trim(),
      type: (map.type !== "" && normType(g(row, "type"))) || defaultType,
      unit: String(g(row, "unit") || "ea").trim() || "ea",
      rate: num(g(row, "rate")),
      supplier: String(g(row, "supplier") || "").trim()
    })).filter(it => it.description);
    const n = await bulkUpsertItems(items);
    setBusy(false);
    notify(n + " items imported");
    onClose();
  };

  const template = () => {
    const ws = XLSX.utils.aoa_to_sheet([["Code", "Description", "Category", "Unit", "Rate (ex GST)", "Supplier"], ["DEMO-01", "Example item — 90x45 MGP10 pine", "Framing", "lm", 4.85, "Local Supplier"]]);
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Cost Register"); XLSX.writeFile(wb, "RJG-cost-register-template.xlsx");
  };

  const fields = [["code", "Code"], ["description", "Description *"], ["category", "Category"], ["type", "Cost type (optional)"], ["unit", "Unit"], ["rate", "Rate (ex GST)"], ["supplier", "Supplier"]];

  return (
    <Modal open={open} onClose={onClose} title="Import cost register" wide>
      {!rows ? (
        <div className="space-y-4">
          <p className="text-sm" style={{ color: "var(--muted)" }}>Upload your cost register as <b>.xlsx</b> or <b>.csv</b>. The first row must be column headers. You'll map columns on the next step.</p>
          <label className="btn btn-primary cursor-pointer w-full"><IcUpload size={16} /> Choose file<input type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={onFile} /></label>
          <button className="btn btn-ghost w-full" onClick={template}><IcDoc size={16} /> Download blank template</button>
        </div>
      ) : (
        <div className="space-y-4">
          <div className="text-sm font-semibold">{rows.length} rows found — map your columns:</div>
          <div className="card p-3" style={{ background: "var(--bg)" }}>
            <Field label={"Set all imported rows as cost type" + (map.type !== "" ? " (used only where the Cost type column is blank/unknown)" : "")}>
              <select className="inp" value={defaultType} onChange={e => setDefaultType(e.target.value)}>{COST_TYPES.map(t => <option key={t} value={t}>{t}</option>)}</select>
            </Field>
            <p className="text-xs mt-1" style={{ color: "var(--muted)" }}>Tip: importing your Labour / Equipment / Crews / Items files separately — set this to match each file.</p>
          </div>
          <div className="grid grid-cols-2 gap-3">
            {fields.map(([key, label]) => (
              <Field key={key} label={label}>
                <select className="inp" value={map[key]} onChange={e => setMap(m => ({ ...m, [key]: e.target.value }))}>
                  <option value="">— none —</option>
                  {headers.map((h, i) => <option key={i} value={String(i)}>{h || ("Column " + (i+1))}</option>)}
                </select>
              </Field>
            ))}
          </div>
          <div className="card p-3 text-xs overflow-x-auto" style={{ background: "var(--bg)" }}>
            <div className="font-semibold mb-1">Preview (first 3 rows)</div>
            {rows.slice(0, 3).map((row, ri) => (
              <div key={ri} className="whitespace-nowrap">
                {(map.code !== "" ? row[map.code] + " · " : "")}{map.description !== "" ? row[map.description] : "(no description mapped)"}{map.rate !== "" ? " — " + money(num(row[map.rate])) : ""}
              </div>
            ))}
          </div>
          <div className="flex gap-2">
            <button className="btn btn-ghost flex-1" onClick={() => setRows(null)}>Back</button>
            <button className="btn btn-primary flex-1" disabled={busy} onClick={doImport}><IcCheck size={16} /> Import {rows.length} items</button>
          </div>
        </div>
      )}
    </Modal>
  );
}

      <ItemModal open={editing !== undefined} onClose={() => setEditing(undefined)} item={editing || null} />
      <ImportModal open={importing} onClose={() => setImporting(false)} />
    </div>
  );
}

/* =========================================================================
   TAKEOFF CANVAS (PDF / photo measure + markup)
   ========================================================================= */
const MEASURE_TOOLS = ["length", "area", "count"];
const TOOL_LABELS = { calibrate: "Set scale", length: "Length", area: "Area", count: "Count", pen: "Draw", arrow: "Arrow", rect: "Box", text: "Text" };
const MARKUP_COLORS = ["#e11d48", "#2563eb", "#16a34a", "#ea580c", "#eab308", "#111827", "#ffffff"];

function TakeoffCanvas({ drawing, onChange, onAddToQuote }){
  const { items, notify } = useStore();
  const wrapRef = useRef(null);
  const canvasRef = useRef(null);
  const imgRef = useRef(null);
  const [tool, setTool] = useState("length");
  const [zoom, setZoom] = useState(1);
  const [color, setColor] = useState("#e11d48");
  const [areaMode, setAreaMode] = useState("polygon");   // polygon | box | circle
  const [draft, setDraft] = useState(null); // {tool, points:[]}
  const [wrapW, setWrapW] = useState(360);
  const [, force] = useState(0);

  const anns = drawing.annotations || [];
  const mpp = drawing.scaleMpp || null; // metres per (image-space) pixel

  // load bg image
  useEffect(() => {
    if (!drawing.bg) return;
    const im = new Image();
    im.onload = () => { imgRef.current = im; force(x => x + 1); };
    im.src = drawing.bg;
  }, [drawing.bg]);

  useEffect(() => {
    const measure = () => { if (wrapRef.current) setWrapW(wrapRef.current.clientWidth); };
    measure(); window.addEventListener("resize", measure); return () => window.removeEventListener("resize", measure);
  }, []);

  const natW = drawing.natW || 1000, natH = drawing.natH || 700;
  const baseScale = wrapW / natW;              // fit width
  const displayScale = baseScale * zoom;       // image-space px -> screen px
  const cssW = natW * displayScale, cssH = natH * displayScale;

  const measureVal = (a) => {
    if (!mpp) return null;
    if (a.tool === "length" || a.tool === "arrow") return perimeter(a.points, false) * mpp;
    if (a.tool === "area") return shoelace(a.points) * mpp * mpp;
    if (a.tool === "count") return a.points.length;
    return null;
  };
  const valLabel = (a) => {
    const v = measureVal(a); if (v === null) return "";
    if (a.tool === "area") return round2(v).toFixed(2) + " m²";
    if (a.tool === "count") return v + " no.";
    return round2(v).toFixed(2) + " m";
  };

  // draw
  useEffect(() => {
    const cv = canvasRef.current; if (!cv) return;
    const dpr = window.devicePixelRatio || 1;
    cv.width = Math.max(1, cssW * dpr); cv.height = Math.max(1, cssH * dpr);
    cv.style.width = cssW + "px"; cv.style.height = cssH + "px";
    const ctx = cv.getContext("2d"); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, cssW, cssH);
    if (imgRef.current) ctx.drawImage(imgRef.current, 0, 0, cssW, cssH);
    else { ctx.fillStyle = "#eef1f5"; ctx.fillRect(0, 0, cssW, cssH); }
    const S = displayScale;
    const measIds = anns.filter(x => MEASURE_TOOLS.includes(x.tool)).map(x => x.id);
    const drawAnn = (a, isDraft) => {
      ctx.save();
      ctx.lineWidth = 2.2; ctx.strokeStyle = a.color || color; ctx.fillStyle = a.color || color;
      ctx.font = "600 13px system-ui"; ctx.textAlign = "center";
      const P = a.points.map(p => ({ x: p.x * S, y: p.y * S }));
      if (a.tool === "count") {
        P.forEach((p, i) => { ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, 7); ctx.fill(); ctx.fillStyle = "#fff"; ctx.fillText(i + 1, p.x, p.y + 4); ctx.fillStyle = a.color || color; });
      } else if (a.tool === "text") {
        ctx.textAlign = "left"; ctx.font = "700 15px system-ui"; if (P[0]) ctx.fillText(a.text || "Text", P[0].x, P[0].y);
      } else if (a.tool === "rect" && P.length >= 2) {
        ctx.strokeRect(P[0].x, P[0].y, P[1].x - P[0].x, P[1].y - P[0].y);
      } else if (a.tool === "area") {
        ctx.beginPath(); P.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y)); if (!isDraft) ctx.closePath();
        ctx.globalAlpha = 0.16; ctx.fill(); ctx.globalAlpha = 1; ctx.stroke();
        P.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 3.5, 0, 7); ctx.fill(); });
      } else { // length, arrow, pen
        ctx.beginPath(); P.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y)); ctx.stroke();
        P.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 3.5, 0, 7); ctx.fill(); });
        if (a.tool === "arrow" && P.length >= 2) {
          const p2 = P[P.length - 1], p1 = P[P.length - 2], ang = Math.atan2(p2.y - p1.y, p2.x - p1.x);
          ctx.beginPath(); ctx.moveTo(p2.x, p2.y); ctx.lineTo(p2.x - 12 * Math.cos(ang - .4), p2.y - 12 * Math.sin(ang - .4)); ctx.moveTo(p2.x, p2.y); ctx.lineTo(p2.x - 12 * Math.cos(ang + .4), p2.y - 12 * Math.sin(ang + .4)); ctx.stroke();
        }
      }
      // measurement number badge + label
      if (!isDraft && MEASURE_TOOLS.includes(a.tool) && mpp) {
        const c = a.tool === "count" ? P[0] : centroid(P);
        const no = measIds.indexOf(a.id) + 1;
        if (c) {
          const t = (a.name ? a.name + " · " : "") + valLabel(a);
          ctx.font = "700 12px system-ui"; ctx.textAlign = "left";
          const tw = ctx.measureText(t).width, badge = 20, pad = 6, w = badge + pad + tw + 8, bx = c.x - w/2, by = c.y - 24;
          ctx.fillStyle = "rgba(17,24,39,.85)"; ctx.fillRect(bx, by, w, 20);
          ctx.fillStyle = a.color || color; ctx.beginPath(); ctx.arc(bx + 10, by + 10, 8, 0, 7); ctx.fill();
          ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.fillText(no, bx + 10, by + 14);
          ctx.textAlign = "left"; ctx.fillText(t, bx + badge + pad, by + 14);
        }
      }
      ctx.restore();
    };
    anns.forEach(a => drawAnn(a, false));
    if (draft) drawAnn(draft, true);
  }, [anns, draft, cssW, cssH, displayScale, mpp, color]);

  const toImg = (e) => { const r = canvasRef.current.getBoundingClientRect(); return { x: (e.clientX - r.left) / displayScale, y: (e.clientY - r.top) / displayScale }; };

  const commit = (d) => {
    if (d.tool === "calibrate") {
      const px = dist(d.points[0], d.points[1]);
      const real = parseFloat(prompt("Real length of the line you drew, in metres:", "1"));
      if (real && px > 0) { onChange({ ...drawing, scaleMpp: real / px }); }
      setDraft(null); return;
    }
    const ann = { id: uid(), tool: d.tool, points: d.points, color };
    if (d.tool === "text") { const t = prompt("Text:", ""); if (!t) { setDraft(null); return; } ann.text = t; }
    onChange({ ...drawing, annotations: [...anns, ann] });
    setDraft(null);
  };

  const onDown = (e) => {
    e.preventDefault();
    const p = toImg(e);
    const twoPt = ["calibrate", "length", "arrow", "rect"].includes(tool);
    const multi = ["area", "pen"].includes(tool);
    if (tool === "count") {
      // append to existing draft count or start
      setDraft(d => d && d.tool === "count" ? { ...d, points: [...d.points, p] } : { tool: "count", points: [p] });
      return;
    }
    if (tool === "text") { commit({ tool: "text", points: [p] }); return; }
    if (tool === "area" && areaMode !== "polygon") { setDraft({ tool: "area", shape: areaMode, start: p, points: [p], dragging: true }); return; }
    if (twoPt) {
      setDraft(d => {
        if (!d || d.tool !== tool) return { tool, points: [p] };
        const done = { tool, points: [d.points[0], p] };
        setTimeout(() => commit(done), 0);
        return null;
      });
      return;
    }
    if (multi) { setDraft(d => d && d.tool === tool ? { ...d, points: [...d.points, p] } : { tool, points: [p] }); return; }
  };
  const onMove = (e) => {
    if (!draft) return;
    if (draft.dragging && draft.shape) {
      const p = toImg(e), a = draft.start;
      if (draft.shape === "box") setDraft({ ...draft, points: [{ x: a.x, y: a.y }, { x: p.x, y: a.y }, { x: p.x, y: p.y }, { x: a.x, y: p.y }] });
      else { const r = dist(a, p), pts = []; for (let i = 0; i < 40; i++){ const t = i / 40 * Math.PI * 2; pts.push({ x: a.x + r * Math.cos(t), y: a.y + r * Math.sin(t) }); } setDraft({ ...draft, points: pts }); }
      return;
    }
    if (["length", "arrow", "rect", "calibrate"].includes(draft.tool) && draft.points.length >= 1) {
      const p = toImg(e); setDraft({ ...draft, points: [draft.points[0], p], _preview: true });
    } else if (draft.tool === "pen") { const p = toImg(e); setDraft({ ...draft, points: [...draft.points, p] }); }
  };
  const onUp = (e) => {
    if (!draft) return;
    if (draft.dragging && draft.shape) { const pts = draft.points; setDraft(null); if (pts.length >= 3 && shoelace(pts) * displayScale * displayScale > 60) commit({ tool: "area", points: pts }); return; }
    if (["length", "arrow", "rect", "calibrate"].includes(draft.tool) && draft._preview && draft.points.length === 2 && dist(draft.points[0], draft.points[1]) * displayScale > 6) {
      const done = { tool: draft.tool, points: draft.points }; setDraft(null); commit(done);
    } else if (draft.tool === "pen") { const done = { tool: "pen", points: draft.points }; setDraft(null); if (done.points.length > 1) commit(done); }
  };

  const finishShape = () => { if (draft && (draft.tool === "area" || draft.tool === "count") && draft.points.length >= (draft.tool === "area" ? 3 : 1)) commit({ tool: draft.tool, points: draft.points }); else setDraft(null); };
  const undoPoint = () => { if (draft && draft.points.length > 1) setDraft({ ...draft, points: draft.points.slice(0, -1) }); else setDraft(null); };
  const delAnn = (id) => onChange({ ...drawing, annotations: anns.filter(a => a.id !== id) });
  const linkItem = (id, itemId) => onChange({ ...drawing, annotations: anns.map(a => a.id === id ? { ...a, priceItemId: itemId } : a) });
  const renameAnn = (id, name) => onChange({ ...drawing, annotations: anns.map(a => a.id === id ? { ...a, name } : a) });

  const saveSnapshot = () => {
    const cv = canvasRef.current; if (!cv) return;
    onChange({ ...drawing, snapshot: cv.toDataURL("image/jpeg", 0.8) });
  };
  const addCopyToQuote = () => {
    const cv = canvasRef.current; if (!cv) return;
    onChange({ ...drawing, snapshot: cv.toDataURL("image/jpeg", 0.85), include: true });
    notify("Marked-up copy attached to quote");
  };

  const addToQuote = () => {
    if (!mpp) { alert("Set the scale first (Set scale tool)."); return; }
    const lines = anns.filter(a => MEASURE_TOOLS.includes(a.tool) && a.priceItemId).map(a => {
      const it = items.find(i => i.id === a.priceItemId); if (!it) return null;
      return { id: uid(), desc: a.name ? a.name + " — " + it.description : it.description, unit: it.unit, rateEx: it.rate, category: it.category, qty: round2(measureVal(a)), source: "Takeoff: " + drawing.name };
    }).filter(Boolean);
    if (!lines.length) { alert("Link a price item to at least one measurement first."); return; }
    saveSnapshot();
    onAddToQuote(lines);
  };

  const measured = anns.filter(a => MEASURE_TOOLS.includes(a.tool));
  const tools = ["calibrate", "length", "area", "count", "arrow", "rect", "pen", "text"];

  return (
    <div className="space-y-3">
      {!mpp && <div className="card p-3 text-sm flex items-center gap-2" style={{ background: "#fff7ed", borderColor: "#fed7aa", color: "#9a3412" }}><IcRuler size={18} /> Set the scale first: pick <b>Set scale</b>, draw a line over a known dimension, then enter its real length.</div>}
      {mpp && <div className="chip"><IcCheck size={14} /> Scale set · 1 px = {round2(mpp * 1000)} mm</div>}

      <div className="scroll-x flex gap-1.5 pb-1">
        {tools.map(t => <button key={t} className={"tab " + (tool === t ? "tab-active" : "card")} onClick={() => { setTool(t); setDraft(null); }}>{TOOL_LABELS[t]}</button>)}
      </div>
      {tool === "area" && (
        <div className="flex items-center gap-2 text-sm">
          <span style={{ color: "var(--muted)" }}>Area shape:</span>
          {[["polygon","Points"],["box","Rectangle"],["circle","Circle"]].map(([m,l]) => <button key={m} className={"tab " + (areaMode === m ? "tab-active" : "card")} onClick={() => { setAreaMode(m); setDraft(null); }}>{l}</button>)}
          <span style={{ color: "var(--muted)" }}>{areaMode === "polygon" ? "tap corners, Finish" : "drag to draw"}</span>
        </div>
      )}

      <div className="flex items-center gap-3 flex-wrap text-sm">
        <label className="flex items-center gap-1">Zoom <input type="range" min="0.5" max="4" step="0.1" value={zoom} onChange={e => setZoom(num(e.target.value))} /></label>
        {tool !== "calibrate" && (
          <div className="flex items-center gap-1">
            {MARKUP_COLORS.map(c => <button key={c} onClick={() => setColor(c)} title={c} style={{ width: 20, height: 20, borderRadius: 6, background: c, border: color === c ? "2px solid var(--ink)" : "1px solid var(--line)" }} />)}
            <input type="color" value={color} onChange={e => setColor(e.target.value)} className="h-6 w-7 rounded border" title="Custom colour" />
          </div>
        )}
        {draft && !draft.dragging && (draft.tool === "area" || draft.tool === "count") && <><button className="btn btn-accent !py-1" onClick={finishShape}><IcCheck size={14} /> Finish</button><button className="btn btn-ghost !py-1" onClick={undoPoint}>Undo pt</button></>}
      </div>

      <div ref={wrapRef} className="card overflow-hidden" style={{ maxHeight: "62vh", overflowY: "auto" }}>
        <canvas ref={canvasRef} className="editor" onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} />
      </div>

      {measured.length > 0 && (
        <div className="card p-3 space-y-2">
          <div className="font-semibold text-sm brand-text">Attach each measurement to a rate → quote</div>
          {measured.map((a, mi) => {
            const it = items.find(i => i.id === a.priceItemId);
            const qty = mpp ? measureVal(a) : 0;
            return (
              <div key={a.id} className="space-y-1 pb-1" style={{ borderBottom: "1px solid var(--line)" }}>
                <div className="flex items-center gap-2 text-sm">
                  <span className="flex items-center justify-center text-white text-xs font-bold" style={{ background: a.color || "#e11d48", width: 22, height: 22, borderRadius: 999, flex: "0 0 auto" }}>{mi + 1}</span>
                  <input className="inp !py-1 flex-1" placeholder={TOOL_LABELS[a.tool] + " (rename…)"} value={a.name || ""} onChange={e => renameAnn(a.id, e.target.value)} />
                  <span className="font-semibold whitespace-nowrap">{valLabel(a)}</span>
                  <button className="btn btn-ghost !p-1.5" onClick={() => delAnn(a.id)}><IcTrash size={15} /></button>
                </div>
                <div className="flex items-center gap-2 text-sm">
                  <select className="inp !py-1 flex-1" value={a.priceItemId || ""} onChange={e => linkItem(a.id, e.target.value)}>
                    <option value="">— attach a rate from the database —</option>
                    {items.map(i => <option key={i.id} value={i.id}>{i.description} ({money(i.rate)}/{i.unit})</option>)}
                  </select>
                  {it && <span className="text-xs whitespace-nowrap" style={{ color: "var(--muted)" }}>= <b style={{ color: "var(--ink)" }}>{money(qty * it.rate)}</b></span>}
                </div>
              </div>
            );
          })}
          {items.length === 0 && <div className="text-xs" style={{ color: "var(--muted)" }}>No rates in the database yet — add items under the Prices tab first.</div>}
          <button className="btn btn-primary w-full" onClick={addToQuote}><IcPlus size={16} /> Send priced measurements to quote</button>
        </div>
      )}
      <button className="btn btn-primary w-full" onClick={addCopyToQuote}><IcPlus size={16} /> Add marked-up copy to quote</button>
      {drawing.snapshot && <div className="text-xs text-center" style={{ color: "var(--muted)" }}>Attached ✓ — tick/untick it under Report › Attachments.</div>}
      {anns.filter(a => !MEASURE_TOOLS.includes(a.tool)).length > 0 &&
        <button className="btn btn-ghost w-full" onClick={() => onChange({ ...drawing, annotations: anns.filter(a => MEASURE_TOOLS.includes(a.tool)) })}>Clear markups</button>}
    </div>
  );
}

function smoothPath(ctx, pts){
  if (pts.length < 3){ ctx.beginPath(); pts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y)); ctx.stroke(); return; }
  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length - 1; i++){ const xc = (pts[i].x + pts[i+1].x) / 2, yc = (pts[i].y + pts[i+1].y) / 2; ctx.quadraticCurveTo(pts[i].x, pts[i].y, xc, yc); }
  ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y); ctx.stroke();
}
const STAMP_DEFAULT_M = { door: 0.9, window: 1.2, opening: 1.0, table: 1.5, chair: 0.5, bench: 1.6, bed: 1.5, sink: 0.6, toilet: 0.4, car: 4.8, tree: 4.0, fence: 3.0, pool: 6.0 };
const STAMP_TYPES = [["door","Door"],["window","Window"],["opening","Opening"],["table","Table"],["chair","Chair"],["bench","Bench"],["bed","Bed"],["sink","Sink"],["toilet","Toilet"],["car","Car"],["tree","Tree"],["fence","Fence"],["pool","Pool"]];
const STAMP_LABEL = Object.fromEntries(STAMP_TYPES);
const STAMP_CATEGORIES = [["Openings", ["door","window","opening"]], ["Furniture", ["table","chair","bench","bed"]], ["Fixtures", ["sink","toilet"]], ["Outdoor / site", ["car","tree","fence","pool"]]];
function rrect(ctx, x, y, w, h, r){ r = Math.min(r, w/2, h/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function drawStamp(ctx, s, brand){
  const w = s.size, half = w / 2;
  ctx.save(); ctx.translate(s.x, s.y); ctx.rotate((s.angle || 0) * Math.PI / 180);
  ctx.strokeStyle = brand; ctx.fillStyle = brand; ctx.lineWidth = 3; ctx.lineJoin = "round"; ctx.setLineDash([]);
  if (s.type === "door"){
    ctx.beginPath(); ctx.moveTo(-half, 0); ctx.lineTo(-half, -6); ctx.moveTo(half, 0); ctx.lineTo(half, -6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-half, 0); ctx.lineTo(-half, -w); ctx.stroke();
    ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(-half, 0, w, -Math.PI/2, 0); ctx.stroke();
  } else if (s.type === "window"){
    ctx.lineWidth = 2.4;
    ctx.beginPath(); ctx.moveTo(-half, -3); ctx.lineTo(half, -3); ctx.moveTo(-half, 3); ctx.lineTo(half, 3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-half, -6); ctx.lineTo(-half, 6); ctx.moveTo(half, -6); ctx.lineTo(half, 6); ctx.stroke();
  } else if (s.type === "opening"){
    ctx.beginPath(); ctx.moveTo(-half, -7); ctx.lineTo(-half, 7); ctx.moveTo(half, -7); ctx.lineTo(half, 7); ctx.stroke();
    ctx.strokeStyle = "#9aa3b2"; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(-half, 0); ctx.lineTo(half, 0); ctx.stroke();
  } else if (s.type === "table"){
    const h = w * 0.62; ctx.lineWidth = 2.5; rrect(ctx, -half, -h/2, w, h, 4); ctx.stroke();
  } else if (s.type === "bench"){
    const h = w * 0.34; ctx.lineWidth = 2.2;
    rrect(ctx, -half, -h/2 + 3, w, h - 3, 3); ctx.stroke();                                   // seat
    ctx.lineWidth = 3.2; ctx.beginPath(); ctx.moveTo(-half, -h/2); ctx.lineTo(half, -h/2); ctx.stroke();  // backrest
    ctx.lineWidth = 1; const nb = Math.max(3, Math.round(w / 11)); for (let i = 1; i < nb; i++){ const x = -half + w*i/nb; ctx.beginPath(); ctx.moveTo(x, -h/2 + 4); ctx.lineTo(x, h/2 - 1); ctx.stroke(); }
  } else if (s.type === "car"){
    const h = w * 0.44, bl = brand;
    ctx.fillStyle = "rgba(2,34,75,.05)"; ctx.strokeStyle = bl; ctx.lineWidth = 2.6;
    rrect(ctx, -half, -h/2, w, h, h*0.42); ctx.fill(); ctx.stroke();                          // body
    ctx.lineWidth = 1.7; rrect(ctx, -w*0.16, -h*0.34, w*0.44, h*0.68, h*0.22); ctx.stroke();   // cabin
    ctx.beginPath(); ctx.moveTo(w*0.28, -h*0.30); ctx.lineTo(w*0.40, -h*0.16); ctx.moveTo(w*0.28, h*0.30); ctx.lineTo(w*0.40, h*0.16); ctx.stroke(); // windscreen
    ctx.beginPath(); ctx.moveTo(-w*0.20, -h*0.30); ctx.lineTo(-w*0.30, -h*0.15); ctx.moveTo(-w*0.20, h*0.30); ctx.lineTo(-w*0.30, h*0.15); ctx.stroke(); // rear window
    ctx.fillStyle = bl; const ww = w*0.12, wh = Math.max(3, h*0.16);                            // wheels
    [[-w*0.32, -h/2 - wh*0.3], [-w*0.32, h/2 - wh*0.7], [w*0.20, -h/2 - wh*0.3], [w*0.20, h/2 - wh*0.7]].forEach(([wx, wy]) => { rrect(ctx, wx, wy, ww, wh, 2); ctx.fill(); });
  } else if (s.type === "tree"){
    ctx.fillStyle = "rgba(34,139,60,.20)"; ctx.strokeStyle = "#228b3c"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, half, 0, 7); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#7a5230"; ctx.beginPath(); ctx.arc(0, 0, Math.max(3, w*0.08), 0, 7); ctx.fill();
  } else if (s.type === "fence"){
    ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(-half, 0); ctx.lineTo(half, 0); ctx.stroke();
    const n = Math.max(2, Math.round(w / 14)); for (let i = 0; i <= n; i++){ const x = -half + (w * i / n); ctx.beginPath(); ctx.moveTo(x, -5); ctx.lineTo(x, 5); ctx.stroke(); }
  } else if (s.type === "pool"){
    const h = w * 0.6; ctx.fillStyle = "rgba(56,150,220,.25)"; ctx.strokeStyle = "#2f6fb0"; ctx.lineWidth = 3; rrect(ctx, -half, -h/2, w, h, Math.min(w,h)*0.28); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#2f6fb0"; ctx.font = "600 11px system-ui"; ctx.textAlign = "center"; ctx.fillText("POOL", 0, 4);
  } else if (s.type === "chair"){
    ctx.lineWidth = 2.2; rrect(ctx, -half, -half*0.7, w, w*0.9, 3); ctx.stroke(); ctx.beginPath(); ctx.moveTo(-half, -half*0.7); ctx.lineTo(half, -half*0.7); ctx.stroke();
  } else if (s.type === "bed"){
    const h = w * 1.3; ctx.lineWidth = 2.5; rrect(ctx, -half, -h/2, w, h, 4); ctx.stroke();
    ctx.lineWidth = 1.6; ctx.beginPath(); ctx.moveTo(-half, -h/2 + h*0.28); ctx.lineTo(half, -h/2 + h*0.28); ctx.stroke();       // pillow line
    rrect(ctx, -half + w*0.12, -h/2 + h*0.05, w*0.34, h*0.16, 3); ctx.stroke(); rrect(ctx, half - w*0.46, -h/2 + h*0.05, w*0.34, h*0.16, 3); ctx.stroke();
  } else if (s.type === "sink"){
    const h = w * 0.75; ctx.lineWidth = 2.2; rrect(ctx, -half, -h/2, w, h, 4); ctx.stroke(); ctx.beginPath(); ctx.arc(0, h*0.05, Math.max(2, w*0.1), 0, 7); ctx.stroke(); ctx.beginPath(); ctx.arc(0, -h*0.32, Math.max(1.5, w*0.05), 0, 7); ctx.stroke();
  } else if (s.type === "toilet"){
    const bw = w, bh = w * 1.4; ctx.lineWidth = 2.2; rrect(ctx, -bw*0.42, -bh/2, bw*0.84, bh*0.34, 3); ctx.stroke();              // cistern
    ctx.beginPath(); ctx.ellipse(0, bh*0.12, bw*0.42, bh*0.4, 0, 0, 7); ctx.stroke();                                             // bowl
  }
  ctx.restore();
}

/* ---- 3D view of a floor plan (Three.js) ---- */
function Plan3D({ plan, onClose, onSave }){
  const mountRef = useRef(null);
  const capRef = useRef(null);
  const [ok, setOk] = useState(true);
  const [roof, setRoof] = useState(!!plan.roof);
  useEffect(() => {
    const THREE = window.THREE; const mount = mountRef.current;
    if (!THREE || !mount){ setOk(false); return; }
    try {
    const W = mount.clientWidth || 360, H = mount.clientHeight || 360;
    const mpp = (plan.gridMetres || 0.5) / (plan.gridPx || 28);
    const wallH = plan.wallHeight || 2.7;
    const rooms = plan.rooms || [], stamps = plan.stamps || [];
    const allPts = []; rooms.forEach(r => r.points.forEach(p => allPts.push(p))); stamps.forEach(s => allPts.push({ x: s.x, y: s.y }));
    let cx = 0, cy = 0, ext = 10;
    if (allPts.length){ const xs = allPts.map(p => p.x), ys = allPts.map(p => p.y); const minx = Math.min(...xs), maxx = Math.max(...xs), miny = Math.min(...ys), maxy = Math.max(...ys); cx = (minx+maxx)/2; cy = (miny+maxy)/2; ext = Math.max((maxx-minx)*mpp, (maxy-miny)*mpp, 5); }
    const toM = (p) => ({ x: (p.x - cx) * mpp, z: (p.y - cy) * mpp });

    const scene = new THREE.Scene(); scene.background = new THREE.Color(0xeef2f7);
    const camera = new THREE.PerspectiveCamera(50, W/H, 0.1, 2000);
    camera.position.set(ext*0.95, ext*1.1, ext*0.95);
    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1)); renderer.setSize(W, H);
    mount.appendChild(renderer.domElement);
    const controls = new THREE.OrbitControls(camera, renderer.domElement); controls.target.set(0, wallH/2, 0); controls.update();
    scene.add(new THREE.HemisphereLight(0xffffff, 0x94a3b8, 1.0));
    const dir = new THREE.DirectionalLight(0xffffff, 0.65); dir.position.set(ext, ext*1.6, ext*0.6); scene.add(dir);
    scene.add(new THREE.GridHelper(Math.ceil(ext*2)+12, Math.ceil(ext*2)+12, 0xc7d0da, 0xdfe5ec));

    const wallMat = new THREE.MeshLambertMaterial({ color: 0xf3f5f9 });
    const floorMat = new THREE.MeshLambertMaterial({ color: 0xdbe3ec, side: THREE.DoubleSide });
    // openings (metres) that should be cut into walls
    const openings = stamps.filter(s => s.type === "door" || s.type === "window" || s.type === "opening").map(s => ({ type: s.type, c: toM({ x: s.x, y: s.y }), w: s.size * mpp }));
    const piece = (A, ux, uz, s0, s1, y0, y1) => { const len = s1 - s0, hgt = y1 - y0; if (len < 0.06 || hgt < 0.03) return; const mx = A.x + ux*((s0+s1)/2), mz = A.z + uz*((s0+s1)/2); const m = new THREE.Mesh(new THREE.BoxGeometry(len, hgt, 0.1), wallMat); m.position.set(mx, (y0+y1)/2, mz); m.rotation.y = -Math.atan2(uz, ux); scene.add(m); };
    const wallEdge = (a, b, h) => {
      const A = toM(a), B = toM(b); const dx = B.x-A.x, dz = B.z-A.z; const L = Math.hypot(dx, dz); if (L < 0.02) return;
      const ux = dx/L, uz = dz/L, nx = -uz, nz = ux;
      const ops = [];
      openings.forEach(o => { const rx = o.c.x-A.x, rz = o.c.z-A.z; const t = rx*ux + rz*uz, perp = Math.abs(rx*nx + rz*nz); if (t > -o.w/2 && t < L + o.w/2 && perp < 0.6) ops.push({ type: o.type, s0: Math.max(0, t-o.w/2), s1: Math.min(L, t+o.w/2) }); });

    onChange({ ...plan, rooms: [...rooms, { id: uid(), name: curved ? "Curve" : "Wall", points: pts, wall: true, curved, perim: round2(perimeter(pts, false) * mPerPx) }] });
  };

  const finishRoom = () => { if (draft && draft.tool === "room" && draft.points.length >= 3){ const name = prompt("Room name:", "Room " + (rooms.filter(r=>!r.wall).length + 1)) || "Room"; onChange({ ...plan, rooms: [...rooms, { id: uid(), name, points: draft.points }] }); } setDraft(null); };
  const finishWall = () => { if (draft && draft.tool === "wall" && draft.points.length >= 2){ const pts = draft.points; onChange({ ...plan, rooms: [...rooms, { id: uid(), name: "Wall " + (rooms.filter(r => r.wall).length + 1), points: pts, wall: true, perim: round2(perimeter(pts, false) * mPerPx) }] }); } setDraft(null); };
  const undoPt = () => { if (draft && draft.points.length > 1) setDraft({ ...draft, points: draft.points.slice(0,-1) }); else setDraft(null); };
  const delShape = (id) => onChange({ ...plan, rooms: rooms.filter(r => r.id !== id) });
  const renameShape = (id, name) => onChange({ ...plan, rooms: rooms.map(r => r.id === id ? { ...r, name } : r) });
  const setHeight = (id, h) => onChange({ ...plan, rooms: rooms.map(r => r.id === id ? { ...r, height: Math.max(0.1, num(h)) } : r) });
  const save3dRender = (dataUrl) => { onChange({ ...plan, render3d: dataUrl, include: true }); setShow3d(false); notify("3D render saved to quote"); };
  const clearAll = () => { if ((rooms.length || stamps.length) && confirm("Clear everything on this floor plan?")){ setDraft(null); setSel(null); onChange({ ...plan, rooms: [], stamps: [], snapshot: undefined }); } };
  const delStamp = (id) => onChange({ ...plan, stamps: stamps.filter(s => s.id !== id) });
  const rotStamp = (id, delta) => onChange({ ...plan, stamps: stamps.map(s => s.id === id ? { ...s, angle: (((s.angle||0)+delta)%360+360)%360 } : s) });
  const setAngle = (id, deg) => onChange({ ...plan, stamps: stamps.map(s => s.id === id ? { ...s, angle: ((Math.round(num(deg))%360)+360)%360 } : s) });
  const sizeStamp = (id, m) => onChange({ ...plan, stamps: stamps.map(s => s.id === id ? { ...s, size: Math.max(0.1, num(m)) * pxPerM } : s) });
  const setLink = (id, itemId) => onChange({ ...plan, rooms: rooms.map(r => r.id === id ? { ...r, priceItemId: itemId } : r) });

  const saveSnapshot = () => { const cv = canvasRef.current; if (cv) onChange({ ...plan, snapshot: cv.toDataURL("image/jpeg", 0.85) }); };
  const shapeQty = (r) => r.wall ? perimeter(r.points, false)*mPerPx : shoelace(r.points)*mPerPx*mPerPx;
  const addToQuote = () => {
    const lines = rooms.filter(r => r.priceItemId).map(r => { const it = items.find(i => i.id === r.priceItemId); if (!it) return null; return { id: uid(), desc: it.description + " — " + r.name, unit: it.unit, rateEx: it.rate, category: it.category, qty: round2(shapeQty(r)), source: "Floor plan: " + plan.name }; }).filter(Boolean);
    if (!lines.length) { alert("Link a price item to a room or wall first."); return; }
    saveSnapshot(); onAddToQuote(lines);
  };
  const totalArea = rooms.filter(r => !r.wall).reduce((s, r) => s + shoelace(r.points) * mPerPx * mPerPx, 0);

  const DRAW_TOOLS = [["wall","Wall"],["curve","Curve"],["room","Room"],["move","Edit"]];
  const stampLabel = STAMP_LABEL[tool] || "";
  const hint = tool === "room" ? "Tap the grid to drop corners, then Finish to close the room. Corners snap to nearby corners so rooms close cleanly."
    : tool === "wall" ? "Tap to drop each corner and keep going around bends (drag works too); Finish when done. Set a length below to fix each segment."
    : tool === "curve" ? "Drag to draw a freehand curved wall."
    : tool === "move" ? "Tap an object to select it: drag it to move, drag the round knob to rotate, the square to resize, the red ✕ to delete. Drag room/wall corners to reshape."
    : "Tap the plan to drop a " + stampLabel + ". Then use Edit to move, rotate, resize or delete it by hand.";

  return (
    <div className="space-y-3">
      <div className="flex gap-2 items-center flex-wrap">
        <Field label="Grid = metres"><NumInput value={gridM} onCommit={v => onChange({ ...plan, gridMetres: v || 0.5 })} className="inp w-20" /></Field>
        <Field label="Wall height (m)"><NumInput value={plan.wallHeight || 2.7} onCommit={v => onChange({ ...plan, wallHeight: v || 2.7 })} className="inp w-24" /></Field>
        <label className="flex items-center gap-1 text-sm mt-4"><input type="checkbox" checked={snap} onChange={e => setSnap(e.target.checked)} /> Snap grid</label>
        <label className="flex items-center gap-1 text-sm mt-4"><input type="checkbox" checked={ortho} onChange={e => setOrtho(e.target.checked)} /> Straighten (90°/45°)</label>
        <label className="flex items-center gap-1 text-sm mt-4"><input type="checkbox" checked={labels} onChange={e => setLabels(e.target.checked)} /> Labels</label>
        {(rooms.length > 0 || stamps.length > 0) && <button className="btn btn-ghost !py-1 mt-3 ml-auto" onClick={clearAll}><IcTrash size={14} /> Clear plan</button>}
      </div>
      <div className="flex gap-2 items-center flex-wrap">
        <div className="scroll-x flex gap-1.5">
          {DRAW_TOOLS.map(([t,l]) => <button key={t} className={"tab " + (tool === t ? "tab-active" : "card")} onClick={() => { setTool(t); setDraft(null); }}>{l}</button>)}
        </div>
        <select className="inp !py-1.5 !w-auto" value={STAMP_DEFAULT_M[tool] ? tool : ""} onChange={e => { if (e.target.value){ setTool(e.target.value); setDraft(null); } }}>
          <option value="">+ Add object…</option>
          {STAMP_CATEGORIES.map(([cat, keys]) => <optgroup key={cat} label={cat}>{keys.map(k => <option key={k} value={k}>{STAMP_LABEL[k]}</option>)}</optgroup>)}
        </select>
        {STAMP_DEFAULT_M[tool] && <span className="text-sm" style={{ color: "var(--muted)" }}>Placing <b className="brand-text">{stampLabel}</b> — tap the plan</span>}
      </div>
      {tool === "wall" && <label className="flex items-center gap-2 text-sm"><input type="checkbox" checked={lockLen > 0} onChange={e => setLockLen(e.target.checked ? 3 : 0)} /> Fixed segment length {lockLen > 0 && <><NumInput value={lockLen} onCommit={v => setLockLen(v > 0 ? v : 0.1)} className="inp !py-1 w-20" /> m</>}</label>}
      {draft && (draft.tool === "room" || draft.tool === "wall")
        ? <div className="flex gap-2"><button className="btn btn-accent !py-1" onClick={draft.tool === "room" ? finishRoom : finishWall}><IcCheck size={14} /> Finish {draft.tool}</button><button className="btn btn-ghost !py-1" onClick={undoPt}>Undo pt</button><span className="text-sm self-center" style={{ color: "var(--muted)" }}>{draft.points.length} pt{draft.points.length === 1 ? "" : "s"}</span></div>
        : <div className="text-sm" style={{ color: "var(--muted)" }}>{hint} · 1 cell = {gridM} m</div>}

      <div ref={wrapRef} className="card overflow-auto" style={{ maxHeight: "60vh" }}>
        <canvas ref={canvasRef} className="editor" onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp} />
      </div>
      {(rooms.length > 0 || stamps.length > 0) && <button className="btn btn-primary w-full" onClick={() => setShow3d(true)}><IcGrid size={16} /> 3D view / render</button>}

      {rooms.length > 0 && (
        <div className="card p-3 space-y-2">
          <div className="flex justify-between items-center"><div className="font-semibold text-sm brand-text">Rooms & walls</div><div className="text-sm font-semibold">Total floor: {round2(totalArea).toFixed(2)} m²</div></div>
          {rooms.map(r => (
            <div key={r.id} className="flex items-center gap-2 text-sm flex-wrap">
              <span className="chip">{r.wall ? (r.curved ? "Curve" : "Wall") : "Room"}</span>
              <input className="inp !py-1" style={{ flex: "1 1 120px" }} placeholder="Name…" value={r.name || ""} onChange={e => renameShape(r.id, e.target.value)} />
              <span className="font-semibold whitespace-nowrap">{round2(shapeQty(r)).toFixed(2)}{r.wall ? " m" : " m²"}</span>
              <label className="flex items-center gap-1 whitespace-nowrap" style={{ color: "var(--muted)" }}>H<NumInput value={r.height || plan.wallHeight || 2.7} onCommit={v => setHeight(r.id, v)} className="inp !py-1 w-16" />m</label>
              <select className="inp !py-1" style={{ flex: "1 1 140px" }} value={r.priceItemId || ""} onChange={e => setLink(r.id, e.target.value)}><option value="">— link item —</option>{items.map(i => <option key={i.id} value={i.id}>{i.description}</option>)}</select>
              <button className="btn btn-ghost !p-1.5" onClick={() => delShape(r.id)}><IcTrash size={15} /></button>
            </div>
          ))}
          <div className="flex gap-2"><button className="btn btn-primary flex-1" onClick={addToQuote}><IcPlus size={16} /> Add to quote</button><button className="btn btn-ghost" onClick={saveSnapshot}>Save for report</button></div>
        </div>
      )}

      {stamps.length > 0 && (
        <div className="card p-3 space-y-2">
          <div className="font-semibold text-sm brand-text">Symbols & objects</div>
          {stamps.map(s => (
            <div key={s.id} className="flex items-center gap-2 text-sm flex-wrap">
              <span className="chip capitalize">{s.type}</span>
              <label className="flex items-center gap-1">size <NumInput value={round2(s.size / pxPerM)} onCommit={v => sizeStamp(s.id, v)} className="inp !py-1 w-16" />m</label>
              <label className="flex items-center gap-1">angle <NumInput value={s.angle || 0} onCommit={v => setAngle(s.id, v)} className="inp !py-1 w-16" />°</label>
              <button className="btn btn-ghost !py-1 !px-2" onClick={() => rotStamp(s.id, -15)}>↺</button>
              <button className="btn btn-ghost !py-1 !px-2" onClick={() => rotStamp(s.id, 15)}>↻</button>
              <button className="btn btn-ghost !p-1.5 ml-auto" onClick={() => delStamp(s.id)}><IcTrash size={15} /></button>
            </div>
          ))}
          <button className="btn btn-ghost w-full" onClick={saveSnapshot}>Save for report</button>
        </div>
      )}

      {show3d && <Plan3D plan={plan} onClose={() => setShow3d(false)} onSave={save3dRender} />}
    </div>
  );
}

function QuoteEditor({ project, onChange }){
  const { items, settings } = useStore();
  const [picker, setPicker] = useState(false);
  const [q, setQ] = useState("");
  const lines = project.quoteLines || [];
  const margin = project.margin ?? settings.defaultMargin;
  const gst = settings.gst;

  const subEx = lines.reduce((s, l) => s + num(l.qty) * num(l.rateEx), 0);
  const marginAmt = subEx * margin / 100;
  const totalEx = subEx + marginAmt;
  const gstAmt = totalEx * gst / 100;
  const totalInc = totalEx + gstAmt;

  const setLine = (id, patch) => onChange({ ...project, quoteLines: lines.map(l => l.id === id ? { ...l, ...patch } : l) });
  const delLine = (id) => onChange({ ...project, quoteLines: lines.filter(l => l.id !== id) });
  const addManual = () => onChange({ ...project, quoteLines: [...lines, { id: uid(), desc: "", qty: 1, unit: "ea", rateEx: 0, category: "", source: "Manual" }] });
  const addItem = (it) => { onChange({ ...project, quoteLines: [...lines, { id: uid(), desc: it.description, qty: 1, unit: it.unit, rateEx: it.rate, category: it.category, source: "Pricing DB" }] }); };

  const filtered = items.filter(i => { const s = q.trim().toLowerCase(); return !s || (i.description + " " + i.code).toLowerCase().includes(s); }).slice(0, 60);

  return (
    <div className="space-y-3">
      <div className="flex gap-2">
        <button className="btn btn-primary flex-1" onClick={() => setPicker(true)}><IcPrice size={16} /> Add from database</button>
        <button className="btn btn-ghost flex-1" onClick={addManual}><IcPlus size={16} /> Manual line</button>
      </div>

      {lines.length === 0 ? <Empty icon={<IcDoc size={44} />} title="No quote lines yet" sub="Add items from your pricing database, add manual lines, or push measurements across from the Takeoff / Floor plan tabs." /> : (
        <div className="card overflow-hidden">
          <div className="scroll-x">
            <table className="w-full text-sm min-w-[620px]">
              <thead><tr style={{ background: "var(--bg)", color: "var(--muted)" }} className="text-xs uppercase">
                <th className="text-left px-2 py-2">Description</th><th className="px-2 w-16">Qty</th><th className="px-2 w-16">Unit</th><th className="px-2 w-24 text-right">Rate ex</th><th className="px-2 w-24 text-right">Amount</th><th></th>
              </tr></thead>
              <tbody>
                {lines.map(l => (
                  <tr key={l.id} className="border-t align-top" style={{ borderColor: "var(--line)" }}>
                    <td className="px-2 py-1"><input className="inp !py-1" value={l.desc} onChange={e => setLine(l.id, { desc: e.target.value })} />{l.source && <div className="text-[10px] px-1" style={{ color: "var(--muted)" }}>{l.source}</div>}</td>
                    <td className="px-1 py-1"><NumInput value={l.qty} onCommit={v => setLine(l.id, { qty: v })} className="inp !py-1 !px-1 text-center" /></td>
                    <td className="px-1 py-1"><input className="inp !py-1 !px-1 text-center" value={l.unit} onChange={e => setLine(l.id, { unit: e.target.value })} /></td>
                    <td className="px-1 py-1"><NumInput value={l.rateEx} onCommit={v => setLine(l.id, { rateEx: v })} className="inp !py-1 !px-1 text-right" /></td>
                    <td className="px-2 py-1 text-right font-semibold whitespace-nowrap">{money(num(l.qty) * num(l.rateEx))}</td>
                    <td className="px-1 py-1"><button className="btn btn-ghost !p-1.5" onClick={() => delLine(l.id)}><IcTrash size={14} /></button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      <div className="card p-4 space-y-2 text-sm">
        <div className="flex justify-between"><span style={{ color: "var(--muted)" }}>Subtotal (ex GST)</span><span className="font-semibold">{money(subEx)}</span></div>
        <div className="flex justify-between items-center"><span style={{ color: "var(--muted)" }}>Margin
          <NumInput value={margin} onCommit={v => onChange({ ...project, margin: v })} className="inp !py-0.5 !px-1 w-16 inline-block ml-2" />%</span>
          <span className="font-semibold">{money(marginAmt)}</span></div>
        <div className="flex justify-between border-t pt-2" style={{ borderColor: "var(--line)" }}><span className="font-semibold">Total (ex GST)</span><span className="font-bold brand-text">{money(totalEx)}</span></div>
        <div className="flex justify-between"><span style={{ color: "var(--muted)" }}>GST ({gst}%)</span><span className="font-semibold">{money(gstAmt)}</span></div>
        <div className="flex justify-between text-base border-t pt-2" style={{ borderColor: "var(--line)" }}><span className="font-bold">Total (inc GST)</span><span className="font-bold">{money(totalInc)}</span></div>
      </div>

      <Modal open={picker} onClose={() => setPicker(false)} title="Add from pricing database" wide>
        <input className="inp mb-3" placeholder="Search…" value={q} onChange={e => setQ(e.target.value)} autoFocus />
        {items.length === 0 ? <p className="text-sm" style={{ color: "var(--muted)" }}>No items in the database yet. Add some under the Prices tab.</p> : (
          <div className="space-y-1 max-h-[55vh] overflow-y-auto">
            {filtered.map(i => (
              <button key={i.id} className="w-full text-left card p-2 flex justify-between items-center hover:brightness-95" onClick={() => { addItem(i); }}>
                <span className="text-sm"><b>{i.description}</b><span className="text-xs" style={{ color: "var(--muted)" }}> · {i.unit}{i.category ? " · " + i.category : ""}</span></span>
                <span className="font-semibold text-sm whitespace-nowrap ml-2">{money(i.rate)}</span>
              </button>
            ))}
          </div>
        )}
      </Modal>
    </div>
  );
}

function totalsFor(project, settings){
  const lines = project.quoteLines || [];
  const margin = project.margin ?? settings.defaultMargin;
  const subEx = lines.reduce((s, l) => s + num(l.qty) * num(l.rateEx), 0);
  const totalEx = subEx * (1 + margin / 100);
  const gstAmt = totalEx * settings.gst / 100;
  return { subEx, margin, marginAmt: totalEx - subEx, totalEx, gstAmt, totalInc: totalEx + gstAmt };
}

/* ---- export helpers ---- */
async function urlToDataUrl(url){ const res = await fetch(url); const blob = await res.blob(); return await new Promise((rs) => { const r = new FileReader(); r.onload = () => rs(r.result); r.readAsDataURL(blob); }); }
async function getLogoDataUrl(settings){ if (settings.logo) return settings.logo; try { return await urlToDataUrl(DEFAULT_LOGO); } catch(e){ return ""; } }
async function elementToPdf(el){
  const { jsPDF } = window.jspdf;
  const canvas = await html2canvas(el, { scale: 2, backgroundColor: "#ffffff", useCORS: true, windowWidth: el.scrollWidth });
  const pdf = new jsPDF({ unit: "pt", format: "a4", compress: true });
  const pageW = pdf.internal.pageSize.getWidth(), pageH = pdf.internal.pageSize.getHeight();
  const imgW = pageW, imgH = canvas.height * imgW / canvas.width;
  const img = canvas.toDataURL("image/jpeg", 0.92);
  if (imgH <= pageH) pdf.addImage(img, "JPEG", 0, 0, imgW, imgH);
  else { let pos = 0, remaining = imgH; while (remaining > 0){ pdf.addImage(img, "JPEG", 0, pos, imgW, imgH); remaining -= pageH; if (remaining > 0){ pdf.addPage(); pos -= pageH; } } }
  return pdf;
}
function quoteFilename(project, ext){ const q = (project.quoteNo || "quote").replace(/[^a-z0-9\-]/gi, "_"); return "RJG-" + q + "." + ext; }
async function shareOrEmailPdf(blob, filename, subject, body){
  const file = new File([blob], filename, { type: "application/pdf" });
  if (navigator.canShare && navigator.canShare({ files: [file] })){
    try { await navigator.share({ files: [file], title: subject, text: body }); return "shared"; }
    catch(e){ if (e && e.name === "AbortError") return "cancel"; }
  }
  download(filename, blob);
  window.location.href = "mailto:?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body + "\n\nThe quote PDF (" + filename + ") has been downloaded to this device — please attach it to this email.");
  return "fallback";
}
function buildWordHtml(project, settings, t, logo, attachments){

  return `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><title>Quotation ${esc(project.quoteNo)}</title></head>
  <body style="font-family:Arial,Helvetica,sans-serif;color:#141922;font-size:13px">
  <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:14px"><tr>
    <td style="background:${b};padding:14px 18px" width="55%">${logo?`<img src="${logo}" style="height:54px"/>`:`<span style="color:#fff;font-size:22px;font-weight:bold">${esc(settings.company)}</span>`}</td>
    <td style="background:${b};padding:14px 18px;color:#ffffff;text-align:right;font-size:11px" width="45%">${esc(settings.phone)}<br/>${esc(settings.address)}<br/>${esc(settings.website)}</td>
  </tr></table>
  <table width="100%" style="border-bottom:3px solid ${b};margin-bottom:14px"><tr>
    <td style="font-size:30px;font-weight:bold;color:${b}">QUOTATION</td>
    <td style="text-align:right;font-size:12px">Quote # <b>${esc(project.quoteNo)}</b><br/>Date ${esc(fmtDate(project.date||project.createdAt||now()))}<br/>Valid ${esc(settings.validity)}</td>
  </tr></table>
  <table width="100%" style="margin-bottom:14px"><tr>
    <td width="50%" valign="top"><div style="font-size:11px;font-weight:bold;text-transform:uppercase;color:#5b6472">Prepared for</div><b>${esc(project.client)}</b></td>
    <td width="50%" valign="top"><div style="font-size:11px;font-weight:bold;text-transform:uppercase;color:#5b6472">Site / project</div><b>${esc(project.title)}</b><br/>${esc(project.site)}</td>
  </tr></table>
  ${block("Scope of works", project.notes)}
  ${block("Exclusions", project.exclusions)}
  <table width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;margin-bottom:12px">
    <tr style="background:${b};color:#fff"><th align="left" style="padding:7px 10px">Description</th><th style="padding:7px">Qty</th><th style="padding:7px">Unit</th><th align="right" style="padding:7px 10px">Rate</th><th align="right" style="padding:7px 10px">Amount</th></tr>
    ${rows}
  </table>
  <table align="right" style="margin-bottom:14px;font-size:13px">
    ${t.margin>0?`<tr><td style="color:#5b6472;padding:2px 16px 2px 0">Subtotal</td><td align="right">${money(t.subEx)}</td></tr>`:""}
    <tr><td style="font-weight:bold;padding:2px 16px 2px 0">Total price ex GST</td><td align="right"><b>${money(t.totalEx)}</b></td></tr>
    <tr><td style="color:#5b6472;padding:2px 16px 2px 0">GST component (${settings.gst}%)</td><td align="right">${money(t.gstAmt)}</td></tr>
    <tr><td style="background:${b};color:#fff;font-weight:bold;padding:6px 10px">Total price inc GST</td><td style="background:${b};color:#fff;font-weight:bold;padding:6px 10px" align="right">${money(t.totalInc)}</td></tr>

function ReportView({ project, onChange }){
  const { settings, notify } = useStore();

  const [busy, setBusy] = useState("");
  const inc = (x) => x.include !== false;
  const photos = (project.photos || []).filter(p => p.data);
  const drawings = (project.drawings || []).filter(d => d.snapshot);
  const plans = (project.floorplans || []).filter(p => p.snapshot || p.render3d);
  const incPhotos = photos.filter(inc), incDrawings = drawings.filter(inc), incPlans = plans.filter(inc);
  const attachments = [
    ...incPhotos.map(p => ({ src: p.data, caption: p.caption || "Site photo" })),
    ...incDrawings.map(d => ({ src: d.snapshot, caption: "Takeoff — " + d.name })),
    ...incPlans.flatMap(p => [p.snapshot && { src: p.snapshot, caption: "Floor plan — " + p.name }, p.render3d && { src: p.render3d, caption: "3D — " + p.name }].filter(Boolean))
  ];
  const hasAttachChoices = photos.length + drawings.length + plans.length > 0;

  const toggle = (kind, id) => {
    const key = kind === "photo" ? "photos" : kind === "drawing" ? "drawings" : "floorplans";
    onChange({ ...project, [key]: (project[key] || []).map(x => x.id === id ? { ...x, include: x.include === false } : x) });
  };

  // Pre-build the PDF whenever the report content changes, so the Share button can
  // hand it to the OS share sheet instantly — iOS drops the tap "permission" if we
  // generate the PDF only after the tap, which is why the email wouldn't attach.
  const [shareBlob, setShareBlob] = useState(null);
  const genKey = JSON.stringify({ q: project.quoteNo, c: project.client, s: project.site, ti: project.title, n: project.notes, x: project.exclusions, m: project.margin, g: settings.gst, br: settings.brand, lines: (project.quoteLines || []).map(l => [l.desc, l.qty, l.rateEx, l.unit]), att: attachments.map(a => a.caption) });
  useEffect(() => {
    let cancelled = false; setShareBlob(null);
    const id = setTimeout(async () => { if (!sheetRef.current) return; try { const pdf = await elementToPdf(sheetRef.current); if (!cancelled) setShareBlob(pdf.output("blob")); } catch(e){} }, 500);
    return () => { cancelled = true; clearTimeout(id); };
  }, [genKey]);

  const subjectBody = () => ({
    subject: "Quotation " + (project.quoteNo || "") + (project.title ? " — " + project.title : ""),
    body: "Hi" + (project.client ? " " + project.client : "") + ",\n\nPlease find our quotation attached.\n\nTotal price inc GST: " + money(t.totalInc) + "\n\nKind regards,\n" + settings.company
  });
  const doPdf = async () => { setBusy("pdf"); try { let blob = shareBlob; if (!blob){ const pdf = await elementToPdf(sheetRef.current); blob = pdf.output("blob"); } download(quoteFilename(project, "pdf"), blob); } catch(e){ alert("PDF export failed: " + e.message); } setBusy(""); };
  const doShare = async () => {
    let blob = shareBlob;
    if (!blob){ setBusy("share"); try { const pdf = await elementToPdf(sheetRef.current); blob = pdf.output("blob"); setShareBlob(blob); } catch(e){ alert("Couldn't build the PDF: " + e.message); setBusy(""); return; } setBusy(""); }
    const { subject, body } = subjectBody();
    const file = new File([blob], quoteFilename(project, "pdf"), { type: "application/pdf" });
    if (navigator.canShare && navigator.canShare({ files: [file] })){
      try { await navigator.share({ files: [file], title: subject, text: body }); notify("Shared"); return; }
      catch(e){ if (e && e.name === "AbortError") return; }
    }
    // fallback (desktop / no file-share): download the PDF + open an email draft to attach it
    download(file.name, blob);
    window.location.href = "mailto:?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body + "\n\nThe quote PDF (" + file.name + ") has downloaded to this device — attach it to this email.");
  };
  const doWord = async () => { setBusy("word"); try { const logo = await getLogoDataUrl(settings); const html = buildWordHtml(project, settings, t, logo, attachments); download(quoteFilename(project, "doc"), new Blob([html], { type: "application/msword" })); } catch(e){ alert("Word export failed: " + e.message); } setBusy(""); };
  const doEmailLink = () => { const { subject, body } = subjectBody(); window.location.href = "mailto:?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body); };

  return (

          <button className="btn btn-ghost" disabled={busy} onClick={doWord}><IcDoc size={16} /> {busy === "word" ? "…" : "Word"}</button>
          <button className="btn btn-ghost" onClick={doEmailLink}><IcDoc size={16} /> Email (text only)</button>
          <button className="btn btn-ghost" disabled={busy} onClick={() => window.print()}><IcPrint size={16} /> Print</button>
        </div>
        {hasAttachChoices && (
          <div className="card p-3">
            <div className="font-semibold text-sm brand-text mb-2">Attachments to include</div>
            <div className="space-y-1 text-sm">
              {photos.map(p => <label key={p.id} className="flex items-center gap-2"><input type="checkbox" checked={inc(p)} onChange={() => toggle("photo", p.id)} /> <span className="chip">Photo</span> {p.caption || "Site photo"}</label>)}
              {drawings.map(d => <label key={d.id} className="flex items-center gap-2"><input type="checkbox" checked={inc(d)} onChange={() => toggle("drawing", d.id)} /> <span className="chip">Takeoff</span> {d.name}</label>)}

            </div>

      <div ref={sheetRef} className="report-sheet mx-auto shadow-sm overflow-hidden" style={{ border: "2px solid var(--brand)", borderRadius: 6 }}>
        {/* ===== letterhead band ===== */}
        <div className="flex justify-between items-center" style={{ background: "var(--brand)", color: "#fff", padding: "14px 22px" }}>
          <img src={settings.logo || DEFAULT_LOGO} alt={settings.company} style={{ height: 58 }} />
          <div className="text-right text-xs" style={{ lineHeight: 1.7 }}>
            {settings.phone && <div>{settings.phone}</div>}
            {settings.address && <div>{settings.address}</div>}
            {settings.website && <div>{settings.website}</div>}
          </div>
        </div>

        <div style={{ padding: "26px 30px" }}>
          {/* title row */}
          <div className="flex justify-between items-start gap-6 pb-4 mb-5" style={{ borderBottom: "3px solid var(--brand)" }}>
            <div className="wordmark brand-text" style={{ fontSize: 44, lineHeight: 1 }}>QUOTATION</div>
            <div className="text-right text-sm">
              <div><span style={{ color: "var(--muted)" }}>Quote #</span> <b>{project.quoteNo || "—"}</b></div>
              <div><span style={{ color: "var(--muted)" }}>Date</span> {fmtDate(project.date || project.createdAt || now())}</div>
              <div><span style={{ color: "var(--muted)" }}>Valid</span> {settings.validity}</div>
            </div>
          </div>

          {/* client / site */}
          <div className="grid grid-cols-2 gap-6 mb-5 text-sm">
            <div><div className="text-xs font-bold uppercase mb-1" style={{ color: "var(--muted)" }}>Prepared for</div><div className="font-semibold">{project.client || "—"}</div></div>
            <div><div className="text-xs font-bold uppercase mb-1" style={{ color: "var(--muted)" }}>Site / project</div><div className="font-semibold">{project.title || "—"}</div><div>{project.site}</div></div>
          </div>

          {/* scope / notes */}
          {project.notes && <div className="mb-5 text-sm" style={{ pageBreakInside: "avoid" }}><div className="text-xs font-bold uppercase mb-1" style={{ color: "var(--muted)" }}>Scope of works</div><div style={{ whiteSpace: "pre-wrap", color: "var(--ink)" }}>{project.notes}</div></div>}
          {project.exclusions && <div className="mb-5 text-sm" style={{ pageBreakInside: "avoid" }}><div className="text-xs font-bold uppercase mb-1" style={{ color: "var(--muted)" }}>Exclusions</div><div style={{ whiteSpace: "pre-wrap", color: "var(--ink)" }}>{project.exclusions}</div></div>}

          {/* line items */}
          <table className="w-full text-sm mb-4" style={{ borderCollapse: "collapse" }}>
            <thead><tr style={{ background: "var(--brand)", color: "#fff" }}>

            </tr></thead>
            <tbody>

          {/* totals — RJG wording */}
          <div className="flex justify-end mb-5" style={{ pageBreakInside: "avoid" }}>
            <div className="w-96 max-w-full text-sm space-y-1">
              {t.margin > 0 && <div className="flex justify-between gap-6" style={{ color: "var(--muted)" }}><span>Subtotal</span><span>{money(t.subEx)}</span></div>}
              <div className="flex justify-between gap-6 font-semibold"><span>Total price ex GST</span><span>{money(t.totalEx)}</span></div>
              <div className="flex justify-between gap-6"><span style={{ color: "var(--muted)" }}>GST component ({settings.gst}%)</span><span>{money(t.gstAmt)}</span></div>

  );
