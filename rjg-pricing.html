      const nm = (r.name || (r.wall ? "Wall" : "Room")) + ft;
      const main = { id: uid(), desc: it ? (it.description + " — " + nm) : nm, unit: it ? it.unit : (r.wall ? "m" : "m2"), rateEx: it ? it.rate : 0, category: it ? it.category : "", qty: round2(shapeQty(r)), source: "Floor plan: " + plan.name };
      // a closed wall with a floor type also sends its enclosed floor as an m² line
      const encl = wallEncloses(r);
      if (r.wall && encl > 0.01 && r.floorType){
        return [main, { id: uid(), desc: "Floor — " + FLOOR_LABEL[r.floorType] + (r.name ? " (" + r.name + ")" : ""), unit: "m2", rateEx: 0, category: "", qty: round2(encl), source: "Floor plan: " + plan.name }];
      }
      return [main];
    });
    saveSnapshot(); onAddToQuote(lines);
    const priced = lines.filter(l => l.rateEx > 0).length;
    notify(lines.length + " sent to quote" + (priced < lines.length ? " · " + (lines.length - priced) + " need a rate" : ""));
  };
  const totalArea = rooms.reduce((s, r) => s + ((!r.wall && !r.surface) ? shoelace(r.points) * mPerPx * mPerPx : wallEncloses(r)), 0);
  const setStampRoof = (id, roof) => onChange({ ...plan, stamps: stamps.map(s => s.id === id ? { ...s, roof } : s) });
  const toggleStampLock = (id) => onChange({ ...plan, stamps: stamps.map(s => s.id === id ? { ...s, locked: !s.locked } : s) });
  const toggleShapeLock = (id) => onChange({ ...plan, rooms: rooms.map(r => r.id === id ? { ...r, locked: !r.locked } : r) });
  const setSlabH = (id, m) => onChange({ ...plan, rooms: rooms.map(r => r.id === id ? { ...r, slabH: Math.max(0, num(m)) } : r) });
  const setFloorType = (id, ft) => onChange({ ...plan, rooms: rooms.map(r => r.id === id ? { ...r, floorType: ft } : r) });
  // lock / unlock everything at once (then unlock individual items to edit)
  const pr0 = plan.rooms || [], ps0 = plan.stamps || [];
  const anyUnlocked = [...pr0, ...ps0].some(x => !x.locked);
  const setAllLocked = (v) => onChange({ ...plan, rooms: pr0.map(r => ({ ...r, locked: v })), stamps: ps0.map(s => ({ ...s, locked: v })) });
  const setWallThick = (id, m) => onChange({ ...plan, rooms: rooms.map(r => r.id === id ? { ...r, thick: Math.max(0.02, num(m)) } : r) });
  const addOpening = (id, type) => onChange({ ...plan, stamps: stamps.map(s => s.id === id ? { ...s, openings: [...shedOpenings(s), type], door: undefined } : s) });
  const removeOpening = (id, idx) => onChange({ ...plan, stamps: stamps.map(s => s.id === id ? { ...s, openings: shedOpenings(s).filter((_, k) => k !== idx), door: undefined } : s) });
  // ---- type an exact size for the selected shape ----
  // A straight 2-point wall/fence: return its length (m).
  const segLenM = (r) => (r && r.points.length === 2) ? dist(r.points[0], r.points[1]) * mPerPx : null;
  const setSegLen = (id, m) => {
    const r = rooms.find(x => x.id === id); if (!r || r.points.length !== 2) return;
    const lenPx = Math.max(0.1, num(m)) / mPerPx, a = r.points[0], b = r.points[1];
    const dx = b.x - a.x, dy = b.y - a.y, d = Math.hypot(dx, dy) || 1;
    const nb = { x: clamp(a.x + dx/d*lenPx, 0, worldW), y: clamp(a.y + dy/d*lenPx, 0, worldH) };
    onChange({ ...plan, rooms: rooms.map(x => x.id === id ? { ...x, points: [a, nb] } : x) });
  };
  // An axis-aligned rectangle (4 corners): return {x0,y0,w,h} in world px, else null.
  const shapeRect = (r) => {
    if (!r || r.points.length !== 4) return null;
    const xs = r.points.map(p => p.x), ys = r.points.map(p => p.y);
    const x0 = Math.min(...xs), x1 = Math.max(...xs), y0 = Math.min(...ys), y1 = Math.max(...ys);
    const axis = r.points.every((p, i) => { const q = r.points[(i+1)%4]; return Math.abs(p.x-q.x) < 0.6 || Math.abs(p.y-q.y) < 0.6; });
    if (!axis || x1-x0 < 1 || y1-y0 < 1) return null;
    return { x0, y0, w: x1-x0, h: y1-y0 };
  };
  const setRectDim = (id, which, m) => {
    const r = rooms.find(x => x.id === id), rc = shapeRect(r); if (!rc) return;
    const px = Math.max(0.1, num(m)) / mPerPx;
    const nx1 = clamp(rc.x0 + (which === "w" ? px : rc.w), 0, worldW), ny1 = clamp(rc.y0 + (which === "h" ? px : rc.h), 0, worldH);
    const pts = r.points.map(p => ({ x: Math.abs(p.x-rc.x0) <= rc.w/2 ? rc.x0 : nx1, y: Math.abs(p.y-rc.y0) <= rc.h/2 ? rc.y0 : ny1 }));
    onChange({ ...plan, rooms: rooms.map(x => x.id === id ? { ...x, points: pts } : x) });
  };
  // Send a count of each object type to the quote (e.g. "6 × Downlight"). Rates left blank to fill in.
  const addStampsToQuote = () => {
    if (!stamps.length) { alert("Add objects first."); return; }
    const counts = {}; stamps.forEach(s => { counts[s.type] = (counts[s.type] || 0) + 1; });
    const lines = Object.entries(counts).map(([type, n]) => ({ id: uid(), desc: STAMP_LABEL[type] || type, qty: n, unit: "ea", rateEx: 0, category: "", source: "Floor plan: " + plan.name }));
    saveSnapshot(); onAddToQuote(lines);
    notify(lines.length + " object type(s) sent to quote · add rates on the quote");
  };
  const exportPdf = async () => {
    setPdfBusy(true);
    try { const pdf = await planToPdf(plan, settings); download("RJG-floorplan-" + (plan.name || "plan").replace(/[^a-z0-9\-]/gi, "_") + ".pdf", pdf.output("blob")); }
    catch (e) { alert("Plan PDF export failed: " + e.message); }
    setPdfBusy(false);
  };

  const DRAW_TOOLS = [["room","Room"],["wall","Wall"],["fenceline","Fence"],["curve","Curve"],["move","Edit"]];
  const stampLabel = STAMP_LABEL[tool] || "";
  const hint = tool === "room" ? "Tap the grid to drop corners, then Finish to close the room. Corners snap to nearby corners so rooms close cleanly."
    : tool === "wall" ? "Tap to drop each corner and keep going around bends; Finish when done. Choose external (200mm) or internal (90mm) below."
    : tool === "fenceline" ? "Tap to drop each fence corner and keep going — Finish when done. Pick the fence style below."
    : tool === "curve" ? "Drag to draw a freehand curved wall."
    : SURFACE_SET.has(tool) ? (surfMode === "rect" ? "Drag a rectangle for the " + SURFACE_LABEL[tool].toLowerCase() + " area — measured in m², can be sent to the quote." : "Tap the grid to outline the " + SURFACE_LABEL[tool].toLowerCase() + " area, then Finish. Measured in m².")
    : tool === "mk_line" ? "Drag to draw a reference line. Shows on the plan/report, not in 3D."
    : tool === "mk_arrow" ? "Drag to draw a reference arrow. Shows on the plan/report, not in 3D."
    : tool === "mk_text" ? "Tap where you want a note, then type it. Shows on the plan/report, not in 3D."
    : tool === "move" ? "Tap a room to select it — drag inside to move it, the green + to add a wall corner, the red ✕ to remove one, or drag any corner to reshape. Tap an object to move/resize/rotate it."
    : "Tap the plan to drop a " + stampLabel + ". Then use Edit to move, rotate, resize or delete it by hand.";
  const selShapeObj = rooms.find(r => r.id === selShape);

  return (
    <div className="space-y-3">
      <div className="flex gap-2 items-center flex-wrap">
        <Field label="Wall height (m)"><NumInput value={plan.wallHeight || 2.7} onCommit={v => onChange({ ...plan, wallHeight: v || 2.7 })} className="inp w-24" /></Field>
        <Field label="Snap to"><select className="inp !w-auto" value={snapIncM} onChange={e => onChange({ ...plan, snapInc: num(e.target.value) })}><option value="0.05">50 mm</option><option value="0.1">100 mm</option><option value="0.25">250 mm</option><option value="0.5">500 mm</option></select></Field>
        <label className="flex items-center gap-1 text-sm mt-4"><input type="checkbox" checked={snap} onChange={e => setSnap(e.target.checked)} /> Snap</label>
        <label className="flex items-center gap-1 text-sm mt-4"><input type="checkbox" checked={ortho} onChange={e => setOrtho(e.target.checked)} /> Straighten (90°/45°)</label>
        <label className="flex items-center gap-1 text-sm mt-4"><input type="checkbox" checked={labels} onChange={e => setLabels(e.target.checked)} /> Labels</label>
        <label className="flex items-center gap-1 text-sm mt-4"><input type="checkbox" checked={cleanView} onChange={e => setCleanView(e.target.checked)} /> Clean view</label>
        {(pr0.length > 0 || ps0.length > 0) && <button className="btn btn-ghost !py-1 mt-3 ml-auto" onClick={() => setAllLocked(anyUnlocked)} title="Lock or unlock every room, wall and object">{anyUnlocked ? "🔒 Lock all" : "🔓 Unlock all"}</button>}
        {(rooms.length > 0 || stamps.length > 0) && <button className="btn btn-ghost !py-1 mt-3" onClick={clearAll}><IcTrash size={14} /> Clear plan</button>}
      </div>
      <div className="flex gap-2 items-center flex-wrap">
        <div className="scroll-x flex gap-1.5">
          {DRAW_TOOLS.map(([t,l]) => <button key={t} className={"tab " + (tool === t ? "tab-active" : "card")} onClick={() => { setTool(t); setDraft(null); setSel(null); setSelShape(null); }}>{l}</button>)}
        </div>
        <select className="inp !py-1.5 !w-auto" value={STAMP_DEFAULT_M[tool] ? tool : ""} onChange={e => { if (e.target.value){ setTool(e.target.value); setDraft(null); } }}>
          <option value="">+ Add object…</option>
          {STAMP_CATEGORIES.map(([cat, keys]) => <optgroup key={cat} label={cat}>{keys.map(k => <option key={k} value={k}>{STAMP_LABEL[k]}</option>)}</optgroup>)}
        </select>
        {STAMP_DEFAULT_M[tool] && <span className="text-sm" style={{ color: "var(--muted)" }}>Placing <b className="brand-text">{stampLabel}</b> — tap the plan</span>}
      </div>
      <div className="flex gap-1.5 items-center flex-wrap">
        <span className="text-xs" style={{ color: "var(--muted)" }}>Ground area:</span>
        {SURFACE_KINDS.map(([t,l]) => <button key={t} className={"tab " + (tool === t ? "tab-active" : "card")} onClick={() => { setTool(t); setDraft(null); setSel(null); setSelShape(null); }}>{l}</button>)}
        {SURFACE_SET.has(tool) && <>
          <span className="text-xs ml-1" style={{ color: "var(--muted)" }}>draw:</span>
          <button className={"tab " + (surfMode === "rect" ? "tab-active" : "card")} onClick={() => { setSurfMode("rect"); setDraft(null); }}>▭ Rectangle</button>
          <button className={"tab " + (surfMode === "poly" ? "tab-active" : "card")} onClick={() => { setSurfMode("poly"); setDraft(null); }}>⬠ Dot-to-dot</button>
        </>}
      </div>
      <div className="flex gap-1.5 items-center flex-wrap">
        <span className="text-xs" style={{ color: "var(--muted)" }}>Markup (reference):</span>
        {[["mk_line","／ Line"],["mk_arrow","➔ Arrow"],["mk_text","T Text"]].map(([t,l]) => <button key={t} className={"tab " + (tool === t ? "tab-active" : "card")} onClick={() => { setTool(t); setDraft(null); setSel(null); setSelShape(null); }}>{l}</button>)}
        <input type="color" value={mkColor} onChange={e => setMkColor(e.target.value)} className="h-7 w-8 rounded border" title="Markup colour" style={{ borderColor: "var(--line)" }} />
      </div>
      {tool === "wall" && <div className="flex gap-1.5 items-center flex-wrap">
        <span className="text-xs" style={{ color: "var(--muted)" }}>Wall:</span>
        <button className={"tab " + (wallKind === "ext" ? "tab-active" : "card")} onClick={() => setWallKind("ext")}>External · 200mm</button>
        <button className={"tab " + (wallKind === "int" ? "tab-active" : "card")} onClick={() => setWallKind("int")}>Internal · 90mm</button>
        <label className="flex items-center gap-1 text-sm ml-2"><input type="checkbox" checked={lockLen > 0} onChange={e => setLockLen(e.target.checked ? 3 : 0)} /> Fixed length {lockLen > 0 && <><NumInput value={lockLen} onCommit={v => setLockLen(v > 0 ? v : 0.1)} className="inp !py-1 w-16" /> m</>}</label>
      </div>}
      {tool === "fenceline" && <div className="flex gap-1.5 items-center flex-wrap">
        <span className="text-xs" style={{ color: "var(--muted)" }}>Fence style:</span>
        {FENCE_WALL_STYLES.map(([v,l]) => <button key={v} className={"tab " + (fenceStyle === v ? "tab-active" : "card")} onClick={() => setFenceStyle(v)}>{l}</button>)}
      </div>}
      {draft && (draft.tool === "room" || draft.tool === "surface" || draft.tool === "wall")
        ? <div className="flex gap-2"><button className="btn btn-accent !py-1" onClick={draft.tool === "wall" ? finishWall : finishRoom}><IcCheck size={14} /> Finish {draft.tool === "surface" ? SURFACE_LABEL[draft.surface].toLowerCase() : draft.fence ? "fence" : draft.tool}</button><button className="btn btn-ghost !py-1" onClick={undoPt}>Undo pt</button><span className="text-sm self-center" style={{ color: "var(--muted)" }}>{draft.points.length} pt{draft.points.length === 1 ? "" : "s"}</span></div>
        : <div className="text-sm" style={{ color: "var(--muted)" }}>{hint} · 1 cell = {gridM} m</div>}

      <div className="flex items-center gap-2 text-sm" style={{ color: "var(--muted)" }}>
        <span>Zoom</span>
        <button className="btn btn-ghost !py-0.5 !px-2" onClick={() => setZoom(z => clamp(z/1.25, 0.15, 6))}>−</button>
        <span style={{ minWidth: 38, textAlign: "center" }}>{Math.round(zoom*100)}%</span>
        <button className="btn btn-ghost !py-0.5 !px-2" onClick={() => setZoom(z => clamp(z*1.25, 0.15, 6))}>+</button>
        {zoom !== 1 && <button className="btn btn-ghost !py-0.5 !px-2" onClick={() => setZoom(1)}>Fit</button>}
        <span className="text-xs">· pinch or scroll to zoom · two fingers to pan</span>
      </div>
      <div ref={wrapRef} className="card overflow-auto" style={{ maxHeight: "60vh" }}>
        <canvas ref={canvasRef} className="editor" style={{ touchAction: "none" }} onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp} />
      </div>
      {tool === "move" && selShapeObj && (() => {
        const segM = (selShapeObj.wall || selShapeObj.fence) ? segLenM(selShapeObj) : null;   // straight 2-pt wall/fence
        const rc = (!selShapeObj.wall && !selShapeObj.fence) ? shapeRect(selShapeObj) : null;  // rectangular room / surface
        return (
        <div className="flex items-center gap-2 flex-wrap card p-2" style={{ borderColor: "#e8792b" }}>
          <span className="chip" style={{ background: "rgba(232,121,43,.12)", color: "#b45309" }}>{selShapeObj.fence ? "Fence" : selShapeObj.wall ? (selShapeObj.curved ? "Curve" : "Wall") : selShapeObj.surface ? SURFACE_LABEL[selShapeObj.surface] : "Room"} selected{selShapeObj.name ? " · " + selShapeObj.name : ""}</span>
          {segM != null && <label className="flex items-center gap-1 text-sm">Length <NumInput value={round2(segM)} onCommit={v => setSegLen(selShape, v)} className="inp !py-1" style={{ width: 72 }} disabled={selShapeObj.locked} /> m</label>}
          {rc && <><label className="flex items-center gap-1 text-sm">Width <NumInput value={round2(rc.w * mPerPx)} onCommit={v => setRectDim(selShape, "w", v)} className="inp !py-1" style={{ width: 72 }} disabled={selShapeObj.locked} /> m</label>
            <label className="flex items-center gap-1 text-sm">Depth <NumInput value={round2(rc.h * mPerPx)} onCommit={v => setRectDim(selShape, "h", v)} className="inp !py-1" style={{ width: 72 }} disabled={selShapeObj.locked} /> m</label></>}
          <span className="text-xs" style={{ color: "var(--muted)" }}>{segM == null && !rc ? "drag corners to reshape · " : "type a size, or "}green + adds a corner · red ✕ removes one</span>
          <button className="btn btn-ghost !py-1 ml-auto" style={{ color: "#dc2626" }} onClick={() => { delShape(selShape); setSelShape(null); }}><IcTrash size={15} /> Delete</button>
        </div>
        );
      })()}
      {(rooms.length > 0 || stamps.length > 0) && <div className="flex gap-2">
        <button className="btn btn-primary flex-1" onClick={() => setShow3d(true)}><IcGrid size={16} /> 3D view / render</button>
        <button className="btn btn-ghost" disabled={pdfBusy} onClick={exportPdf} title="Scaled PDF with dimensions and a scale bar — measurable off the print"><IcDoc size={16} /> {pdfBusy ? "…" : "Measurable PDF"}</button>
      </div>}

      {rooms.length > 0 && (
        <div className="card p-3 space-y-2">
          <div className="flex justify-between items-center"><div className="font-semibold text-sm brand-text">Rooms & walls</div><div className="text-sm font-semibold">Total floor: {round2(totalArea).toFixed(2)} m²</div></div>
          {rooms.map(r => {
            const kindLabel = r.fence ? "Fence" : r.wall ? (r.curved ? "Curve" : "Wall") : r.surface ? SURFACE_LABEL[r.surface] : "Room";
            const encl = wallEncloses(r);   // >0 when this wall run closes into a floor
            return (
            <div key={r.id} className="rounded-lg p-2 space-y-1.5" style={{ border: "1px solid var(--line)", opacity: r.locked ? 0.65 : 1 }}>
              <div className="flex items-center gap-2">
                <span className="chip">{kindLabel}</span>
                <input className="inp !py-1" style={{ flex: "1 1 100px" }} placeholder="Name…" value={r.name || ""} onChange={e => renameShape(r.id, e.target.value)} disabled={r.locked} />
                {encl > 0.01 && <span className="chip" title="Floor area enclosed by this wall run" style={{ background: "rgba(2,34,75,.06)" }}>⌂ {round2(encl).toFixed(2)} m²</span>}
                <span className="font-semibold whitespace-nowrap">{round2(shapeQty(r)).toFixed(2)}{r.wall ? " m" : " m²"}</span>
                <button className="btn btn-ghost !p-1.5" title={r.locked ? "Unlock" : "Lock"} onClick={() => toggleShapeLock(r.id)}>{r.locked ? "🔒" : "🔓"}</button>
                <button className="btn btn-ghost !p-1.5" onClick={() => delShape(r.id)}><IcTrash size={15} /></button>
              </div>
              <div className="flex items-center gap-3 flex-wrap text-xs" style={{ color: "var(--muted)" }}>
                {!r.surface && !r.fence && <label className="flex items-center gap-1">H<NumInput value={r.height || plan.wallHeight || 2.7} onCommit={v => setHeight(r.id, v)} className="inp !py-1" style={{ width: 60 }} />m</label>}
                {r.wall && !r.fence && <label className="flex items-center gap-1">Thick<NumInput value={round2(r.thick != null ? r.thick : WALL_THICK.int)} onCommit={v => setWallThick(r.id, v)} className="inp !py-1" style={{ width: 60 }} />m</label>}
                {!r.wall && !r.surface && <label className="flex items-center gap-1">Wall<NumInput value={round2(r.thick != null ? r.thick : WALL_THICK.ext)} onCommit={v => setWallThick(r.id, v)} className="inp !py-1" style={{ width: 60 }} />m</label>}
                {((!r.wall && !r.surface) || encl > 0.01) && <select className="inp !py-1 !w-auto" value={r.floorType || ""} onChange={e => setFloorType(r.id, e.target.value)} title="Floor finish for this space">{FLOOR_TYPES.map(([v,l]) => <option key={v} value={v}>{l}</option>)}</select>}
                {r.surface && <label className="flex items-center gap-1">Slab height<NumInput value={round2(r.slabH || 0)} onCommit={v => setSlabH(r.id, v)} className="inp !py-1" style={{ width: 60 }} />m</label>}
                <select className="inp !py-1" style={{ flex: "1 1 140px" }} value={r.priceItemId || ""} onChange={e => setLink(r.id, e.target.value)}><option value="">— link {r.wall ? "m" : "m²"} rate —</option>{items.filter(i => unitFamily(i.unit) === (r.wall ? "length" : "area") || i.id === r.priceItemId).map(i => <option key={i.id} value={i.id}>{i.description} ({money(i.rate)}/{i.unit})</option>)}</select>
              </div>
            </div>
            );
          })}
          <div className="flex gap-2"><button className="btn btn-primary flex-1" onClick={addToQuote}><IcPlus size={16} /> Add to quote</button><button className="btn btn-ghost" onClick={saveSnapshot}>Save for report</button></div>
        </div>
      )}

      {stamps.length > 0 && (
        <div className="card p-3 space-y-2">
          <div className="font-semibold text-sm brand-text">Symbols & objects</div>
          {stamps.map(s => (
            <div key={s.id} className="rounded-lg p-2 space-y-1.5" style={{ border: "1px solid var(--line)", opacity: s.locked ? 0.65 : 1 }}>
              <div className="flex items-center gap-1.5">
                <span className="chip">{STAMP_LABEL[s.type] || s.type}</span>
                <div className="ml-auto flex items-center gap-1">
                  <button className="btn btn-ghost !py-1 !px-2" title="Rotate left" onClick={() => rotStamp(s.id, -15)}>↺</button>
                  <button className="btn btn-ghost !py-1 !px-2" title="Rotate right" onClick={() => rotStamp(s.id, 15)}>↻</button>
                  {STAMP_FLIP.has(s.type) && <button className="btn btn-ghost !py-1 !px-2" title="Flip" onClick={() => flipStamp(s.id)}>⇅</button>}
                  <button className="btn btn-ghost !p-1.5" title={s.locked ? "Unlock" : "Lock"} onClick={() => toggleStampLock(s.id)}>{s.locked ? "🔒" : "🔓"}</button>
                  <button className="btn btn-ghost !p-1.5" onClick={() => delStamp(s.id)}><IcTrash size={15} /></button>
                </div>
              </div>
              <div className="flex items-center gap-x-3 gap-y-1.5 flex-wrap text-xs" style={{ color: "var(--muted)" }}>
                <label className="flex items-center gap-1">{STAMP_LINEAR.has(s.type) ? "Length" : "W"}<NumInput value={round2(stampW(s) / pxPerM)} onCommit={v => setStampW(s.id, v)} className="inp !py-1" style={{ width: 68 }} />m</label>
                {!STAMP_ROUND.has(s.type) && !STAMP_LINEAR.has(s.type) && <label className="flex items-center gap-1">D<NumInput value={round2(stampD(s) / pxPerM)} onCommit={v => setStampD(s.id, v)} className="inp !py-1" style={{ width: 68 }} />m</label>}
                <label className="flex items-center gap-1">Angle<NumInput value={s.angle || 0} onCommit={v => setAngle(s.id, v)} className="inp !py-1" style={{ width: 60 }} />°</label>
                {STAMP_ROOFS[s.type] && <label className="flex items-center gap-1">Roof<select className="inp !py-1 !w-auto" value={s.roof || STAMP_ROOFS[s.type][0][0]} onChange={e => setStampRoof(s.id, e.target.value)}>{STAMP_ROOFS[s.type].map(([v,l]) => <option key={v} value={v}>{l}</option>)}</select></label>}
              </div>
              {s.type === "shed" && (
                <div className="flex items-center gap-1.5 flex-wrap text-xs" style={{ borderTop: "1px dashed var(--line)", paddingTop: 6 }}>
                  <span style={{ color: "var(--muted)" }}>Openings:</span>
                  {shedOpenings(s).map((op, i) => <span key={i} className="chip" style={{ background: "rgba(2,34,75,.06)" }}>{SHED_OPEN_LABEL[op] || op}<button className="ml-1" style={{ color: "#dc2626" }} onClick={() => removeOpening(s.id, i)}>✕</button></span>)}
                  {!shedOpenings(s).length && <span style={{ color: "var(--muted)" }}>none</span>}
                  <span className="ml-1" style={{ color: "var(--muted)" }}>add:</span>
                  {SHED_OPENINGS.map(([v,l]) => <button key={v} className="btn btn-ghost !py-0.5 !px-2" onClick={() => addOpening(s.id, v)}>+ {l}</button>)}
                </div>
              )}
            </div>
          ))}
          <div className="flex gap-2"><button className="btn btn-primary flex-1" onClick={addStampsToQuote} title="Adds a counted line per object type (e.g. 6 × Downlight)"><IcPlus size={16} /> Send object counts to quote</button><button className="btn btn-ghost" onClick={saveSnapshot}>Save for report</button></div>
        </div>
      )}

      {markups.length > 0 && (
        <div className="card p-3 space-y-2">
          <div className="font-semibold text-sm brand-text">Reference markups <span className="font-normal" style={{ color: "var(--muted)" }}>(plan & report only — not in 3D)</span></div>
          {markups.map(m => (
            <div key={m.id} className="flex items-center gap-2 text-sm">
              <span className="inline-block rounded" style={{ width: 12, height: 12, background: m.color || "#e11d48" }} />
              <span className="chip">{m.mk === "arrow" ? "Arrow" : m.mk === "text" ? "Text" : "Line"}</span>
              <span className="flex-1 truncate" style={{ color: "var(--muted)" }}>{m.mk === "text" ? m.text : ""}</span>
              <button className="btn btn-ghost !p-1.5" onClick={() => delMarkup(m.id)}><IcTrash size={15} /></button>
            </div>
          ))}
        </div>
      )}

      {show3d && <Plan3D plan={plan} onClose={() => setShow3d(false)} onSave={save3dRender} onPersist={(patch) => onChange({ ...plan, ...patch })} />}
    </div>
  );
}

/* =========================================================================
   QUOTE EDITOR
   ========================================================================= */
function QuoteEditor({ project, onChange, priced = true, kind = "new" }){
  const { items, settings, notify } = useStore();
  const [picker, setPicker] = useState(false);
  const [q, setQ] = useState("");
  const [pcat, setPcat] = useState("");
  const [ptype, setPtype] = useState("");
  const lines = project.quoteLines || [];
  const pickerCats = useMemo(() => [...new Set(items.map(i => i.category).filter(Boolean))].sort(), [items]);
  const pickerTypes = useMemo(() => COST_TYPES.filter(t => items.some(i => (i.type || "Material") === t)), [items]);
  const margin = project.margin ?? settings.defaultMargin;
  const gst = settings.gst;

  const inc = (l) => l.include !== false;   // a line can be kept but left off the quote/report
  const subEx = lines.filter(inc).reduce((s, l) => s + num(l.qty) * num(l.rateEx), 0);
  const marginAmt = subEx * margin / 100;
  const totalEx = subEx + marginAmt;
  const gstAmt = totalEx * gst / 100;
  const totalInc = totalEx + gstAmt;

  const setLine = (id, patch) => onChange({ ...project, quoteLines: lines.map(l => l.id === id ? { ...l, ...patch } : l) });
  const delLine = (id) => onChange({ ...project, quoteLines: lines.filter(l => l.id !== id) });
  const addManual = () => onChange({ ...project, quoteLines: [...lines, { id: uid(), desc: "", qty: 1, unit: "ea", rateEx: 0, category: "", source: "Manual" }] });
  const addItem = (it) => { onChange({ ...project, quoteLines: [...lines, { id: uid(), desc: it.description, qty: 1, unit: it.unit, rateEx: it.rate, category: it.category, source: "Pricing DB" }] }); notify("Added: " + it.description); };

  const matches = useMemo(() => {
    const s = q.trim().toLowerCase();
    return items.filter(i =>
      (!pcat || i.category === pcat) &&
      (!ptype || (i.type || "Material") === ptype) &&
      (!s || (i.description + " " + i.code + " " + (i.supplier || "") + " " + (i.category || "")).toLowerCase().includes(s)))
      .sort((a, b) => (a.category || "").localeCompare(b.category || "") || (a.description || "").localeCompare(b.description || ""));
  }, [items, q, pcat, ptype]);
  const CAP = 200;
  const filtered = matches.slice(0, CAP);

  return (
    <div className="space-y-3">
      <div className="flex gap-2">
        <button className="btn btn-primary flex-1" onClick={() => setPicker(true)}><IcPrice size={16} /> Add from database</button>
        <button className="btn btn-ghost flex-1" onClick={addManual}><IcPlus size={16} /> Manual line</button>
      </div>

      {!priced && <div className="text-xs" style={{ color: "var(--muted)" }}>Known quantities / measurements for the subcontractor to price from — description, qty and unit (no rates). Push measurements across from Takeoff / Floor plan, or add them by hand. These appear on the price request.</div>}

      {lines.length === 0 ? <Empty icon={<IcDoc size={44} />} title={priced ? "No quote lines yet" : "No quantities yet"} sub="Add items from your pricing database, add manual lines, or push measurements across from the Takeoff / Floor plan tabs." /> : (
        <div className="card overflow-hidden">
          <div className="scroll-x">
            <table className="w-full text-sm min-w-[620px]">
              <thead><tr style={{ background: "var(--bg)", color: "var(--muted)" }} className="text-xs uppercase">
                <th className="text-left px-2 py-2">Description</th><th className="px-2 w-16">Qty</th><th className="px-2 w-16">Unit</th>{priced && <><th className="px-2 w-24 text-right">Rate ex</th><th className="px-2 w-24 text-right">Amount</th></>}<th></th>
              </tr></thead>
              <tbody>
                {lines.map(l => (
                  <tr key={l.id} className="border-t align-top" style={{ borderColor: "var(--line)", opacity: inc(l) ? 1 : 0.45 }}>
                    <td className="px-2 py-1"><input className="inp !py-1" value={l.desc} onChange={e => setLine(l.id, { desc: e.target.value })} />{l.source && <div className="text-[10px] px-1" style={{ color: "var(--muted)" }}>{l.source}</div>}</td>
                    <td className="px-1 py-1"><NumInput value={l.qty} onCommit={v => setLine(l.id, { qty: v })} className="inp !py-1 !px-1 text-center" /></td>
                    <td className="px-1 py-1"><input className="inp !py-1 !px-1 text-center" value={l.unit} onChange={e => setLine(l.id, { unit: e.target.value })} /></td>
                    {priced && <td className="px-1 py-1"><NumInput value={l.rateEx} onCommit={v => setLine(l.id, { rateEx: v })} className="inp !py-1 !px-1 text-right" /></td>}
                    {priced && <td className="px-2 py-1 text-right font-semibold whitespace-nowrap">{money(num(l.qty) * num(l.rateEx))}</td>}
                    <td className="px-1 py-1 whitespace-nowrap"><input type="checkbox" checked={inc(l)} title={inc(l) ? "On the quote — untick to keep the line but leave it off" : "Kept but off the quote — tick to include"} onChange={e => setLine(l.id, { include: e.target.checked })} /> <button className="btn btn-ghost !p-1.5" onClick={() => delLine(l.id)}><IcTrash size={14} /></button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {priced && (
      <div className="card p-4 space-y-2 text-sm">
        <div className="flex justify-between"><span style={{ color: "var(--muted)" }}>Subtotal (ex GST)</span><span className="font-semibold">{money(subEx)}</span></div>
        <div className="flex justify-between items-center"><span style={{ color: "var(--muted)" }}>Margin
          <NumInput value={margin} onCommit={v => onChange({ ...project, margin: v })} className="inp !py-0.5 !px-1 w-16 inline-block ml-2" />%</span>
          <span className="font-semibold">{money(marginAmt)}</span></div>
        <div className="flex justify-between border-t pt-2" style={{ borderColor: "var(--line)" }}><span className="font-semibold">Total (ex GST)</span><span className="font-bold brand-text">{money(totalEx)}</span></div>
        <div className="flex justify-between"><span style={{ color: "var(--muted)" }}>GST ({gst}%)</span><span className="font-semibold">{money(gstAmt)}</span></div>
        <div className="flex justify-between text-base border-t pt-2" style={{ borderColor: "var(--line)" }}><span className="font-bold">Total (inc GST)</span><span className="font-bold">{money(totalInc)}</span></div>
        {(kind === "new" || kind === "variation") && margin > 0 && (() => { const mm = project.marginMode || (kind === "variation" ? "spread" : "show"); return (
          <div className="border-t pt-2" style={{ borderColor: "var(--line)" }}>
            <div className="text-xs font-semibold mb-1">Margin on the client's {kind === "variation" ? "variation" : "quote"}</div>
            <select className="inp" value={mm} onChange={e => onChange({ ...project, marginMode: e.target.value })}>
              <option value="show">Show margin — list Subtotal + Margin + Total</option>
              <option value="spread">Hide margin — spread it through the {kind === "variation" ? "price" : "item prices"}</option>
            </select>
            <div className="text-[10px] mt-1" style={{ color: "var(--muted)" }}>{mm === "spread" ? (kind === "variation" ? "Only the total is shown to the client; the margin is included but not itemised." : "Each item's rate on the quote includes the margin; no subtotal or margin line is shown.") : "The client sees the cost subtotal, the margin, then the total."}</div>
          </div>
        ); })()}
      </div>
      )}

      <Modal open={picker} onClose={() => setPicker(false)} title="Add from pricing database" wide>
        {items.length === 0 ? <p className="text-sm" style={{ color: "var(--muted)" }}>No items in the database yet. Add some under the Prices tab.</p> : (<>
          <div className="flex gap-2 mb-2">
            <input className="inp flex-1" placeholder="Search code, description, supplier, category…" value={q} onChange={e => setQ(e.target.value)} autoFocus />
          </div>
          <div className="flex gap-2 mb-2">
            <select className="inp flex-1" value={ptype} onChange={e => setPtype(e.target.value)}><option value="">All types</option>{pickerTypes.map(t => <option key={t} value={t}>{t}</option>)}</select>
            <select className="inp flex-1" value={pcat} onChange={e => setPcat(e.target.value)}><option value="">All categories</option>{pickerCats.map(c => <option key={c} value={c}>{c}</option>)}</select>
          </div>
          <div className="text-xs mb-2" style={{ color: "var(--muted)" }}>{matches.length} match{matches.length === 1 ? "" : "es"}{matches.length > CAP ? " · showing first " + CAP + ", refine to narrow" : ""} · tap to add (keeps open for more)</div>
          {matches.length === 0 ? <p className="text-sm" style={{ color: "var(--muted)" }}>No items match. Try a different search or clear the filters.</p> : (
          <div className="space-y-1 max-h-[52vh] overflow-y-auto">
            {filtered.map(i => (
              <button key={i.id} className="w-full text-left card p-2 flex justify-between items-center gap-2 hover:brightness-95" onClick={() => { addItem(i); }}>
                <span className="text-sm min-w-0">
                  <b>{i.description}</b>
                  <span className="block text-xs truncate" style={{ color: "var(--muted)" }}>{[i.code, (i.type || "Material"), i.category, i.supplier].filter(Boolean).join(" · ")}</span>
                </span>
                <span className="font-semibold text-sm whitespace-nowrap ml-2 text-right">{money(i.rate)}<span className="block text-xs font-normal" style={{ color: "var(--muted)" }}>/{i.unit}</span></span>
              </button>
            ))}
          </div>
          )}
        </>)}
      </Modal>
    </div>
  );
}

/* =========================================================================
   REPORT (branded, printable)
   ========================================================================= */
function totalsFor(project, settings){
  const lines = (project.quoteLines || []).filter(l => l.include !== false);   // excluded lines don't count
  const margin = project.margin ?? settings.defaultMargin;
  const subEx = lines.reduce((s, l) => s + num(l.qty) * num(l.rateEx), 0);
  const totalEx = subEx * (1 + margin / 100);
  const gstAmt = totalEx * settings.gst / 100;
  return { subEx, margin, marginAmt: totalEx - subEx, totalEx, gstAmt, totalInc: totalEx + gstAmt };
}

/* ---- export helpers ---- */
async function urlToDataUrl(url){ const res = await fetch(url); const blob = await res.blob(); return await new Promise((rs) => { const r = new FileReader(); r.onload = () => rs(r.result); r.readAsDataURL(blob); }); }
async function getLogoDataUrl(settings){ if (settings.logo) return settings.logo; try { return await urlToDataUrl(DEFAULT_LOGO); } catch(e){ return ""; } }
async function elementToPdf(el){
  const { jsPDF } = window.jspdf;
  const canvas = await html2canvas(el, { scale: 2, backgroundColor: "#ffffff", useCORS: true, windowWidth: el.scrollWidth });
  const pdf = new jsPDF({ unit: "pt", format: "a4", compress: true });
  const pageW = pdf.internal.pageSize.getWidth(), pageH = pdf.internal.pageSize.getHeight();
  const imgW = pageW, imgH = canvas.height * imgW / canvas.width;
  const img = canvas.toDataURL("image/jpeg", 0.92);
  if (imgH <= pageH) pdf.addImage(img, "JPEG", 0, 0, imgW, imgH);
  else { let pos = 0, remaining = imgH; while (remaining > 0){ pdf.addImage(img, "JPEG", 0, pos, imgW, imgH); remaining -= pageH; if (remaining > 0){ pdf.addPage(); pos -= pageH; } } }
  return pdf;
}
function quoteFilename(project, ext){ const q = (project.quoteNo || "quote").replace(/[^a-z0-9\-]/gi, "_"); return "RJG-" + q + "." + ext; }
async function shareOrEmailPdf(blob, filename, subject, body){
  const file = new File([blob], filename, { type: "application/pdf" });
  if (navigator.canShare && navigator.canShare({ files: [file] })){
    try { await navigator.share({ files: [file], title: subject, text: body }); return "shared"; }
    catch(e){ if (e && e.name === "AbortError") return "cancel"; }
  }
  download(filename, blob);
  window.location.href = "mailto:?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body + "\n\nThe quote PDF (" + filename + ") has been downloaded to this device — please attach it to this email.");
  return "fallback";
}
function buildWordHtml(project, settings, t, logo, attachments){
  const esc = (s) => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const nl = (s) => esc(s).replace(/\n/g, "<br/>");
  const b = settings.brand || "#02224B";
  const kind = jobKind(project), priced = JOB_KINDS[kind].priced;
  // mirror the on-screen report section toggles (everything shows unless turned off)
  const rShow = project.reportShow || {};
  const wScope = rShow.scope !== false, wExcl = rShow.exclusions !== false, wTerms = rShow.terms !== false;
  const wAtt = rShow.attachments !== false, wLines = rShow.lines !== false, wPrices = priced && rShow.prices !== false;
  const dueStr = project.dueDate ? fmtDate(project.dueDate) : "";
  const atts = (attachments || []).map(a => `<div style="margin:8px 0"><img src="${a.src}" style="max-width:520px;border:1px solid #e4e7ec"/><div style="font-size:11px;color:#5b6472">${esc(a.caption)}</div></div>`).join("");
  const block = (title, body) => body ? `<div style="margin:0 0 12px 0"><div style="font-weight:bold">${esc(title)}</div><div>${nl(body)}</div></div>` : "";
  const head = `<table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:14px"><tr>
    <td style="background:${b};padding:14px 18px" width="55%">${logo?`<img src="${logo}" style="height:54px"/>`:`<span style="color:#fff;font-size:22px;font-weight:bold">${esc(settings.company)}</span>`}</td>
    <td style="background:${b};padding:14px 18px;color:#ffffff;text-align:right;font-size:11px" width="45%">${esc(settings.phone)}<br/>${esc(settings.address)}<br/>${esc(settings.website)}</td>
  </tr></table>`;
  const foot = `<div style="background:${b};color:#fff;text-align:center;font-size:11px;font-weight:bold;padding:8px;margin-top:14px">ABN: ${esc(settings.abn)} &nbsp;•&nbsp; Open Builders Licence: ${esc(settings.license)} &nbsp;•&nbsp; ${esc(settings.website)}</div>`;
  const wrap = (title, inner) => `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><title>${esc(title)} ${esc(project.quoteNo)}</title></head><body style="font-family:Arial,Helvetica,sans-serif;color:#141922;font-size:13px">${head}${inner}${foot}</body></html>`;

  if (kind === "new") {
    // Margin display: "spread" folds the margin into each line rate (nothing shown);
    // otherwise it's itemised as Subtotal + Margin + Total.
    const spread = project.marginMode === "spread" && t.margin > 0;
    const mf = 1 + t.margin / 100;
    const dRate = (l) => spread ? num(l.rateEx) * mf : num(l.rateEx);
    const rows = (project.quoteLines || []).filter(l => l.include !== false).map((l, i) => `<tr><td style="border:1px solid #e4e7ec;padding:6px 10px;background:${i%2?'#f4f6f9':'#ffffff'}">${esc(l.desc)}</td><td style="border:1px solid #e4e7ec;padding:6px;text-align:center;background:${i%2?'#f4f6f9':'#ffffff'}">${round2(num(l.qty))}</td><td style="border:1px solid #e4e7ec;padding:6px;text-align:center;background:${i%2?'#f4f6f9':'#ffffff'}">${esc(l.unit)}</td>${wPrices?`<td style="border:1px solid #e4e7ec;padding:6px 10px;text-align:right;background:${i%2?'#f4f6f9':'#ffffff'}">${money(dRate(l))}</td><td style="border:1px solid #e4e7ec;padding:6px 10px;text-align:right;background:${i%2?'#f4f6f9':'#ffffff'}">${money(num(l.qty)*dRate(l))}</td>`:""}</tr>`).join("");
    const lineTable = wLines ? `<table width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;margin-bottom:12px">
      <tr style="background:${b};color:#fff"><th align="left" style="padding:7px 10px">Description</th><th style="padding:7px">Qty</th><th style="padding:7px">Unit</th>${wPrices?`<th align="right" style="padding:7px 10px">Rate</th><th align="right" style="padding:7px 10px">Amount</th>`:""}</tr>${rows}
    </table>` : "";
    const totalsTable = wPrices ? `<table align="right" style="margin-bottom:14px;font-size:13px">
      ${(!spread && t.margin>0)?`<tr><td style="color:#5b6472;padding:2px 16px 2px 0">Subtotal</td><td align="right">${money(t.subEx)}</td></tr><tr><td style="color:#5b6472;padding:2px 16px 2px 0">Margin (${t.margin}%)</td><td align="right">${money(t.marginAmt)}</td></tr>`:""}
      <tr><td style="font-weight:bold;padding:2px 16px 2px 0">Total price ex GST</td><td align="right"><b>${money(t.totalEx)}</b></td></tr>
      <tr><td style="color:#5b6472;padding:2px 16px 2px 0">GST component (${settings.gst}%)</td><td align="right">${money(t.gstAmt)}</td></tr>
      <tr><td style="background:${b};color:#fff;font-weight:bold;padding:6px 10px">Total price inc GST</td><td style="background:${b};color:#fff;font-weight:bold;padding:6px 10px" align="right">${money(t.totalInc)}</td></tr>
    </table><div style="clear:both"></div>` : "";
    return wrap("QUOTATION", `
    <table width="100%" style="border-bottom:3px solid ${b};margin-bottom:14px"><tr>
      <td style="font-size:30px;font-weight:bold;color:${b}">QUOTATION</td>
      <td style="text-align:right;font-size:12px">Quote # <b>${esc(project.quoteNo)}</b><br/>Date ${esc(fmtDate(project.date||project.createdAt||now()))}<br/>Valid ${esc(settings.validity)}</td>
    </tr></table>
    <table width="100%" style="margin-bottom:14px"><tr>
      <td width="50%" valign="top"><div style="font-size:11px;font-weight:bold;text-transform:uppercase;color:#5b6472">Prepared for</div><b>${esc(project.client)}</b></td>
      <td width="50%" valign="top"><div style="font-size:11px;font-weight:bold;text-transform:uppercase;color:#5b6472">Site / project</div><b>${esc(project.title)}</b><br/>${esc(project.site)}</td>
    </tr></table>
    ${wScope?block("Scope of works", project.notes):""}${wExcl?block("Exclusions", project.exclusions):""}
    ${lineTable}
    ${totalsTable}
    ${(wTerms&&wPrices)?`<div style="margin:8px 0 14px 0">Price is valid for <b>${esc(settings.validity)}</b>.<br/>${settings.noticeToStart?`<b>${esc(settings.noticeToStart)}</b> notice needed to start.<br/>`:""}${settings.paymentTerms?`Payment terms are <b>${esc(settings.paymentTerms)}</b>.`:""}</div>`:""}
    ${(wAtt&&atts)?`<div style="font-size:11px;font-weight:bold;text-transform:uppercase;color:#5b6472">Attachments</div>${atts}`:""}
    <div style="border-top:1px solid #e4e7ec;padding-top:8px;margin-top:10px;font-size:11px;color:#5b6472"><b style="color:#141922">Terms &amp; conditions</b><br/>${nl(project.terms||settings.terms)}</div>`);
  }

  // RFQ / Variation — matches the RJG "Request for Quotation / Variation Request" form
  const numLabel = kind === "rfq" ? "RFQ #" : "Variation #";
  const incLines = (project.quoteLines || []).filter(l => l.include !== false);
  const qtyRows = incLines.map((l, i) => `<tr><td style="border:1px solid #e4e7ec;padding:6px 10px;background:${i%2?'#f4f6f9':'#ffffff'}">${esc(l.desc)}</td><td style="border:1px solid #e4e7ec;padding:6px;text-align:center;background:${i%2?'#f4f6f9':'#ffffff'}">${round2(num(l.qty))}</td><td style="border:1px solid #e4e7ec;padding:6px;text-align:center;background:${i%2?'#f4f6f9':'#ffffff'}">${esc(l.unit)}</td></tr>`).join("");
  const knownQty = (kind === "rfq" && incLines.length) ? `<div style="font-weight:bold;margin-bottom:4px">Known quantities / measurements:</div><table width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;margin-bottom:4px"><tr style="background:${b};color:#fff"><th align="left" style="padding:6px 10px">Description</th><th style="padding:6px">Qty</th><th style="padding:6px">Unit</th></tr>${qtyRows}</table><div style="font-size:11px;color:#5b6472;margin-bottom:10px">Quantities are for reference only — please verify on site and from the attached before pricing.</div>` : "";
  const wMarginMode = project.marginMode || (kind === "variation" ? "spread" : "show");
  const marginRows = (kind === "variation" && wMarginMode === "show" && t.margin > 0) ? `<tr><td style="padding-right:24px;color:#5b6472">Subtotal:</td><td style="color:#5b6472">${money(t.subEx)}</td></tr><tr><td style="padding-right:24px;color:#5b6472">Margin (${t.margin}%):</td><td style="color:#5b6472">${money(t.totalEx - t.subEx)}</td></tr>` : "";
  const wTermsBlock = (priced && wTerms) ? `<div style="margin:10px 0">Price is valid for <b>${esc(settings.validity)}</b>.<br/>${settings.noticeToStart?`<b>${esc(settings.noticeToStart)}</b> is needed to start.<br/>`:""}${settings.paymentTerms?`Payment terms are <b>${esc(settings.paymentTerms)}</b>.`:""}</div>` : "";
  const wTotalsBlock = wPrices ? `<table style="font-size:13px;margin-bottom:8px">${marginRows}<tr><td style="padding-right:24px">Total price ex GST:</td><td><b>${money(t.totalEx)}</b></td></tr>
      <tr><td style="padding-right:24px">GST component:</td><td>${money(t.gstAmt)}</td></tr>
      <tr><td style="padding-right:24px;font-weight:bold">Total price inc GST:</td><td style="font-weight:bold">${money(t.totalInc)}</td></tr></table>` : "";
  const priceAndTerms = wTermsBlock + wTotalsBlock;
  return wrap(kind === "variation" ? "VARIATION REQUEST" : "REQUEST FOR QUOTATION", `
    <table width="100%" style="border-bottom:3px solid ${b};margin-bottom:12px"><tr>
      <td style="font-size:24px;font-weight:bold;color:${b}">${kind==="variation"?"VARIATION REQUEST":"REQUEST FOR QUOTATION"}</td>
      <td style="text-align:right;font-size:12px">${numLabel} <b>${esc(project.quoteNo)}</b><br/>Date ${esc(fmtDate(project.date||project.createdAt||now()))}${kind==="rfq"&&dueStr?`<br/>Price by <b>${esc(dueStr)}</b>`:""}</td>
    </tr></table>
    <div style="margin-bottom:12px">
      <div><b>Project Name:</b> ${esc(project.title)}${project.site?", "+esc(project.site):""}</div>
      <div><b>Contractor / Trade:</b> ${esc(project.trade)||"—"}</div>
      <div><b>Cause / Source:</b> ${esc(project.cause)||"—"}</div>
      ${kind==="rfq"?`<div><b>Quote to be submitted to:</b> ${esc(project.submitTo)||"—"}</div>${(project.subCompany||project.subName)?`<div><b>Sent to (subcontractor):</b> ${esc(project.subCompany)}${project.subName?" — "+esc(project.subName):""}${project.subEmail?" · "+esc(project.subEmail):""}${project.subPhone?" · "+esc(project.subPhone):""}</div>`:""}`:`<div><b>Prepared for:</b> ${esc(project.client)||"—"}</div>${project.contractRef?`<div><b>Original job / contract ref:</b> ${esc(project.contractRef)}</div>`:""}`}
    </div>
    ${wExcl?block("Exclusions / notes related to this:", project.exclusions):""}
    ${wScope?block("Description of scope / works "+(kind==="rfq"?"to be priced:":":"), project.notes):""}
    ${block("Documents / mark-ups / drawings to reference:", project.refs)}
    ${knownQty}
    ${(wAtt&&atts)?`<div style="font-weight:bold">Attached photos / mark-ups / plans</div>${atts}`:""}
    ${priceAndTerms}
    ${kind==="rfq"?`<div style="background:#e7f2f0;padding:10px;border-radius:4px;margin-bottom:8px">Please review the attached and provide your price for the above works${dueStr?" by "+esc(dueStr):""}. Return to ${esc(settings.email||settings.company)}.</div>`:""}
    <div style="border-top:1px solid #e4e7ec;padding-top:8px;margin-top:10px;font-size:11px;color:#5b6472"><b style="color:#141922">Request for Quotation / Variation Request</b><br/>Document No.: ${esc(settings.formDocNo)||"—"} &nbsp;&nbsp; Version No.: ${esc(settings.formDocVer)||"—"} &nbsp;&nbsp; Release Date: ${esc(settings.formDocRelease)||"—"}<br/>Uncontrolled if printed</div>`);
}

function ReportView({ project, onChange }){
  const { settings, notify } = useStore();
  const t = totalsFor(project, settings);
  const lines = (project.quoteLines || []).filter(l => l.include !== false);   // lines left off the quote don't print
  const kind = jobKind(project), kv = JOB_KINDS[kind], priced = kv.priced;
  // New-quote margin display: spread folds margin into the shown line rates.
  const effMarginMode = project.marginMode || (kind === "variation" ? "spread" : "show");   // how margin is presented to the client
  const qtSpread = kind === "new" && effMarginMode === "spread" && t.margin > 0;
  const qtRate = (l) => qtSpread ? num(l.rateEx) * (1 + t.margin / 100) : num(l.rateEx);
  const showVarMargin = kind === "variation" && effMarginMode === "show" && t.margin > 0;   // variation: itemise subtotal + margin
  // report section visibility — everything shows by default; each can be turned off
  const rShow = project.reportShow || {};
  const showScope = rShow.scope !== false, showExcl = rShow.exclusions !== false, showTerms = rShow.terms !== false;
  const showAtt = rShow.attachments !== false, showLines = rShow.lines !== false;
  const showPrices = priced && rShow.prices !== false;   // hide $ even on a priced quote (scope-only document)
  const setRShow = (k, v) => onChange({ ...project, reportShow: { ...rShow, [k]: v } });
  const rptTitle = kind === "rfq" ? "PRICE REQUEST" : kind === "variation" ? "VARIATION" : "QUOTATION";
  const numLabel = kind === "rfq" ? "RFQ #" : kind === "variation" ? "Variation #" : "Quote #";
  const sheetRef = useRef(null);
  const [busy, setBusy] = useState("");
  const inc = (x) => x.include !== false;
  const photos = (project.photos || []).filter(p => p.data);
  const drawings = (project.drawings || []).filter(d => d.snapshot || d.bg);   // takeoffs: marked-up snapshot, else the raw drawing
  const plans = (project.floorplans || []).filter(p => p.snapshot || p.render3d);
  const incPhotos = photos.filter(inc), incDrawings = drawings.filter(inc), incPlans = plans.filter(inc);
  const attachments = [
    ...incPhotos.map(p => ({ src: p.data, caption: p.caption || "Site photo" })),
    ...incDrawings.map(d => ({ src: d.snapshot || d.bg, caption: "Takeoff — " + d.name })),
    ...incPlans.flatMap(p => [p.snapshot && { src: p.snapshot, caption: "Floor plan — " + p.name }, p.render3d && { src: p.render3d, caption: "3D — " + p.name }].filter(Boolean))
  ];
  const hasAttachChoices = photos.length + drawings.length + plans.length > 0;

  const toggle = (kind, id) => {
    const key = kind === "photo" ? "photos" : kind === "drawing" ? "drawings" : "floorplans";
    onChange({ ...project, [key]: (project[key] || []).map(x => x.id === id ? { ...x, include: x.include === false } : x) });
  };

  // Pre-build the PDF whenever the report content changes, so the Share button can
  // hand it to the OS share sheet instantly — iOS drops the tap "permission" if we
  // generate the PDF only after the tap, which is why the email wouldn't attach.
  const [shareBlob, setShareBlob] = useState(null);
  const genKey = JSON.stringify({ k: kind, q: project.quoteNo, c: project.client, s: project.site, ti: project.title, n: project.notes, x: project.exclusions, ca: project.cause, st: project.submitTo, rf: project.refs, cr: project.contractRef, sm: project.showMargin, mm: project.marginMode, rs: project.reportShow, sc: project.subCompany, sn: project.subName, se: project.subEmail, sp: project.subPhone, tr: project.trade, dd: project.dueDate, m: project.margin, g: settings.gst, br: settings.brand, fd: [settings.formDocNo, settings.formDocVer, settings.formDocRelease], lines: (project.quoteLines || []).map(l => [l.desc, l.qty, l.rateEx, l.unit, l.include]), att: attachments.map(a => a.caption) });
  useEffect(() => {
    let cancelled = false; setShareBlob(null);
    const id = setTimeout(async () => { if (!sheetRef.current) return; try { const pdf = await elementToPdf(sheetRef.current); if (!cancelled) setShareBlob(pdf.output("blob")); } catch(e){} }, 500);
    return () => { cancelled = true; clearTimeout(id); };
  }, [genKey]);

  const dueStr = project.dueDate ? fmtDate(project.dueDate) : "";
  const subjectBody = () => {
    if (kind === "rfq") return {
      subject: "Price request " + (project.quoteNo || "") + (project.title ? " — " + project.title : ""),
      body: "Hi" + (project.subName ? " " + project.subName : "") + ",\n\nPlease find attached our price request for " + (project.title || "the works") + (project.site ? " at " + project.site : "") + ".\n\nThe marked-up photos, takeoffs and plans are attached for your pricing." + (dueStr ? "\n\nPlease provide your price by " + dueStr + "." : "") + "\n\nKind regards,\n" + settings.company
    };
    if (kind === "variation") return {
      subject: "Variation " + (project.quoteNo || "") + (project.title ? " — " + project.title : ""),
      body: "Hi" + (project.client ? " " + project.client : "") + ",\n\nPlease find attached a variation" + (project.contractRef ? " to " + project.contractRef : "") + " for your approval.\n\nTotal price inc GST: " + money(t.totalInc) + "\n\nKind regards,\n" + settings.company
    };
    return {
      subject: "Quotation " + (project.quoteNo || "") + (project.title ? " — " + project.title : ""),
      body: "Hi" + (project.client ? " " + project.client : "") + ",\n\nPlease find our quotation attached.\n\nTotal price inc GST: " + money(t.totalInc) + "\n\nKind regards,\n" + settings.company
    };
  };
  const doPdf = async () => { setBusy("pdf"); try { let blob = shareBlob; if (!blob){ const pdf = await elementToPdf(sheetRef.current); blob = pdf.output("blob"); } download(quoteFilename(project, "pdf"), blob); } catch(e){ alert("PDF export failed: " + e.message); } setBusy(""); };
  const doShare = async () => {
    let blob = shareBlob;
    if (!blob){ setBusy("share"); try { const pdf = await elementToPdf(sheetRef.current); blob = pdf.output("blob"); setShareBlob(blob); } catch(e){ alert("Couldn't build the PDF: " + e.message); setBusy(""); return; } setBusy(""); }
    const { subject, body } = subjectBody();
    const file = new File([blob], quoteFilename(project, "pdf"), { type: "application/pdf" });
    if (navigator.canShare && navigator.canShare({ files: [file] })){
      try { await navigator.share({ files: [file], title: subject, text: body }); notify("Shared"); return; }
      catch(e){ if (e && e.name === "AbortError") return; }
    }
    // fallback (desktop / no file-share): download the PDF + open an email draft to attach it
    download(file.name, blob);
    window.location.href = "mailto:?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body + "\n\nThe quote PDF (" + file.name + ") has downloaded to this device — attach it to this email.");
  };
  const doWord = async () => { setBusy("word"); try { const logo = await getLogoDataUrl(settings); const html = buildWordHtml(project, settings, t, logo, attachments); download(quoteFilename(project, "doc"), new Blob([html], { type: "application/msword" })); } catch(e){ alert("Word export failed: " + e.message); } setBusy(""); };
  const doEmailLink = () => { const { subject, body } = subjectBody(); window.location.href = "mailto:?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body); };

          <button className="btn btn-ghost" disabled={busy} onClick={doWord}><IcDoc size={16} /> {busy === "word" ? "…" : "Word"}</button>

          <button className="btn btn-ghost" disabled={busy} onClick={() => window.print()}><IcPrint size={16} /> Print</button>
        </div>
        <div className="card p-3">
          <div className="font-semibold text-sm brand-text mb-1">Attach to quote — tick what to include</div>
          {hasAttachChoices ? (
            <div className="space-y-1.5 text-sm mt-2">
              {photos.map(p => <label key={p.id} className="flex items-center gap-2"><input type="checkbox" checked={inc(p)} onChange={() => toggle("photo", p.id)} /> <img src={p.data} className="w-9 h-9 object-cover rounded border" style={{ borderColor: "var(--line)" }} /> <span className="chip">Photo</span> {p.caption || "Site photo"}</label>)}
              {drawings.map(d => <label key={d.id} className="flex items-center gap-2"><input type="checkbox" checked={inc(d)} onChange={() => toggle("drawing", d.id)} /> <img src={d.snapshot || d.bg} className="w-9 h-9 object-cover rounded border" style={{ borderColor: "var(--line)" }} /> <span className="chip">Takeoff</span> {d.name}{!d.snapshot && <span className="text-xs" style={{ color: "var(--muted)" }}> (open it & tap “Add marked-up copy” to show your markups)</span>}</label>)}
              {plans.map(p => <label key={p.id} className="flex items-center gap-2"><input type="checkbox" checked={inc(p)} onChange={() => toggle("plan", p.id)} /> <img src={p.render3d || p.snapshot} className="w-9 h-9 object-cover rounded border" style={{ borderColor: "var(--line)" }} /> <span className="chip">Plan</span> {p.name}{p.render3d ? " (incl. 3D)" : ""}</label>)}
            </div>
          ) : <div className="text-xs mt-1" style={{ color: "var(--muted)" }}>Nothing to attach yet. Add site photos in the <b>Photos</b> tab, drawings/takeoffs in <b>Drawings / Takeoff</b>, or a <b>Floor plan</b> — they'll appear here to tick on.</div>}
        </div>
        <div className="card p-3">
          <div className="font-semibold text-sm brand-text mb-1">Show on this report — untick to hide a section</div>
          <div className="flex flex-wrap gap-x-5 gap-y-1.5 text-sm mt-2">
            {priced && <label className="flex items-center gap-2"><input type="checkbox" checked={showPrices} onChange={(e) => setRShow("prices", e.target.checked)} /> Prices ($ rates &amp; totals)</label>}
            {kind === "new" && <label className="flex items-center gap-2"><input type="checkbox" checked={showLines} onChange={(e) => setRShow("lines", e.target.checked)} /> Line-item table</label>}
            <label className="flex items-center gap-2"><input type="checkbox" checked={showScope} onChange={(e) => setRShow("scope", e.target.checked)} /> Scope of works</label>
            <label className="flex items-center gap-2"><input type="checkbox" checked={showExcl} onChange={(e) => setRShow("exclusions", e.target.checked)} /> Exclusions</label>
            {priced && <label className="flex items-center gap-2"><input type="checkbox" checked={showTerms} onChange={(e) => setRShow("terms", e.target.checked)} /> Terms &amp; payment</label>}
            <label className="flex items-center gap-2"><input type="checkbox" checked={showAtt} onChange={(e) => setRShow("attachments", e.target.checked)} /> Attachments</label>

          <div className="text-right text-xs" style={{ lineHeight: 1.7 }}>
            {settings.phone && <div>{settings.phone}</div>}
            {settings.address && <div>{settings.address}</div>}
            {settings.website && <div>{settings.website}</div>}
          </div>

          {kind === "new" ? (<>

            <div><div className="text-xs font-bold uppercase mb-1" style={{ color: "var(--muted)" }}>Site / project</div><div className="font-semibold">{project.title || "—"}</div><div>{project.site}</div></div>

          {showExcl && project.exclusions && <div className="mb-5 text-sm" style={{ pageBreakInside: "avoid" }}><div className="text-xs font-bold uppercase mb-1" style={{ color: "var(--muted)" }}>Exclusions</div><div style={{ whiteSpace: "pre-wrap", color: "var(--ink)" }}>{project.exclusions}</div></div>}
          {showLines && (

              <th className="text-left px-3 py-2">Description</th><th className="px-2 py-2 w-14">Qty</th><th className="px-2 py-2 w-14">Unit</th>{showPrices && <><th className="px-3 py-2 w-24 text-right">Rate</th><th className="px-3 py-2 w-24 text-right">Amount</th></>}
            </tr></thead>
            <tbody>
              {lines.map((l, i) => (
                <tr key={l.id} style={{ background: i % 2 ? "#f4f6f9" : "#fff" }}>

                  <td className="px-2 py-2 text-center" style={{ borderBottom: "1px solid var(--line)" }}>{round2(num(l.qty))}</td>
                  <td className="px-2 py-2 text-center" style={{ borderBottom: "1px solid var(--line)" }}>{l.unit}</td>

                  <td className="px-3 py-2 text-right" style={{ borderBottom: "1px solid var(--line)" }}>{money(num(l.qty) * qtRate(l))}</td></>}
                </tr>
              ))}
              {lines.length === 0 && <tr><td colSpan={showPrices ? "5" : "3"} className="px-3 py-4 text-center" style={{ color: "var(--muted)" }}>No line items.</td></tr>}
            </tbody>
          </table>
          )}
          {showPrices && (
          <div className="flex justify-end mb-5" style={{ pageBreakInside: "avoid" }}>
            <div className="w-96 max-w-full text-sm space-y-1">
              {!qtSpread && t.margin > 0 && <div className="flex justify-between gap-6" style={{ color: "var(--muted)" }}><span>Subtotal</span><span>{money(t.subEx)}</span></div>}
              {!qtSpread && t.margin > 0 && <div className="flex justify-between gap-6" style={{ color: "var(--muted)" }}><span>Margin ({t.margin}%)</span><span>{money(t.marginAmt)}</span></div>}

            </div>
          )}

          {/* validity / notice / payment + price — priced kinds only (not on a subbie price request) */}
          {priced && (<>
          {showTerms && (
          <div className="text-sm space-y-0.5 mb-3" style={{ pageBreakInside: "avoid" }}>
            <div>Price is valid for <b>{settings.validity}</b>.</div>
            {settings.noticeToStart && <div><b>{settings.noticeToStart}</b> is needed to start.</div>}
            {settings.paymentTerms && <div>Payment terms are <b>{settings.paymentTerms}</b>.</div>}
          </div>
          )}
          {showPrices && (
          <div className="text-sm mb-2" style={{ pageBreakInside: "avoid" }}>
            {showVarMargin && <>
              <div className="flex justify-between" style={{ maxWidth: 320, color: "var(--muted)" }}><span>Subtotal:</span><span>{money(t.subEx)}</span></div>
              <div className="flex justify-between" style={{ maxWidth: 320, color: "var(--muted)" }}><span>Margin ({t.margin}%):</span><span>{money(t.totalEx - t.subEx)}</span></div>
            </>}
            <div className="flex justify-between" style={{ maxWidth: 320 }}><span>Total price ex GST:</span><span className="font-semibold">{money(t.totalEx)}</span></div>
            <div className="flex justify-between" style={{ maxWidth: 320 }}><span>GST component:</span><span>{money(t.gstAmt)}</span></div>
            <div className="flex justify-between font-bold" style={{ maxWidth: 320 }}><span>Total price inc GST:</span><span>{money(t.totalInc)}</span></div>
          </div>
          )}
          </>)}
          {kind === "rfq" && <div className="text-xs mt-2 p-2 rounded" style={{ background: "rgba(15,118,110,.08)" }}>Please review the attached and provide your price for the above works{dueStr ? " by " + dueStr : ""}. Return to {settings.email || settings.company}.</div>}
          {/* doc-control block (matches form footer) */}
          <div className="text-xs pt-3 mt-4" style={{ borderTop: "1px solid var(--line)", color: "var(--muted)" }}>
            <div className="font-semibold" style={{ color: "var(--ink)" }}>Request for Quotation / Variation Request</div>
            <div className="flex gap-5 flex-wrap mt-1">
              <span>Document No.: {settings.formDocNo || "—"}</span>
              <span>Version No.: {settings.formDocVer || "—"}</span>
              <span>Release Date: {settings.formDocRelease || "—"}</span>
            </div>
            <div className="mt-0.5">Uncontrolled if printed</div>
          </div>
          </>)}
        </div>

        {/* ===== footer band ===== */}
        <div className="text-center text-xs font-semibold" style={{ background: "var(--brand)", color: "#fff", padding: "10px 20px" }}>
          ABN: {settings.abn} &nbsp;•&nbsp; Open Builders Licence: {settings.license} &nbsp;•&nbsp; {settings.website}
        </div>
      </div>
    </div>
  );
}
