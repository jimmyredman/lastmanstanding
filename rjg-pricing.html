// Returns an array of drawing objects (one per PDF page, or one for an image).
function newDrawingsFromFile(file){
  return new Promise((resolve, reject) => {
    const name = file.name.replace(/\.[^.]+$/, "");
    if (file.type === "application/pdf" || /\.pdf$/i.test(file.name)) {
      const r = new FileReader();
      r.onload = async () => {
        try {
          const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(r.result) }).promise;
          const n = pdf.numPages;
          const out = [];
          for (let i = 1; i <= n; i++){
            const page = await pdf.getPage(i);
            const vp = page.getViewport({ scale: 2 });
            const cv = document.createElement("canvas"); cv.width = vp.width; cv.height = vp.height;
            await page.render({ canvasContext: cv.getContext("2d"), viewport: vp }).promise;
            out.push({ id: uid(), name: n > 1 ? name + " — p" + i : name, type: "pdf", bg: cv.toDataURL("image/jpeg", 0.82), natW: vp.width, natH: vp.height, annotations: [], scaleMpp: null });
          }
          resolve(out);
        } catch (e) { reject(e); }
      };
      r.readAsArrayBuffer(file);
    } else {
      const r = new FileReader();
      r.onerror = () => reject(new Error("read"));
      r.onload = () => {
        const im = new Image();
        // never hang: if the image can't decode (e.g. an odd format), fail cleanly so the UI can tell the user
        const guard = setTimeout(() => reject(new Error("decode-timeout")), 20000);
        im.onerror = () => { clearTimeout(guard); reject(new Error("decode")); };
        im.onload = () => {
          clearTimeout(guard);
          // downscale big phone photos so they store/render fast (cap longest edge ~2400px)
          const MAX = 2400, w = im.naturalWidth, h = im.naturalHeight, sc = Math.min(1, MAX / Math.max(w, h));
          let bg = r.result, nw = w, nh = h;
          if (sc < 1) {
            try { const cv = document.createElement("canvas"); nw = Math.round(w * sc); nh = Math.round(h * sc); cv.width = nw; cv.height = nh; cv.getContext("2d").drawImage(im, 0, 0, nw, nh); bg = cv.toDataURL("image/jpeg", 0.85); } catch (_) { bg = r.result; nw = w; nh = h; }
          }
          resolve([{ id: uid(), name, type: "image", bg, natW: nw, natH: nh, annotations: [], scaleMpp: null }]);
        };
        im.src = r.result;
      };
      r.readAsDataURL(file);
    }
  });
}

function JobWorkspace({ project, onChange, onBack, onDelete }){
  const { notify } = useStore();
  const [tab, setTab] = useState("details");
  const [openDrawing, setOpenDrawing] = useState(null);
  const [openPlan, setOpenPlan] = useState(null);
  const [loading, setLoading] = useState(false);
  const drawings = project.drawings || [];
  const plans = project.floorplans || [];
  const photos = project.photos || [];

  const upd = (patch) => onChange({ ...project, ...patch });
  const updDrawing = (d) => onChange({ ...project, drawings: drawings.map(x => x.id === d.id ? d : x) });
  const updPlan = (p) => onChange({ ...project, floorplans: plans.map(x => x.id === p.id ? p : x) });
  const updPhoto = (id, patch) => onChange({ ...project, photos: photos.map(p => p.id === id ? { ...p, ...patch } : p) });
  const delPhoto = (id) => onChange({ ...project, photos: photos.filter(p => p.id !== id) });
  const addPhotos = (e) => {
    const files = [...e.target.files]; if (!files.length) return;
    let pending = files.length; const added = [];
    files.forEach(file => { const r = new FileReader(); r.onload = () => { added.push({ id: uid(), data: r.result, caption: "", include: true }); if (--pending === 0) onChange({ ...project, photos: [...photos, ...added] }); }; r.readAsDataURL(file); });
    e.target.value = "";
  };
  const addToQuote = (newLines) => { onChange({ ...project, quoteLines: [...(project.quoteLines || []), ...newLines] }); notify(newLines.length + " line(s) added to quote"); setTab("quote"); setOpenDrawing(null); setOpenPlan(null); };

  const onFile = async (e) => {
    const file = e.target.files[0]; if (!file) return; setLoading(true);
    try { const ds = await newDrawingsFromFile(file); onChange({ ...project, drawings: [...drawings, ...ds] }); setOpenDrawing(ds[0].id); if (ds.length > 1) notify(ds.length + " pages added"); }
    catch (err) { alert("Could not load that file. Photos: use a JPG/PNG (an iPhone HEIC photo may need 'Most Compatible' in Settings › Camera › Formats, or take a screenshot of it). PDFs: be online the first time so the PDF engine can load."); }
    setLoading(false); e.target.value = "";
  };
  const addPlan = () => { const p = { id: uid(), name: "Floor plan " + (plans.length + 1), gridMetres: 0.5, rooms: [] }; onChange({ ...project, floorplans: [...plans, p] }); setOpenPlan(p.id); };
  const dupPlan = (p) => { const copy = { ...p, id: uid(), name: p.name + " (copy)", snapshot: undefined, rooms: (p.rooms || []).map(r => ({ ...r, id: uid(), points: r.points.map(pt => ({ ...pt })) })), stamps: (p.stamps || []).map(s => ({ ...s, id: uid() })) }; onChange({ ...project, floorplans: [...plans, copy] }); notify("Floor plan duplicated"); };

  const curDrawing = drawings.find(d => d.id === openDrawing);
  const curPlan = plans.find(p => p.id === openPlan);
  const kind = jobKind(project), kv = JOB_KINDS[kind];
  const quoteTabLabel = kind === "rfq" ? "Known quantities" : kind === "variation" ? "Variation items" : "Quote";
  const tabs = [["details", "Details"], ["drawings", "Drawings / Takeoff"], ["plans", "Floor plan"], ["photos", "Photos"], ["quote", quoteTabLabel], ["report", "Report"]];
  const t = totalsFor(project, useStore().settings);

  return (
    <div className="max-w-4xl mx-auto p-4 pb-28">
      <div className="flex items-center gap-2 mb-3">
        <button className="btn btn-ghost !p-2" onClick={onBack}><IcBack size={18} /></button>
        <div className="flex-1 min-w-0"><div className="font-bold truncate flex items-center gap-2"><span className="chip" style={{ background: kv.badge, color: "#fff" }}>{kv.short}</span>{project.title || "Untitled"}</div><div className="text-xs truncate" style={{ color: "var(--muted)" }}>{kind === "rfq" ? (project.subCompany || project.subName || "") : project.client} {(kind === "rfq" ? (project.subCompany||project.subName) : project.client) && project.site ? "·" : ""} {project.site}</div></div>
        {kv.priced ? <div className="text-right"><div className="text-xs" style={{ color: "var(--muted)" }}>Total inc GST</div><div className="font-bold brand-text">{money(t.totalInc)}</div></div> : <div className="text-right"><div className="text-xs" style={{ color: "var(--muted)" }}>{kv.short}</div><div className="font-bold" style={{ color: kv.badge }}>Price request</div></div>}
      </div>

      <div className="scroll-x flex gap-1.5 mb-4">
        {tabs.map(([k, l]) => <button key={k} className={"tab " + (tab === k ? "tab-active" : "card")} onClick={() => { setTab(k); setOpenDrawing(null); setOpenPlan(null); }}>{l}</button>)}
      </div>

      {tab === "details" && (
        <div className="card p-4 space-y-3">
          <div className="grid grid-cols-2 gap-3">
            <Field label={kind === "rfq" ? "RFQ #" : kind === "variation" ? "Variation #" : "Quote #"}><input className="inp" value={project.quoteNo || ""} onChange={e => upd({ quoteNo: e.target.value })} /></Field>
            <Field label="Date"><input type="date" className="inp" value={new Date(project.date || project.createdAt || now()).toISOString().slice(0,10)} onChange={e => upd({ date: new Date(e.target.value).getTime() })} /></Field>
          </div>

          {kind === "rfq" ? (<>
            <Field label="Project name"><input className="inp" placeholder="e.g. 22 Percy Street, West End — External ACM removal" value={project.title || ""} onChange={e => upd({ title: e.target.value })} /></Field>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Contractor / Trade"><input className="inp" placeholder="e.g. Asbestos Removal" value={project.trade || ""} onChange={e => upd({ trade: e.target.value })} /></Field>
              <Field label="Price required by"><input type="date" className="inp" value={project.dueDate ? new Date(project.dueDate).toISOString().slice(0,10) : ""} onChange={e => upd({ dueDate: e.target.value ? new Date(e.target.value).getTime() : null })} /></Field>
            </div>
            <Field label="Cause / Source"><textarea className="inp" rows="2" placeholder="e.g. Client (Rizon) has requested removal of the existing external ACM wall cladding…" value={project.cause || ""} onChange={e => upd({ cause: e.target.value })} /></Field>
            <Field label="Quote to be submitted to"><input className="inp" placeholder="e.g. RJG Builders / Rizon" value={project.submitTo || ""} onChange={e => upd({ submitTo: e.target.value })} /></Field>
            <div className="text-xs font-bold uppercase mt-2" style={{ color: "var(--muted)" }}>Subcontractor (who you're sending it to)</div>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Company"><input className="inp" value={project.subCompany || ""} onChange={e => upd({ subCompany: e.target.value })} /></Field>
              <Field label="Contact name"><input className="inp" value={project.subName || ""} onChange={e => upd({ subName: e.target.value })} /></Field>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Email"><input className="inp" type="email" value={project.subEmail || ""} onChange={e => upd({ subEmail: e.target.value })} /></Field>
              <Field label="Phone"><input className="inp" type="tel" value={project.subPhone || ""} onChange={e => upd({ subPhone: e.target.value })} /></Field>
            </div>
            <Field label="Site address"><input className="inp" value={project.site || ""} onChange={e => upd({ site: e.target.value })} /></Field>
            <Field label="Exclusions / notes related to this"><textarea className="inp" rows="5" placeholder="Highlight specific exclusions or notes — services disconnection, air monitoring, replacement not included, etc." value={project.exclusions || ""} onChange={e => upd({ exclusions: e.target.value })} /></Field>
            <Field label="Description of scope / works to be priced"><textarea className="inp" rows="5" placeholder="Give accurate details of what the contractor is to price." value={project.notes || ""} onChange={e => upd({ notes: e.target.value })} /></Field>
            <Field label="Documents / mark-ups / drawings to reference"><textarea className="inp" rows="2" placeholder="e.g. Site reference photos attached. No formal asbestos register held." value={project.refs || ""} onChange={e => upd({ refs: e.target.value })} /></Field>
          </>) : kind === "variation" ? (<>
            <Field label="Project name"><input className="inp" value={project.title || ""} onChange={e => upd({ title: e.target.value })} /></Field>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Contractor / Trade"><input className="inp" value={project.trade || ""} onChange={e => upd({ trade: e.target.value })} /></Field>
              <Field label="Client"><input className="inp" value={project.client || ""} onChange={e => upd({ client: e.target.value })} /></Field>
            </div>
            <Field label="Site address"><input className="inp" value={project.site || ""} onChange={e => upd({ site: e.target.value })} /></Field>
            <Field label="Original job / contract reference"><input className="inp" placeholder="e.g. RJG-Q0042 / contract no." value={project.contractRef || ""} onChange={e => upd({ contractRef: e.target.value })} /></Field>
            <Field label="Cause / Source (reason for variation)"><textarea className="inp" rows="2" placeholder="e.g. Additional works requested by client / unforeseen site condition." value={project.cause || ""} onChange={e => upd({ cause: e.target.value })} /></Field>
            <Field label="Exclusions / notes related to this"><textarea className="inp" rows="4" value={project.exclusions || ""} onChange={e => upd({ exclusions: e.target.value })} /></Field>
            <Field label="Description of scope / works"><textarea className="inp" rows="5" value={project.notes || ""} onChange={e => upd({ notes: e.target.value })} /></Field>
            <Field label="Documents / mark-ups / drawings to reference"><textarea className="inp" rows="2" value={project.refs || ""} onChange={e => upd({ refs: e.target.value })} /></Field>
            <p className="text-xs" style={{ color: "var(--muted)" }}>Choose whether to show or spread the margin under <b>Variation items</b> → margin.</p>
          </>) : (<>
            <Field label="Job / project title"><input className="inp" value={project.title || ""} onChange={e => upd({ title: e.target.value })} /></Field>
            <Field label="Client"><input className="inp" value={project.client || ""} onChange={e => upd({ client: e.target.value })} /></Field>
            <Field label="Site address"><input className="inp" value={project.site || ""} onChange={e => upd({ site: e.target.value })} /></Field>
            <Field label="Scope / notes (shown on quote)"><textarea className="inp" rows="4" value={project.notes || ""} onChange={e => upd({ notes: e.target.value })} /></Field>
            <Field label="Exclusions (shown on quote after scope)"><textarea className="inp" rows="4" placeholder="e.g. Services disconnection excluded. Replacement cladding not included. Full-time air monitoring excluded." value={project.exclusions || ""} onChange={e => upd({ exclusions: e.target.value })} /></Field>
          </>)}

          <button className="btn btn-primary w-full" onClick={() => { upd({ updatedAt: now() }); notify("Details saved"); }}><IcCheck size={16} /> Save details</button>
          <p className="text-xs text-center" style={{ color: "var(--muted)" }}>Changes save automatically as you type — this just confirms it.</p>
          <button className="btn btn-danger w-full" onClick={onDelete}><IcTrash size={16} /> Delete</button>
        </div>
      )}

      {tab === "drawings" && !curDrawing && (
        <div className="space-y-3">
          <label className="btn btn-primary cursor-pointer w-full">{loading ? "Loading…" : <><IcUpload size={16} /> Add drawing (PDF or photo)</>}<input type="file" accept="application/pdf,image/*" className="hidden" onChange={onFile} disabled={loading} /></label>
          {drawings.length === 0 ? <Empty icon={<IcRuler size={44} />} title="No drawings yet" sub="Add a PDF plan or a site photo, calibrate the scale, then measure lengths/areas, count items and add markups." /> :
            <div className="grid grid-cols-2 gap-3">
              {drawings.map(d => (
                <div key={d.id} className="card overflow-hidden">
                  <button className="block w-full" onClick={() => setOpenDrawing(d.id)}><img src={d.snapshot || d.bg} className="w-full h-32 object-cover" /></button>
                  <div className="p-2 flex items-center justify-between"><span className="text-sm font-semibold truncate">{d.name}</span><button className="btn btn-ghost !p-1.5" onClick={() => onChange({ ...project, drawings: drawings.filter(x => x.id !== d.id) })}><IcTrash size={14} /></button></div>
                </div>
              ))}
            </div>}
        </div>
      )}
      {tab === "drawings" && curDrawing && (() => {
        const di = drawings.findIndex(d => d.id === curDrawing.id);
        const go = (step) => { const n = drawings[di + step]; if (n) setOpenDrawing(n.id); };
        return (
        <div className="space-y-3">
          <div className="flex items-center gap-2">
            <button className="btn btn-ghost !p-2" onClick={() => setOpenDrawing(null)} title="Back to all drawings"><IcBack size={16} /></button>
            <input className="inp flex-1 min-w-0" value={curDrawing.name} onChange={e => updDrawing({ ...curDrawing, name: e.target.value })} />
          </div>
          {drawings.length > 1 && (
            <div className="flex items-center justify-between gap-2 card p-1.5">
              <button className="btn btn-ghost !py-1.5" disabled={di <= 0} onClick={() => go(-1)}><IcBack size={16} /> Prev</button>
              <div className="flex items-center gap-1 overflow-x-auto px-1 flex-1 justify-center">
                {drawings.map((d, i) => (
                  <button key={d.id} onClick={() => setOpenDrawing(d.id)} title={d.name}
                    className={"shrink-0 rounded overflow-hidden border-2 " + (d.id === curDrawing.id ? "" : "opacity-60")}
                    style={{ borderColor: d.id === curDrawing.id ? "var(--brand)" : "transparent" }}>
                    <img src={d.snapshot || d.bg} className="h-11 w-14 object-cover block" />
                  </button>
                ))}
              </div>
              <button className="btn btn-ghost !py-1.5" disabled={di >= drawings.length - 1} onClick={() => go(1)}>Next <IcFwd size={16} /></button>
            </div>
          )}
          <div className="text-xs text-center" style={{ color: "var(--muted)" }}>Drawing {di + 1} of {drawings.length}{drawings.length > 1 ? " · flick with Prev / Next or tap a thumbnail" : ""}</div>
          <TakeoffCanvas key={curDrawing.id} drawing={curDrawing} onChange={updDrawing} onAddToQuote={addToQuote} priced={kv.priced} />
        </div>
        );
      })()}

      {tab === "plans" && !curPlan && (
        <div className="space-y-3">
          <button className="btn btn-primary w-full" onClick={addPlan}><IcPlus size={16} /> New floor plan</button>
          {plans.length === 0 ? <Empty icon={<IcGrid size={44} />} title="No floor plans yet" sub="Draw a scaled floor plan on a grid — rooms auto-calculate area and perimeter, and can feed straight into the quote." /> :
            <div className="grid grid-cols-2 gap-3">
              {plans.map(p => (
                <div key={p.id} className="card overflow-hidden">
                  <button className="block w-full" onClick={() => setOpenPlan(p.id)}>{p.snapshot ? <img src={p.snapshot} className="w-full h-32 object-cover" /> : <div className="h-32 flex items-center justify-center" style={{ background: "var(--bg)", color: "var(--muted)" }}><IcGrid size={32} /></div>}</button>
                  <div className="p-2 flex items-center justify-between gap-1"><span className="text-sm font-semibold truncate">{p.name}</span><div className="flex gap-1"><button className="btn btn-ghost !p-1.5" title="Duplicate" onClick={() => dupPlan(p)}><IcCopy size={14} /></button><button className="btn btn-ghost !p-1.5" onClick={() => onChange({ ...project, floorplans: plans.filter(x => x.id !== p.id) })}><IcTrash size={14} /></button></div></div>
                </div>
              ))}
            </div>}
        </div>
      )}
      {tab === "plans" && curPlan && (
        <div className="space-y-3">
          <div className="flex items-center gap-2"><button className="btn btn-ghost !p-2" onClick={() => setOpenPlan(null)}><IcBack size={16} /></button><input className="inp flex-1" value={curPlan.name} onChange={e => updPlan({ ...curPlan, name: e.target.value })} /></div>
          <FloorPlanEditor key={curPlan.id} plan={curPlan} onChange={updPlan} onAddToQuote={addToQuote} />
        </div>
      )}

      {tab === "photos" && (
        <div className="space-y-3">
          <div className="flex gap-2">
            <label className="btn btn-primary flex-1 cursor-pointer"><IcCamera size={16} /> Take photo<input type="file" accept="image/*" capture="environment" className="hidden" onChange={addPhotos} /></label>
            <label className="btn btn-ghost flex-1 cursor-pointer"><IcUpload size={16} /> Add photos<input type="file" accept="image/*" multiple className="hidden" onChange={addPhotos} /></label>
          </div>
          {photos.length === 0 ? <Empty icon={<IcCamera size={44} />} title="No photos yet" sub="Take a photo on site or add from your gallery. Tick which ones go on the quote in the Report tab." /> :
            <div className="grid grid-cols-2 gap-3">
              {photos.map(p => (
                <div key={p.id} className="card overflow-hidden">
                  <img src={p.data} className="w-full h-40 object-cover" />
                  <div className="p-2 space-y-2">
                    <input className="inp !py-1 text-sm" placeholder="Caption (shown on quote)" value={p.caption || ""} onChange={e => updPhoto(p.id, { caption: e.target.value })} />
                    <div className="flex items-center justify-between text-xs">
                      <label className="flex items-center gap-1"><input type="checkbox" checked={p.include !== false} onChange={e => updPhoto(p.id, { include: e.target.checked })} /> On quote</label>
                      <button className="btn btn-ghost !p-1.5" onClick={() => delPhoto(p.id)}><IcTrash size={14} /></button>
                    </div>
                  </div>
                </div>
              ))}
            </div>}
        </div>
      )}

      {tab === "quote" && <QuoteEditor project={project} onChange={onChange} priced={kv.priced} kind={kind} />}
      {tab === "report" && <ReportView project={project} onChange={onChange} />}
    </div>
  );
}

/* =========================================================================
   JOBS LIST
   ========================================================================= */
function JobsScreen({ onOpen }){
  const { projects, upsertProject, settings } = useStore();
  const [q, setQ] = useState("");
  const [chooser, setChooser] = useState(false);
  const createKind = async (kind) => {
    setChooser(false);
    const k = JOB_KINDS[kind]; const seqKey = k.seq; const seq = settings[seqKey] || 1;
    const p = await upsertProject({ kind, title: "", client: "", site: "", date: now(), quoteNo: k.prefix + String(seq).padStart(4, "0"), margin: settings.defaultMargin, terms: settings.terms, drawings: [], floorplans: [], quoteLines: [] });
    await dbPut("kv", { ...settings, [seqKey]: seq + 1 }, "settings");
    onOpen(p.id);
  };
  const s = q.trim().toLowerCase();
  const filtered = s ? projects.filter(p => ((p.title||"") + " " + (p.client||"") + " " + (p.site||"") + " " + (p.quoteNo||"")).toLowerCase().includes(s)) : projects;
  const pipeline = projects.reduce((sum, p) => sum + (JOB_KINDS[jobKind(p)].priced ? totalsFor(p, settings).totalInc : 0), 0);
  return (
    <div className="max-w-4xl mx-auto p-4 pb-28">
      {/* hero banner */}
      <div className="rounded-2xl p-5 mb-4 text-white flex items-center justify-between gap-3" style={{ background: "linear-gradient(135deg, var(--brand) 0%, #123f78 100%)", boxShadow: "0 8px 22px rgba(2,34,75,.20)" }}>
        <div className="min-w-0">
          <div className="wordmark" style={{ fontSize: 30, lineHeight: 1 }}>JOBS</div>
          <div className="text-xs mt-1.5" style={{ opacity: .85 }}>{projects.length} job{projects.length === 1 ? "" : "s"}{pipeline > 0 ? " · " + money(pipeline) + " inc GST" : ""}</div>
        </div>
        <button className="btn font-bold" onClick={() => setChooser(true)} style={{ background: "#fff", color: "var(--brand)", boxShadow: "0 2px 8px rgba(0,0,0,.12)" }}><IcPlus size={16} /> New</button>
      </div>
      <Modal open={chooser} onClose={() => setChooser(false)} title="What are you creating?">
        <div className="space-y-2">
          {Object.entries(JOB_KINDS).map(([k, v]) => (
            <button key={k} className="w-full text-left card p-3 hover:brightness-95" onClick={() => createKind(k)} style={{ borderLeft: "5px solid " + v.badge }}>
              <div className="flex items-center gap-2"><span className="chip" style={{ background: v.badge, color: "#fff" }}>{v.short}</span><span className="font-bold">{v.label}</span></div>
              <div className="text-xs mt-1" style={{ color: "var(--muted)" }}>{k === "new" ? "Full quote to a client — client details, priced items, RJG quotation." : k === "rfq" ? "Send scope + marked-up photos, takeoffs & plans to a subbie to price. No prices shown — they send a price back to you." : "Priced variation on an existing job — client + original job reference, on the variation letterhead."}</div>
            </button>
          ))}
        </div>
      </Modal>
      {projects.length > 0 && (
        <div className="relative mb-4">
          <span className="absolute left-3 top-1/2 -translate-y-1/2" style={{ color: "var(--muted)" }}><IcSearch size={16} /></span>
          <input className="inp" style={{ paddingLeft: 38 }} placeholder="Search jobs — client, site, title, quote #…" value={q} onChange={e => setQ(e.target.value)} />
        </div>
      )}
      {projects.length === 0 ? <Empty icon={<IcJobs size={48} />} title="No jobs yet" sub="Tap ‘New job’ to start pricing, take off drawings and produce a quote." /> :
       filtered.length === 0 ? <Empty icon={<IcSearch size={44} />} title="No matches" sub="No jobs match your search." /> : (
        <div className="grid sm:grid-cols-2 gap-3">
          {filtered.map(p => {
            const t = totalsFor(p, settings); const kd = jobKind(p), kv = JOB_KINDS[kd];
            const who = kd === "rfq" ? (p.subCompany || p.subName || "No subcontractor") : (p.client || "No client");
            const bits = [(p.drawings||[]).length && ((p.drawings||[]).length + " dwg"), (p.floorplans||[]).length && ((p.floorplans||[]).length + " plan"), (p.photos||[]).length && ((p.photos||[]).length + " photo"), (p.quoteLines||[]).length && ((p.quoteLines||[]).length + (kd === "rfq" ? " item" : " line"))].filter(Boolean).join(" · ");
            return (
              <button key={p.id} className="text-left transition" onClick={() => onOpen(p.id)}
                style={{ background: "var(--paper)", border: "1px solid var(--line)", borderLeft: "5px solid " + kv.badge, borderRadius: 14, padding: 16, boxShadow: "0 1px 3px rgba(2,34,75,.06)" }}>
                <div className="flex justify-between items-start gap-2">
                  <div className="min-w-0"><div className="font-bold truncate">{p.title || (kd === "rfq" ? "Untitled request" : kd === "variation" ? "Untitled variation" : "Untitled job")}</div><div className="text-sm truncate" style={{ color: "var(--muted)" }}>{who}</div></div>
                  <div className="flex flex-col items-end gap-1" style={{ flex: "0 0 auto" }}><span className="chip" style={{ background: kv.badge, color: "#fff" }}>{kv.short}</span><span className="chip">{p.quoteNo}</span></div>
                </div>
                <div className="text-xs mt-2 truncate flex items-center gap-1" style={{ color: "var(--muted)" }}><IcPin size={12} /> {p.site || "—"}</div>
                {bits && <div className="text-xs mt-1" style={{ color: "var(--muted)" }}>{bits}</div>}
                <div className="flex justify-between items-end mt-3 pt-3" style={{ borderTop: "1px solid var(--line)" }}>
                  <span className="text-xs" style={{ color: "var(--muted)" }}>{fmtDate(p.date || p.createdAt)}</span>
                  {kv.priced ? <span className="font-extrabold brand-text text-lg">{money(t.totalInc)}<span className="text-xs font-normal" style={{ color: "var(--muted)" }}> inc</span></span> : <span className="text-xs font-semibold" style={{ color: kv.badge }}>Price request</span>}
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* =========================================================================
   APP SHELL
   ========================================================================= */
function AppShell(){
  const { settings, projects, upsertProject, deleteProject, ready } = useStore();
  const [nav, setNav] = useState("jobs");
  const [jobId, setJobId] = useState(null);

  // tapping a text/number field selects its contents so the keyboard opens and you can type straight over it
  useEffect(() => {
    const h = (e) => { const el = e.target; if (el && el.tagName === "INPUT" && /^(text|number|search|tel|)$/.test((el.getAttribute("type") || "").toLowerCase())) { setTimeout(() => { try { el.select(); } catch(_){} }, 0); } };
    document.addEventListener("focusin", h); return () => document.removeEventListener("focusin", h);
  }, []);

  // apply brand colours
  useEffect(() => {
    document.documentElement.style.setProperty("--brand", settings.brand || "#02224B");
    document.documentElement.style.setProperty("--brand-2", settings.brand2 || "#2B5AA0");
    const meta = document.querySelector('meta[name="theme-color"]'); if (meta) meta.content = settings.brand || "#02224B";
  }, [settings.brand, settings.brand2]);

  const job = projects.find(p => p.id === jobId);

  if (!ready) return <div className="min-h-screen flex items-center justify-center" style={{ color: "var(--muted)" }}>Loading…</div>;

  return (
    <div className="min-h-screen">
      <header className="brand-bg text-white sticky top-0 z-30 no-print" style={{ paddingTop: "env(safe-area-inset-top)", boxShadow: "0 2px 12px rgba(2,34,75,.25)" }}>
        <div className="max-w-4xl mx-auto px-4 flex items-center gap-3" style={{ minHeight: 68 }}>
          <img src={settings.logo || DEFAULT_LOGO} className="rounded" alt={settings.company} style={{ height: 52, width: "auto" }} />
          <div className="text-sm font-semibold" style={{ opacity: .85, letterSpacing: ".01em" }}>Site Pricing &amp; Takeoff</div>
        </div>
      </header>

      <main>
        {job ? (
          <JobWorkspace project={job} onChange={(p) => upsertProject(p)} onBack={() => setJobId(null)} onDelete={() => { if (confirm("Delete this job permanently?")) { deleteProject(job.id); setJobId(null); } }} />
        ) : nav === "jobs" ? <JobsScreen onOpen={setJobId} />
          : nav === "prices" ? <PricingScreen />
          : <SettingsScreen />}
      </main>

      {!job && (
        <nav className="fixed bottom-0 left-0 right-0 z-30 no-print flex" style={{ paddingBottom: "env(safe-area-inset-bottom)", background: "var(--paper)", borderTop: "1px solid var(--line)", boxShadow: "0 -2px 14px rgba(2,34,75,.08)" }}>
          {[["jobs", "Jobs", IcJobs], ["prices", "Prices", IcPrice], ["settings", "Settings", IcGear]].map(([k, l, Ic]) => (
            <button key={k} className={"navbtn " + (nav === k ? "navbtn-active" : "")} onClick={() => setNav(k)}>
              {nav === k && <span style={{ position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)", width: 34, height: 3, borderRadius: 3, background: "var(--brand)" }} />}
              <Ic size={27} />{l}
            </button>
          ))}
        </nav>
      )}
    </div>
  );
}

function Root(){ return <StoreProvider><AppShell /></StoreProvider>; }
ReactDOM.createRoot(document.getElementById("root")).render(<Root />);

<script>
  // pdf.js worker
  if (window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = "./vendor/pdf.worker.min.js";
  // compile app source (JSX) with Babel standalone — no build step needed
  var src = document.getElementById("app-source").textContent;
  var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
  var s = document.createElement("script");
  s.textContent = out;
  document.body.appendChild(s);
  // register offline service worker + keep it fresh so new builds always arrive
  if ("serviceWorker" in navigator) {
    var reloaded = false;
    navigator.serviceWorker.addEventListener("controllerchange", function(){ if (reloaded) return; reloaded = true; location.reload(); });
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("./sw.js").then(function(reg){
        reg.update();
        // if a new worker is waiting, activate it immediately
        function nudge(w){ if (w && w.state === "installed" && navigator.serviceWorker.controller) w.postMessage && reg.waiting && reg.waiting.postMessage({ type: "SKIP_WAITING" }); }
        if (reg.waiting) reg.waiting.postMessage({ type: "SKIP_WAITING" });
        reg.addEventListener("updatefound", function(){ var nw = reg.installing; if (nw) nw.addEventListener("statechange", function(){ nudge(nw); }); });
        setInterval(function(){ reg.update().catch(function(){}); }, 60 * 60 * 1000);  // hourly check while open
      }).catch(function(){});
    });
    document.addEventListener("visibilitychange", function(){ if (!document.hidden && navigator.serviceWorker.controller) navigator.serviceWorker.getRegistration().then(function(r){ r && r.update().catch(function(){}); }); });
  }
</script>
